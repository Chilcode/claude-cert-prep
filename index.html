\n<tr>\n<td>\"conventions for files spread throughout the codebase (*.test.tsx next to source)\"<\/td>\n<td><code>.claude/rules/<\/code> file with YAML frontmatter glob <code>paths:<\/code> \u2014 beats monolithic CLAUDE.md (inference) and per-dir CLAUDE.md (directory-bound)<\/td>\n<td>Q6, T3.3<\/td>\n<\/tr>\n<tr>\n<td>\"CLAUDE.md is huge/monolithic\"<\/td>\n<td>Split into <code>.claude/rules/<\/code> topic files, or <code>@import<\/code> per-package standards<\/td>\n<td>T3.1<\/td>\n<\/tr>\n<tr>\n<td>\"inconsistent behavior across sessions \u2014 which files are loaded?\"<\/td>\n<td><code>/memory<\/code> command to verify loaded memory files<\/td>\n<td>T3.1<\/td>\n<\/tr>\n<tr>\n<td>\"always-on universal standard\" vs \"on-demand task workflow\"<\/td>\n<td>CLAUDE.md vs skill \u2014 always-loaded vs invoked<\/td>\n<td>T3.2<\/td>\n<\/tr>\n<tr>\n<td>\"skill output is verbose / pollutes main conversation\"<\/td>\n<td><code>context: fork<\/code> frontmatter (isolated sub-agent context)<\/td>\n<td>T3.2<\/td>\n<\/tr>\n<tr>\n<td>\"restrict what a skill can do\"<\/td>\n<td><code>allowed-tools<\/code> frontmatter<\/td>\n<td>T3.2<\/td>\n<\/tr>\n<tr>\n<td>\"developers invoke skill without required parameters\"<\/td>\n<td><code>argument-hint<\/code> frontmatter<\/td>\n<td>T3.2<\/td>\n<\/tr>\n<tr>\n<td>\"architectural decisions / dozens of files / multiple valid approaches / migration touching 45+ files\"<\/td>\n<td>Plan mode first (explore + design before changing)<\/td>\n<td>Q5, T3.4<\/td>\n<\/tr>\n<tr>\n<td>\"single-file fix, clear stack trace, well-scoped change\"<\/td>\n<td>Direct execution \u2014 plan mode is overhead<\/td>\n<td>T3.4<\/td>\n<\/tr>\n<tr>\n<td>\"verbose discovery/exploration filling the context\"<\/td>\n<td>Explore subagent (or subagent delegation generally) returning summaries<\/td>\n<td>T3.4, T5.4<\/td>\n<\/tr>\n<tr>\n<td>\"secrets/tokens in shared MCP config\"<\/td>\n<td><code>${ENV_VAR}<\/code> expansion in <code>.mcp.json<\/code> \u2014 never commit credentials<\/td>\n<td>T2.4<\/td>\n<\/tr>\n<tr>\n<td>\"standard integration (Jira etc.)\"<\/td>\n<td>Existing community MCP server; custom only for team-specific workflows<\/td>\n<td>T2.4<\/td>\n<\/tr>\n<tr>\n<td>\"agent makes many exploratory calls just to see what data exists\"<\/td>\n<td>Expose the catalog as MCP <strong>resources<\/strong><\/td>\n<td>T2.4<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3>CI/CD<\/h3>\n<table>\n<thead>\n<tr>\n<th>Stem says<\/th>\n<th>Correct answer shape<\/th>\n<th>Source<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>\"pipeline hangs / waiting for interactive input\"<\/td>\n<td><code>claude -p<\/code> (<code>--print<\/code>) non-interactive mode<\/td>\n<td>Q10, T3.6<\/td>\n<\/tr>\n<tr>\n<td>\"machine-parseable findings / post as PR comments\"<\/td>\n<td><code>--output-format json<\/code> + <code>--json-schema<\/code><\/td>\n<td>T3.6<\/td>\n<\/tr>\n<tr>\n<td>\"duplicate comments when review re-runs after new commits\"<\/td>\n<td>Include prior findings in context; instruct to report only new/unaddressed issues<\/td>\n<td>T3.6<\/td>\n<\/tr>\n<tr>\n<td>\"test generation suggests duplicates\"<\/td>\n<td>Provide existing test files in context<\/td>\n<td>T3.6<\/td>\n<\/tr>\n<tr>\n<td>\"low-value tests / wrong fixtures\"<\/td>\n<td>Document testing standards + fixtures in CLAUDE.md<\/td>\n<td>T3.6<\/td>\n<\/tr>\n<tr>\n<td>\"same session that wrote the code reviews it poorly\"<\/td>\n<td>Independent second Claude instance without the generator's reasoning context \u2014 not self-review instructions, not extended thinking<\/td>\n<td>T3.6, T4.6<\/td>\n<\/tr>\n<tr>\n<td>\"14 files, inconsistent depth, contradictory findings\"<\/td>\n<td>Per-file local passes + separate cross-file integration pass (attention dilution fix)<\/td>\n<td>Q12, T1.6, T4.6<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3>API selection and structured output<\/h3>\n<table>\n<thead>\n<tr>\n<th>Stem says<\/th>\n<th>Correct answer shape<\/th>\n<th>Source<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>\"overnight / weekly / nightly / latency-tolerant / cut costs\"<\/td>\n<td>Message Batches API: 50% off, \u226424h window, no SLA, <code>custom_id<\/code> correlation, no multi-turn tools<\/td>\n<td>Q11, T4.5<\/td>\n<\/tr>\n<tr>\n<td>\"blocking / pre-merge / developers wait for the result\"<\/td>\n<td>Synchronous API \u2014 never batch, no \"usually fast enough,\" no timeout-fallback hybrid<\/td>\n<td>Q11<\/td>\n<\/tr>\n<tr>\n<td>\"N-hour SLA with 24h batch window\"<\/td>\n<td>Do the submission-frequency math (e.g., submit every 4h to guarantee 30h SLA)<\/td>\n<td>T4.5<\/td>\n<\/tr>\n<tr>\n<td>\"some batch requests failed\"<\/td>\n<td>Resubmit only failures identified by <code>custom_id<\/code>, with modifications (e.g., chunk oversized docs)<\/td>\n<td>T4.5<\/td>\n<\/tr>\n<tr>\n<td>\"before running a huge batch\"<\/td>\n<td>Refine the prompt on a sample set first<\/td>\n<td>T4.5<\/td>\n<\/tr>\n<tr>\n<td>\"guaranteed schema-compliant output / no JSON syntax errors\"<\/td>\n<td>Tool use (<code>tool_use<\/code>) with a JSON schema \u2014 not \"ask nicely for JSON\"<\/td>\n<td>T4.3<\/td>\n<\/tr>\n<tr>\n<td>\"model must call a tool, any tool / unknown document type with multiple schemas\"<\/td>\n<td><code>tool_choice: \"any\"<\/code><\/td>\n<td>T4.3, T2.3<\/td>\n<\/tr>\n<tr>\n<td>\"specific extraction must run first / this exact tool\"<\/td>\n<td>Forced <code>tool_choice: {\"type\": \"tool\", \"name\": \"...\"}<\/code><\/td>\n<td>T4.3, T2.3<\/td>\n<\/tr>\n<tr>\n<td>\"some fields missing from source documents / model fabricates values\"<\/td>\n<td>Nullable/optional schema fields so the model can return null instead of inventing<\/td>\n<td>T4.3<\/td>\n<\/tr>\n<tr>\n<td>\"categories don't cover everything / ambiguous cases\"<\/td>\n<td>Enum with <code>\"unclear\"<\/code>, and <code>\"other\"<\/code> + detail string<\/td>\n<td>T4.3<\/td>\n<\/tr>\n<tr>\n<td>\"schema valid but line items don't sum to total\"<\/td>\n<td>Semantic validation \u2014 tool_use kills syntax errors only; extract <code>calculated_total<\/code> alongside <code>stated_total<\/code>, add <code>conflict_detected<\/code><\/td>\n<td>T4.3, T4.4<\/td>\n<\/tr>\n<tr>\n<td>\"extraction failed validation \u2014 retry how?\"<\/td>\n<td>Retry with original document + failed extraction + the specific validation errors appended<\/td>\n<td>T4.4<\/td>\n<\/tr>\n<tr>\n<td>\"will retrying help?\"<\/td>\n<td>Yes for format/structure errors; <strong>no if the information is absent from the source<\/strong><\/td>\n<td>T4.4<\/td>\n<\/tr>\n<tr>\n<td>\"inconsistent output format despite detailed instructions\"<\/td>\n<td>Few-shot examples demonstrating the exact format \u2014 most effective technique for format consistency<\/td>\n<td>T4.2<\/td>\n<\/tr>\n<tr>\n<td>\"prose spec keeps being interpreted differently\"<\/td>\n<td>2\u20133 concrete input/output examples<\/td>\n<td>T3.5<\/td>\n<\/tr>\n<tr>\n<td>\"want design considerations surfaced you didn't anticipate\"<\/td>\n<td>Interview pattern \u2014 Claude asks questions before implementing<\/td>\n<td>T3.5<\/td>\n<\/tr>\n<tr>\n<td>\"multiple issues to fix \u2014 one message or several?\"<\/td>\n<td>Interacting fixes \u2192 single detailed message; independent fixes \u2192 sequential<\/td>\n<td>T3.5<\/td>\n<\/tr>\n<tr>\n<td>\"track why findings get dismissed as false positives\"<\/td>\n<td>Add a <code>detected_pattern<\/code> field to structured findings<\/td>\n<td>T4.4<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3>Multi-agent and context<\/h3>\n<table>\n<thead>\n<tr>\n<th>Stem says<\/th>\n<th>Correct answer shape<\/th>\n<th>Source<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>\"subagent doesn't know what the coordinator knows\"<\/td>\n<td>Context is NOT inherited \u2014 pass complete prior findings explicitly in the subagent's prompt<\/td>\n<td>T1.3<\/td>\n<\/tr>\n<tr>\n<td>\"run subagents in parallel\"<\/td>\n<td>Multiple Task tool calls in a <em>single<\/em> coordinator response; coordinator's <code>allowedTools<\/code> must include <code>\"Task\"<\/code><\/td>\n<td>T1.3<\/td>\n<\/tr>\n<tr>\n<td>\"coordinator prompt style\"<\/td>\n<td>Research goals + quality criteria, not step-by-step procedures (subagent adaptability)<\/td>\n<td>T1.3<\/td>\n<\/tr>\n<tr>\n<td>\"timeout in subagent / design error flow\"<\/td>\n<td>Structured error context up to coordinator: failure type, attempted query, partial results, alternatives<\/td>\n<td>Q8, T5.3<\/td>\n<\/tr>\n<tr>\n<td>\"no results \u2014 error or fine?\"<\/td>\n<td>Distinguish access failures (retry decision needed) from valid empty results (successful query, no matches)<\/td>\n<td>T5.3, T2.2<\/td>\n<\/tr>\n<tr>\n<td>\"which errors should subagents handle themselves\"<\/td>\n<td>Local recovery for transient failures; propagate only unresolvable ones, with partials and what was attempted<\/td>\n<td>T2.2, T5.3<\/td>\n<\/tr>\n<tr>\n<td>\"generic 'Operation failed' responses\"<\/td>\n<td>Structured error metadata: <code>errorCategory<\/code> (transient/validation/permission), <code>isRetryable<\/code>, human-readable description<\/td>\n<td>T2.2<\/td>\n<\/tr>\n<tr>\n<td>\"agent needs one frequent capability outside its role (85/15 split)\"<\/td>\n<td>One scoped tool for the common case; coordinator routing stays for complex cases (least privilege)<\/td>\n<td>Q9<\/td>\n<\/tr>\n<tr>\n<td>\"numbers/dates/amounts getting lost in summarization\"<\/td>\n<td>Persistent \"case facts\" block (amounts, dates, order numbers, statuses) outside summarized history, included in every prompt<\/td>\n<td>T5.1<\/td>\n<\/tr>\n<tr>\n<td>\"tool returns 40+ fields, only 5 matter\"<\/td>\n<td>Trim tool outputs to relevant fields before they accumulate in context<\/td>\n<td>T5.1<\/td>\n<\/tr>\n<tr>\n<td>\"findings from the middle of long input get dropped\"<\/td>\n<td>Lost-in-the-middle: key-findings summary at the top + explicit section headers<\/td>\n<td>T5.1<\/td>\n<\/tr>\n<tr>\n<td>\"downstream agent has a small context budget\"<\/td>\n<td>Upstream agents return structured data (key facts, citations, scores), not verbose reasoning chains<\/td>\n<td>T5.1<\/td>\n<\/tr>\n<tr>\n<td>\"long session \u2014 agent starts citing 'typical patterns' instead of actual code\"<\/td>\n<td>Context degradation: scratchpad files for key findings, subagent delegation, <code>/compact<\/code><\/td>\n<td>T5.4<\/td>\n<\/tr>\n<tr>\n<td>\"system crash mid-research \u2014 recover how?\"<\/td>\n<td>Structured state exports (manifest per agent); coordinator loads manifest on resume<\/td>\n<td>T5.4<\/td>\n<\/tr>\n<tr>\n<td>\"resume session after files changed\"<\/td>\n<td>Tell the resumed session exactly which files changed; if prior tool results are stale, start fresh with an injected summary instead<\/td>\n<td>T1.7<\/td>\n<\/tr>\n<tr>\n<td>\"compare two approaches from one shared analysis\"<\/td>\n<td><code>fork_session<\/code> \u2014 independent branches from a shared baseline<\/td>\n<td>T1.7<\/td>\n<\/tr>\n<tr>\n<td>\"continue a named prior investigation\"<\/td>\n<td><code>--resume &lt;session-name&gt;<\/code><\/td>\n<td>T1.7<\/td>\n<\/tr>\n<tr>\n<td>\"citations lost after synthesis / who said what\"<\/td>\n<td>Structured claim-source mappings (URL, doc name, excerpt) that synthesis must preserve and merge<\/td>\n<td>T5.6<\/td>\n<\/tr>\n<tr>\n<td>\"two credible sources give different numbers\"<\/td>\n<td>Include BOTH, annotated with source attribution \u2014 never arbitrarily pick one<\/td>\n<td>T5.6<\/td>\n<\/tr>\n<tr>\n<td>\"old vs new data read as contradiction\"<\/td>\n<td>Require publication/collection dates in structured outputs<\/td>\n<td>T5.6<\/td>\n<\/tr>\n<tr>\n<td>\"some sources were unavailable\"<\/td>\n<td>Coverage annotations: which findings are well-supported vs which areas have gaps<\/td>\n<td>T5.3, T5.6<\/td>\n<\/tr>\n<tr>\n<td>\"customer explicitly demands a human\"<\/td>\n<td>Escalate immediately \u2014 don't investigate first<\/td>\n<td>T5.2<\/td>\n<\/tr>\n<tr>\n<td>\"customer frustrated but issue is simple\"<\/td>\n<td>Acknowledge frustration + offer resolution; escalate only if they reiterate<\/td>\n<td>T5.2<\/td>\n<\/tr>\n<tr>\n<td>\"policy is silent/ambiguous on the request\"<\/td>\n<td>Escalate \u2014 policy gap is a trigger (complexity alone is not)<\/td>\n<td>T5.2<\/td>\n<\/tr>\n<tr>\n<td>\"lookup returns multiple customer matches\"<\/td>\n<td>Ask for an additional identifier \u2014 never pick by heuristic<\/td>\n<td>T5.2<\/td>\n<\/tr>\n<tr>\n<td>\"97% overall accuracy \u2014 automate?\"<\/td>\n<td>Aggregate masks segment failures: analyze by document type and field first; stratified random sampling of high-confidence extractions<\/td>\n<td>T5.5<\/td>\n<\/tr>\n<tr>\n<td>\"limited human reviewer capacity\"<\/td>\n<td>Field-level confidence scores calibrated on labeled validation sets; route low-confidence + ambiguous/contradictory sources to review<\/td>\n<td>T5.5<\/td>\n<\/tr>\n<tr>\n<td>\"search file CONTENTS for a pattern\"<\/td>\n<td>Grep<\/td>\n<td>T2.5<\/td>\n<\/tr>\n<tr>\n<td>\"find files by NAME/extension pattern\"<\/td>\n<td>Glob (<code>**/*.test.tsx<\/code>)<\/td>\n<td>T2.5<\/td>\n<\/tr>\n<tr>\n<td>\"Edit fails \u2014 anchor text not unique\"<\/td>\n<td>Read + Write fallback<\/td>\n<td>T2.5<\/td>\n<\/tr>\n<tr>\n<td>\"understand an unfamiliar codebase\"<\/td>\n<td>Incremental: Grep entry points \u2192 Read to follow imports \u2014 never read everything upfront<\/td>\n<td>T2.5<\/td>\n<\/tr>\n<tr>\n<td>\"open-ended task (add tests to legacy codebase)\"<\/td>\n<td>Dynamic decomposition: map structure \u2192 find high-impact areas \u2192 prioritized plan that adapts; fixed prompt chaining is for predictable multi-aspect work<\/td>\n<td>T1.6<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>5. The one-sentence version<\/h2>\n<p><strong>Find the defect the stem names, apply the cheapest fix that touches exactly it \u2014 unless the stakes are money/compliance/ordering, in which case enforce it in code \u2014 and kill any option that is a named anti-pattern, a fabricated feature, the wrong scope, or a fix for a component the logs already cleared.<\/strong><\/p>","words":4234},"01-customer-support-agent":{"title":"Scenario 1 \u2014 Customer Support Resolution Agent","group":"Scenario walkthroughs","html":"<h1>Scenario 1 \u2014 Customer Support Resolution Agent<\/h1>\n<blockquote>\n<p><strong>Exam frame:<\/strong> You're building a customer support resolution agent with the <strong>Claude Agent SDK<\/strong>. It handles high-ambiguity requests (returns, billing disputes, account issues) through four custom MCP tools: <code>get_customer<\/code>, <code>lookup_order<\/code>, <code>process_refund<\/code>, <code>escalate_to_human<\/code>. Target: <strong>80%+ first-contact resolution<\/strong> while knowing when to escalate.<\/p>\n<p><strong>Domains tested here:<\/strong> D1 Agentic Architecture &amp; Orchestration (27%), D2 Tool Design &amp; MCP Integration (18%), D5 Context Management &amp; Reliability (15%). That's 60% of the exam weight concentrated in one scenario. Questions 1\u20133 in the guide's sample set come from this scenario \u2014 all three are dissected below.<\/p>\n<\/blockquote>\n<hr />\n<h2>1. The system at a glance<\/h2>\n<p>One agent, one loop, four tools, two enforcement layers. No subagents needed \u2014 this is a <strong>single-agent loop<\/strong> with programmatic guardrails wrapped around the tool calls.<\/p>\n<p>Components:<\/p>\n<ul>\n<li><strong>The agentic loop<\/strong> \u2014 send request \u2192 check <code>stop_reason<\/code> \u2192 if <code>\"tool_use\"<\/code>, execute tools, append results to history, loop; if <code>\"end_turn\"<\/code>, reply to the customer. The model decides which tool to call next based on context (model-driven), not a hardcoded decision tree.<\/li>\n<li><strong>Four MCP tools<\/strong> \u2014 each with a detailed description (input formats, example queries, edge cases, boundaries vs. similar tools) and structured error responses (<code>errorCategory<\/code>, <code>isRetryable<\/code>, human-readable message, MCP <code>isError<\/code> flag).<\/li>\n<li><strong>Enforcement layer (code, not prompt)<\/strong> \u2014 a programmatic prerequisite gate that blocks <code>lookup_order<\/code>/<code>process_refund<\/code> until <code>get_customer<\/code> has returned a verified customer ID, plus a tool-call interception hook that blocks refunds over $500 and redirects to human escalation.<\/li>\n<li><strong>PostToolUse hook<\/strong> \u2014 normalizes heterogeneous data from different backend systems (Unix timestamps vs. ISO 8601, numeric status codes) and trims 40-field order payloads to the ~5 fields that matter, <em>before<\/em> the model sees them.<\/li>\n<li><strong>Context layer<\/strong> \u2014 a persistent \"case facts\" block (amounts, dates, order IDs, statuses, customer-stated expectations) injected into every request, outside the summarized conversation history.<\/li>\n<li><strong>Escalation path<\/strong> \u2014 <code>escalate_to_human<\/code> takes a <strong>structured handoff<\/strong> (customer ID, root cause, refund amount, recommended action) because the human agent has no access to the transcript.<\/li>\n<\/ul>\n<pre><code> Customer message\n       \u2502\n       \u25bc\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 AGENTIC LOOP \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502  messages + case-facts block \u2500\u2500\u25ba Claude (Agent SDK)          \u2502\n\u2502                                     \u2502                        \u2502\n\u2502              stop_reason == &quot;end_turn&quot;? \u2500\u2500yes\u2500\u2500\u25ba reply       \u2502\n\u2502                                     \u2502 no (&quot;tool_use&quot;)        \u2502\n\u2502                                     \u25bc                        \u2502\n\u2502   \u250c\u2500\u2500 ENFORCEMENT (deterministic, in code) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510   \u2502\n\u2502   \u2502 prerequisite gate: get_customer verified first?      \u2502   \u2502\n\u2502   \u2502 interception hook: refund &gt; $500 \u2192 block \u2192 escalate  \u2502   \u2502\n\u2502   \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518   \u2502\n\u2502                   \u25bc                                          \u2502\n\u2502     MCP tools:  get_customer  lookup_order                   \u2502\n\u2502                 process_refund  escalate_to_human            \u2502\n\u2502                   \u2502                                          \u2502\n\u2502   \u250c\u2500\u2500 PostToolUse hook \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510   \u2502\n\u2502   \u2502 normalize timestamps/status codes, trim to           \u2502   \u2502\n\u2502   \u2502 relevant fields, structured errors pass through      \u2502   \u2502\n\u2502   \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518   \u2502\n\u2502                   \u25bc                                          \u2502\n\u2502     tool_result appended to messages \u2500\u2500\u25ba next iteration      \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n       \u2502\n       \u2514\u2500\u2500\u25ba escalate_to_human(customer_id, root_cause,\n             refund_amount, recommended_action)  [human has no transcript]\n<\/code><\/pre>\n<p>The exam's core thesis for this scenario: <strong>anything with financial consequences gets deterministic enforcement in code; everything judgment-shaped (tool selection, escalation calibration) gets fixed with descriptions and few-shot examples in the prompt.<\/strong> Nearly every question maps back to that split.<\/p>\n<hr />\n<h2>2. Build it step by step<\/h2>\n<p>Build order matters because each layer depends on the one before it. Loop mechanics shown against the raw Messages API (<code>anthropic<\/code> Python package) \u2014 that's the stable surface and what the exam's <code>stop_reason<\/code>/<code>tool_choice<\/code> questions describe. Agent-SDK-specific concepts (hooks, <code>AgentDefinition<\/code>, <code>allowedTools<\/code>) are labeled sketches using the exam guide's exact terminology.<\/p>\n<h3>Step 1 \u2014 Tool contracts first (descriptions + JSON schemas)<\/h3>\n<p>Tools before loop, because <strong>tool descriptions are the primary mechanism the model uses for tool selection<\/strong>. <code>get_customer<\/code> and <code>lookup_order<\/code> both take an identifier string \u2014 with minimal descriptions (\"Retrieves customer information\" / \"Retrieves order details\") the model will misroute. Each description must state: input formats, example queries, edge cases, and boundaries vs. the similar tool.<\/p>\n<pre><code class=\"language-python\">TOOLS = [\n    {\n        &quot;name&quot;: &quot;get_customer&quot;,\n        &quot;description&quot;: (\n            &quot;Look up and verify a customer's identity in the CRM. Call this FIRST, &quot;\n            &quot;before any order or refund operation. Input: an email address &quot;\n            &quot;(e.g. 'jane@example.com') or a customer ID (format CUST-######). &quot;\n            &quot;Does NOT accept order numbers \u2014 use lookup_order for those. &quot;\n            &quot;Returns a verified customer_id, account status, and contact info. &quot;\n            &quot;If multiple customers match, all candidates are returned \u2014 ask the &quot;\n            &quot;user for an additional identifier instead of guessing.&quot;\n        ),\n        &quot;input_schema&quot;: {\n            &quot;type&quot;: &quot;object&quot;,\n            &quot;properties&quot;: {\n                &quot;identifier&quot;: {\n                    &quot;type&quot;: &quot;string&quot;,\n                    &quot;description&quot;: &quot;Email address or CUST-###### customer ID&quot;,\n                }\n            },\n            &quot;required&quot;: [&quot;identifier&quot;],\n        },\n    },\n    {\n        &quot;name&quot;: &quot;lookup_order&quot;,\n        &quot;description&quot;: (\n            &quot;Retrieve details for a specific order. Input: an order number &quot;\n            &quot;(format ORD-#####, e.g. from 'check my order #12345'). Requires a &quot;\n            &quot;verified customer first (get_customer). Does NOT accept emails or &quot;\n            &quot;customer IDs \u2014 use get_customer for identity. Returns order status, &quot;\n            &quot;items, amounts, and dates.&quot;\n        ),\n        &quot;input_schema&quot;: {\n            &quot;type&quot;: &quot;object&quot;,\n            &quot;properties&quot;: {\n                &quot;order_id&quot;: {&quot;type&quot;: &quot;string&quot;, &quot;description&quot;: &quot;ORD-##### order number&quot;},\n                &quot;customer_id&quot;: {&quot;type&quot;: &quot;string&quot;, &quot;description&quot;: &quot;Verified CUST-###### ID&quot;},\n            },\n            &quot;required&quot;: [&quot;order_id&quot;, &quot;customer_id&quot;],\n        },\n    },\n    {\n        &quot;name&quot;: &quot;process_refund&quot;,\n        &quot;description&quot;: (\n            &quot;Issue a refund for an order. Only call after get_customer has verified &quot;\n            &quot;identity AND lookup_order has confirmed the order belongs to that &quot;\n            &quot;customer. Refunds over $500 are blocked by policy and must go through &quot;\n            &quot;escalate_to_human instead.&quot;\n        ),\n        &quot;input_schema&quot;: {\n            &quot;type&quot;: &quot;object&quot;,\n            &quot;properties&quot;: {\n                &quot;order_id&quot;: {&quot;type&quot;: &quot;string&quot;},\n                &quot;customer_id&quot;: {&quot;type&quot;: &quot;string&quot;},\n                &quot;amount&quot;: {&quot;type&quot;: &quot;number&quot;, &quot;description&quot;: &quot;Refund amount in USD&quot;},\n                &quot;reason&quot;: {&quot;type&quot;: &quot;string&quot;},\n            },\n            &quot;required&quot;: [&quot;order_id&quot;, &quot;customer_id&quot;, &quot;amount&quot;, &quot;reason&quot;],\n        },\n    },\n    {\n        &quot;name&quot;: &quot;escalate_to_human&quot;,\n        &quot;description&quot;: (\n            &quot;Hand the case to a human agent. The human has NO access to this &quot;\n            &quot;conversation transcript, so every field must be complete and &quot;\n            &quot;self-contained. Use when: the customer explicitly asks for a human, &quot;\n            &quot;policy is ambiguous or silent on the request, you cannot make &quot;\n            &quot;meaningful progress, or a refund exceeds the $500 policy limit.&quot;\n        ),\n        &quot;input_schema&quot;: {\n            &quot;type&quot;: &quot;object&quot;,\n            &quot;properties&quot;: {\n                &quot;customer_id&quot;: {&quot;type&quot;: &quot;string&quot;},\n                &quot;root_cause&quot;: {&quot;type&quot;: &quot;string&quot;, &quot;description&quot;: &quot;Your analysis of the underlying issue&quot;},\n                &quot;refund_amount&quot;: {&quot;type&quot;: &quot;number&quot;, &quot;description&quot;: &quot;Requested/blocked amount, if any&quot;},\n                &quot;recommended_action&quot;: {&quot;type&quot;: &quot;string&quot;, &quot;description&quot;: &quot;What the human should do&quot;},\n            },\n            &quot;required&quot;: [&quot;customer_id&quot;, &quot;root_cause&quot;, &quot;recommended_action&quot;],\n        },\n    },\n]\n<\/code><\/pre>\n<p>The escalation schema is not decoration \u2014 the guide names those exact four fields (customer ID, root cause, refund amount, recommended action) as the structured handoff for humans who lack transcript access.<\/p>\n<h3>Step 2 \u2014 The agentic loop (control flow on <code>stop_reason<\/code>, nothing else)<\/h3>\n<p>The lifecycle the exam tests: send request \u2192 inspect <code>stop_reason<\/code> (<code>\"tool_use\"<\/code> vs <code>\"end_turn\"<\/code>) \u2192 execute requested tools \u2192 return results for the next iteration. Tool results are appended to conversation history so the model can reason about the next action.<\/p>\n<pre><code class=\"language-python\">import anthropic\n\nclient = anthropic.Anthropic()\n\ndef run_agent(user_message: str, case_facts: str) -&gt; str:\n    messages = [{&quot;role&quot;: &quot;user&quot;, &quot;content&quot;: f&quot;{case_facts}\\n\\n{user_message}&quot;}]\n\n    while True:\n        response = client.messages.create(\n            model=&quot;claude-opus-4-8&quot;,\n            max_tokens=4096,\n            system=SYSTEM_PROMPT,          # escalation criteria + few-shot (Step 6)\n            tools=TOOLS,\n            messages=messages,             # full history every time \u2014 API is stateless\n        )\n\n        # Whole assistant turn goes into history, tool_use blocks included\n        messages.append({&quot;role&quot;: &quot;assistant&quot;, &quot;content&quot;: response.content})\n\n        if response.stop_reason == &quot;end_turn&quot;:\n            # Model is done \u2014 final customer-facing text\n            return next(b.text for b in response.content if b.type == &quot;text&quot;)\n\n        if response.stop_reason == &quot;tool_use&quot;:\n            results = []\n            for block in response.content:\n                if block.type == &quot;tool_use&quot;:\n                    output = execute_tool(block.name, block.input)   # Steps 3-5\n                    results.append({\n                        &quot;type&quot;: &quot;tool_result&quot;,\n                        &quot;tool_use_id&quot;: block.id,     # must match the tool_use block\n                        &quot;content&quot;: output,\n                    })\n            # All results go back in ONE user message; loop continues\n            messages.append({&quot;role&quot;: &quot;user&quot;, &quot;content&quot;: results})\n<\/code><\/pre>\n<p><strong>Anti-patterns the exam names as wrong answers:<\/strong> parsing natural-language signals (\"I'm finished\") to decide termination, setting an arbitrary iteration cap as the <em>primary<\/em> stopping mechanism, or checking whether the assistant produced text content as a completion indicator. <code>stop_reason<\/code> is the only loop-control signal.<\/p>\n<p><code>tool_choice<\/code> stays <code>\"auto\"<\/code> here (the default) \u2014 a support agent must be able to answer conversationally. <code>\"any\"<\/code> forces <em>some<\/em> tool call every turn; forced selection (<code>{\"type\": \"tool\", \"name\": \"...\"}<\/code>) forces one specific tool. Know all three for D2, but know that forced <code>tool_choice<\/code> is <strong>not<\/strong> how you enforce tool <em>ordering<\/em> \u2014 that's the next step.<\/p>\n<h3>Step 3 \u2014 Structured error responses in every tool<\/h3>\n<p>Generic <code>\"Operation failed\"<\/code> blocks intelligent recovery. Each tool returns structured error metadata using the MCP <code>isError<\/code> flag pattern: an <code>errorCategory<\/code> (transient / validation / business / permission), an <code>isRetryable<\/code> boolean, and a human-readable description.<\/p>\n<pre><code class=\"language-python\">import json, time\n\ndef execute_tool(name: str, args: dict) -&gt; str:\n    gate_error = check_prerequisites(name, args)      # Step 4\n    if gate_error:\n        return gate_error\n    try:\n        return json.dumps(BACKENDS[name](args))\n    except BackendTimeout:\n        return json.dumps({\n            &quot;isError&quot;: True,\n            &quot;errorCategory&quot;: &quot;transient&quot;,\n            &quot;isRetryable&quot;: True,\n            &quot;message&quot;: &quot;Order service timed out. Safe to retry.&quot;,\n        })\n    except PolicyViolation as e:\n        return json.dumps({\n            &quot;isError&quot;: True,\n            &quot;errorCategory&quot;: &quot;business&quot;,\n            &quot;retriable&quot;: False,   # guide's wording for business-rule violations\n            &quot;message&quot;: (\n                f&quot;Refund denied: {e.reason}. This is a policy decision, not a &quot;\n                &quot;system error \u2014 explain it to the customer; do not retry.&quot;\n            ),\n        })\n<\/code><\/pre>\n<p>Two distinctions the exam drills:\n- <strong>Transient vs. business vs. validation vs. permission<\/strong> \u2014 the category tells the agent whether to retry, rephrase input, explain to the customer, or escalate.\n- <strong>Access failure vs. valid empty result.<\/strong> A timeout (\"couldn't reach the order system\") and \"this customer has no orders\" must look different. Empty-but-successful is a <em>result<\/em>, not an error \u2014 returning it as an error triggers pointless retries; returning a timeout as an empty success silently corrupts the answer.<\/p>\n<h3>Step 4 \u2014 Programmatic prerequisite gate (identity before money)<\/h3>\n<p>The scenario's signature question. Production shows the agent skipping <code>get_customer<\/code> in 12% of cases and refunding misidentified accounts. Prompt instructions (\"verification is MANDATORY\") and few-shot examples are <strong>probabilistic<\/strong> \u2014 a non-zero failure rate is unacceptable when errors have financial consequences. The fix is a programmatic prerequisite that <strong>blocks downstream tool calls until <code>get_customer<\/code> has returned a verified customer ID<\/strong>:<\/p>\n<pre><code class=\"language-python\">session_state = {&quot;verified_customer_id&quot;: None}\nGATED_TOOLS = {&quot;lookup_order&quot;, &quot;process_refund&quot;}\n\ndef check_prerequisites(name: str, args: dict) -&gt; str | None:\n    if name in GATED_TOOLS and session_state[&quot;verified_customer_id&quot;] is None:\n        return json.dumps({\n            &quot;isError&quot;: True,\n            &quot;errorCategory&quot;: &quot;validation&quot;,\n            &quot;isRetryable&quot;: False,\n            &quot;message&quot;: (&quot;Blocked: customer identity not verified. Call get_customer &quot;\n                        &quot;with the customer's email or CUST ID first.&quot;),\n        })\n    return None\n\n# set on success inside the get_customer backend wrapper:\n#   session_state[&quot;verified_customer_id&quot;] = result[&quot;customer_id&quot;]\n<\/code><\/pre>\n<p>The blocked call comes back as a tool result, so the model reads it, calls <code>get_customer<\/code>, and self-corrects \u2014 but the <em>guarantee<\/em> lives in code. This is Sample Question 1: answer A (programmatic prerequisite) beats B (system prompt), C (few-shot), and D (routing classifier \u2014 which fixes tool <em>availability<\/em>, not tool <em>ordering<\/em>, the wrong problem).<\/p>\n<h3>Step 5 \u2014 Agent SDK hooks: interception + PostToolUse normalization<\/h3>\n<p>Two hook patterns, both D1 Task 1.5. Sketch code \u2014 the concepts and names (<code>PostToolUse<\/code>, tool call interception, hooks-for-deterministic-guarantees) are what the exam tests, not exact SDK signatures.<\/p>\n<p><strong>Tool call interception \u2014 enforce the $500 refund policy:<\/strong><\/p>\n<pre><code class=\"language-python\"># Agent SDK concept sketch \u2014 intercepts OUTGOING tool calls before execution\nasync def block_large_refunds(tool_name: str, tool_input: dict):\n    if tool_name == &quot;process_refund&quot; and tool_input[&quot;amount&quot;] &gt; 500:\n        return {\n            &quot;decision&quot;: &quot;block&quot;,\n            &quot;reason&quot;: (&quot;Policy: refunds over $500 require human approval. &quot;\n                       &quot;Call escalate_to_human with a structured handoff &quot;\n                       &quot;(customer_id, root_cause, refund_amount, recommended_action).&quot;),\n        }\n    # returning nothing lets the call proceed\n<\/code><\/pre>\n<p>Block <strong>and redirect to the alternative workflow<\/strong> (escalation) \u2014 don't just fail. Same principle as Step 4: business rules that require <em>guaranteed<\/em> compliance go in hooks; prompt instructions are for probabilistic steering.<\/p>\n<p><strong>PostToolUse \u2014 normalize heterogeneous tool results before the model processes them:<\/strong><\/p>\n<pre><code class=\"language-python\"># Agent SDK concept sketch \u2014 PostToolUse hook: transform results BEFORE the model sees them\nRELEVANT_ORDER_FIELDS = {&quot;order_id&quot;, &quot;status&quot;, &quot;total&quot;, &quot;delivery_date&quot;, &quot;refund_eligible&quot;}\n\nasync def normalize_results(tool_name: str, result: dict) -&gt; dict:\n    if tool_name == &quot;lookup_order&quot;:\n        # Different backends disagree: Unix timestamps vs ISO 8601, numeric status codes\n        result[&quot;delivery_date&quot;] = to_iso8601(result[&quot;delivery_date&quot;])\n        result[&quot;status&quot;] = STATUS_CODE_MAP.get(result[&quot;status&quot;], result[&quot;status&quot;])\n        # Trim 40+ fields to the ~5 return-relevant ones before they hit context\n        result = {k: v for k, v in result.items() if k in RELEVANT_ORDER_FIELDS}\n    return result\n<\/code><\/pre>\n<p>Why a hook and not a prompt instruction (\"convert all timestamps to ISO 8601\")? Deterministic transformation, zero model attention spent, and it doubles as context hygiene (D5): raw order lookups carry 40+ fields when only ~5 are relevant \u2014 trimming <em>before<\/em> they accumulate is the guide's stated fix for tool results consuming tokens disproportionately to their relevance.<\/p>\n<p><strong>Agent SDK framing for the rest:<\/strong> the agent is configured via an <strong>AgentDefinition<\/strong> (description, system prompt, tool restrictions). This scenario doesn't need subagents, but know the trigger facts anyway: subagents are spawned with the <strong>Task tool<\/strong>, the coordinator's <strong>allowedTools must include \"Task\"<\/strong>, subagents do <strong>not<\/strong> inherit the parent's conversation history \u2014 context is passed explicitly in the prompt \u2014 and <strong>fork_session<\/strong> creates independent branches from a shared baseline. Multi-concern requests here (\"wrong item AND double-charged AND locked account\") don't need subagents \u2014 decompose into distinct items, investigate each (in parallel where possible) with shared context, then synthesize one unified resolution.<\/p>\n<h3>Step 6 \u2014 Escalation criteria in the system prompt (with few-shot)<\/h3>\n<p>Escalation calibration is a <em>judgment<\/em> problem, so it lives in the prompt \u2014 explicit criteria plus 2\u20134 few-shot examples demonstrating escalate-vs-resolve, showing the <em>reasoning<\/em> for why one action beat the plausible alternative.<\/p>\n<pre><code class=\"language-python\">SYSTEM_PROMPT = &quot;&quot;&quot;You are a customer support resolution agent.\n\nESCALATE (call escalate_to_human) when:\n- The customer explicitly asks for a human \u2014 escalate immediately, do NOT\n  investigate first.\n- Policy is ambiguous or silent on the request (e.g. competitor price matching\n  when policy only covers own-site adjustments).\n- You cannot make meaningful progress after reasonable investigation.\n- A refund exceeds the $500 policy limit.\n\nRESOLVE AUTONOMOUSLY when:\n- The case fits standard policy (e.g. damage replacement with photo evidence),\n  even if the customer sounds frustrated. Acknowledge the frustration, offer the\n  resolution; escalate only if they reiterate wanting a human.\n\nNEVER escalate based on: customer sentiment alone, or your own confidence level.\nComplexity is judged against policy coverage, not tone.\n\nIf get_customer returns multiple matches, ask for an additional identifier\n(order number, phone, billing zip). Never pick a match heuristically.\n\n&lt;example&gt;\nCustomer: &quot;My blender arrived shattered, here's a photo. I want a replacement.&quot;\nReasoning: standard damage claim with evidence \u2014 squarely inside policy.\nAction: resolve autonomously (verify, confirm order, process replacement).\n&lt;/example&gt;\n&lt;example&gt;\nCustomer: &quot;Competitor sells this for $40 less, match it or I return everything.&quot;\nReasoning: policy covers own-site price adjustments only; silent on competitor\nmatching. Policy gap \u2192 not my call.\nAction: escalate_to_human with root cause and recommended action.\n&lt;/example&gt;\n&lt;example&gt;\nCustomer: &quot;This is ridiculous, I've been waiting a week. Where is my package?!&quot;\nReasoning: frustrated, but the issue (shipment tracking) is fully within my\ncapability. Sentiment is not complexity.\nAction: acknowledge frustration, look up the order, resolve.\n&lt;/example&gt;&quot;&quot;&quot;\n<\/code><\/pre>\n<p>This is Sample Question 3: 55% FCR because the agent escalates easy cases and freelances hard ones \u2192 the root cause is <strong>unclear decision boundaries<\/strong>, fixed with explicit criteria + few-shot (answer A). Not self-reported confidence scores (LLM confidence is poorly calibrated \u2014 the agent is already wrongly confident on hard cases), not a trained classifier (over-engineered before prompt optimization is tried), not sentiment analysis (sentiment doesn't correlate with case complexity).<\/p>\n<h3>Step 7 \u2014 The case-facts context layer<\/h3>\n<p>Long, multi-issue conversations get summarized; progressive summarization <strong>condenses numerical values, percentages, dates, and customer-stated expectations into vague summaries<\/strong>. Defense: extract transactional facts into a persistent block included in <em>each<\/em> prompt, outside the summarized history.<\/p>\n<pre><code class=\"language-python\">case_facts = &quot;&quot;&quot;&lt;case_facts&gt;\ncustomer_id: CUST-004821 (verified)\norder_id: ORD-99120 | total: $129.99 | delivered: 2026-06-30\nissue_1: damaged item, photo provided | status: refund pending\nissue_2: duplicate charge $129.99 on 2026-07-01 | status: investigating\ncustomer_expectation: full refund to card, NOT store credit\n&lt;/case_facts&gt;&quot;&quot;&quot;\n<\/code><\/pre>\n<p>Update it as tools return facts; for multi-issue sessions persist per-issue structured data (order IDs, amounts, statuses) as its own context layer. Companion rules from D5 Task 5.1: pass complete conversation history in each API request (the loop in Step 2 already does), and when aggregating long inputs, put key-findings summaries at the <strong>beginning<\/strong> with explicit section headers \u2014 models reliably process the beginning and end of long inputs but drop the middle (\"lost in the middle\").<\/p>\n<hr />\n<h2>3. The decision points this scenario tests<\/h2>\n<p>Situation \u2192 correct move \u2192 why \u2192 the trap. These map directly to task statements 1.1, 1.4, 1.5, 2.1\u20132.3, 5.1\u20135.3.<\/p>\n<h3>D1 \u2014 Loop and enforcement (Tasks 1.1, 1.4, 1.5)<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>When does the loop stop?<\/td>\n<td>Continue while <code>stop_reason == \"tool_use\"<\/code>, terminate on <code>\"end_turn\"<\/code><\/td>\n<td>Deterministic API signal, the only reliable one<\/td>\n<td>Parsing assistant text for \"done\", iteration caps as the primary stop, treating presence of text as completion<\/td>\n<\/tr>\n<tr>\n<td>Model just called a tool<\/td>\n<td>Execute it, append <code>tool_result<\/code> (matching <code>tool_use_id<\/code>) to history, request again<\/td>\n<td>The model needs the result in context to reason about the next action<\/td>\n<td>Dropping results, starting a fresh conversation, sending results without the assistant's <code>tool_use<\/code> turn<\/td>\n<\/tr>\n<tr>\n<td>Who decides which tool runs next?<\/td>\n<td>The model, from context (model-driven decision-making)<\/td>\n<td>That's what makes it an agent handling high-ambiguity requests<\/td>\n<td>Pre-configured decision trees / fixed tool sequences<\/td>\n<\/tr>\n<tr>\n<td>Identity must be verified before refunds<\/td>\n<td>Programmatic prerequisite gate blocking <code>lookup_order<\/code>/<code>process_refund<\/code> until <code>get_customer<\/code> returns a verified ID<\/td>\n<td>Prompt compliance is probabilistic; financial errors need deterministic guarantees<\/td>\n<td>\"Strengthen the system prompt\", \"add few-shot\", routing classifier (fixes availability, not ordering)<\/td>\n<\/tr>\n<tr>\n<td>Refunds over $500 forbidden<\/td>\n<td>Tool call interception hook: block + redirect to <code>escalate_to_human<\/code><\/td>\n<td>Hooks give guaranteed compliance; also route to the alternative workflow, don't just fail<\/td>\n<td>A <code>MUST NOT<\/code> line in the prompt; blocking without offering escalation<\/td>\n<\/tr>\n<tr>\n<td>Tools return mixed formats (Unix ts / ISO 8601 / numeric codes)<\/td>\n<td>PostToolUse hook normalizes results before the model processes them<\/td>\n<td>Deterministic transformation; no model attention wasted<\/td>\n<td>Prompt instruction \"convert timestamps\"; per-tool duplicate parsing logic<\/td>\n<\/tr>\n<tr>\n<td>Customer message contains 3 distinct issues<\/td>\n<td>Decompose into distinct items, investigate each in parallel with shared context, synthesize one unified resolution<\/td>\n<td>Coverage of every concern without context fragmentation<\/td>\n<td>Answering the first issue only; forcing the customer to re-ask; one subagent per issue with no shared context<\/td>\n<\/tr>\n<tr>\n<td>Escalating mid-process<\/td>\n<td>Structured handoff: customer ID, root cause, refund amount, recommended action<\/td>\n<td>The human agent has no access to the conversation transcript<\/td>\n<td>\"Escalating now\" with no payload; dumping the raw transcript<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3>D2 \u2014 Tool design (Tasks 2.1, 2.2, 2.3)<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Agent calls <code>get_customer<\/code> for \"check my order #12345\"; both tools have minimal descriptions<\/td>\n<td><strong>First step:<\/strong> expand descriptions \u2014 input formats, example queries, edge cases, boundaries vs. similar tools<\/td>\n<td>Descriptions are the primary tool-selection mechanism; low-effort, high-leverage, fixes the root cause<\/td>\n<td>Few-shot first (token overhead, doesn't fix root cause), keyword routing layer (over-engineered, bypasses NLU), consolidating into one <code>lookup_entity<\/code> tool (valid architecture, too much for a \"first step\")<\/td>\n<\/tr>\n<tr>\n<td>Two tools overlap functionally<\/td>\n<td>Rename + rewrite descriptions to eliminate overlap; split generic tools into purpose-specific ones with defined I/O contracts<\/td>\n<td>Ambiguous/overlapping descriptions cause misrouting<\/td>\n<td>Adding more prompt rules about which to prefer<\/td>\n<\/tr>\n<tr>\n<td>Tool selection ignores good descriptions<\/td>\n<td>Review the <strong>system prompt<\/strong> for keyword-sensitive instructions creating unintended tool associations<\/td>\n<td>System prompt wording can override well-written descriptions<\/td>\n<td>Rewriting descriptions again; adding a router<\/td>\n<\/tr>\n<tr>\n<td>Tool fails<\/td>\n<td>Structured error: <code>errorCategory<\/code> (transient/validation/business/permission) + <code>isRetryable<\/code> + human-readable message, via the MCP <code>isError<\/code> flag<\/td>\n<td>The agent needs metadata to choose retry vs. explain vs. escalate<\/td>\n<td>Uniform <code>\"Operation failed\"<\/code> \u2014 prevents any recovery decision<\/td>\n<\/tr>\n<tr>\n<td>Refund denied by policy<\/td>\n<td><code>retriable: false<\/code> + customer-friendly explanation<\/td>\n<td>Agent won't waste retries and can communicate the reason appropriately<\/td>\n<td>Returning it as a generic/transient error \u2192 retry storm<\/td>\n<\/tr>\n<tr>\n<td>Query succeeds but finds nothing<\/td>\n<td>Return valid empty result, clearly distinct from access failure<\/td>\n<td>Empty \u2260 broken; conflating them causes wrong retries or silent data loss<\/td>\n<td>Timeout returned as empty success; empty result returned as error<\/td>\n<\/tr>\n<tr>\n<td>How many tools should the agent see?<\/td>\n<td>Only the 4\u20135 its role needs (scoped access)<\/td>\n<td>Too many tools (e.g. 18) degrades selection reliability<\/td>\n<td>\"Give it everything for flexibility\"<\/td>\n<\/tr>\n<tr>\n<td>Must guarantee a tool call (any tool)<\/td>\n<td><code>tool_choice: \"any\"<\/code><\/td>\n<td><code>\"auto\"<\/code> may return conversational text instead<\/td>\n<td>Assuming <code>\"auto\"<\/code> guarantees a call<\/td>\n<\/tr>\n<tr>\n<td>Must guarantee one <em>specific<\/em> tool runs first<\/td>\n<td>Forced selection <code>tool_choice: {\"type\": \"tool\", \"name\": \"...\"}<\/code>, then follow-up turns for subsequent steps<\/td>\n<td>Only forced selection pins the exact tool<\/td>\n<td>Using <code>\"any\"<\/code> and hoping; using forced tool_choice as a substitute for a prerequisite gate across turns<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3>D5 \u2014 Context, escalation, reliability (Tasks 5.1, 5.2, 5.3)<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Long conversation; amounts/dates drift or vanish<\/td>\n<td>Persistent case-facts block (amounts, dates, order numbers, statuses, stated expectations) in every prompt, outside summarized history<\/td>\n<td>Progressive summarization condenses exact values into vague prose<\/td>\n<td>\"Summarize more often/better\"; bigger context window<\/td>\n<\/tr>\n<tr>\n<td>Order lookups return 40+ fields, 5 relevant<\/td>\n<td>Trim tool outputs to relevant fields before they accumulate in context<\/td>\n<td>Tool results consume tokens disproportionately to relevance<\/td>\n<td>Larger context window (cost + lost-in-the-middle, not a fix)<\/td>\n<\/tr>\n<tr>\n<td>Aggregating long multi-part input<\/td>\n<td>Key-findings summary at the beginning + explicit section headers<\/td>\n<td>Lost-in-the-middle: beginning and end are processed reliably, middle isn't<\/td>\n<td>Dumping sections in arbitrary order<\/td>\n<\/tr>\n<tr>\n<td>Customer explicitly demands a human<\/td>\n<td>Escalate <strong>immediately<\/strong>, no investigation first<\/td>\n<td>Explicit customer request is a first-class escalation trigger<\/td>\n<td>\"Let me just try to resolve it first\"<\/td>\n<\/tr>\n<tr>\n<td>Customer is angry but the issue is simple<\/td>\n<td>Acknowledge frustration + offer resolution; escalate only if they reiterate<\/td>\n<td>Sentiment is an unreliable proxy for complexity<\/td>\n<td>Auto-escalation on negative sentiment threshold<\/td>\n<\/tr>\n<tr>\n<td>Policy is silent (competitor price match)<\/td>\n<td>Escalate \u2014 policy exception/gap<\/td>\n<td>The agent can't invent policy<\/td>\n<td>Improvising a \"reasonable\" answer; refusing outright<\/td>\n<\/tr>\n<tr>\n<td>Agent escalates easy cases, attempts hard ones (FCR 55%)<\/td>\n<td>Explicit escalation criteria + few-shot escalate-vs-resolve examples in the system prompt<\/td>\n<td>Root cause is unclear decision boundaries; proportionate fix before infrastructure<\/td>\n<td>Self-reported confidence thresholds (poorly calibrated), trained escalation classifier (over-engineered), sentiment routing (wrong problem)<\/td>\n<\/tr>\n<tr>\n<td><code>get_customer<\/code> returns multiple matches<\/td>\n<td>Ask the customer for additional identifiers<\/td>\n<td>Heuristic selection risks misidentified accounts and wrong refunds<\/td>\n<td>Picking most-recent/best-match account<\/td>\n<\/tr>\n<tr>\n<td>Backend failure mid-case<\/td>\n<td>Structured error context: failure type, what was attempted, partial results, alternatives; local recovery for transient errors first<\/td>\n<td>Enables intelligent recovery decisions<\/td>\n<td>Generic \"service unavailable\" after silent retries; suppressing the error as empty success; killing the whole workflow on one failure<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>4. Failure-modes drill<\/h2>\n<p>Production symptom \u2192 root cause \u2192 fix. This is the shape of the actual exam questions \u2014 read the symptom, name the root cause <em>before<\/em> looking at options, then find the option that fixes that root cause (not a different problem).<\/p>\n<p><strong>1. Skipped verification.<\/strong>\n<em>Symptom:<\/em> In 12% of cases the agent calls <code>lookup_order<\/code> with just the customer's stated name, never calling <code>get_customer<\/code>; occasional wrong-account refunds.\n<em>Root cause:<\/em> Tool ordering enforced only by prompt language \u2014 probabilistic compliance on a rule with financial consequences.\n<em>Fix:<\/em> Programmatic prerequisite that blocks <code>lookup_order<\/code> and <code>process_refund<\/code> until <code>get_customer<\/code> has returned a verified customer ID. (Not: stronger prompt, few-shot, or a routing classifier \u2014 the last one changes which tools are <em>available<\/em>, not their <em>order<\/em>.)<\/p>\n<p><strong>2. Misrouted lookups.<\/strong>\n<em>Symptom:<\/em> \"Check my order #12345\" routes to <code>get_customer<\/code> instead of <code>lookup_order<\/code>. Both descriptions are one-liners and both tools accept similar identifier formats.\n<em>Root cause:<\/em> Minimal, near-identical tool descriptions \u2014 the model has nothing to differentiate on.\n<em>Fix (first step):<\/em> Expand each description with input formats, example queries, edge cases, and when-to-use-this-vs-that boundaries. Few-shot, routing layers, and tool consolidation are all second-line or over-engineered.<\/p>\n<p><strong>3. Miscalibrated escalation.<\/strong>\n<em>Symptom:<\/em> 55% first-contact resolution vs. 80% target. Logs show escalation of standard damage claims (with photo evidence) while the agent freelances policy-exception cases.\n<em>Root cause:<\/em> No explicit escalation decision boundaries in the system prompt.\n<em>Fix:<\/em> Explicit escalation criteria + few-shot examples demonstrating escalate vs. resolve. (Not confidence self-scores \u2014 the agent is already miscalibrated; not a separate ML classifier; not sentiment analysis.)<\/p>\n<p><strong>4. Retry storm on a policy denial.<\/strong>\n<em>Symptom:<\/em> A refund outside the return window fails; the agent retries <code>process_refund<\/code> three times, then tells the customer \"there's a system issue.\"\n<em>Root cause:<\/em> The tool returns a uniform generic error, so the agent can't distinguish a business-rule violation from a transient fault.\n<em>Fix:<\/em> Structured error responses: <code>errorCategory: \"business\"<\/code>, <code>retriable: false<\/code>, plus a customer-friendly explanation the agent can relay.<\/p>\n<p><strong>5. Numbers drift late in the conversation.<\/strong>\n<em>Symptom:<\/em> Forty turns into a billing dispute, the agent offers a \"$89.99 refund\" for a $129.99 order and forgets the customer refused store credit.\n<em>Root cause:<\/em> Progressive summarization condensed transactional facts (amounts, dates, stated expectations) into vague summary prose.\n<em>Fix:<\/em> Extract transactional facts into a persistent case-facts block included in every prompt, outside the summarized history.<\/p>\n<p><strong>6. Context exhaustion from tool bloat.<\/strong>\n<em>Symptom:<\/em> Multi-issue sessions blow the context budget after a handful of order lookups; late-conversation answers degrade.\n<em>Root cause:<\/em> Each <code>lookup_order<\/code> result carries 40+ fields into history when only ~5 are relevant \u2014 tool results accumulate tokens disproportionately to relevance.\n<em>Fix:<\/em> Trim tool outputs to relevant fields before they enter context (natural home: the PostToolUse hook). Not \"buy a bigger context window.\"<\/p>\n<p><strong>7. Empty result treated as outage (and vice versa).<\/strong>\n<em>Symptom:<\/em> Customer with no purchase history asks about orders; the agent retries the \"failing\" lookup, then reports the order system is down. Separately, a real timeout once returned <code>[]<\/code> and the agent confidently said \"you have no orders.\"\n<em>Root cause:<\/em> The tool conflates access failures with valid empty results.\n<em>Fix:<\/em> Distinguish them structurally \u2014 empty-with-success is a normal result; timeouts are <code>errorCategory: \"transient\"<\/code>, <code>isRetryable: true<\/code>.<\/p>\n<p><strong>8. Escalations bounce back.<\/strong>\n<em>Symptom:<\/em> Human agents reject or re-triage most escalated tickets, asking \"who is this customer and what do they want?\"\n<em>Root cause:<\/em> The handoff carried no context \u2014 human agents have no access to the conversation transcript.\n<em>Fix:<\/em> <code>escalate_to_human<\/code> requires a structured handoff summary: customer ID, root cause, refund amount, recommended action \u2014 complete and self-contained.<\/p>\n<hr />\n<h2>Memorize-this recap<\/h2>\n<ol>\n<li>Loop control = <code>stop_reason<\/code> only: <code>\"tool_use\"<\/code> \u2192 run tools and continue; <code>\"end_turn\"<\/code> \u2192 done. Text-parsing and iteration caps are named anti-patterns.<\/li>\n<li>Deterministic rule (verify-before-refund, $500 cap) \u2192 enforce in code: prerequisite gates and interception hooks. Judgment call (tool choice, escalation) \u2192 fix in prompt: descriptions and few-shot.<\/li>\n<li>Wrong tool selected? Fix descriptions <strong>first<\/strong> \u2014 they're the primary selection mechanism.<\/li>\n<li>Every tool error carries <code>errorCategory<\/code> + <code>isRetryable<\/code> + readable message; business denials get <code>retriable: false<\/code> + customer-friendly wording.<\/li>\n<li>Valid empty result \u2260 access failure. Ever.<\/li>\n<li>Escalate on: explicit customer request (immediately), policy gap, no meaningful progress. Never on sentiment or self-reported confidence.<\/li>\n<li>Multiple customer matches \u2192 ask for another identifier, never guess.<\/li>\n<li>Facts with digits in them (amounts, dates, IDs, statuses) live in a persistent case-facts block, not in summarized history.<\/li>\n<li>Trim and normalize tool results (PostToolUse) <em>before<\/em> they accumulate in context.<\/li>\n<li>Escalation handoff = customer ID + root cause + refund amount + recommended action; the human never sees your transcript.<\/li>\n<\/ol>","words":3286},"02-claude-code-codegen":{"title":"Scenario 2 \u2014 Code Generation with Claude Code","group":"Scenario walkthroughs","html":"<h1>Scenario 2 \u2014 Code Generation with Claude Code<\/h1>\n<p><strong>Scenario text (verbatim intent):<\/strong> Your team uses Claude Code for code generation, refactoring, debugging, and documentation. You need to integrate it into the development workflow with custom slash commands, CLAUDE.md configurations, and judgment about plan mode vs direct execution.<\/p>\n<p><strong>Primary domains:<\/strong> D3 Claude Code Configuration &amp; Workflows (20%) + D5 Context Management &amp; Reliability (15%). Sample questions 4, 5, and 6 in the guide belong to this scenario \u2014 command location, plan mode, and path-scoped rules. That's the exam telling you exactly what it cares about.<\/p>\n<p>You live in Claude Code all day, so your edge here is real. The risk is answering from <em>your<\/em> habits instead of the guide's canonical answers. This chapter is the canonical version.<\/p>\n<hr />\n<h2>1. The system at a glance<\/h2>\n<p>There is no API code in this scenario. The \"system\" is a <strong>repository configured so that any developer who clones it gets the same Claude behavior<\/strong>, plus per-developer personal layers that never leak into version control.<\/p>\n<p>Three layers of configuration, from broadest to narrowest:<\/p>\n<ol>\n<li><strong>Always-loaded context<\/strong> \u2014 CLAUDE.md hierarchy (user \u2192 project \u2192 directory). Universal standards.<\/li>\n<li><strong>Conditionally-loaded context<\/strong> \u2014 <code>.claude/rules/<\/code> files with YAML frontmatter glob patterns. Loaded only when editing matching files. Saves tokens, guarantees the right conventions activate.<\/li>\n<li><strong>On-demand behavior<\/strong> \u2014 slash commands (<code>.claude/commands/<\/code>) and skills (<code>.claude/skills/<\/code>). Invoked explicitly, not always in context.<\/li>\n<\/ol>\n<p>Plus two runtime dimensions: <strong>execution mode<\/strong> (plan mode vs direct execution, Explore subagent) and <strong>session lifecycle<\/strong> (<code>--resume<\/code>, <code>fork_session<\/code>, <code>/compact<\/code>, scratchpad files).<\/p>\n<pre><code>            SHARED (in the repo, version-controlled)          PERSONAL (per developer)\n \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510   \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n \u2502 CLAUDE.md            \u2190 project-level, always   \u2502   \u2502 ~/.claude/CLAUDE.md  (user-lvl) \u2502\n \u2502  \u2514\u2500 @import docs/standards/*.md (modular)      \u2502   \u2502 ~/.claude/commands/  (personal) \u2502\n \u2502 src/api/CLAUDE.md    \u2190 directory-level         \u2502   \u2502 ~/.claude/skills/    (variants, \u2502\n \u2502 .claude/rules/*.md   \u2190 glob-scoped, loads on   \u2502   \u2502    different names)             \u2502\n \u2502                        matching file edits     \u2502   \u2502 ~/.claude.json       (personal/ \u2502\n \u2502 .claude/commands/    \u2190 team slash commands     \u2502   \u2502    experimental MCP servers)    \u2502\n \u2502 .claude/skills/      \u2190 team skills (SKILL.md)  \u2502   \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n \u2502 .mcp.json            \u2190 team MCP servers,       \u2502\n \u2502                        ${ENV_VAR} for secrets  \u2502\n \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n                         \u25bc\n \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n \u2502                        Claude Code session                             \u2502\n \u2502  Plan mode \u2500\u2500(investigate/design)\u2500\u2500\u25ba Direct execution \u2500\u2500(implement)    \u2502\n \u2502  Explore subagent: verbose discovery isolated, summary returned        \u2502\n \u2502  Built-in tools: Grep(content) Glob(paths) Read/Write Edit Bash        \u2502\n \u2502  Context hygiene: /compact, /memory, scratchpad files                  \u2502\n \u2502  Sessions: --resume &lt;name&gt; \u00b7 fork_session \u00b7 fresh-start-with-summary   \u2502\n \u2502  CI entry point: claude -p &quot;...&quot; --output-format json --json-schema   \u2502\n \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n<\/code><\/pre>\n<p><strong>The core scoping rule that decides half the questions in this scenario:<\/strong> anything the <em>team<\/em> must share goes in the repo (<code>CLAUDE.md<\/code>, <code>.claude/commands/<\/code>, <code>.claude/rules/<\/code>, <code>.claude/skills/<\/code>, <code>.mcp.json<\/code>); anything <em>personal<\/em> goes under <code>~<\/code> (<code>~/.claude/CLAUDE.md<\/code>, <code>~/.claude/commands/<\/code>, <code>~/.claude/skills/<\/code>, <code>~/.claude.json<\/code>). User-level config is never distributed via version control \u2014 that's the root cause behind every \"new teammate doesn't get the instructions\" question.<\/p>\n<hr />\n<h2>2. Build it step by step<\/h2>\n<h3>Step 1 \u2014 Project-level CLAUDE.md (the always-loaded baseline)<\/h3>\n<p>First because everything else layers on top of it. Root <code>CLAUDE.md<\/code> (or <code>.claude/CLAUDE.md<\/code>) \u2014 committed, so every clone gets it.<\/p>\n<pre><code class=\"language-markdown\"># ProjectX \u2014 Claude Context\n\n## Universal standards (apply everywhere)\n- TypeScript strict mode; no `any` without a justification comment\n- All new endpoints require an integration test\n- Conventional commits\n\n## Testing (context for test generation)\n- Framework: vitest. Fixtures live in tests/fixtures/ \u2014 reuse, don't recreate.\n- A valuable test asserts behavior, not implementation details.\n\n## Package-specific standards\n@import docs/standards/api.md\n@import docs/standards/frontend.md\n<\/code><\/pre>\n<p>Rules the exam pulls from this step:<\/p>\n<ul>\n<li><strong>Hierarchy:<\/strong> user-level (<code>~/.claude/CLAUDE.md<\/code>) \u2192 project-level (<code>.claude/CLAUDE.md<\/code> or root <code>CLAUDE.md<\/code>) \u2192 directory-level (subdirectory <code>CLAUDE.md<\/code> files).<\/li>\n<li><strong>User-level is personal only<\/strong> \u2014 never shared with teammates via version control.<\/li>\n<li><strong><code>@import<\/code><\/strong> keeps CLAUDE.md modular: each package's CLAUDE.md imports only the standards files relevant to it (maintainers pick, based on domain knowledge).<\/li>\n<li><strong><code>/memory<\/code><\/strong> shows which memory files are loaded. It's the diagnostic for \"Claude behaves differently across sessions/machines.\"<\/li>\n<li>CLAUDE.md is for <strong>instructions and context<\/strong> \u2014 it is <em>not<\/em> where slash commands are defined (sample Q4 distractor).<\/li>\n<\/ul>\n<h3>Step 2 \u2014 <code>.claude/rules/<\/code> with glob-scoped YAML frontmatter<\/h3>\n<p>Second, because a monolithic CLAUDE.md degrades: irrelevant conventions burn tokens and Claude has to <em>infer<\/em> which section applies. Split conventions into topic files that load <strong>only when editing matching files<\/strong>:<\/p>\n<pre><code>.claude/rules/\n\u251c\u2500\u2500 testing.md\n\u251c\u2500\u2500 api-conventions.md\n\u2514\u2500\u2500 deployment.md\n<\/code><\/pre>\n<pre><code class=\"language-markdown\">---\npaths: [&quot;**/*.test.tsx&quot;, &quot;**/*.test.ts&quot;]\n---\n# Testing conventions\n- One describe block per unit under test\n- Mock at module boundaries only; never mock internal functions\n<\/code><\/pre>\n<pre><code class=\"language-markdown\">---\npaths: [&quot;src/api/**/*&quot;]\n---\n# API handler conventions\n- async/await only; wrap handlers in withErrorBoundary()\n<\/code><\/pre>\n<p>The decisive comparison (sample Q6):<\/p>\n<table>\n<thead>\n<tr>\n<th>Mechanism<\/th>\n<th>Loads when<\/th>\n<th>Handles files spread across dirs?<\/th>\n<th>Deterministic?<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><code>.claude/rules/<\/code> + <code>paths:<\/code> globs<\/td>\n<td>Editing a matching file<\/td>\n<td><strong>Yes<\/strong> (<code>**/*.test.tsx<\/code> matches anywhere)<\/td>\n<td>Yes<\/td>\n<\/tr>\n<tr>\n<td>Directory-level CLAUDE.md<\/td>\n<td>Working in that directory<\/td>\n<td>No \u2014 directory-bound<\/td>\n<td>Yes, but per-dir only<\/td>\n<\/tr>\n<tr>\n<td>Root CLAUDE.md with headers<\/td>\n<td>Always<\/td>\n<td>Relies on Claude inferring the right section<\/td>\n<td>No<\/td>\n<\/tr>\n<tr>\n<td>Skills<\/td>\n<td>On invocation<\/td>\n<td>N/A \u2014 manual/model-chosen, not automatic<\/td>\n<td>No<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p><strong>Rule of thumb:<\/strong> conventions keyed to <em>file type scattered across the tree<\/em> \u2192 glob rules. Conventions keyed to <em>one directory<\/em> \u2192 directory CLAUDE.md is acceptable, but glob rules still win on maintainability.<\/p>\n<h3>Step 3 \u2014 Team slash commands in <code>.claude/commands/<\/code><\/h3>\n<p>A slash command is a markdown prompt file. Filename = command name. Committed \u2192 every developer has <code>/review<\/code> after clone or pull.<\/p>\n<pre><code>.claude/commands/\n\u2514\u2500\u2500 review.md        \u2192  invoked as /review\n<\/code><\/pre>\n<pre><code class=\"language-markdown\">Run the team code review checklist on the current changes:\n1. Correctness: logic errors, unhandled edge cases, off-by-one\n2. Security: injection, secrets in code, unvalidated input\n3. Report only bugs and security issues \u2014 skip style nits.\n   Format each finding: file:line \u2014 issue \u2014 severity \u2014 suggested fix\n<\/code><\/pre>\n<p>Sample Q4 canon: team command \u2192 <code>.claude/commands/<\/code> in the repo. Distractors: <code>~/.claude/commands/<\/code> (personal, not shared), CLAUDE.md (context, not commands), <code>.claude/config.json<\/code> with a commands array (<strong>does not exist<\/strong>).<\/p>\n<h3>Step 4 \u2014 Skills in <code>.claude/skills/<\/code> with frontmatter controls<\/h3>\n<p>Skills are for <strong>on-demand, task-specific workflows<\/strong> (vs CLAUDE.md's always-loaded universal standards). Each is a directory with a <code>SKILL.md<\/code>:<\/p>\n<pre><code>.claude/skills/\n\u2514\u2500\u2500 analyze-codebase/\n    \u2514\u2500\u2500 SKILL.md\n<\/code><\/pre>\n<pre><code class=\"language-markdown\">---\nname: analyze-codebase\ndescription: Deep structural analysis of a module \u2014 dependencies, entry points, test coverage map\ncontext: fork\nallowed-tools: Read, Grep, Glob\nargument-hint: &lt;module-or-directory&gt;\n---\nMap the structure of $ARGUMENTS: entry points, imports/exports,\ndependency direction, existing test coverage. Return a concise summary.\n<\/code><\/pre>\n<p>The three frontmatter options the exam names, and what each buys you:<\/p>\n<table>\n<thead>\n<tr>\n<th>Frontmatter<\/th>\n<th>What it does<\/th>\n<th>When the exam wants it<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><code>context: fork<\/code><\/td>\n<td>Runs the skill in an isolated sub-agent context<\/td>\n<td>Skill produces verbose output (codebase analysis) or exploratory context (brainstorming) that would pollute the main conversation<\/td>\n<\/tr>\n<tr>\n<td><code>allowed-tools<\/code><\/td>\n<td>Restricts tool access during skill execution<\/td>\n<td>Prevent destructive actions \u2014 e.g., limit a doc-generation skill to file write operations only<\/td>\n<\/tr>\n<tr>\n<td><code>argument-hint<\/code><\/td>\n<td>Prompts the developer for required parameters when invoked without arguments<\/td>\n<td>Skill needs input (a module name, a ticket ID) and devs keep invoking it bare<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p><strong>Personal customization:<\/strong> don't edit the team skill. Create a variant in <code>~/.claude/skills/<\/code> <strong>with a different name<\/strong> so teammates are unaffected.<\/p>\n<h3>Step 5 \u2014 MCP servers: <code>.mcp.json<\/code> (team) vs <code>~/.claude.json<\/code> (personal)<\/h3>\n<p>Team-shared backend integrations go in project-scoped <code>.mcp.json<\/code>, committed. Secrets stay out of the repo via <strong>environment variable expansion<\/strong>:<\/p>\n<pre><code class=\"language-json\">{\n  &quot;mcpServers&quot;: {\n    &quot;github&quot;: {\n      &quot;command&quot;: &quot;npx&quot;,\n      &quot;args&quot;: [&quot;-y&quot;, &quot;@modelcontextprotocol/server-github&quot;],\n      &quot;env&quot;: { &quot;GITHUB_TOKEN&quot;: &quot;${GITHUB_TOKEN}&quot; }\n    }\n  }\n}\n<\/code><\/pre>\n<p>Personal/experimental servers go in user-scoped <code>~/.claude.json<\/code>. Both are live simultaneously \u2014 <strong>tools from all configured MCP servers are discovered at connection time and available at once<\/strong>.<\/p>\n<p>Two more MCP judgments that leak into this scenario:<\/p>\n<ul>\n<li>If Claude keeps using built-in Grep instead of a more capable MCP search tool, the fix is <strong>enhancing the MCP tool's description<\/strong> (capabilities + outputs in detail), not disabling built-ins.<\/li>\n<li>Standard integration (e.g., Jira)? Use an <strong>existing community MCP server<\/strong>. Custom servers are for team-specific workflows only.<\/li>\n<\/ul>\n<h3>Step 6 \u2014 Workflow judgment: modes, sessions, context hygiene<\/h3>\n<p>No files to create \u2014 this is the runtime discipline the exam tests hardest.<\/p>\n<p><strong>Plan mode vs direct execution.<\/strong> Plan mode = complex tasks: large-scale changes, multiple valid approaches, architectural decisions, multi-file modifications (monolith\u2192microservices, a library migration touching 45+ files, choosing between integration approaches). Direct execution = simple, well-scoped changes (single validation check, single-file bug fix with a clear stack trace). The blessed combo: <strong>plan mode for investigation and design, then direct execution for implementation<\/strong>. \"Start direct, switch to plan if it gets complex\" is a named distractor \u2014 if the complexity is stated up front, plan first.<\/p>\n<p><strong>Explore subagent.<\/strong> During multi-phase tasks, verbose discovery output exhausts the main context. The Explore subagent isolates that discovery and returns a summary, preserving the main conversation.<\/p>\n<p><strong>Sessions.<\/strong>\n- <code>--resume &lt;session-name&gt;<\/code> \u2014 continue a named investigation across work sessions.\n- <code>fork_session<\/code> \u2014 branch independent explorations from a <strong>shared analysis baseline<\/strong> (e.g., compare two refactoring strategies without re-analyzing the codebase twice).\n- Resuming after code changed? <strong>Tell the agent which files changed<\/strong> for targeted re-analysis \u2014 don't force full re-exploration.\n- Prior tool results mostly stale? <strong>Start a new session with a structured summary injected.<\/strong> Resuming over stale results is less reliable than a fresh start with facts.<\/p>\n<p><strong>Context hygiene for long codebase work (D5.4).<\/strong>\n- Symptom of degradation: inconsistent answers, citing \"typical patterns\" instead of the specific classes it discovered earlier.\n- Countermeasures: <strong>scratchpad files<\/strong> recording key findings (re-read for later questions); <strong>subagent delegation<\/strong> for scoped questions (\"find all test files\", \"trace the refund flow\") while the main agent keeps high-level coordination; <strong><code>/compact<\/code><\/strong> when context fills with verbose discovery output; <strong>summarize each phase before spawning the next phase's subagents<\/strong> and inject the summary.\n- Crash recovery: each agent <strong>exports structured state to a known location (manifest)<\/strong>; on resume the coordinator loads the manifest and injects it into prompts.\n- Trim verbose tool outputs to relevant fields before they accumulate; put key-findings summaries at the <strong>beginning<\/strong> of aggregated input with explicit section headers (lost-in-the-middle mitigation).<\/p>\n<p><strong>Iterative refinement (D3.5) \u2014 how you steer generation quality.<\/strong><\/p>\n<table>\n<thead>\n<tr>\n<th>Problem<\/th>\n<th>Technique<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Prose spec interpreted inconsistently<\/td>\n<td>2\u20133 concrete input/output examples showing the transformation<\/td>\n<\/tr>\n<tr>\n<td>Edge case failures (e.g., nulls in a migration script)<\/td>\n<td>Specific test cases: example input + expected output<\/td>\n<\/tr>\n<tr>\n<td>Unfamiliar domain, unknown design considerations<\/td>\n<td>Interview pattern \u2014 have Claude ask questions first (cache invalidation, failure modes)<\/td>\n<\/tr>\n<tr>\n<td>Want progressive, verifiable improvement<\/td>\n<td>Write the test suite first (behavior + edge cases + performance), iterate by sharing failures<\/td>\n<\/tr>\n<tr>\n<td>Multiple issues to fix<\/td>\n<td>Interacting fixes \u2192 one detailed message. Independent fixes \u2192 sequential iteration<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p><strong>CI entry point (bleeds in from D3.6).<\/strong> Automated invocation is <code>claude -p \"...\"<\/code> (<code>--print<\/code> = non-interactive; processes prompt, prints, exits). Structured findings: <code>--output-format json<\/code> with <code>--json-schema<\/code>. CLAUDE.md is how CI-invoked Claude gets project context (testing standards, fixtures, review criteria). And: the session that <em>generated<\/em> code is worse at reviewing it than an <strong>independent instance<\/strong> \u2014 session context isolation.<\/p>\n<hr />\n<h2>3. The decision points this scenario tests<\/h2>\n<p>Each row = one exam-question shape. Situation \u2192 correct move \u2192 why \u2192 the trap.<\/p>\n<h3>Configuration scoping (TS 3.1, 3.2, 2.4)<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Team checklist command must exist for everyone on clone/pull<\/td>\n<td><code>.claude/commands/<\/code> in the repo<\/td>\n<td>Version-controlled, auto-available<\/td>\n<td><code>~/.claude/commands/<\/code> (personal); CLAUDE.md (context, not commands); <code>.claude/config.json<\/code> commands array (<strong>fake<\/strong>)<\/td>\n<\/tr>\n<tr>\n<td>New teammate's Claude ignores team standards<\/td>\n<td>Move instructions from <code>~/.claude/CLAUDE.md<\/code> to project CLAUDE.md<\/td>\n<td>User-level config isn't shared via version control<\/td>\n<td>\"Have them copy your user config\" \u2014 patches one person, not the mechanism<\/td>\n<\/tr>\n<tr>\n<td>CLAUDE.md grown huge, conventions bleed across areas<\/td>\n<td>Split into <code>.claude/rules/<\/code> topic files (testing.md, api-conventions.md, deployment.md) or <code>@import<\/code> per package<\/td>\n<td>Modularity + scoped loading beats one monolith<\/td>\n<td>One giant file \"with clear headers\" \u2014 relies on inference<\/td>\n<\/tr>\n<tr>\n<td>Inconsistent behavior across sessions/machines<\/td>\n<td><code>/memory<\/code> to verify which memory files load<\/td>\n<td>Diagnose before rewriting anything<\/td>\n<td>Rewriting prompts/CLAUDE.md without checking what's actually loaded<\/td>\n<\/tr>\n<tr>\n<td>Team MCP server needing a token<\/td>\n<td>Project <code>.mcp.json<\/code> with <code>${GITHUB_TOKEN}<\/code> expansion<\/td>\n<td>Shared config, no committed secrets<\/td>\n<td>Hardcoding token in <code>.mcp.json<\/code>; per-user <code>~/.claude.json<\/code> for a <em>team<\/em> tool<\/td>\n<\/tr>\n<tr>\n<td>Your own experimental MCP server<\/td>\n<td><code>~/.claude.json<\/code><\/td>\n<td>Personal scope, doesn't touch teammates<\/td>\n<td>Adding experiments to the shared <code>.mcp.json<\/code><\/td>\n<\/tr>\n<tr>\n<td>Want personal tweak of a shared skill<\/td>\n<td><code>~/.claude/skills/<\/code> variant <strong>with a different name<\/strong><\/td>\n<td>Doesn't affect teammates<\/td>\n<td>Editing the committed skill in place<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3>Conditional conventions (TS 3.3)<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Test files scattered next to sources everywhere; same conventions for all<\/td>\n<td><code>.claude/rules/<\/code> file, <code>paths: [\"**/*.test.tsx\"]<\/code><\/td>\n<td>Glob matches by file type regardless of directory; loads deterministically on edit<\/td>\n<td>Per-directory CLAUDE.md (directory-bound, can't cover scattered files); root headers (inference); skills (manual invocation \u2260 automatic)<\/td>\n<\/tr>\n<tr>\n<td>Conventions differ by code area (API vs components vs models)<\/td>\n<td>One rules file per area with area-scoped globs (<code>src/api/**/*<\/code>)<\/td>\n<td>Only relevant conventions enter context \u2014 less noise, fewer tokens<\/td>\n<td>Loading all conventions always \"so nothing is missed\"<\/td>\n<\/tr>\n<\/tbody>\n<\/table
