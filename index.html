news as prose, technical findings as structured lists<\/strong> \u2014 not one uniform format.<\/p>\n<pre><code class=\"language-python\"># Subagent finding \u2014 the unit that must survive synthesis intact\n{\n  &quot;claim&quot;: &quot;EU AI enforcement fines totaled EUR 287M&quot;,\n  &quot;evidence_excerpt&quot;: &quot;\u2026regulators levied 287 million euros in fines\u2026&quot;,\n  &quot;source&quot;: {&quot;url&quot;: &quot;https://\u2026&quot;, &quot;document&quot;: &quot;EC enforcement report&quot;, &quot;published&quot;: &quot;2025-11-02&quot;},\n  &quot;relevance&quot;: 0.92\n}\n\n# Genuine conflict \u2192 annotate, attribute, escalate the reconciliation decision\n{\n  &quot;field&quot;: &quot;market_size_2025&quot;,\n  &quot;conflict_detected&quot;: True,\n  &quot;values&quot;: [\n    {&quot;value&quot;: &quot;42B&quot;, &quot;source&quot;: &quot;Gartner note&quot;,   &quot;published&quot;: &quot;2025-03-01&quot;},\n    {&quot;value&quot;: &quot;55B&quot;, &quot;source&quot;: &quot;McKinsey report&quot;, &quot;published&quot;: &quot;2025-09-15&quot;}\n  ]\n  # coordinator reconciles; synthesis never silently picks one\n}\n<\/code><\/pre>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Final report has claims but no idea which source said what<\/td>\n<td>Subagents output structured claim-source mappings (URL, document name, excerpt); synthesis must preserve and merge them<\/td>\n<td>Attribution is lost at summarization steps unless structurally carried<\/td>\n<td>\"Add citations at the end\" \u2014 the link is already gone<\/td>\n<\/tr>\n<tr>\n<td>Two credible sources give different statistics<\/td>\n<td>Include <strong>both<\/strong> values, annotated with source attribution; coordinator decides reconciliation before synthesis<\/td>\n<td>No agent has grounds to arbitrate mid-pipeline<\/td>\n<td>Analysis agent silently picks the \"more credible\" number<\/td>\n<\/tr>\n<tr>\n<td>Sources \"contradict\" on a time-varying metric<\/td>\n<td>Require publication/collection dates in structured outputs<\/td>\n<td>2023-vs-2025 data isn't a contradiction, it's a timeline<\/td>\n<td>Flagging temporal differences as conflicts (or averaging them)<\/td>\n<\/tr>\n<tr>\n<td>Report mixes solid and shaky findings uniformly<\/td>\n<td>Explicit sections: well-established vs. contested; preserve original source characterizations + methodological context<\/td>\n<td>Readers must see the epistemic split<\/td>\n<td>Uniform confident tone over everything<\/td>\n<\/tr>\n<tr>\n<td>Synthesis flattens everything to prose<\/td>\n<td>Render per content type: financial \u2192 tables, news \u2192 prose, technical \u2192 structured lists<\/td>\n<td>Format is part of fidelity<\/td>\n<td>One-format-fits-all output<\/td>\n<\/tr>\n<tr>\n<td>Passing findings between agents<\/td>\n<td>Structured formats separating content from metadata (URLs, doc names, page numbers)<\/td>\n<td>Preserves attribution across handoffs (ties to D1 context passing)<\/td>\n<td>Concatenated prose blobs<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>Memorize cold<\/h2>\n<p><strong>Weights &amp; mechanics<\/strong>\n- D5 = <strong>15%<\/strong> of scored content \u2248 9/60 questions; exam = 60 Qs / 120 min / pass 720 of 1000 scaled.\n- D5 is primary in scenarios <strong>1, 2, 3, 6<\/strong> (support agent, Claude Code codegen, multi-agent research, extraction).<\/p>\n<p><strong>5.1 context preservation<\/strong>\n- Case-facts block = <strong>amounts, dates, order numbers, statuses + customer-stated expectations<\/strong> \u2014 in <strong>every prompt, outside summarized history<\/strong>.\n- Lost-in-the-middle: reliable at <strong>beginning and end<\/strong>, drops <strong>middle<\/strong> \u2192 key-findings summary <strong>first<\/strong>, then explicit section headers.\n- Canonical waste number: <strong>40+ fields<\/strong> returned per order lookup, <strong>~5 relevant<\/strong> \u2192 trim <strong>before<\/strong> accumulation.\n- Multi-turn coherence = pass <strong>complete conversation history<\/strong> each API request.\n- Downstream budget fix = change <strong>upstream<\/strong> agents to emit structured data (key facts, citations, relevance scores) instead of verbose prose + reasoning chains.<\/p>\n<p><strong>5.2 escalation<\/strong>\n- Valid triggers (3): <strong>explicit customer request<\/strong> (immediate, no investigation first) \u00b7 <strong>policy exception/gap<\/strong> \u00b7 <strong>no meaningful progress<\/strong>.\n- Invalid proxies (2): <strong>sentiment<\/strong>, <strong>self-reported confidence<\/strong> (LLM confidence is poorly calibrated \u2014 already wrong on hard cases).\n- Calibration fix = <strong>explicit criteria + few-shot escalate-vs-resolve examples in the system prompt<\/strong> (sample Q3 answer).\n- Frustrated + in-policy \u2192 acknowledge, offer resolution; escalate only if customer <strong>reiterates<\/strong>.\n- Multiple customer matches \u2192 <strong>request additional identifiers<\/strong>; never heuristic selection.<\/p>\n<p><strong>5.3 error propagation<\/strong>\n- Structured error context (4 parts): <strong>failure type \u00b7 attempted query \u00b7 partial results \u00b7 alternative approaches<\/strong> (sample Q8 answer).\n- Order: <strong>local recovery first<\/strong> (transient \u2192 retry in subagent), propagate only unresolvable, <strong>with partials + what was attempted<\/strong>.\n- <strong>Access failure \u2260 valid empty result<\/strong> (timeout needs a retry decision; empty = successful query, no matches).\n- Named anti-patterns: generic status (\"search unavailable\"), <strong>silent suppression<\/strong> (empty-as-success), <strong>whole-workflow termination<\/strong> on one failure.\n- Incomplete synthesis \u2192 <strong>coverage annotations<\/strong>: well-supported findings vs. gap areas from unavailable sources.\n- (D2 tool-level cousins: <code>isError<\/code> flag, <code>errorCategory<\/code> transient/validation/permission, <code>isRetryable<\/code> boolean.)<\/p>\n<p><strong>5.4 large-codebase context<\/strong>\n- Degradation fingerprint: inconsistent answers + citing <strong>\"typical patterns\"<\/strong> instead of specific classes discovered earlier.\n- Four tools: <strong>scratchpad files<\/strong> (findings persist across context boundaries) \u00b7 <strong>subagent delegation<\/strong> (verbose output isolated; main agent = high-level coordinator) \u00b7 <strong>phase summaries<\/strong> (summarize before spawning next phase, inject into initial context) \u00b7 <strong><code>/compact<\/code><\/strong> (reduce in-session context bloat).\n- Crash recovery: each agent <strong>exports state to a known location<\/strong>; coordinator <strong>loads the manifest on resume<\/strong> and injects into agent prompts.\n- (Adjacent, other domains: Explore subagent = D3; <code>--resume &lt;name&gt;<\/code> / <code>fork_session<\/code> = D1.)<\/p>\n<p><strong>5.5 human review &amp; calibration<\/strong>\n- Bait number: <strong>97% aggregate accuracy<\/strong> can mask per-segment failure \u2192 segment by <strong>document type AND field<\/strong> before reducing review.\n- <strong>Stratified random sampling of HIGH-confidence extractions<\/strong> \u2192 measures true auto-pass error rate + detects <strong>novel error patterns<\/strong>.\n- Confidence pipeline: model emits <strong>field-level confidence<\/strong> \u2192 <strong>calibrate thresholds on a labeled validation set<\/strong> \u2192 route.\n- Human-review routing: <strong>low confidence OR ambiguous/contradictory source documents<\/strong> first.<\/p>\n<p><strong>5.6 provenance<\/strong>\n- Claim-source mapping fields: <strong>claim, evidence excerpt, source URL/document name, publication (or data-collection) date<\/strong>; synthesis must <strong>preserve and merge<\/strong>, never drop.\n- Conflicting credible stats \u2192 <strong>both values + source attribution<\/strong>; <strong>coordinator<\/strong> reconciles before synthesis.\n- <strong>Publication dates<\/strong> prevent temporal differences reading as contradictions.\n- Report structure: <strong>well-established vs. contested<\/strong> sections, preserving original characterizations + methodological context.\n- Rendering: <strong>financial \u2192 tables, news \u2192 prose, technical \u2192 structured lists<\/strong>.<\/p>\n<hr />\n<h2>Anti-pattern wall \u2014 recognize on sight<\/h2>\n<table>\n<thead>\n<tr>\n<th>Anti-pattern<\/th>\n<th>Where<\/th>\n<th>Why it's wrong<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Progressive summarization of transactional facts<\/td>\n<td>5.1<\/td>\n<td>Numbers, dates, expectations blur into vagueness; use a case-facts block<\/td>\n<\/tr>\n<tr>\n<td>Letting raw 40-field tool dumps accumulate in context<\/td>\n<td>5.1<\/td>\n<td>Tokens spent disproportionately to relevance; trim before entry<\/td>\n<\/tr>\n<tr>\n<td>Burying key findings mid-input<\/td>\n<td>5.1<\/td>\n<td>Lost-in-the-middle drops them; lead with the summary<\/td>\n<\/tr>\n<tr>\n<td>Verbose prose + reasoning chains handed to a context-tight downstream agent<\/td>\n<td>5.1<\/td>\n<td>Fix the upstream producer: structured facts, citations, scores<\/td>\n<\/tr>\n<tr>\n<td><strong>Sentiment-based escalation<\/strong><\/td>\n<td>5.2<\/td>\n<td>Frustration \u2260 complexity; angry-but-simple cases deserve resolution<\/td>\n<\/tr>\n<tr>\n<td><strong>Self-reported confidence as escalation/routing signal<\/strong><\/td>\n<td>5.2, 5.5<\/td>\n<td>LLM confidence is uncalibrated \u2014 wrongly confident exactly on hard cases<\/td>\n<\/tr>\n<tr>\n<td>Investigating first when the customer explicitly asked for a human<\/td>\n<td>5.2<\/td>\n<td>Explicit request = immediate escalation<\/td>\n<\/tr>\n<tr>\n<td>Heuristic selection among multiple customer matches<\/td>\n<td>5.2<\/td>\n<td>Wrong-account actions; ask for another identifier<\/td>\n<\/tr>\n<tr>\n<td>Separate ML classifier for escalation before trying prompt criteria<\/td>\n<td>5.2<\/td>\n<td>Over-engineering; explicit criteria + few-shot is the proportionate first fix<\/td>\n<\/tr>\n<tr>\n<td>Generic error statuses (\"Operation failed\", \"search unavailable\")<\/td>\n<td>5.3<\/td>\n<td>Hides failure type/partials/alternatives; coordinator can't recover<\/td>\n<\/tr>\n<tr>\n<td><strong>Silent error suppression<\/strong> \u2014 returning empty results marked success<\/td>\n<td>5.3<\/td>\n<td>Failure becomes invisible; confidently incomplete output<\/td>\n<\/tr>\n<tr>\n<td><strong>Terminating the entire workflow on a single subagent failure<\/strong><\/td>\n<td>5.3<\/td>\n<td>Discards all completed work; proceed with partials + coverage gaps<\/td>\n<\/tr>\n<tr>\n<td>Conflating access failures with valid empty results<\/td>\n<td>5.3<\/td>\n<td>One triggers retry decisions; the other IS the answer<\/td>\n<\/tr>\n<tr>\n<td>Relying on in-window memory for multi-hour exploration<\/td>\n<td>5.4<\/td>\n<td>Context degrades to \"typical patterns\"; use scratchpads/subagents/manifests<\/td>\n<\/tr>\n<tr>\n<td>Main agent doing verbose discovery itself<\/td>\n<td>5.4<\/td>\n<td>Drowns coordination context; delegate to subagents<\/td>\n<\/tr>\n<tr>\n<td>No exported state in long multi-agent jobs<\/td>\n<td>5.4<\/td>\n<td>A crash means full re-exploration; export manifests to a known location<\/td>\n<\/tr>\n<tr>\n<td>Trusting aggregate accuracy to cut human review<\/td>\n<td>5.5<\/td>\n<td>Masks per-doc-type/per-field failure; segment first<\/td>\n<\/tr>\n<tr>\n<td>Reviewing only low-confidence extractions<\/td>\n<td>5.5<\/td>\n<td>High-confidence error rate stays unknown; stratified-sample the auto-pass lane<\/td>\n<\/tr>\n<tr>\n<td>Raw model confidence as a routing threshold without labeled calibration<\/td>\n<td>5.5<\/td>\n<td>Uncalibrated numbers; validate against labels first<\/td>\n<\/tr>\n<tr>\n<td>Summarization that strips claim-source links<\/td>\n<td>5.6<\/td>\n<td>Attribution unrecoverable later; carry structured mappings through<\/td>\n<\/tr>\n<tr>\n<td>Mid-pipeline agent silently picking one of two conflicting values<\/td>\n<td>5.6<\/td>\n<td>Annotate both with attribution; coordinator reconciles<\/td>\n<\/tr>\n<tr>\n<td>Omitting publication dates from findings<\/td>\n<td>5.6<\/td>\n<td>Temporal differences get misread as contradictions<\/td>\n<\/tr>\n<tr>\n<td>Flattening all content types to one uniform format<\/td>\n<td>5.6<\/td>\n<td>Tables for financial, prose for news, lists for technical<\/td>\n<\/tr>\n<\/tbody>\n<\/table>","words":3588},"exercise-1-2-agent-and-claude-code":{"title":"Exercises 1 & 2 \u2014 Multi-Tool Agent + Claude Code Team Workflow","group":"Build exercises","html":"<h1>Exercises 1 &amp; 2 \u2014 Multi-Tool Agent + Claude Code Team Workflow<\/h1>\n<blockquote>\n<p>Claude Certified Architect \u2014 Foundations. Two build-it-tonight labs.\nExercise 1 = raw Anthropic Messages API (Python). Exercise 2 = Claude Code config files + the CLI you already use.\nModel for all API code: <code>claude-sonnet-5<\/code>. Everything here is paste-ready.<\/p>\n<\/blockquote>\n<p>The whole point of these labs is the thing you said you're missing: <strong>given a scenario, build the thing.<\/strong> So each step ends with a checkpoint (what to run, what you should see), and each exercise ends with <strong>Break it on purpose<\/strong> \u2014 deliberately sabotage the working thing and watch the failure mode. The exam tests whether you recognize those failure modes. Seeing them once beats reading about them ten times.<\/p>\n<hr />\n<h1>Exercise 1 \u2014 Build a Multi-Tool Agent with Escalation Logic<\/h1>\n<h2>1.1 Objective + exam mapping<\/h2>\n<p>Build a customer-support resolution agent on the raw Messages API: an agentic loop, 4 tools with careful descriptions, structured error responses, a deterministic tool-call interception hook enforcing a <code>$500<\/code> business rule, and multi-concern request handling.<\/p>\n<table>\n<thead>\n<tr>\n<th>What you build<\/th>\n<th>Task statements drilled<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Agentic loop driven by <code>stop_reason<\/code> (<code>tool_use<\/code> \u2192 continue, <code>end_turn<\/code> \u2192 stop)<\/td>\n<td><strong>1.1<\/strong><\/td>\n<\/tr>\n<tr>\n<td>4 tools, incl. 2 easily-confused ones (<code>get_customer<\/code> vs <code>lookup_order<\/code>) with careful descriptions<\/td>\n<td><strong>2.1<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Structured tool errors: <code>errorCategory<\/code> (transient/validation/business/permission) + <code>isRetryable<\/code><\/td>\n<td><strong>2.2<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Interception hook: block refunds &gt; <code>$500<\/code> and refunds before identity is verified \u2192 redirect to escalation<\/td>\n<td><strong>1.4, 1.5<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Multi-concern message \u2192 decompose \u2192 investigate each \u2192 one unified resolution + structured handoff<\/td>\n<td><strong>1.4, 1.6, 5.2<\/strong><\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>This <em>is<\/em> exam Scenario 1 (Customer Support Resolution Agent). Sample questions 1, 2, and 3 are literally about the tradeoffs you'll build here.<\/p>\n<h2>1.2 Setup (Windows / PowerShell)<\/h2>\n<p>You need an <strong>Anthropic API key<\/strong> from console.anthropic.com. This is billed separately from your Claude Max / Claude Code subscription \u2014 the raw API is not the same account surface as the CLI.<\/p>\n<pre><code class=\"language-powershell\">cd C:\\Users\\david.rios\\Dev\\claude-cert-prep\\exercises\npython -m venv .venv\n.\\.venv\\Scripts\\Activate.ps1          # if blocked: Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass\npip install anthropic\n$env:ANTHROPIC_API_KEY = &quot;sk-ant-...&quot;  # your key; session-scoped\n$env:PYTHONIOENCODING  = &quot;utf-8&quot;       # cp1252 defense, per your usual setup\n<\/code><\/pre>\n<p>Starter tree:<\/p>\n<pre><code>claude-cert-prep\\exercises\\\n  .venv\\\n  agent.py          # you build this\n<\/code><\/pre>\n<h2>1.3 Step-by-step build<\/h2>\n<h3>Step 1 \u2014 Fake backend + 4 tools with careful descriptions<\/h3>\n<p>The tool <strong>descriptions<\/strong> are the only thing the model uses to pick a tool. Two of these tools overlap on purpose (<code>get_customer<\/code> and <code>lookup_order<\/code> both \"look something up\" and both take an id-like string) \u2014 the exam's sample Q2 is exactly this confusion. Careful descriptions are what keep them apart. Notice each description states: what it does, its input format, an example query, and <em>when to use it vs. the other tool<\/em>.<\/p>\n<p>Create <code>agent.py<\/code>:<\/p>\n<pre><code class=\"language-python\">import json\nimport anthropic\n\nclient = anthropic.Anthropic()\nMODEL = &quot;claude-sonnet-5&quot;\n\n# ---------------------------------------------------------------- fake backend\nCUSTOMERS = {\n    &quot;jane doe&quot;:  {&quot;customer_id&quot;: &quot;cust_001&quot;, &quot;name&quot;: &quot;Jane Doe&quot;,  &quot;email&quot;: &quot;jane@example.com&quot;},\n    &quot;john smith&quot;:{&quot;customer_id&quot;: &quot;cust_002&quot;, &quot;name&quot;: &quot;John Smith&quot;,&quot;email&quot;: &quot;john@example.com&quot;},\n}\nORDERS = {\n    &quot;1001&quot;: {&quot;order_id&quot;: &quot;1001&quot;, &quot;customer_id&quot;: &quot;cust_001&quot;, &quot;amount&quot;: 49.99, &quot;status&quot;: &quot;delivered&quot;, &quot;item&quot;: &quot;Wireless mouse&quot;},\n    &quot;1002&quot;: {&quot;order_id&quot;: &quot;1002&quot;, &quot;customer_id&quot;: &quot;cust_001&quot;, &quot;amount&quot;: 620.00, &quot;status&quot;: &quot;delivered&quot;, &quot;item&quot;: &quot;Standing desk&quot;},\n    &quot;1003&quot;: {&quot;order_id&quot;: &quot;1003&quot;, &quot;customer_id&quot;: &quot;cust_001&quot;, &quot;amount&quot;: 89.50, &quot;status&quot;: &quot;delivered&quot;, &quot;item&quot;: &quot;Desk lamp&quot;},\n}\n\ndef err(category, is_retryable, message):\n    # This dict is what the MODEL reads to decide retry vs explain vs escalate.\n    return {&quot;error&quot;: {&quot;errorCategory&quot;: category, &quot;isRetryable&quot;: is_retryable, &quot;message&quot;: message}}\n\n# ---------------------------------------------------------------- tool schemas\nTOOLS = [\n    {\n        &quot;name&quot;: &quot;get_customer&quot;,\n        &quot;description&quot;: (\n            &quot;Look up a CUSTOMER ACCOUNT and return a verified customer_id. &quot;\n            &quot;Input: the customer's full name or email address (e.g. \\&quot;Jane Doe\\&quot; or \\&quot;jane@example.com\\&quot;). &quot;\n            &quot;Use this FIRST for any request, before any order or refund operation \u2014 it is how you &quot;\n            &quot;establish which account you are acting on. Do NOT use this to look up an order number; &quot;\n            &quot;for anything tied to an order (status, amount, refunds) use lookup_order instead. &quot;\n            &quot;Returns customer_id, name, email. Returns a validation error if no account matches.&quot;\n        ),\n        &quot;input_schema&quot;: {\n            &quot;type&quot;: &quot;object&quot;,\n            &quot;properties&quot;: {&quot;identifier&quot;: {&quot;type&quot;: &quot;string&quot;, &quot;description&quot;: &quot;Customer full name or email&quot;}},\n            &quot;required&quot;: [&quot;identifier&quot;],\n        },\n    },\n    {\n        &quot;name&quot;: &quot;lookup_order&quot;,\n        &quot;description&quot;: (\n            &quot;Look up a single ORDER by its numeric order number and return its details &quot;\n            &quot;(amount, status, item, owning customer_id). Input: the order number as a string &quot;\n            &quot;(e.g. \\&quot;1002\\&quot;). Use this when the customer references a specific order \u2014 a charge, a &quot;\n            &quot;delivery, a damaged item, a refund target. Do NOT use this to find a person; if you only &quot;\n            &quot;have a name or email, call get_customer first. Returns a validation error if the order &quot;\n            &quot;number does not exist, and a transient error if the order service times out.&quot;\n        ),\n        &quot;input_schema&quot;: {\n            &quot;type&quot;: &quot;object&quot;,\n            &quot;properties&quot;: {&quot;order_id&quot;: {&quot;type&quot;: &quot;string&quot;, &quot;description&quot;: &quot;Order number, e.g. 1002&quot;}},\n            &quot;required&quot;: [&quot;order_id&quot;],\n        },\n    },\n    {\n        &quot;name&quot;: &quot;process_refund&quot;,\n        &quot;description&quot;: (\n            &quot;Issue a refund against an order. Input: order_id (string) and amount (number, USD). &quot;\n            &quot;Only call this after the customer's identity is verified via get_customer and the order &quot;\n            &quot;is confirmed via lookup_order. Refunds at or under the auto-approval limit are issued &quot;\n            &quot;immediately; larger refunds are blocked by policy and must be escalated to a human.&quot;\n        ),\n        &quot;input_schema&quot;: {\n            &quot;type&quot;: &quot;object&quot;,\n            &quot;properties&quot;: {\n                &quot;order_id&quot;: {&quot;type&quot;: &quot;string&quot;},\n                &quot;amount&quot;:   {&quot;type&quot;: &quot;number&quot;, &quot;description&quot;: &quot;Refund amount in USD&quot;},\n            },\n            &quot;required&quot;: [&quot;order_id&quot;, &quot;amount&quot;],\n        },\n    },\n    {\n        &quot;name&quot;: &quot;escalate_to_human&quot;,\n        &quot;description&quot;: (\n            &quot;Hand the case to a human agent. Use this when the customer explicitly asks for a human, &quot;\n            &quot;when policy blocks an action (e.g. a refund over the limit), or when you cannot make &quot;\n            &quot;progress. Input: a structured handoff summary \u2014 customer_id, a one-line root_cause, the &quot;\n            &quot;refund_amount or action at issue, and your recommended_action \u2014 because the human cannot &quot;\n            &quot;see this conversation.&quot;\n        ),\n        &quot;input_schema&quot;: {\n            &quot;type&quot;: &quot;object&quot;,\n            &quot;properties&quot;: {\n                &quot;customer_id&quot;:       {&quot;type&quot;: &quot;string&quot;},\n                &quot;root_cause&quot;:        {&quot;type&quot;: &quot;string&quot;},\n                &quot;amount_or_action&quot;:  {&quot;type&quot;: &quot;string&quot;},\n                &quot;recommended_action&quot;:{&quot;type&quot;: &quot;string&quot;},\n            },\n            &quot;required&quot;: [&quot;root_cause&quot;, &quot;recommended_action&quot;],\n        },\n    },\n]\n\n# ---------------------------------------------------------------- tool execution\ndef execute_tool(name, tool_input, state):\n    if name == &quot;get_customer&quot;:\n        rec = CUSTOMERS.get(tool_input[&quot;identifier&quot;].strip().lower())\n        if not rec:\n            return err(&quot;validation&quot;, False, f&quot;No account matches '{tool_input['identifier']}'. Ask for a valid name or email.&quot;)\n        state[&quot;verified_customer_id&quot;] = rec[&quot;customer_id&quot;]   # &lt;- prerequisite is now satisfied\n        return rec\n    if name == &quot;lookup_order&quot;:\n        oid = tool_input[&quot;order_id&quot;]\n        if oid == &quot;9999&quot;:  # simulated flaky backend\n            return err(&quot;transient&quot;, True, &quot;Order service timed out. Safe to retry.&quot;)\n        rec = ORDERS.get(oid)\n        if not rec:\n            return err(&quot;validation&quot;, False, f&quot;Order '{oid}' does not exist. Ask the customer to confirm the number.&quot;)\n        return rec\n    if name == &quot;process_refund&quot;:\n        return {&quot;refund_id&quot;: &quot;rf_&quot; + tool_input[&quot;order_id&quot;], &quot;refunded&quot;: tool_input[&quot;amount&quot;], &quot;status&quot;: &quot;issued&quot;}\n    if name == &quot;escalate_to_human&quot;:\n        return {&quot;ticket_id&quot;: &quot;esc_204&quot;, &quot;status&quot;: &quot;escalated&quot;, &quot;handoff&quot;: tool_input}\n    return err(&quot;validation&quot;, False, f&quot;Unknown tool {name}&quot;)\n<\/code><\/pre>\n<p><strong>Checkpoint 1.<\/strong> Run <code>python -c \"import agent; print(len(agent.TOOLS))\"<\/code> \u2014 you should see <code>4<\/code>. Nothing calls the API yet; you've just defined the surface.<\/p>\n<h3>Step 2 \u2014 The agentic loop (stop_reason drives everything)<\/h3>\n<p>This is the beating heart of Domain 1. The loop continues <strong>only<\/strong> because <code>stop_reason == \"tool_use\"<\/code> and stops <strong>only<\/strong> on <code>end_turn<\/code>. The <code>max_steps<\/code> cap is a <em>safety net<\/em>, not the stop condition \u2014 the exam explicitly flags \"iteration caps as the primary stopping mechanism\" as an anti-pattern, and so is \"parsing assistant text to decide you're done.\" We do neither.<\/p>\n<p>Thinking is disabled here so <code>response.content<\/code> is just text + <code>tool_use<\/code> blocks \u2014 cleaner to watch while you learn. Append the <strong>full <code>response.content<\/code><\/strong> back as the assistant turn every iteration (that's how the model sees its own tool calls), and return every <code>tool_result<\/code> in a single user message.<\/p>\n<p>Add to <code>agent.py<\/code>:<\/p>\n<pre><code class=\"language-python\">SYSTEM = (\n    &quot;You are a customer support resolution agent. Resolve returns, billing disputes, and account &quot;\n    &quot;issues using your tools. Verify who you are helping before acting on their orders. Escalate to &quot;\n    &quot;a human when a case needs human approval or you cannot make progress.&quot;\n)\n\ndef run(user_message, intercept=None):\n    state = {&quot;verified_customer_id&quot;: None}\n    messages = [{&quot;role&quot;: &quot;user&quot;, &quot;content&quot;: user_message}]\n\n    for step in range(20):  # safety net ONLY. Real stop condition is end_turn below.\n        resp = client.messages.create(\n            model=MODEL, max_tokens=2048, system=SYSTEM, tools=TOOLS,\n            thinking={&quot;type&quot;: &quot;disabled&quot;}, messages=messages,\n        )\n        print(f&quot;\\n[step {step}] stop_reason = {resp.stop_reason}&quot;)\n\n        if resp.stop_reason == &quot;end_turn&quot;:\n            final = &quot;&quot;.join(b.text for b in resp.content if b.type == &quot;text&quot;)\n            print(&quot;\\n=== FINAL ===\\n&quot; + final)\n            return final\n\n        # stop_reason == &quot;tool_use&quot;: echo the assistant turn, run each tool, feed results back.\n        messages.append({&quot;role&quot;: &quot;assistant&quot;, &quot;content&quot;: resp.content})\n        results = []\n        for block in resp.content:\n            if block.type != &quot;tool_use&quot;:\n                continue\n            # (interception hook wires in here in Step 4)\n            gate = intercept(block.name, block.input, state) if intercept else None\n            result = gate if gate is not None else execute_tool(block.name, block.input, state)\n            is_error = &quot;error&quot; in result or &quot;blocked&quot; in result\n            print(f&quot;  -&gt; {block.name}({json.dumps(block.input)}) =&gt; {json.dumps(result)}&quot;)\n            results.append({\n                &quot;type&quot;: &quot;tool_result&quot;,\n                &quot;tool_use_id&quot;: block.id,\n                &quot;content&quot;: json.dumps(result),\n                &quot;is_error&quot;: is_error,\n            })\n        messages.append({&quot;role&quot;: &quot;user&quot;, &quot;content&quot;: results})\n\n    print(&quot;hit safety cap without end_turn&quot;)  # you should almost never see this\n\nif __name__ == &quot;__main__&quot;:\n    run(&quot;Hi, I'm Jane Doe. Can you check the status of order 1001?&quot;)\n<\/code><\/pre>\n<p><strong>Checkpoint 2.<\/strong> Run <code>python agent.py<\/code>. You should see step 0 print <code>stop_reason = tool_use<\/code> and a <code>get_customer<\/code> call, step 1 another <code>tool_use<\/code> for <code>lookup_order<\/code>, then a step with <code>stop_reason = end_turn<\/code> and a final answer stating order 1001 (wireless mouse) is delivered. If you see the model call <code>lookup_order<\/code> on the name \"Jane Doe\" instead of <code>get_customer<\/code> on the number \u2014 that's the tool-confusion failure you'll force on purpose later.<\/p>\n<h3>Step 3 \u2014 Exercise the structured error paths<\/h3>\n<p>Structured errors (<code>errorCategory<\/code> + <code>isRetryable<\/code>) are what let the agent recover <em>correctly<\/em>: retry a transient timeout, but explain a validation/business error to the customer instead of hammering it. Your backend already returns these. Now watch the model consume them.<\/p>\n<p>Run two inputs (edit the <code>__main__<\/code> line or add calls):<\/p>\n<pre><code class=\"language-python\">run(&quot;I'm Jane Doe. What's the status of order 8888?&quot;)   # validation: order doesn't exist\nrun(&quot;I'm Jane Doe. Check order 9999 for me.&quot;)           # transient: times out, then retryable\n<\/code><\/pre>\n<p><strong>Checkpoint 3.<\/strong>\n- For <code>8888<\/code> (validation, <code>isRetryable: false<\/code>): the model reads the error, does <strong>not<\/strong> retry, and asks Jane to confirm the number. One <code>lookup_order<\/code> call, then it explains.\n- For <code>9999<\/code> (transient, <code>isRetryable: true<\/code>): the model sees <code>isRetryable: true<\/code> and <strong>retries<\/strong> <code>lookup_order(\"9999\")<\/code> at least once before giving up gracefully. Watch for two <code>lookup_order<\/code> calls in the trace.<\/p>\n<p>That difference \u2014 retry vs. don't \u2014 is entirely driven by the metadata you returned. That's Task 2.2.<\/p>\n<h3>Step 4 \u2014 The interception hook (deterministic business rule)<\/h3>\n<p>Here's the exam's single most-tested idea (sample Q1): when a rule has money or identity consequences, <strong>enforce it in code, not in a prompt.<\/strong> A prompt says \"please don't refund over $500\" \u2014 the model complies <em>most<\/em> of the time. A hook is a gate the tool call physically cannot pass. In the Claude Agent SDK this is a tool-call interception hook; on the raw API you build the same gate by hand, which is better for learning because you can see it's just code sitting between the model's decision and the side effect.<\/p>\n<p>The hook enforces two things:\n1. <strong>Prerequisite gate<\/strong> \u2014 block <code>lookup_order<\/code> and <code>process_refund<\/code> until <code>get_customer<\/code> has set a verified <code>customer_id<\/code>. (Directly sample Q1.)\n2. <strong>Threshold + redirect<\/strong> \u2014 block <code>process_refund<\/code> over <code>$500<\/code> and steer the model to <code>escalate_to_human<\/code>.<\/p>\n<p>Add to <code>agent.py<\/code>:<\/p>\n<pre><code class=\"language-python\">AUTO_REFUND_LIMIT = 500.0\n\ndef intercept(name, tool_input, state):\n    # Return a dict to BLOCK (becomes the tool result); return None to ALLOW execution.\n    if name in (&quot;lookup_order&quot;, &quot;process_refund&quot;) and not state[&quot;verified_customer_id&quot;]:\n        return {&quot;blocked&quot;: {&quot;errorCategory&quot;: &quot;permission&quot;, &quot;isRetryable&quot;: False,\n                &quot;message&quot;: &quot;Identity not verified. Call get_customer and confirm the account before this operation.&quot;}}\n    if name == &quot;process_refund&quot; and float(tool_input.get(&quot;amount&quot;, 0)) &gt; AUTO_REFUND_LIMIT:\n        return {&quot;blocked&quot;: {&quot;errorCategory&quot;: &quot;business&quot;, &quot;isRetryable&quot;: False,\n                &quot;message&quot;: (f&quot;Refund ${tool_input['amount']:.2f} exceeds the ${AUTO_REFUND_LIMIT:.0f} auto-approval &quot;\n                            &quot;limit. Do not retry. Escalate to a human with escalate_to_human.&quot;)}}\n    return None\n<\/code><\/pre>\n<p>Wire it in \u2014 change the <code>__main__<\/code> block:<\/p>\n<pre><code class=\"language-python\">if __name__ == &quot;__main__&quot;:\n    run(&quot;I'm Jane Doe. Order 1002 (the standing desk) arrived broken. Please refund me the full $620.&quot;,\n        intercept=intercept)\n<\/code><\/pre>\n<p><strong>Checkpoint 4.<\/strong> Run it. You should see: <code>get_customer<\/code> \u2192 <code>lookup_order(\"1002\")<\/code> \u2192 the model attempts <code>process_refund(\"1002\", 620)<\/code> \u2192 the trace shows a <code>blocked<\/code> result with <code>errorCategory: business<\/code> \u2192 the model then calls <code>escalate_to_human<\/code> with a filled-in handoff, and the final message tells Jane it's been escalated. The refund <strong>never executed.<\/strong> That's a deterministic guarantee \u2014 no phrasing of the request can get $620 past the gate.<\/p>\n<h3>Step 5 \u2014 Multi-concern decomposition + handoff<\/h3>\n<p>Real tickets bundle problems. The agent must split one message into distinct items, investigate each (sharing the verified customer context), and synthesize one resolution \u2014 escalating only the part that needs it, with a structured handoff the human can act on without the transcript.<\/p>\n<pre><code class=\"language-python\">if __name__ == &quot;__main__&quot;:\n    run(\n        &quot;Hi, I'm Jane Doe. Two things: I want a $89.50 refund on order 1003, the desk lamp, &quot;\n        &quot;because it's defective \u2014 AND order 1002, the standing desk, also arrived damaged and &quot;\n        &quot;I want the full $620 back for that one too.&quot;,\n        intercept=intercept,\n    )\n<\/code><\/pre>\n<p><strong>Checkpoint 5.<\/strong> Watch the trace: <code>get_customer<\/code> once (shared context), <code>lookup_order(\"1003\")<\/code> and <code>lookup_order(\"1002\")<\/code> (both concerns investigated), <code>process_refund(\"1003\", 89.50)<\/code> <strong>succeeds<\/strong> (under the limit), <code>process_refund(\"1002\", 620)<\/code> is <strong>blocked<\/strong> and routed to <code>escalate_to_human<\/code>. The final message resolves concern 1 (refund issued) and reports concern 2 as escalated \u2014 two problems, two different outcomes, one coherent answer. That's Task 1.4 / 1.6 / 5.2 in one run.<\/p>\n<h2>1.4 Break it on purpose<\/h2>\n<p>Each of these turns a working agent into a broken one so you can feel the failure the exam is testing.<\/p>\n<h3>Break-it #1 \u2014 Strip the descriptions, watch tool selection collapse (Task 2.1)<\/h3>\n<p>Replace both descriptions with the exam's \"minimal\" versions and remove the disambiguation:<\/p>\n<pre><code class=\"language-python\"># get_customer:  &quot;description&quot;: &quot;Retrieves customer information.&quot;\n# lookup_order:  &quot;description&quot;: &quot;Retrieves order details.&quot;\n<\/code><\/pre>\n<p>Run <code>run(\"Hi, can you check my order 1002?\")<\/code>. With rich descriptions the model reliably starts with <code>get_customer<\/code> (it has no account yet) or correctly reaches for <code>lookup_order<\/code>. With the stripped ones you'll see it misroute \u2014 often calling <code>get_customer<\/code> with \"1002\" as if 1002 were a name, or picking the wrong tool outright. <strong>Lesson:<\/strong> tool descriptions are the routing mechanism; \"first step to fix misrouting\" on the exam is <em>expand the descriptions<\/em>, not add a classifier (sample Q2, answer B). Restore the good descriptions after.<\/p>\n<h3>Break-it #2 \u2014 Delete the hook, trust the prompt instead (Tasks 1.4, 1.5)<\/h3>\n<p>Comment out <code>intercept=intercept<\/code> in the <code>process_refund<\/code> run, and instead add a line to <code>SYSTEM<\/code>: <code>\"Never issue a refund over $500.\"<\/code> Now run the $620 refund a handful of times. Sometimes it escalates \u2014 and sometimes it just calls <code>process_refund(\"1002\", 620)<\/code> and the money goes out. <strong>Lesson:<\/strong> prompt-based compliance is probabilistic; for money/identity rules you need the deterministic hook (sample Q1, answer A \u2014 a programmatic prerequisite, not a stronger prompt). Re-enable the hook.<\/p>\n<h3>Break-it #3 \u2014 Downgrade structured errors to a generic string (Task 2.2)<\/h3>\n<p>In <code>execute_tool<\/code>, make the validation and transient branches return a bare string instead of the structured dict:<\/p>\n<pre><code class=\"language-python\">return err(&quot;validation&quot;, False, &quot;...&quot;)   # replace with:  return {&quot;error&quot;: &quot;Operation failed&quot;}\n<\/code><\/pre>\n<p>Re-run the <code>9999<\/code> (transient) and <code>8888<\/code> (validation) inputs. Now the model can't tell retryable from not: it may retry the permanent validation error uselessly, or give up on the transient one that a retry would have fixed. <strong>Lesson:<\/strong> uniform \"Operation failed\" errors destroy the agent's ability to recover appropriately; <code>errorCategory<\/code> + <code>isRetryable<\/code> are what make recovery correct. Restore the structured version.<\/p>\n<hr />\n<h1>Exercise 2 \u2014 Configure Claude Code for a Team Development Workflow<\/h1>\n<h2>2.1 Objective + exam mapping<\/h2>\n<p>Configure a repo the way a team would: a project <code>CLAUDE.md<\/code>, path-scoped rules that load only for matching files, a skill that runs in an isolated fork with restricted tools, a shared MCP server plus a personal one, and hands-on feel for plan mode vs. direct execution. All of this happens in config files and the Claude Code CLI you already drive daily.<\/p>\n<table>\n<thead>\n<tr>\n<th>What you configure<\/th>\n<th>Task statements drilled<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Project <code>CLAUDE.md<\/code> (project vs user scope, <code>@import<\/code>)<\/td>\n<td><strong>3.1<\/strong><\/td>\n<\/tr>\n<tr>\n<td><code>.claude/rules/*.md<\/code> with <code>paths:<\/code> glob frontmatter (load only when a matching file is edited)<\/td>\n<td><strong>3.3<\/strong><\/td>\n<\/tr>\n<tr>\n<td>A project skill with <code>context: fork<\/code> + <code>allowed-tools<\/code><\/td>\n<td><strong>3.2<\/strong><\/td>\n<\/tr>\n<tr>\n<td><code>.mcp.json<\/code> with <code>${VAR}<\/code> env-var expansion + a personal <code>~/.claude.json<\/code> server, both live at once<\/td>\n<td><strong>2.4<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Plan mode vs. direct execution across three tasks of increasing complexity<\/td>\n<td><strong>3.4<\/strong><\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2>2.2 Setup (throwaway practice repo)<\/h2>\n<p>Do this in a scratch repo so you don't touch a real project.<\/p>\n<pre><code class=\"language-powershell\">cd C:\\Users\\david.rios\\Dev\\claude-cert-prep\\exercises\nmkdir cc-team-practice\ncd cc-team-practice\ngit init\nmkdir src\\api, src\\components, docs\n&quot;export function handler(req) { return req; }&quot;           | Out-File -Encoding utf8 src\\api\\handler.ts\n&quot;export function Button() { return null; }&quot;              | Out-File -Encoding utf8 src\\components\\Button.tsx\n&quot;import { Button } from './Button'; test('renders', () =&gt; {});&quot; | Out-File -Encoding utf8 src\\components\\Button.test.tsx\n&quot;Team docs live here.&quot; | Out-File -Encoding utf8 docs\\README.md\n$env:TEAM_DOCS_ROOT = &quot;C:\\Users\\david.rios\\Dev\\claude-cert-prep\\exercises\\cc-team-practice\\docs&quot;\n<\/code><\/pre>\n<p>Target tree once you finish the steps:<\/p>\n<pre><code>cc-team-practice\\\n  CLAUDE.md\n  .mcp.json\n  .claude\\\n    rules\\\n      api-conventions.md\n      testing.md\n    skills\\\n      map-area\\\n        SKILL.md\n  src\\api\\handler.ts\n  src\\components\\Button.tsx\n  src\\components\\Button.test.tsx\n  docs\\README.md\n<\/code><\/pre>\n<h2>2.3 Step-by-step build<\/h2>\n<h3>Step 1 \u2014 Project <code>CLAUDE.md<\/code> (shared, version-controlled)<\/h3>\n<p>Project-level config is committed and reaches every teammate on clone/pull. User-level (<code>~/.claude/CLAUDE.md<\/code>) is yours alone and is <strong>never shared via git<\/strong> \u2014 that distinction is the whole of sample-question territory for Task 3.1. Put universal standards here.<\/p>\n<p><code>cc-team-practice\\CLAUDE.md<\/code>:<\/p>\n<pre><code class=\"language-markdown\"># Project Standards \u2014 cc-team-practice\n\n## Universal\n- Language: TypeScript. Prefer explicit types over `any`.\n- Every new function gets a colocated `*.test.ts(x)` next to the file it tests.\n- Never commit secrets. Config that needs a token reads it from an env var.\n\n## Testing\n- Test files sit beside their source (e.g. Button.test.tsx next to Button.tsx).\n- One behavior per `test()`; name tests by the behavior, not the function.\n\n@docs/README.md\n<\/code><\/pre>\n<p>The <code>@docs/README.md<\/code> line is the <code>@import<\/code> syntax \u2014 it pulls that file's contents into context so you can keep <code>CLAUDE.md<\/code> modular instead of monolithic.<\/p>\n<p><strong>Checkpoint 1.<\/strong> Launch <code>claude<\/code> in <code>cc-team-practice<\/code>, then run <code>/memory<\/code>. You should see <code>CLAUDE.md<\/code> listed as a loaded project memory file. Ask <em>\"what are this project's testing conventions?\"<\/em> \u2014 it should answer from the file without you pasting anything.<\/p>\n<h3>Step 2 \u2014 Path-scoped rules with glob frontmatter<\/h3>\n<p>Conventions that apply to files <strong>spread across directories<\/strong> (like test files, which live next to every component) don't fit a single-directory <code>CLAUDE.md<\/code>. <code>.claude/rules/*.md<\/code> with a <code>paths:<\/code> glob in the YAML frontmatter solves this: the rule loads <strong>only<\/strong> when you're editing a file that matches the glob \u2014 less irrelevant context, fewer tokens, and it follows the file type regardless of folder. This is sample Q6, answer A.<\/p>\n<p><code>.claude\\rules\\api-conventions.md<\/code>:<\/p>\n<pre><code class=\"language-markdown\">---\npaths: [&quot;src/api/**/*&quot;]\n---\n# API conventions\n- Handlers are async and use try/catch with a typed error response.\n- Validate the request shape at the top of every handler before any logic.\n<\/code><\/pre>\n<p><code>.claude\\rules\\testing.md<\/code>:<\/p>\n<pre><code class=\"language-markdown\">---\npaths: [&quot;**/*.test.*&quot;]\n---\n# Testing conventions\n- Arrange-Act-Assert, with a blank line between each section.\n- Mock network calls; never hit a live endpoint in a unit test.\n<\/code><\/pre>\n<p><strong>Checkpoint 2.<\/strong> In <code>claude<\/code>, ask it to <em>\"add a test case to <code>src/components/Button.test.tsx<\/code>.\"<\/em> The <code>**/*.test.*<\/code> glob matches, so the testing rule loads and the generated test follows Arrange-Act-Assert. Then ask it to <em>\"tweak <code>src/components/Button.tsx<\/code>\"<\/em> (not a test, not under <code>src/api<\/code>) \u2014 neither rule's glob matches, so neither loads. You've made conventions travel with the file <em>type<\/em>, not the folder.<\/p>\n<h3>Step 3 \u2014 A project skill with <code>context: fork<\/code> + <code>allowed-tools<\/code><\/h3>\n<p>A skill is on-demand (invoked when relevant), unlike <code>CLAUDE.md<\/code> which is always loaded. Two frontmatter options matter here:\n- <strong><code>context: fork<\/code><\/strong> runs the skill in an isolated sub-agent, so its verbose output (a codebase map, an exploration dump) returns a summary and <strong>doesn't pollute your main conversation<\/strong>.\n- <strong><code>allowed-tools<\/code><\/strong> restricts what the skill can do while it runs \u2014 here, read-only, so a \"map the code\" skill can't accidentally write or run shell commands.<\/p>\n<p><code>.claude\\skills\\map-area\\SKILL.md<\/code>:<\/p>\n<pre><code class=\"language-markdown\">---\nname: map-area\ndescription: Summarize the structure of a subdirectory \u2014 files, exports, and how they connect. Read-only.\ncontext: fork\nallowed-tools: Read, Grep, Glob\nargument-hint: &lt;directory path, e.g. src/api&gt;\n---\n# Map Area\n\nExplore the directory given as the argument. Use Grep and Glob to find files and their\nexported names, follow imports to see how they connect, and return a SHORT summary:\n- files and what each exports\n- the dependency edges between them\n- anything that looks like an entry point\n\nDo not modify any files. Return only the summary.\n<\/code><\/pre>\n<p><strong>Checkpoint 3.<\/strong> In <code>claude<\/code>, invoke the skill (e.g. <code>/map-area src<\/code>, or ask \"use the map-area skill on src\"). Because of <code>context: fork<\/code>, the noisy file-by-file exploration happens in a sub-agent and you get back a tidy summary \u2014 your main transcript stays clean. Try to make it write a file mid-skill; <code>allowed-tools: Read, Grep, Glob<\/code> means it can't. If you invoke it with no argument, <code>argument-hint<\/code> prompts you for the directory.<\/p>\n<h3>Step 4 \u2014 MCP servers: shared (<code>.mcp.json<\/code>) + personal (<code>~/.claude.json<\/code>)<\/h3>\n<p>Two scopes, both discovered at connection time and available <strong>simultaneously<\/strong>:\n- <strong><code>.mcp.json<\/code><\/strong> (project root, committed) = shared team tooling. Secrets are never hardcoded \u2014 you expand an environment variable with <code>${VAR}<\/code>, so the file is safe to commit.\n- <strong><code>~/.claude.json<\/code><\/strong> (your home dir) = personal / experimental servers your teammates don't get.<\/p>\n<p><code>cc-team-practice\\.mcp.json<\/code> \u2014 a shared docs server whose root path is env-var-expanded (no token needed to run tonight; the pattern is identical for a real <code>${GITHUB_PERSONAL_ACCESS_TOKEN}<\/code>):<\/p>\n<pre><code class=\"language-json\">{\n  &quot;mcpServers&quot;: {\n    &quot;team-docs&quot;: {\n      &quot;command&quot;: &quot;npx&quot;,\n      &quot;args&quot;: [&quot;-y&quot;, &quot;@modelcontextprotocol/server-filesystem&quot;, &quot;${TEAM_DOCS_ROOT}&quot;]\n    }\n  }\n}\n<\/code><\/pre>\n<blockquote>\n<p>The exam's canonical credential example is a token: <code>\"env\": { \"GITHUB_PERSONAL_ACCESS_TOKEN\": \"${GITHUB_TOKEN}\" }<\/code>. Same <code>${VAR}<\/code> mechanism \u2014 the point is that the secret lives in your environment, not in the committed file.<\/p>\n<\/blockquote>\n<p>Add a <strong>personal, experimental<\/strong> server to <code>~/.claude.json<\/code> (Windows: <code>C:\\Users\\david.rios\\.claude.json<\/code>). Merge this into the existing JSON's top level \u2014 don't overwrite the file:<\/p>\n<pre><code class=\"language-json\">{\n  &quot;mcpServers&quot;: {\n    &quot;scratch-memory&quot;: {\n      &quot;command&quot;: &quot;npx&quot;,\n      &quot;args&quot;: [&quot;-y&quot;, &quot;@modelcontextprotocol/server-memory&quot;]\n    }\n  }\n}\n<\/code><\/pre>\n<blockquote>\n<p>On native Windows PowerShell, <code>npx<\/code> sometimes needs wrapping: set <code>\"command\": \"cmd\"<\/code> and prepend <code>\"/c\", \"npx\"<\/code> to args. In your WSL bash session, plain <code>npx<\/code> works.<\/p>\n<\/blockquote>\n<p><strong>Checkpoint 4.<\/strong> Restart <code>claude<\/code> in the repo and run <code>/mcp<\/code>. You should see <strong>both<\/strong> <code>team-docs<\/code> (project) and <code>scratch-memory<\/code> (personal) connected at the same time \u2014 proving project- and user-scoped servers coexist. Tools from both are now available to the agent.<\/p>\n<h3>Step 5 \u2014 Plan mode vs. direct execution<\/h3>\n<p>Plan mode explores and designs <em>before<\/em> changing anything \u2014 right for large, multi-file, or multiple-valid-approach work where blind edits cause costly rework. Direct execution is right for a small, well-scoped, unambiguous change. Enter plan mode by pressing <strong>Shift+Tab<\/strong> to cycle permission modes until it shows plan mode (or launch <code>claude --permission-mode plan<\/code>). Run these three and notice where the plan step earns its keep:<\/p>\n<ol>\n<li><strong>Direct execution \u2014 single-file, clear scope.<\/strong> <em>\"In <code>src/api/handler.ts<\/code>, add a guard that returns a 400 error object when <code>req<\/code> is null.\"<\/em> One file, obvious change. Plan mode here is pure overhead; just let it edit.<\/li>\n<li><strong>Plan mode \u2014 multi-file change.<\/strong> <em>\"Rename <code>Button<\/code> to <code>PrimaryButton<\/code> everywhere it's defined, exported, imported, and tested.\"<\/em> This spans <code>Button.tsx<\/code> and <code>Button.test.tsx<\/code> (and any importer). Plan mode maps the usages and shows you the change set before touching anything \u2014 you catch a missed reference <em>before<\/em> it breaks.<\/li>\n<li><strong>Plan mode \u2014 multiple valid approaches.<\/strong> <em>\"Add response caching to the API handler.\"<\/em> In-memory? Keyed how? TTL? There are several defensible designs. Plan mode surfaces the options and their tradeoffs so you decide the architecture up front, then execute the chosen one.<\/li>\n<\/ol>\n<p><strong>Checkpoint 5.<\/strong> You should feel the difference: task 1 is faster and cleaner in direct execution; tasks 2 and 3 give you a reviewable plan that prevents rework. That judgment \u2014 <em>is this architectural / multi-file / multi-approach, or is it a single well-scoped edit?<\/em> \u2014 is exactly what sample Q5 tests (answer A: enter plan mode for the monolith-to-microservices restructure).<\/p>\n<h2>2.4 Break it on purpose<\/h2>\n<h3>Break-it #1 \u2014 Wrong glob, silent no-op (Tasks 3.3, 3.1)<\/h3>\n<p>Change <code>testing.md<\/code>'s frontmatter to <code>paths: [\"src/api/**/*\"]<\/code>, then ask Claude to add a test to <code>Button.test.tsx<\/code>. The glob no longer matches the test file, so the testing rule <strong>silently doesn't load<\/strong> \u2014 the generated test ignores your Arrange-Act-Assert convention, with no error to tell you why. <strong>Lesson:<\/strong> path-scoped rules only fire on a matching glob; a convention that \"isn't being applied\" is usually a glob that doesn't match the file you're editing. (Related diagnosis for Task 3.1: put a rule in <code>~/.claude/CLAUDE.md<\/code> instead of the project and a teammate who clones the repo never receives it \u2014 same \"silently missing\" failure, different cause.) Restore <code>[\"**/*.test.*\"]<\/code>.<\/p>\n<h3>Break-it #2 \u2014 Remove <code>context: fork<\/code>, watch the transcript flood (Task 3.2)<\/h3>\n<p>Delete the <code>context: fork<\/code> line from <code>SKILL.md<\/code> and re-run <code>map-area<\/code> on <code>src<\/code>. Now the skill runs <strong>in your main conversation<\/strong>: every file it reads, every grep, every intermediate note dumps straight into your context instead of coming back as a summary. On a real codebase this exhausts your context window fast. <strong>Lesson:<\/strong> <code>context: fork<\/code> is what isolates verbose or exploratory skills so their output doesn't pollute the session. Restore it.<\/p>\n<h3>Break-it #3 \u2014 Unset the env var, watch the MCP server fail (Task 2.4)<\/h3>\n<p>In a fresh shell (so <code>TEAM_DOCS_ROOT<\/code> is unset), launch <code>claude<\/code> and run <code>/mcp<\/code>. The <code>team-docs<\/code> server can't resolve <code>${TEAM_DOCS_ROOT}<\/code> and fails to start \u2014 it shows as errored, not silently skipped. <strong>Lesson:<\/strong> <code>${VAR}<\/code> expansion keeps secrets out of committed config, but the variable has to actually be present in the environment where Claude Code launches; a missing var is a visible startup failure, not a no-op. Re-export <code>TEAM_DOCS_ROOT<\/code> and confirm it connects again.<\/p>\n<hr />\n<h2>Where this maps on the exam<\/h2>\n<ul>\n<li><strong>Exercise 1<\/strong> is Domain 1 (Agentic Architecture &amp; Orchestration, 27%) + Domain 2 (Tool Design &amp; MCP, 18%) + a slice of Domain 5 (Reliability): the loop, the hook, structured errors, decomposition, escalation.<\/li>\n<li><strong>Exercise 2<\/strong> is Domain 3 (Claude Code Config &amp; Workflows, 20%) + Domain 2 (MCP integration): hierarchy, glob rules, forked skills, MCP scoping, plan vs. direct.<\/li>\n<\/ul>\n<p>If you can rebuild both from a blank folder without looking, you own roughly 45% of the scored content by weight \u2014 and, more to the point, you'll be reading each scenario question and already knowing which lever it's testing.<\/p>","words":2890},"exercise-3-4-extraction-and-research":{"title":"Exercises 3 & 4 \u2014 Structured Extraction Pipeline + Multi-Agent Research","group":"Build exercises","html":"<h1>Exercises 3 &amp; 4 \u2014 Structured Extraction Pipeline + Multi-Agent Research<\/h1>\n<blockquote>\n<p>Claude Certified Architect \u2014 Foundations. Two build-it-tonight labs, same rules as Exercises 1 &amp; 2.\nBoth run on the raw Anthropic Messages API (Python). Model for all API code: <code>claude-sonnet-5<\/code>. Everything here is paste-ready.\nExercise 3 = exam Scenario 6 (Structured Data Extraction). Exercise 4 = exam Scenario 3 (Multi-Agent Research System).<\/p>\n<\/blockquote>\n<p>Same drill as last time: every step ends with a checkpoint (run this, see that), and every exercise ends with <strong>Break it on purpose<\/strong>. The exam questions for these scenarios are almost all \"here's a broken pipeline, what's the root cause?\" \u2014 so the break-it sections are the actual studying.<\/p>\n<p>One heads-up before you start: the exam's Exercise 4 talks about the Agent SDK's <code>Task<\/code> tool and <code>allowedTools<\/code>. You're going to build the exact same machinery by hand on the raw API \u2014 a <code>Task<\/code> tool the coordinator calls, a runner that spawns a fresh, isolated conversation per subagent. That's better for learning: you'll <em>see<\/em> why subagents don't inherit context, because you wrote the code that doesn't pass it.<\/p>\n<hr />\n<h1>Exercise 3 \u2014 Build a Structured Data Extraction Pipeline<\/h1>\n<h2>3.1 Objective + exam mapping<\/h2>\n<p>Build an invoice-extraction pipeline: a schema that refuses to let the model lie, a validation-retry loop that feeds errors back, few-shot examples for messy real-world formats, a Message Batches pass with <code>custom_id<\/code> failure handling, and confidence-based routing to human review.<\/p>\n<table>\n<thead>\n<tr>\n<th>What you build<\/th>\n<th>Task statements drilled<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Extraction tool: required + optional + <strong>nullable<\/strong> fields, enum + <code>\"other\"<\/code> + detail, forced <code>tool_choice<\/code><\/td>\n<td><strong>4.3<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Pydantic validation-retry loop feeding the <em>specific<\/em> error back; retry-fixable vs. retry-hopeless errors<\/td>\n<td><strong>4.4<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Few-shot examples demonstrating extraction from varied document formats<\/td>\n<td><strong>4.2<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Message Batches API run: 50% cost, <code>custom_id<\/code> correlation, resubmit-only-failures<\/td>\n<td><strong>4.5<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Field-level confidence scores \u2192 human-review routing, accuracy-by-segment thinking<\/td>\n<td><strong>5.5<\/strong><\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>This is exam Scenario 6 end to end. Sample Q11 (batch vs. real-time) is Step 4 verbatim.<\/p>\n<h2>3.2 Setup (Windows / PowerShell)<\/h2>\n<p>Same venv and API key as Exercise 1. One new dependency: Pydantic (the exam names it by name for validation-retry loops).<\/p>\n<pre><code class=\"language-powershell\">cd C:\\Users\\david.rios\\Dev\\claude-cert-prep\\exercises\n.\\.venv\\Scripts\\Activate.ps1\npip install pydantic\n$env:ANTHROPIC_API_KEY = &quot;sk-ant-...&quot;   # if not still set from Exercise 1\n$env:PYTHONIOENCODING  = &quot;utf-8&quot;\n<\/code><\/pre>\n<p>Tree after both exercises tonight:<\/p>\n<pre><code>claude-cert-prep\\exercises\\\n  .venv\\\n  agent.py           # from Exercise 1\n  extract.py         # Exercise 3 \u2014 you build this\n  research.py        # Exercise 4 \u2014 you build this\n<\/code><\/pre>\n<h2>3.3 Step-by-step build<\/h2>\n<h3>Step 1 \u2014 The extraction tool: a schema that blocks fabrication<\/h3>\n<p>The whole game of Task 4.3 is in three schema decisions:<\/p>\n<ol>\n<li><strong>Nullable fields<\/strong> (<code>\"type\": [\"string\", \"null\"]<\/code>) for anything a real document might not contain. If you make a maybe-absent field required and non-nullable, the model <em>will<\/em> invent a value to satisfy the schema \u2014 you'll prove that in Break-it #1.<\/li>\n<li><strong>Enum + <code>\"other\"<\/code> + detail string<\/strong> for categories. Real payments include Venmo, gift cards, barter. Without <code>\"other\"<\/code>, those get shoehorned into <code>check<\/code> or <code>wire<\/code>. <code>\"unclear\"<\/code> covers genuinely ambiguous docs.<\/li>\n<li><strong>Forced <code>tool_choice<\/code><\/strong> so the response is <em>always<\/em> a schema-valid tool call, never prose. Tool use with a JSON schema eliminates JSON <em>syntax<\/em> errors entirely \u2014 you'll never <code>json.loads()<\/code>-crash again. (It does NOT eliminate <em>semantic<\/em> errors. That's Step 2.)<\/li>\n<\/ol>\n<p>Create <code>extract.py<\/code>:<\/p>\n<pre><code class=\"language-python\">import json\nimport time\nfrom datetime import date\nfrom typing import Literal, Optional\n\nimport anthropic\nfrom pydantic import BaseModel, ValidationError, model_validator\n\nclient = anthropic.Anthropic()\nMODEL = &quot;claude-sonnet-5&quot;\n\n# ---------------------------------------------------------------- the tool\nEXTRACT_TOOL = {\n    &quot;name&quot;: &quot;record_invoice&quot;,\n    &quot;description&quot;: (\n        &quot;Record structured data extracted from an invoice, receipt, or payment-related document. &quot;\n        &quot;Only record what the document actually states. If a field's information is absent from &quot;\n        &quot;the document, use null \u2014 NEVER guess or fabricate a value.&quot;\n    ),\n    &quot;input_schema&quot;: {\n        &quot;type&quot;: &quot;object&quot;,\n        &quot;properties&quot;: {\n            &quot;vendor_name&quot;:    {&quot;type&quot;: &quot;string&quot;, &quot;description&quot;: &quot;Who is being paid&quot;},\n            &quot;invoice_number&quot;: {&quot;type&quot;: [&quot;string&quot;, &quot;null&quot;],\n                               &quot;description&quot;: &quot;The document's invoice/reference number. null if none appears.&quot;},\n            &quot;invoice_date&quot;:   {&quot;type&quot;: [&quot;string&quot;, &quot;null&quot;],\n                               &quot;description&quot;: &quot;ISO format YYYY-MM-DD. null if no date appears.&quot;},\n            &quot;total_amount&quot;:   {&quot;type&quot;: &quot;number&quot;, &quot;description&quot;: &quot;Total amount due, in the document's currency&quot;},\n            &quot;payment_method&quot;: {&quot;type&quot;: &quot;string&quot;,\n                               &quot;enum&quot;: [&quot;credit_card&quot;, &quot;ach&quot;, &quot;wire&quot;, &quot;check&quot;, &quot;other&quot;, &quot;unclear&quot;],\n                               &quot;description&quot;: &quot;How payment is/was made. 'other' for anything not listed &quot;\n                                              &quot;(then fill payment_method_detail). 'unclear' if ambiguous.&quot;},\n            &quot;payment_method_detail&quot;: {&quot;type&quot;: [&quot;string&quot;, &quot;null&quot;],\n                               &quot;description&quot;: &quot;Free-text detail. REQUIRED when payment_method is 'other'.&quot;},\n            &quot;line_items&quot;: {\n                &quot;type&quot;: &quot;array&quot;,\n                &quot;items&quot;: {&quot;type&quot;: &quot;object&quot;,\n                          &quot;properties&quot;: {&quot;description&quot;: {&quot;type&quot;: &quot;string&quot;}, &quot;amount&quot;: {&quot;type&quot;: &quot;number&quot;}},\n                          &quot;required&quot;: [&quot;description&quot;, &quot;amount&quot;]},\n                &quot;description&quot;: &quot;Every individual charge on the document, INCLUDING tax, fees, and shipping. &quot;\n                               &quot;Must sum to total_amount.&quot;,\n            },\n        },\n        &quot;required&quot;: [&quot;vendor_name&quot;, &quot;invoice_number&quot;, &quot;invoice_date&quot;,\n                     &quot;total_amount&quot;, &quot;payment_method&quot;, &quot;line_items&quot;],\n    },\n}\n# Note: invoice_number and invoice_date are REQUIRED **and** NULLABLE. That combination is the\n# exam pattern \u2014 the model must always address the field, but null is a legal, honest answer.\n\n# ---------------------------------------------------------------- sample documents\nDOC_CLEAN = &quot;&quot;&quot;INVOICE #INV-4471\nBlue Ridge Hosting LLC\nDate: 2026-06-14\nManaged VPS (June)........$120.00\nBackup storage............$18.00\nTOTAL DUE: $138.00\nPayment: ACH transfer to account on file&quot;&quot;&quot;\n\nDOC_EMAIL = &quot;&quot;&quot;From: dave@chilcode.com\nSubject: banner payment\nHey \u2014 heads up, we still owe Maria's Print Shop for the trade-show banner job.\nIt came to $150 even. She doesn't do invoices for small jobs, said just Venmo her\nwhenever. Can you take care of it this week?&quot;&quot;&quot;\n\nDOC_TAX = &quot;&quot;&quot;RECEIPT \u2014 Lakeside Office Supply\nStanding desk mat.........$40.00\nMonitor arm...............$35.00\nSales tax (10%)...........$7.50\nAmount charged: $82.50&quot;&quot;&quot;\n<\/code><\/pre>\n<p><strong>Checkpoint 1.<\/strong> <code>python -c \"import extract; print(extract.EXTRACT_TOOL['name'])\"<\/code> prints <code>record_invoice<\/code>. Nothing calls the API yet. Read the three docs and predict: which fields come back null for <code>DOC_EMAIL<\/code>? (Should be <code>invoice_number<\/code> and <code>invoice_date<\/code>; <code>payment_method<\/code> should be <code>other<\/code> + <code>\"Venmo\"<\/code>.)<\/p>\n<h3>Step 2 \u2014 Pydantic validation + the retry loop<\/h3>\n<p>Tool use guarantees the output <em>parses<\/em> and <em>matches the schema shape<\/em>. It does not guarantee the output makes <em>sense<\/em> \u2014 line items that don't sum to the total, a date in the wrong format, <code>\"other\"<\/code> with no detail. That's semantic validation, and it's your job. When it fails, the exam-correct move (Task 4.4) is: <strong>re-send the document + the failed extraction + the specific validation error<\/strong>, and let the model self-correct. Not \"try again\" \u2014 the <em>specific error<\/em>. That's the entire difference between a retry that converges and one that flails.<\/p>\n<p>Add to <code>extract.py<\/code>:<\/p>\n<pre><code class=\"language-python\"># ---------------------------------------------------------------- semantic validation\nclass LineItem(BaseModel):\n    description: str\n    amount: float\n\nclass Invoice(BaseModel):\n    vendor_name: str\n    invoice_number: Optional[str]\n    invoice_date: Optional[str]\n    total_amount: float\n    payment_method: Literal[&quot;credit_card&quot;, &quot;ach&quot;, &quot;wire&quot;, &quot;check&quot;, &quot;other&quot;, &quot;unclear&quot;]\n    payment_method_detail: Optional[str] = None\n    line_items: list[LineItem]\n\n    @model_validator(mode=&quot;after&quot;)\n    def semantic_checks(self):\n        if self.line_items:\n            s = round(sum(li.amount for li in self.line_items), 2)\n            if abs(s - self.total_amount) &gt; 0.01:\n                raise ValueError(\n                    f&quot;line_items sum to {s} but total_amount is {self.total_amount}. Every charge on &quot;\n                    &quot;the document \u2014 including tax, fees, shipping \u2014 must appear as a line item.&quot;)\n        if self.payment_method == &quot;other&quot; and not self.payment_method_detail:\n            raise ValueError(&quot;payment_method is 'other' but payment_method_detail is empty.&quot;)\n        if self.invoice_date is not None:\n            try:\n                date.fromisoformat(self.invoice_date)\n            except ValueError:\n                raise ValueError(f&quot;invoice_date '{self.invoice_date}' is not ISO YYYY-MM-DD.&quot;)\n        return self\n\n# ---------------------------------------------------------------- extraction + retry loop\nSYSTEM = (&quot;You extract structured data from payment documents by calling record_invoice. &quot;\n          &quot;Record only what the document states; use null for absent information.&quot;)\n\ndef extract(document, system=SYSTEM, max_retries=2):\n    messages = [{&quot;role&quot;: &quot;user&quot;, &quot;content&quot;:\n                 f&quot;Extract the invoice data from this document:\\n\\n&lt;document&gt;\\n{document}\\n&lt;/document&gt;&quot;}]\n    for attempt in range(max_retries + 1):\n        resp = client.messages.create(\n            model=MODEL, max_tokens=2048, system=system,\n            tools=[EXTRACT_TOOL],\n            tool_choice={&quot;type&quot;: &quot;tool&quot;, &quot;name&quot;: &quot;record_invoice&quot;},  # ALWAYS a tool call, never prose\n            thinking={&quot;type&quot;: &quot;disabled&quot;},  # forced tool_choice requires thinking off\n            messages=messages,\n        )\n        tool_use = next(b for b in resp.content if b.type == &quot;tool_use&quot;)\n        try:\n            inv = Invoice.model_validate(tool_use.input)\n            print(f&quot;  [attempt {attempt}] VALID&quot;)\n            return inv, attempt\n        except ValidationError as e:\n            print(f&quot;  [attempt {attempt}] validation failed: {e.errors()[0]['msg'][:90]}&quot;)\n            # Retry-with-error-feedback: document is still in context, add the failed\n            # extraction (assistant turn) + the SPECIFIC error (tool_result).\n            messages.append({&quot;role&quot;: &quot;assistant&quot;, &quot;content&quot;: resp.content})\n            messages.append({&quot;role&quot;: &quot;user&quot;, &quot;content&quot;: [{\n                &quot;type&quot;: &quot;tool_result&quot;, &quot;tool_use_id&quot;: tool_use.id, &quot;is_error&quot;: True,\n                &quot;content&quot;: (f&quot;Validation failed:\\n{e}\\n\\nRe-read the document and call record_invoice &quot;\n                            &quot;again with corrected values. If information is genuinely absent from the &quot;\n                            &quot;document, use null \u2014 do not invent it.&quot;),\n            }]})\n    print(&quot;  gave up: error not resolvable by retry&quot;)\n    return None, max_retries\n\nif __name__ == &quot;__main__&quot;:\n    print(&quot;--- DOC_CLEAN ---&quot;); extract(DOC_CLEAN)\n    print(&quot;--- DOC_TAX ---&quot;);   extract(DOC_TAX)\n<\/code><\/pre>\n<p><strong>Checkpoint 2.<\/strong> Run <code>python extract.py<\/code>.\n- <code>DOC_CLEAN<\/code>: <code>VALID<\/code> on attempt 0.\n- <code>DOC_TAX<\/code>: this doc is a trap \u2014 the \"obvious\" extraction is two line items ($40 + $35) against a total of $82.50, which fails the sum check. Watch attempt 0 fail with the exact sum error, then attempt 1 come back with tax added as a third line item and pass. That's a <strong>format/structural error \u2014 retry-fixable<\/strong>. (If the model gets it right on attempt 0, run it again or remove the word \"tax\" from the line to make the trap stronger.)\n- Add <code>extract(DOC_EMAIL)<\/code> and confirm <code>invoice_number=None<\/code>, <code>invoice_date=None<\/code>, <code>payment_method='other'<\/code>, <code>payment_method_detail<\/code> mentioning Venmo. Null instead of fabrication \u2014 the nullable schema doing its job.<\/p>\n<h3>Step 3 \u2014 Few-shot examples for varied formats<\/h3>\n<p>Detailed instructions plateau; few-shot examples generalize. The exam's specific claim (Task 4.2): 2\u20134 targeted examples demonstrating <em>varied document structures<\/em> fix inconsistent extraction better than more prose rules. Show one formal-table doc and one informal-narrative doc, each with its correct output \u2014 including correct null handling \u2014 so the model learns the <em>judgment<\/em>, not just the format.<\/p>\n<p>Add to <code>extract.py<\/code>:<\/p>\n<pre><code class=\"language-python\">FEW_SHOT = &quot;&quot;&quot;\nHere are examples of correct extractions from differently-formatted documents:\n\n&lt;example&gt;\n&lt;document&gt;STATEMENT 2209 | Vexler Legal | 03/02/2026 | Retainer $500.00 | Filing fees $85.00 | Balance: $585.00 | Remit by check&lt;/document&gt;\n&lt;correct_extraction&gt;{&quot;vendor_name&quot;: &quot;Vexler Legal&quot;, &quot;invoice_number&quot;: &quot;2209&quot;, &quot;invoice_date&quot;: &quot;2026-03-02&quot;,\n&quot;total_amount&quot;: 585.00, &quot;payment_method&quot;: &quot;check&quot;, &quot;payment_method_detail&quot;: null,\n&quot;line_items&quot;: [{&quot;description&quot;: &quot;Retainer&quot;, &quot;amount&quot;: 500.00}, {&quot;description&quot;: &quot;Filing fees&quot;, &quot;amount&quot;: 85.00}]}\n&lt;/correct_extraction&gt;\nNote: &quot;03/02/2026&quot; was normalized to ISO. The statement number counts as the invoice_number.\n&lt;/example&gt;\n\n&lt;example&gt;\n&lt;document&gt;text from Jim: &quot;yo the lawn guys came by, $75, I paid cash from the drawer&quot;&lt;/document&gt;\n&lt;correct_extraction&gt;{&quot;vendor_name&quot;: &quot;lawn service (unnamed)&quot;, &quot;invoice_number&quot;: null, &quot;invoice_date&quot;: null,\n&quot;total_amount&quot;: 75.00, &quot;payment_method&quot;: &quot;other&quot;, &quot;payment_method_detail&quot;: &quot;cash&quot;,\n&quot;line_items&quot;: [{&quot;description&quot;: &quot;lawn service&quot;, &quot;amount&quot;: 75.00}]}\n&lt;/correct_extraction&gt;\nNote: no document number or date exists, so both are null \u2014 they were not invented.\n&lt;/example&gt;\n&quot;&quot;&quot;\n\nSYSTEM_FS = SYSTEM + &quot;\\n&quot; + FEW_SHOT\n<\/code><\/pre>\n<p>Change the <code>__main__<\/code> calls to <code>extract(DOC_EMAIL, system=SYSTEM_FS)<\/code> etc.<\/p>\n<p><strong>Checkpoint 3.<\/strong> Re-run all three docs with <code>SYSTEM_FS<\/code>. Everything should now pass on attempt 0 more consistently (run <code>DOC_TAX<\/code> a few times \u2014 the few-shot examples' \"sums must match\" demonstrations raise the first-pass rate). This is your baseline for Break-it comparisons: <strong>few-shot is the tool for format variety, prompts-with-more-rules is not.<\/strong><\/p>\n<h3>Step 4 \u2014 Message Batches: cheap, slow, and correlated by custom_id<\/h3>\n<p>The Batches API facts the exam tests cold (Task 4.5, sample Q11):<\/p>\n<ul>\n<li><strong>50% cost savings<\/strong>, up to <strong>24-hour<\/strong> processing window, <strong>no latency SLA<\/strong>. Right for overnight/weekly jobs; <em>wrong<\/em> for anything blocking (pre-merge checks, live extraction).<\/li>\n<li><strong>No multi-turn tool calling inside a batch request.<\/strong> Your Step-2 retry loop cannot run inside the batch \u2014 so the architecture is: batch does single-shot extraction \u2192 you validate locally \u2192 failures get the synchronous retry loop (or go into the <em>next<\/em> batch).<\/li>\n<li>Results come back <strong>in any order<\/strong> \u2014 correlate by <code>custom_id<\/code>, never by position.<\/li>\n<li>On failures: resubmit <strong>only the failed custom_ids<\/strong>, with the fix applied (real-world: chunking a doc that blew the context limit; tonight: a poisoned model name).<\/li>\n<\/ul>\n<p>Add to <code>extract.py<\/code>:<\/p>\n<pre><code class=\"language-python\">from anthropic.types.message_create_params import MessageCreateParamsNonStreaming\nfrom anthropic.types.messages.batch_create_params import Request\n\ndef build_request(custom_id, document, model=MODEL):\n    return Request(custom_id=custom_id, params=MessageCreateParamsNonStreaming(\n        model=model, max_tokens=2048, system=SYSTEM_FS,\n        tools=[EXTRACT_TOOL], tool_choice={&quot;type&quot;: &quot;tool&quot;, &quot;name&quot;: &quot;record_invoice&quot;},\n        thinking={&quot;type&quot;: &quot;disabled&quot;},\n        messages=[{&quot;role&quot;: &quot;user&quot;, &quot;content&quot;:\n                   f&quot;Extract the invoice data from this document:\\n\\n&lt;document&gt;\\n{document}\\n&lt;/document&gt;&quot;}],\n    ))\n\ndef run_batch(requests):\n    batch = client.messages.batches.create(requests=requests)\n    print(f&quot;batch {batch.id}: {batch.processing_status}&quot;)\n    t0 = time.time()\n    while True:\n        batch = client.messages.batches.retrieve(batch.id)\n        if batch.processing_status == &quot;ended&quot;:\n            break\n        print(f&quot;  ...{batch.processing_status} ({batch.request_counts})&quot;)\n        time.sleep(15)\n    print(f&quot;batch ended in {time.time() - t0:.0f}s&quot;)\n    ok, failed = {}, {}\n    for result in client.messages.batches.results(batch.id):   # arrives in ANY order\n        if result.result.type == &quot;succeeded&quot;:\n            msg = result.result.message\n            ok[result.custom_id] = next(b for b in msg.content if b.type == &quot;tool_use&quot;).input\n        else:\n            failed[result.custom_id] = result.result           # errored / canceled / expired\n    return ok, failed\n\ndef batch_pipeline():\n    docs = {&quot;doc-clean&quot;: DOC_CLEAN, &quot;doc-email&quot;: DOC_EMAIL, &quot;doc-tax&quot;: DOC_TAX}\n    requests = [build_request(cid, d) for cid, d in docs.items()]\n    requests.append(build_request(&quot;doc-poisoned&quot;, DOC_CLEAN, model=&quot;claude-sonnet-5-typo&quot;))  # forced failure\n\n    ok, failed = run_batch(requests)\n    print(f&quot;\\nsucceeded: {list(ok)}\\nfailed: {list(failed)}&quot;)\n\n    # Local validation \u2014 batches can't run the retry loop, so failures fall back to sync\n    for cid, data in ok.items():\n        try:\n            Invoice.model_validate(data)\n            print(f&quot;  {cid}: valid&quot;)\n        except ValidationError:\n            print(f&quot;  {cid}: semantic failure -&gt; synchronous retry loop&quot;)\n            extract(docs[cid])\n\n    # Resubmit ONLY the failed custom_ids, with the fix applied\n    if failed:\n        print(&quot;\\nresubmitting failed docs with corrected params...&quot;)\n        retry = [build_request(cid, DOC_CLEAN) for cid in failed]   # fix = real model name\n        ok2, failed2 = run_batch(retry)\n        print(f&quot;resubmit: succeeded={list(ok2)} failed={list(failed2)}&quot;)\n\nif __name__ == &quot;__main__&quot;:\n    batch_pipeline()\n<\/code><\/pre>\n<p><strong>Checkpoint 4.<\/strong> Run it. Small batches usually end within a minute or two (remember: <em>up to<\/em> 24h, no guarantee). You should see 3 succeeded + <code>doc-poisoned<\/code> errored (<code>invalid_request<\/code> \u2014 the bogus model name), then a resubmit of just that one custom_id succeeding. Do the SLA math out loud while you wait: <em>if a customer SLA is 30 hours and the batch window is 24 hours, you must submit at most every 30 \u2212 24 = 6 hours.<\/em> And note the exam's other move: <strong>refine your prompt on a small sample synchronously (Steps 1\u20133) before batching thousands<\/strong> \u2014 first-pass success rate is your cost lever, because every resubmission is a new batch.<\/p>\n<h3>Step 5 \u2014 Field-level confidence \u2192 human-review routing<\/h3>\n<p>An aggregate \"97% accurate\" can hide a document type or field that's failing badly (Task 5.5). Two mechanics tonight: make the model emit <strong>field-level confidence scores<\/strong>, and route low-confidence extractions to a human queue. In production you'd calibrate the threshold against a labeled validation set and stratified-sample the <em>high<\/em>-confidence bucket to catch novel error patterns \u2014 self-reported confidence is a routing signal, not truth.<\/p>\n<p>Add a <code>confidence<\/code> property to <code>EXTRACT_TOOL[\"input_schema\"][\"properties\"]<\/code> and to <code>required<\/code>:<\/p>\n<pre><code class=\"language-python\">EXTRACT_TOOL[&quot;input_schema&quot;][&quot;properties&quot;][&quot;confidence&quot;] = {\n    &quot;type&quot;: &quot;object&quot;,\n    &quot;description&quot;: &quot;Your confidence (0.0-1.0) that each extracted field is correct, per field. &quot;\n                   &quot;Be honest: informal or ambiguous sources warrant lower scores.&quot;,\n    &quot;properties&quot;: {k: {&quot;type&quot;: &quot;number&quot;} for k in\n                   [&quot;vendor_name&quot;, &quot;invoice_number&quot;, &quot;invoice_date&quot;, &quot;total_amount&quot;, &quot;payment_method&quot;]},\n    &quot;required&quot;: [&quot;vendor_name&quot;, &quot;invoice_number&quot;, &quot;invoice_date&quot;, &quot;total_amount&quot;, &quot;payment_method&quot;],\n}\nEXTRACT_TOOL[&quot;input_schema&quot;][&quot;required&quot;].append(&quot;confidence&quot;)\n<\/code><\/pre>\n<p>Add the field to the Pydantic model (<code>confidence: dict[str, float]<\/code>) and a router:<\/p>\n<pre><code class=\"language-python\">REVIEW_THRESHOLD = 0.8\n\ndef route(doc_id, doc_type, inv: Invoice):\n    low = {k: v for k, v in inv.confidence.items() if v &lt; REVIEW_THRESHOLD}\n    dest = &quot;HUMAN REVIEW&quot; if low else &quot;AUTO-ACCEPT&quot;\n    print(f&quot;  {doc_id} [{doc_type}] -&gt; {dest}&quot; + (f&quot;  low-confidence: {low}&quot; if low else &quot;&quot;))\n    return dest\n\nif __name__ == &quot;__main__&quot;:\n    for doc_id, doc_type, doc in [(&quot;doc-clean&quot;, &quot;formal_invoice&quot;, DOC_CLEAN),\n                                  (&quot;doc-email&quot;, &quot;informal_email&quot;, DOC_EMAIL),\n                                  (&quot;doc-tax&quot;,   &quot;retail_receipt&quot;, DOC_TAX)]:\n        inv, _ = extract(doc, system=SYSTEM_FS)\n        if inv:\n            route(doc_id, doc_type, inv)\n<\/code><\/pre>\n<p><strong>Checkpoint 5.<\/strong> <code>doc-clean<\/code> and <code>doc-tax<\/code> should auto-accept; <code>doc-email<\/code> should route to human review (the vendor name and amount come from an informal secondhand message \u2014 confidence should reflect that). Notice you tagged each doc with a <code>doc_type<\/code>: that's the hook for the exam's real point \u2014 <strong>track accuracy by document type and field<\/strong>, because \"informal_email\" failing at 40% is invisible inside a 97% aggregate. If <code>doc-email<\/code> sails through at 0.95 confidence everywhere, that's LLM overconfidence \u2014 exactly why production calibrates thresholds against labeled data instead of trusting the raw scores.<\/p>\n<h2>3.4 Break it on purpose<\/h2>\n<h3>Break-it #1 \u2014 Non-nullable required field \u2192 watch it fabricate (Task 4.3)<\/h3>\n<p>Change <code>invoice_number<\/code> to <code>{\"type\": \"string\"}<\/code> (drop the <code>\"null\"<\/code>), keep it required, drop the \"use null, never guess\" line from the tool description, and make the Pydantic field <code>invoice_number: str<\/code>. Run <code>extract(DOC_EMAIL)<\/code> several times. The document contains no invoice number \u2014 but the schema <em>demands a string<\/em>, so the model produces one: <code>\"N/A\"<\/code>, <code>\"\"<\/code>, or on a bad day something plausible-looking like <code>\"MPS-150\"<\/code>. That last one is the killer \u2014 downstream nothing flags it, and it looks real. <strong>Lesson:<\/strong> required non-nullable fields don't make missing data appear; they make the model fabricate it to satisfy the schema. Nullable-but-required is the honest design. Restore the nullable type.<\/p>\n<h3>Break-it #2 \u2014 <code>tool_choice: \"auto\"<\/code> \u2192 prose instead of data (Task 4.3)<\/h3>\n<p>Change <code>tool_c
