ong>\nRoot cause: Batch API has up to a 24-hour window and <strong>no latency SLA<\/strong> \u2014 it's for latency-tolerant workloads only.\nFix: synchronous API for anything blocking a human; keep batch for the overnight/weekly volume. (Not: \"batch with a timeout fallback to real-time\" \u2014 that's the complexity distractor.)<\/p>\n<p><strong>7. Dashboard shows 97% accuracy, so human review was cut \u2014 a month later, lease-agreement date fields turn out to be ~70% accurate.<\/strong>\nRoot cause: aggregate accuracy masked a failing segment (one document type \u00d7 one field).\nFix: segment accuracy by document type and field <em>before<\/em> reducing review; keep stratified random sampling of high-confidence output to catch novel error patterns. (Not: raising the overall confidence threshold \u2014 the model was confidently wrong.)<\/p>\n<p><strong>8. Long contracts (60+ pages) extract fine except clauses from the middle sections, which come back null even though they're present.<\/strong>\nRoot cause: lost-in-the-middle \u2014 reliable processing at the beginning and end of long input, middles dropped.\nFix: chunk the document, place key-info summaries first, use explicit section headers; add few-shot examples of varied document structures. (Not: switching to a larger context window \u2014 capacity doesn't fix attention position effects.)<\/p>\n<hr />\n<h2>Cheat-row: the eight facts to walk in with<\/h2>\n<ol>\n<li>Schema-valid output = <strong>tool use with JSON schema<\/strong>, never JSON-by-prompting.<\/li>\n<li><code>auto<\/code> may return text \u00b7 <code>any<\/code> forces <em>a<\/em> tool \u00b7 <code>{\"type\":\"tool\",\"name\":...}<\/code> forces <em>the<\/em> tool.<\/li>\n<li>Might-be-missing \u2192 <strong>nullable<\/strong>, or the model fabricates.<\/li>\n<li>Strict schema kills <strong>syntax<\/strong> errors only; semantics need Pydantic + retry-with-error-feedback.<\/li>\n<li>Retry fixes format errors; retry <strong>never<\/strong> fixes absent information.<\/li>\n<li>Enum + <code>\"other\"<\/code>+detail + <code>\"unclear\"<\/code> for real-world categories.<\/li>\n<li>Batch: 50% off, \u226424h, no SLA, no multi-turn tools, <code>custom_id<\/code> for selective resubmission.<\/li>\n<li>Calibrate confidence on labeled sets, segment accuracy by doc-type\u00d7field, stratified-sample the automated lane forever.<\/li>\n<\/ol>","words":2911},"domain-1-agentic-architecture":{"title":"Domain 1 \u2014 Agentic Architecture & Orchestration (27%)","group":"Domain playbooks","html":"<h1>Domain 1 \u2014 Agentic Architecture &amp; Orchestration (27%)<\/h1>\n<p>Biggest domain on the exam: <strong>~16 of 60 questions<\/strong>. Shows up hardest in Scenario 1 (Customer Support Agent), Scenario 3 (Multi-Agent Research), and Scenario 4 (Developer Productivity). Every question here is a judgment call: <em>given this failure or this requirement, which architecture move is correct?<\/em> The wrong answers are always plausible \u2014 usually \"put it in the prompt,\" \"add a cap,\" or \"give the agent more tools.\" Learn the correct move AND why each trap is wrong.<\/p>\n<hr />\n<h2>1.1 \u2014 The Agentic Loop (stop_reason drives everything)<\/h2>\n<h3>Concepts in plain words<\/h3>\n<p>An agent is just a <code>while<\/code> loop around the Messages API. You send a request with tools defined; Claude either answers (<code>stop_reason: \"end_turn\"<\/code>) or asks you to run a tool (<code>stop_reason: \"tool_use\"<\/code>). If it's <code>tool_use<\/code>, YOU execute the tool, append the result to the conversation history, and call the API again. The model sees the tool result on the next iteration and reasons about what to do next \u2014 this is <strong>model-driven decision-making<\/strong>, not a pre-configured decision tree. The loop terminates when \u2014 and only when \u2014 <code>stop_reason == \"end_turn\"<\/code>.<\/p>\n<pre><code class=\"language-python\">import anthropic\nclient = anthropic.Anthropic()\nmessages = [{&quot;role&quot;: &quot;user&quot;, &quot;content&quot;: &quot;Refund order #12345&quot;}]\n\nwhile True:\n    resp = client.messages.create(\n        model=&quot;claude-sonnet-4-5&quot;, max_tokens=4096,\n        tools=TOOLS, messages=messages,\n    )\n    if resp.stop_reason == &quot;end_turn&quot;:      # done \u2014 model has answered\n        break\n    if resp.stop_reason == &quot;tool_use&quot;:       # model wants a tool run\n        messages.append({&quot;role&quot;: &quot;assistant&quot;, &quot;content&quot;: resp.content})\n        results = []\n        for block in resp.content:\n            if block.type == &quot;tool_use&quot;:\n                out = run_tool(block.name, block.input)   # YOU execute it\n                results.append({&quot;type&quot;: &quot;tool_result&quot;,\n                                &quot;tool_use_id&quot;: block.id,   # ties result to the call\n                                &quot;content&quot;: out})\n        messages.append({&quot;role&quot;: &quot;user&quot;, &quot;content&quot;: results})  # results go back as a user turn\n<\/code><\/pre>\n<p>Two mechanics the exam checks: (1) tool results are <strong>appended to conversation history<\/strong> (as <code>tool_result<\/code> blocks in a <code>user<\/code>-role message, keyed by <code>tool_use_id<\/code>) so the model can incorporate them into its next reasoning step; (2) control flow keys off <code>stop_reason<\/code> \u2014 nothing else.<\/p>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Deciding when the loop ends<\/td>\n<td><code>if stop_reason == \"end_turn\": break<\/code><\/td>\n<td>The API gives you an explicit, machine-readable termination signal<\/td>\n<td>Parsing assistant text for \"DONE\"/\"finished\" \u2014 natural-language signals are unreliable<\/td>\n<\/tr>\n<tr>\n<td>Response comes back with <code>stop_reason == \"tool_use\"<\/code><\/td>\n<td>Execute the tool(s), append <code>tool_result<\/code> blocks, call the API again<\/td>\n<td>The model needs the result in context to pick the next action<\/td>\n<td>Treating any assistant text alongside the tool call as the final answer<\/td>\n<\/tr>\n<tr>\n<td>Worried about runaway loops<\/td>\n<td>Iteration cap only as a <strong>safety net<\/strong>, never the primary stop<\/td>\n<td>Primary termination is <code>end_turn<\/code>; a cap cutting off mid-task is a bug, not a design<\/td>\n<td>Making <code>for i in range(10)<\/code> the stopping mechanism<\/td>\n<\/tr>\n<tr>\n<td>Choosing agent vs. workflow<\/td>\n<td>Let the model pick the next tool based on context (agentic) for high-ambiguity tasks<\/td>\n<td>Agent value = reasoning about which tool fits the situation<\/td>\n<td>Hard-coding a fixed tool sequence and calling it an \"agent\"<\/td>\n<\/tr>\n<tr>\n<td>Tool ran but model \"forgot\" the result<\/td>\n<td>Check the result was appended to <code>messages<\/code> before the next API call<\/td>\n<td>The model only knows what's in the conversation history<\/td>\n<td>Assuming the API remembers tool executions between calls \u2014 it's stateless<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>1.2 \u2014 Hub-and-Spoke Multi-Agent Orchestration<\/h2>\n<h3>Concepts in plain words<\/h3>\n<p>The pattern the exam wants: a <strong>coordinator<\/strong> (hub) that decomposes the task, delegates to specialized <strong>subagents<\/strong> (spokes), aggregates results, and handles all errors. Subagents never talk to each other \u2014 <strong>all communication routes through the coordinator<\/strong>, which buys you observability, consistent error handling, and controlled information flow. Subagents run with <strong>isolated context<\/strong>: they do NOT inherit the coordinator's conversation history. The coordinator should <strong>dynamically select<\/strong> which subagents to invoke based on query complexity \u2014 not push everything through the full pipeline every time.<\/p>\n<p>The two failure modes the exam tests: (1) <strong>overly narrow task decomposition<\/strong> \u2014 coordinator splits \"impact of AI on creative industries\" into three visual-arts subtasks, so music/writing/film never get covered; every subagent succeeds at its assigned task, but the assignment itself was wrong (sample Q7 \u2014 root cause is the coordinator, not the downstream agents). (2) No <strong>iterative refinement<\/strong>: a good coordinator evaluates synthesis output for gaps, re-delegates targeted queries to search/analysis subagents, and re-invokes synthesis until coverage is sufficient \u2014 one pass through the pipeline is rarely enough for broad topics.<\/p>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Final report misses whole subtopics; each subagent completed its task fine<\/td>\n<td>Fix the <strong>coordinator's decomposition<\/strong> \u2014 it was too narrow<\/td>\n<td>Subagents can only cover what they're assigned<\/td>\n<td>Blaming the search agent's queries or synthesis agent's gap-detection (downstream agents worked correctly within scope)<\/td>\n<\/tr>\n<tr>\n<td>Two subagents keep researching the same sources<\/td>\n<td>Partition scope: assign distinct subtopics or source types per agent<\/td>\n<td>Coordinator owns deduplication at assignment time<\/td>\n<td>Letting agents self-coordinate or dedupe after the fact<\/td>\n<\/tr>\n<tr>\n<td>Synthesis output has coverage gaps<\/td>\n<td>Iterative refinement loop: coordinator detects gaps \u2192 re-delegates targeted queries \u2192 re-runs synthesis<\/td>\n<td>Coordinator owns quality control<\/td>\n<td>Shipping the first synthesis pass; asking synthesis to \"try harder\"<\/td>\n<\/tr>\n<tr>\n<td>Simple query hits a 4-agent pipeline<\/td>\n<td>Coordinator analyzes the query and invokes only the needed subagents<\/td>\n<td>Dynamic selection cuts latency/cost<\/td>\n<td>Always routing through the full pipeline regardless of complexity<\/td>\n<\/tr>\n<tr>\n<td>Where should subagent-to-subagent messages flow?<\/td>\n<td>Through the coordinator, always<\/td>\n<td>Observability, consistent error handling, controlled info flow<\/td>\n<td>Direct spoke-to-spoke channels (\"mesh\") \u2014 loses central control<\/td>\n<\/tr>\n<tr>\n<td>Subagent needs the coordinator's earlier findings<\/td>\n<td>Coordinator includes them explicitly in the subagent's prompt<\/td>\n<td>Isolated context \u2014 no automatic inheritance<\/td>\n<td>Assuming the subagent \"can see\" the parent conversation<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>1.3 \u2014 Subagent Invocation, Context Passing, Parallel Spawning<\/h2>\n<h3>Concepts in plain words<\/h3>\n<p>In the Agent SDK, subagents are spawned via the <strong>Task tool<\/strong> \u2014 and the coordinator's <strong><code>allowedTools<\/code> must include <code>\"Task\"<\/code><\/strong> or it can't delegate at all (classic exam gotcha for \"coordinator never invokes subagents\"). Each subagent type is configured with an <strong><code>AgentDefinition<\/code><\/strong>: a description (so the coordinator knows when to use it), a system prompt, and tool restrictions. Subagents don't inherit parent context and don't share memory between invocations \u2014 <strong>everything they need goes explicitly into their prompt<\/strong>, including complete findings from prior agents (e.g., pass the web-search results AND document-analysis output into the synthesis agent's prompt).<\/p>\n<pre><code class=\"language-python\">from claude_agent_sdk import AgentDefinition, ClaudeAgentOptions\n\noptions = ClaudeAgentOptions(\n    allowed_tools=[&quot;Task&quot;],          # REQUIRED or the coordinator cannot spawn subagents\n    agents={\n        &quot;web-searcher&quot;: AgentDefinition(\n            description=&quot;Searches the web for sources on a subtopic&quot;,\n            prompt=&quot;You are a research searcher. Return findings as structured &quot;\n                   &quot;claim/source/date records.&quot;,\n            tools=[&quot;WebSearch&quot;],     # tool restriction: only what the role needs\n        ),\n        &quot;synthesizer&quot;: AgentDefinition(\n            description=&quot;Combines findings into a cited report&quot;,\n            prompt=&quot;Synthesize the findings provided in your prompt. Preserve source attribution.&quot;,\n            tools=[],                # no search tools \u2014 synthesis only\n        ),\n    },\n)\n<\/code><\/pre>\n<p>Two more skills the exam grades: (1) <strong>Parallel spawning<\/strong> \u2014 the coordinator emits <strong>multiple Task tool calls in a single response<\/strong>; separate turns = sequential = slow. (2) <strong>Structured context passing<\/strong> \u2014 separate content from metadata (source URLs, document names, page numbers) so attribution survives handoffs; don't paste one undifferentiated text blob. And write coordinator prompts that state <strong>research goals and quality criteria, not step-by-step procedures<\/strong> \u2014 procedural scripts kill subagent adaptability.<\/p>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Coordinator never delegates / can't spawn subagents<\/td>\n<td>Add <code>\"Task\"<\/code> to the coordinator's <code>allowedTools<\/code><\/td>\n<td>Task tool IS the spawning mechanism<\/td>\n<td>Rewriting the coordinator prompt to \"delegate more\" when the tool isn't even available<\/td>\n<\/tr>\n<tr>\n<td>Synthesis agent produces output ignoring earlier research<\/td>\n<td>Include complete prior findings directly in the synthesis agent's prompt<\/td>\n<td>Subagents have isolated context \u2014 no inheritance, no shared memory<\/td>\n<td>Expecting the subagent to access the parent's history or a previous invocation's state<\/td>\n<\/tr>\n<tr>\n<td>Citations lost between agents<\/td>\n<td>Pass structured data: content separated from metadata (URL, doc name, page)<\/td>\n<td>Attribution must be carried explicitly through each handoff<\/td>\n<td>Passing a flattened summary blob and hoping sources survive<\/td>\n<\/tr>\n<tr>\n<td>Independent subtopics, latency matters<\/td>\n<td>Emit multiple Task tool calls <strong>in one coordinator response<\/strong><\/td>\n<td>Single-response calls run in parallel<\/td>\n<td>Spawning one per turn (sequential) \u2014 works, but slow; exam marks it wrong for \"parallel\"<\/td>\n<\/tr>\n<tr>\n<td>Subagents are rigid, fail on unexpected findings<\/td>\n<td>Coordinator prompt gives goals + quality criteria<\/td>\n<td>Adaptability requires room to reason<\/td>\n<td>Step-by-step procedural instructions in the delegation prompt<\/td>\n<\/tr>\n<tr>\n<td>Want to compare two approaches from one shared analysis<\/td>\n<td><code>fork_session<\/code> from the analysis baseline (see 1.7)<\/td>\n<td>Independent branches, shared starting context<\/td>\n<td>Re-running the whole analysis twice, or doing both in one session (cross-contamination)<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>1.4 \u2014 Programmatic Enforcement vs. Prompt Guidance + Structured Handoffs<\/h2>\n<h3>Concepts in plain words<\/h3>\n<p>The single highest-yield judgment in this domain: <strong>prompt instructions are probabilistic; hooks and prerequisite gates are deterministic.<\/strong> A system-prompt rule (\"always verify the customer first\") has a <strong>non-zero failure rate<\/strong> \u2014 fine for style, unacceptable for money. When compliance MUST be guaranteed (identity verification before financial operations, refund caps), enforce it in code: a <strong>programmatic prerequisite gate<\/strong> that blocks <code>process_refund<\/code> / <code>lookup_order<\/code> until <code>get_customer<\/code> has returned a verified customer ID (this is sample Q1 \u2014 answer A, the gate; B/C are prompt/few-shot = probabilistic; D fixes tool <em>availability<\/em> when the problem is tool <em>ordering<\/em>).<\/p>\n<pre><code class=\"language-python\">verified_customer_id = None\n\ndef gate(tool_name, tool_input):\n    if tool_name in (&quot;lookup_order&quot;, &quot;process_refund&quot;) and verified_customer_id is None:\n        return {&quot;blocked&quot;: True,\n                &quot;reason&quot;: &quot;Run get_customer and verify identity first.&quot;}\n    return {&quot;blocked&quot;: False}\n<\/code><\/pre>\n<p>Two more testable skills: (1) <strong>Multi-concern decomposition<\/strong> \u2014 a customer message with three issues gets split into distinct items, each investigated <strong>in parallel using shared context<\/strong>, then synthesized into one unified resolution (not answered issue-by-issue across turns, not mashed together). (2) <strong>Structured handoff on escalation<\/strong> \u2014 the human agent receiving the case has NO transcript access, so the handoff must be a compiled summary: <strong>customer ID, root cause analysis, refund amount, recommended action<\/strong>. \"Escalate\" without the packet just moves the problem.<\/p>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Agent skips identity verification before refunds (12% of cases)<\/td>\n<td>Programmatic prerequisite: block downstream tools until <code>get_customer<\/code> returns a verified ID<\/td>\n<td>Financial ops need deterministic compliance<\/td>\n<td>\"Strengthen the system prompt\" / \"add few-shot examples\" \u2014 still probabilistic; routing classifier \u2014 fixes availability, not ordering<\/td>\n<\/tr>\n<tr>\n<td>Business rule must NEVER be violated<\/td>\n<td>Enforce in code (hook / gate)<\/td>\n<td>Zero failure rate required<\/td>\n<td>Prompt instruction \u2014 non-zero failure rate by definition<\/td>\n<\/tr>\n<tr>\n<td>Rule is a soft preference (tone, formatting)<\/td>\n<td>Prompt guidance is fine<\/td>\n<td>Cheap, flexible, failures are low-cost<\/td>\n<td>Building enforcement infrastructure for style rules (over-engineering)<\/td>\n<\/tr>\n<tr>\n<td>Customer raises 3 issues in one message<\/td>\n<td>Decompose into distinct items \u2192 investigate each in parallel with shared context \u2192 synthesize one unified resolution<\/td>\n<td>Complete coverage + coherent response<\/td>\n<td>Handling only the first issue, or serial one-per-turn handling<\/td>\n<\/tr>\n<tr>\n<td>Escalating mid-process to a human with no transcript access<\/td>\n<td>Compile structured handoff: customer ID, root cause, refund amount, recommended action<\/td>\n<td>The human must act without the conversation history<\/td>\n<td>Escalating with just \"customer needs help\" or assuming transcript visibility<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>1.5 \u2014 Agent SDK Hooks (PostToolUse Normalization + Tool-Call Interception)<\/h2>\n<h3>Concepts in plain words<\/h3>\n<p>Hooks are code that runs at fixed points in the agent lifecycle \u2014 <strong>deterministic guarantees<\/strong>, versus prompt instructions' <strong>probabilistic compliance<\/strong>. Two patterns the exam names:<\/p>\n<ol>\n<li><strong>PostToolUse<\/strong> \u2014 intercepts <strong>tool results<\/strong> before the model sees them. Canonical use: normalizing heterogeneous data from different MCP tools (one returns Unix timestamps, another ISO 8601; one returns numeric status codes, another strings) into a single consistent format so the agent reasons over clean data.<\/li>\n<li><strong>Tool-call interception<\/strong> (PreToolUse-style) \u2014 intercepts <strong>outgoing tool calls<\/strong> before they execute, to enforce compliance rules: block <code>process_refund<\/code> when <code>amount &gt; 500<\/code> and redirect to a human-escalation workflow.<\/li>\n<\/ol>\n<pre><code class=\"language-python\">async def normalize_dates(input_data, tool_use_id, context):\n    # PostToolUse: rewrite the tool result BEFORE the model processes it\n    result = input_data[&quot;tool_response&quot;]\n    return {&quot;tool_response&quot;: to_iso8601(result)}   # unix ts / mixed formats \u2192 ISO 8601\n\nasync def refund_cap(input_data, tool_use_id, context):\n    # Tool-call interception: block policy-violating calls, redirect\n    if input_data[&quot;tool_name&quot;] == &quot;process_refund&quot; and input_data[&quot;tool_input&quot;][&quot;amount&quot;] &gt; 500:\n        return {&quot;decision&quot;: &quot;block&quot;,\n                &quot;reason&quot;: &quot;Refunds over $500 require human approval \u2014 escalate_to_human.&quot;}\n<\/code><\/pre>\n<p>Direction is the memory hook: <strong>Post = results coming back (transform data). Interception = calls going out (block/allow policy).<\/strong><\/p>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>MCP tools return dates/statuses in incompatible formats; agent misreads them<\/td>\n<td><strong>PostToolUse hook<\/strong> normalizing results before the model processes them<\/td>\n<td>Deterministic, fixes it once for every tool call<\/td>\n<td>Prompt instruction \"convert all timestamps\" \u2014 probabilistic, burns tokens, fails intermittently<\/td>\n<\/tr>\n<tr>\n<td>Refunds over $500 must always go to a human<\/td>\n<td><strong>Tool-call interception hook<\/strong>: block the call, redirect to escalation workflow<\/td>\n<td>Guaranteed compliance on a hard business rule<\/td>\n<td>System prompt \"never refund more than $500\" \u2014 will eventually be violated<\/td>\n<\/tr>\n<tr>\n<td>Choosing hooks vs. prompt for a rule<\/td>\n<td>Hooks when the rule requires <strong>guaranteed<\/strong> compliance; prompt when best-effort is acceptable<\/td>\n<td>Deterministic vs. probabilistic \u2014 that's the whole test<\/td>\n<td>Treating them as interchangeable \"it usually works\"<\/td>\n<\/tr>\n<tr>\n<td>Need to transform what the model sees vs. control what executes<\/td>\n<td>Transform results \u2192 PostToolUse. Control execution \u2192 interception<\/td>\n<td>Different lifecycle points, different jobs<\/td>\n<td>Picking the hook on the wrong side of the tool call<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>1.6 \u2014 Task Decomposition: Prompt Chaining vs. Dynamic Adaptive<\/h2>\n<h3>Concepts in plain words<\/h3>\n<p>Two decomposition strategies, matched to task shape. <strong>Prompt chaining<\/strong> = fixed sequential pipeline, right when the steps are known upfront and predictable \u2014 e.g., a code review split into per-file local analysis passes plus a separate cross-file integration pass. The split exists to avoid <strong>attention dilution<\/strong>: one pass over 14 files produces inconsistent depth, missed bugs, and contradictory findings (flagging a pattern in one file, approving it in another \u2014 sample Q12; bigger context window does NOT fix attention quality). <strong>Dynamic adaptive decomposition<\/strong> = generate subtasks based on what each step discovers, right for open-ended work \u2014 e.g., \"add comprehensive tests to a legacy codebase\": first map the structure, identify high-impact areas, then build a prioritized plan that <strong>adapts as dependencies are discovered<\/strong>.<\/p>\n<pre><code class=\"language-text\">Prompt chaining (predictable, multi-aspect review):\n  pass 1..n: analyze each file individually (local issues)\n  pass n+1:  cross-file integration pass (data flow between files)\n\nDynamic decomposition (open-ended investigation):\n  step 1: map codebase structure\n  step 2: identify high-impact areas          \u2190 informed by step 1\n  step 3: prioritized plan, adapts as         \u2190 informed by step 2,\n          dependencies are discovered            revised during execution\n<\/code><\/pre>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Multi-aspect review with known, predictable steps<\/td>\n<td>Prompt chaining \u2014 fixed sequential passes<\/td>\n<td>Steps are enumerable upfront; each pass gets full attention<\/td>\n<td>Dynamic planning overhead for a task that never changes shape<\/td>\n<\/tr>\n<tr>\n<td>Open-ended task (\"add comprehensive tests to legacy code\")<\/td>\n<td>Dynamic adaptive: map \u2192 identify high-impact \u2192 prioritized plan that adapts<\/td>\n<td>You can't enumerate subtasks before discovery<\/td>\n<td>Locking a fixed pipeline before you know the codebase<\/td>\n<\/tr>\n<tr>\n<td>14-file PR review: inconsistent depth, missed bugs, contradictions<\/td>\n<td>Per-file local passes + separate cross-file integration pass<\/td>\n<td>Attention dilution is the root cause; focused passes fix it<\/td>\n<td>Bigger context window (doesn't fix attention); forcing devs to split PRs (shifts burden); consensus-of-3-runs (suppresses intermittently-caught real bugs)<\/td>\n<\/tr>\n<tr>\n<td>Cross-file bugs slip through per-file review<\/td>\n<td>Add the dedicated integration pass \u2014 don't fatten the per-file passes<\/td>\n<td>Local and cross-file analysis are different concerns<\/td>\n<td>One giant pass \"looking at everything\" again<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>1.7 \u2014 Session State: --resume, fork_session, Stale-Context Judgment<\/h2>\n<h3>Concepts in plain words<\/h3>\n<p>Claude Code / Agent SDK sessions persist and can be continued: <strong><code>--resume &lt;session-name&gt;<\/code><\/strong> picks up a specific named prior conversation (e.g., a multi-day investigation session). <strong><code>fork_session<\/code><\/strong> creates <strong>independent branches from a shared analysis baseline<\/strong> \u2014 analyze the codebase once, fork twice, explore two testing strategies or refactoring approaches in parallel without cross-contamination and without paying for the analysis again.<\/p>\n<p>The judgment the exam grades is <strong>staleness<\/strong>. If code changed since the session's tool results were captured, those Read/Grep outputs in history are now lies the model will trust. Rules: prior context <strong>mostly valid<\/strong> \u2192 resume, and <strong>explicitly tell the agent which files changed<\/strong> so it re-analyzes just those (targeted re-analysis beats full re-exploration). Prior tool results <strong>substantially stale<\/strong> \u2192 <strong>start a NEW session and inject a structured summary<\/strong> of validated findings \u2014 more reliable than resuming on top of stale data.<\/p>\n<pre><code class=\"language-bash\">claude --resume payment-refactor-investigation   # continue a named session\n# resuming after edits? first message:\n# &quot;Since last session, src/billing/refunds.py and tests/test_refunds.py changed \u2014 re-read those.&quot;\n<\/code><\/pre>\n<pre><code class=\"language-python\">options = ClaudeAgentOptions(resume=analysis_session_id, fork_session=True)\n# \u2192 new independent branch; the original session stays untouched\n<\/code><\/pre>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Continue yesterday's named investigation, code untouched<\/td>\n<td><code>--resume &lt;session-name&gt;<\/code><\/td>\n<td>Prior context is still valid; resumption is cheapest<\/td>\n<td>Starting fresh and re-exploring everything (wasted work)<\/td>\n<\/tr>\n<tr>\n<td>Resuming after a few files changed<\/td>\n<td>Resume + explicitly name the changed files for targeted re-analysis<\/td>\n<td>Agent otherwise trusts stale tool results in history<\/td>\n<td>Resuming silently (agent reasons from stale reads); full re-exploration (overkill)<\/td>\n<\/tr>\n<tr>\n<td>Most prior tool results are now stale<\/td>\n<td>New session + inject a structured summary of validated findings<\/td>\n<td>Fresh context with curated facts beats history full of stale data<\/td>\n<td><code>--resume<\/code> \"to keep context\" \u2014 keeping wrong context is worse than none<\/td>\n<\/tr>\n<tr>\n<td>Compare two strategies from one shared codebase analysis<\/td>\n<td><code>fork_session<\/code> twice from the analysis baseline<\/td>\n<td>Independent branches, no cross-contamination, analysis paid for once<\/td>\n<td>Both experiments in one session (they bleed into each other); redoing analysis per branch<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>Memorize Cold \u2014 Domain 1 Flashcards<\/h2>\n<table>\n<thead>\n<tr>\n<th>Prompt<\/th>\n<th>Answer<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><code>stop_reason<\/code> value meaning \"run the tool, loop again\"<\/td>\n<td><code>\"tool_use\"<\/code><\/td>\n<\/tr>\n<tr>\n<td><code>stop_reason<\/code> value meaning \"task complete, exit loop\"<\/td>\n<td><code>\"end_turn\"<\/code><\/td>\n<\/tr>\n<tr>\n<td>How tool results return to the model<\/td>\n<td>Appended to conversation history as <code>tool_result<\/code> blocks (in a <code>user<\/code>-role message), keyed by <code>tool_use_id<\/code><\/td>\n<\/tr>\n<tr>\n<td>The ONLY valid loop-termination signal<\/td>\n<td><code>stop_reason == \"end_turn\"<\/code> \u2014 never text parsing, never an iteration cap as primary<\/td>\n<\/tr>\n<tr>\n<td>Mechanism for spawning subagents<\/td>\n<td>The <strong>Task tool<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Requirement for a coordinator to invoke subagents<\/td>\n<td><code>allowedTools<\/code> must include <code>\"Task\"<\/code><\/td>\n<\/tr>\n<tr>\n<td><code>AgentDefinition<\/code> configures\u2026<\/td>\n<td>description, system prompt, tool restrictions (per subagent type)<\/td>\n<\/tr>\n<tr>\n<td>Do subagents inherit parent context?<\/td>\n<td><strong>No<\/strong> \u2014 isolated context; no automatic inheritance, no shared memory between invocations; pass everything explicitly in the prompt<\/td>\n<\/tr>\n<tr>\n<td>How to run subagents in parallel<\/td>\n<td>Multiple Task tool calls <strong>in a single coordinator response<\/strong> (not across turns)<\/td>\n<\/tr>\n<tr>\n<td>Multi-agent topology the exam wants<\/td>\n<td>Hub-and-spoke: ALL inter-subagent communication routes through the coordinator<\/td>\n<\/tr>\n<tr>\n<td>Why route through the coordinator (3 reasons)<\/td>\n<td>Observability, consistent error handling, controlled information flow<\/td>\n<\/tr>\n<tr>\n<td>Coordinator's four jobs<\/td>\n<td>Task decomposition, delegation, result aggregation, dynamic subagent selection<\/td>\n<\/tr>\n<tr>\n<td>Named decomposition risk<\/td>\n<td>Overly narrow decomposition \u2192 incomplete coverage of broad topics (root cause lives in the coordinator)<\/td>\n<\/tr>\n<tr>\n<td>Iterative refinement loop<\/td>\n<td>Coordinator evaluates synthesis for gaps \u2192 re-delegates targeted queries \u2192 re-invokes synthesis until coverage is sufficient<\/td>\n<\/tr>\n<tr>\n<td>Coordinator prompt style<\/td>\n<td>Research goals + quality criteria \u2014 NOT step-by-step procedures<\/td>\n<\/tr>\n<tr>\n<td>Context-passing format between agents<\/td>\n<td>Structured data separating content from metadata (source URLs, document names, page numbers) to preserve attribution<\/td>\n<\/tr>\n<tr>\n<td>Prompt guidance vs. programmatic enforcement<\/td>\n<td>Prompt = probabilistic (non-zero failure rate); hooks/gates = deterministic. Financial/compliance rules \u21d2 programmatic<\/td>\n<\/tr>\n<tr>\n<td>Canonical prerequisite gate<\/td>\n<td>Block <code>lookup_order<\/code> / <code>process_refund<\/code> until <code>get_customer<\/code> returns a verified customer ID<\/td>\n<\/tr>\n<tr>\n<td>Structured handoff fields (escalation to a human without transcript access)<\/td>\n<td>Customer ID, root cause, refund amount, recommended action<\/td>\n<\/tr>\n<tr>\n<td>Multi-concern request pattern<\/td>\n<td>Decompose into distinct items \u2192 investigate in parallel with shared context \u2192 synthesize one unified resolution<\/td>\n<\/tr>\n<tr>\n<td>Hook that transforms tool <strong>results<\/strong> before the model sees them<\/td>\n<td><strong>PostToolUse<\/strong> (e.g., normalize Unix timestamps / ISO 8601 / numeric status codes across MCP tools)<\/td>\n<\/tr>\n<tr>\n<td>Hook that blocks outgoing tool <strong>calls<\/strong><\/td>\n<td>Tool-call interception (e.g., block refunds &gt; <strong>$500<\/strong>, redirect to human escalation)<\/td>\n<\/tr>\n<tr>\n<td>When hooks over prompts<\/td>\n<td>Whenever business rules require <strong>guaranteed<\/strong> compliance<\/td>\n<\/tr>\n<tr>\n<td>Prompt chaining is for\u2026<\/td>\n<td>Fixed sequential pipelines with predictable steps (e.g., per-file passes + cross-file integration pass)<\/td>\n<\/tr>\n<tr>\n<td>Dynamic adaptive decomposition is for\u2026<\/td>\n<td>Open-ended tasks \u2014 subtasks generated from what each step discovers (map \u2192 high-impact areas \u2192 adaptive prioritized plan)<\/td>\n<\/tr>\n<tr>\n<td>Why split per-file + integration passes<\/td>\n<td>Attention dilution in single large passes (inconsistent depth, missed bugs, contradictory findings) \u2014 larger context does NOT fix it<\/td>\n<\/tr>\n<tr>\n<td>Flag to continue a specific named session<\/td>\n<td><code>--resume &lt;session-name&gt;<\/code><\/td>\n<\/tr>\n<tr>\n<td>Feature for divergent branches from a shared analysis baseline<\/td>\n<td><code>fork_session<\/code><\/td>\n<\/tr>\n<tr>\n<td>Resuming after code changed<\/td>\n<td>Explicitly inform the agent which files changed \u2192 targeted re-analysis<\/td>\n<\/tr>\n<tr>\n<td>When prior tool results are stale<\/td>\n<td>Start a NEW session with an injected structured summary \u2014 more reliable than resuming<\/td>\n<\/tr>\n<tr>\n<td>Model-driven vs. pre-configured<\/td>\n<td>Agent = Claude reasons about the next tool from context; decision tree / fixed sequence = not agentic<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>Anti-Pattern Wall \u2014 Recognize on Sight<\/h2>\n<p>These are named in the exam guide as wrong answers. If an option matches one, kill it.<\/p>\n<table>\n<thead>\n<tr>\n<th>#<\/th>\n<th>Anti-pattern<\/th>\n<th>Why it's wrong<\/th>\n<th>Correct alternative<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>1<\/td>\n<td><strong>Parsing natural-language signals for loop termination<\/strong> (\"check if the reply says 'done'\")<\/td>\n<td>Fragile text matching when a machine-readable signal exists<\/td>\n<td>Key off <code>stop_reason == \"end_turn\"<\/code><\/td>\n<\/tr>\n<tr>\n<td>2<\/td>\n<td><strong>Arbitrary iteration cap as the primary stopping mechanism<\/strong><\/td>\n<td>Cuts off legitimate work mid-task; cap is a safety net only<\/td>\n<td><code>stop_reason<\/code>-driven termination<\/td>\n<\/tr>\n<tr>\n<td>3<\/td>\n<td><strong>Checking assistant text content as a completion indicator<\/strong><\/td>\n<td>Text alongside a <code>tool_use<\/code> block isn't a final answer<\/td>\n<td>Inspect <code>stop_reason<\/code><\/td>\n<\/tr>\n<tr>\n<td>4<\/td>\n<td><strong>Prompt instructions for deterministic compliance<\/strong> (identity checks, refund caps)<\/td>\n<td>Non-zero failure rate; unacceptable for financial operations<\/td>\n<td>Programmatic gates / tool-call interception hooks<\/td>\n<\/tr>\n<tr>\n<td>5<\/td>\n<td><strong>Assuming subagents inherit parent context<\/strong><\/td>\n<td>Isolated context; no automatic inheritance or shared memory<\/td>\n<td>Pass complete findings explicitly in the subagent prompt<\/td>\n<\/tr>\n<tr>\n<td>6<\/td>\n<td><strong>Spawning \"parallel\" subagents across separate turns<\/strong><\/td>\n<td>Sequential execution \u2014 latency stacks<\/td>\n<td>Multiple Task calls in one response<\/td>\n<\/tr>\n<tr>\n<td>7<\/td>\n<td><strong>Step-by-step procedural delegation prompts<\/strong><\/td>\n<td>Kills subagent adaptability<\/td>\n<td>Goals + quality criteria<\/td>\n<\/tr>\n<tr>\n<td>8<\/td>\n<td><strong>Always running the full subagent pipeline<\/strong><\/td>\n<td>Ignores query complexity; wastes latency/cost<\/td>\n<td>Coordinator dynamically selects subagents<\/td>\n<\/tr>\n<tr>\n<td>9<\/td>\n<td><strong>Spoke-to-spoke (mesh) subagent communication<\/strong><\/td>\n<td>No observability, inconsistent error handling, uncontrolled info flow<\/td>\n<td>Route everything through the coordinator<\/td>\n<\/tr>\n<tr>\n<td>10<\/td>\n<td><strong>Blaming downstream agents for coverage gaps<\/strong> when the coordinator's decomposition was too narrow<\/td>\n<td>Subagents executed their assigned scope correctly<\/td>\n<td>Fix the coordinator's task decomposition<\/td>\n<\/tr>\n<tr>\n<td>11<\/td>\n<td><strong>One giant review pass over many files<\/strong> (or \"just use a bigger context window\")<\/td>\n<td>Attention dilution \u2014 context size doesn't fix attention quality<\/td>\n<td>Per-file passes + separate cross-file integration pass<\/td>\n<\/tr>\n<tr>\n<td>12<\/td>\n<td><strong>Resuming a session on top of stale tool results<\/strong><\/td>\n<td>Model reasons from outdated reads as if true<\/td>\n<td>New session + structured summary; or resume + explicitly name changed files<\/td>\n<\/tr>\n<tr>\n<td>13<\/td>\n<td><strong>Escalating to a human without a structured handoff packet<\/strong><\/td>\n<td>Receiving agent has no transcript access<\/td>\n<td>Customer ID + root cause + refund amount + recommended action<\/td>\n<\/tr>\n<tr>\n<td>14<\/td>\n<td><strong>Hard-coded tool sequences sold as \"agentic\"<\/strong><\/td>\n<td>That's a decision tree, not model-driven reasoning<\/td>\n<td>Let Claude choose the next tool from context<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>How Domain 1 Questions Are Built (test-taking read)<\/h2>\n<p>Every D1 question is a scenario + a failure symptom (or requirement) + four moves. The scoring pattern across the sample questions:<\/p>\n<ol>\n<li><strong>Root cause beats symptom patch.<\/strong> Minimal tool descriptions? Fix the descriptions, not few-shot examples. Coverage gaps? Fix the coordinator's decomposition.<\/li>\n<li><strong>Deterministic beats probabilistic when money/compliance is involved.<\/strong> Gate/hook &gt; prompt, every time the stakes are financial.<\/li>\n<li><strong>Proportionate beats over-engineered.<\/strong> Prompt-level fix that addresses the root cause &gt; routing classifiers, separate ML models, new infrastructure. If prompt optimization hasn't been tried and the cause is unclear boundaries, try it first.<\/li>\n<li><strong>The distractor that \"solves a different problem\"<\/strong> is always there \u2014 e.g., tool <em>availability<\/em> offered when the problem is tool <em>ordering<\/em> (sample Q1 option D). Name the actual problem before reading the options.<\/li>\n<\/ol>","words":3808},"domain-2-tool-design-mcp":{"title":"Domain 2 \u2014 Tool Design & MCP Integration (18% of exam \u2248 11 questions)","group":"Domain playbooks","html":"<h1>Domain 2 \u2014 Tool Design &amp; MCP Integration (18% of exam \u2248 11 questions)<\/h1>\n<p>Source: Claude Certified Architect \u2013 Foundations exam guide v0.2 (2026-06-30), pages 9\u201312 + sample Q2/Q9 + appendix.\nScenarios most likely to carry these questions: <strong>S1 Customer Support Agent, S3 Multi-Agent Research, S4 Developer Productivity<\/strong>.<\/p>\n<p>The whole domain is one idea repeated five ways: <strong>the model picks and uses tools based on words \u2014 names, descriptions, and error text. Fix the words before you build infrastructure.<\/strong> When the exam offers \"add a routing layer / classifier / more few-shot examples\" vs \"fix the description,\" the description fix wins as the <em>first step<\/em> almost every time.<\/p>\n<hr />\n<h2>Task 2.1 \u2014 Tool interfaces: descriptions and boundaries<\/h2>\n<h3>Plain words<\/h3>\n<p>Claude has no schema-introspection magic. When it decides which tool to call, it reads the tool <strong>name + description<\/strong> the same way you'd read a man page. A minimal description (\"Retrieves customer information\") gives the model nothing to differentiate on, so selection between similar tools becomes a coin flip. A good description states: purpose, <strong>input formats it accepts, example queries, edge cases, and boundaries \u2014 when to use it vs. the similar-sounding alternative.<\/strong> Also watch the <strong>system prompt<\/strong>: keyword-sensitive instructions there (\"always analyze documents thoroughly\") can create unintended associations that override well-written tool descriptions.<\/p>\n<pre><code class=\"language-python\"># BAD \u2014 this is what causes the misrouting in sample Q2\n{&quot;name&quot;: &quot;lookup_order&quot;, &quot;description&quot;: &quot;Retrieves order details&quot;}\n\n# GOOD \u2014 formats + examples + boundary vs. the sibling tool\n{\n    &quot;name&quot;: &quot;lookup_order&quot;,\n    &quot;description&quot;: (\n        &quot;Retrieves order details by order ID. &quot;\n        &quot;Input: order ID in format ORD-XXXXX or bare numeric ID (e.g. '12345'). &quot;\n        &quot;Use for questions about a specific order: status, items, shipping &quot;\n        &quot;(e.g. 'check my order #12345'). &quot;\n        &quot;Do NOT use for customer account/profile questions \u2014 use get_customer for those.&quot;\n    ),\n    &quot;input_schema&quot;: {&quot;type&quot;: &quot;object&quot;,\n                     &quot;properties&quot;: {&quot;order_id&quot;: {&quot;type&quot;: &quot;string&quot;}},\n                     &quot;required&quot;: [&quot;order_id&quot;]},\n}\n<\/code><\/pre>\n<p>Two repair moves the exam names explicitly:<\/p>\n<ol>\n<li><strong>Rename to kill overlap<\/strong> \u2014 <code>analyze_content<\/code> vs <code>analyze_document<\/code> with near-identical descriptions misroute; rename <code>analyze_content<\/code> \u2192 <code>extract_web_results<\/code> with a web-specific description.<\/li>\n<li><strong>Split generic into purpose-specific<\/strong> \u2014 one vague <code>analyze_document<\/code> becomes <code>extract_data_points<\/code>, <code>summarize_content<\/code>, <code>verify_claim_against_source<\/code>, each with a defined input/output contract.<\/li>\n<\/ol>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Agent picks wrong tool; both tools have one-line descriptions (sample Q2)<\/td>\n<td>Expand descriptions: input formats, example queries, edge cases, boundaries vs. similar tools<\/td>\n<td>Descriptions are the <strong>primary selection mechanism<\/strong>; this fixes the root cause cheaply<\/td>\n<td>Few-shot examples (token overhead, doesn't fix root cause), keyword routing layer (over-engineered), merging tools (too heavy for a \"first step\")<\/td>\n<\/tr>\n<tr>\n<td>Two tools functionally overlap (<code>analyze_content<\/code> / <code>analyze_document<\/code>)<\/td>\n<td>Rename one to its actual purpose (<code>extract_web_results<\/code>) + rewrite description domain-specific<\/td>\n<td>Distinct names + distinct descriptions = distinct selection signal<\/td>\n<td>Adding \"prefer X for web\" to the system prompt instead of fixing the tools<\/td>\n<\/tr>\n<tr>\n<td>One generic tool does 3 jobs badly<\/td>\n<td>Split into purpose-specific tools with defined input/output contracts<\/td>\n<td>Narrow contracts \u2192 reliable selection and predictable outputs<\/td>\n<td>Making the generic description longer instead of splitting<\/td>\n<\/tr>\n<tr>\n<td>Descriptions are good but selection still wrong<\/td>\n<td>Review the <strong>system prompt<\/strong> for keyword-sensitive instructions creating tool associations<\/td>\n<td>System prompt wording can override good descriptions<\/td>\n<td>Assuming the tool definitions are the only place selection is influenced<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>Task 2.2 \u2014 Structured MCP error responses<\/h2>\n<h3>Plain words<\/h3>\n<p>An MCP tool signals failure with the <strong><code>isError<\/code> flag<\/strong> \u2014 the result comes back to the model marked as an error instead of throwing out-of-band. The exam cares about what you put <em>inside<\/em> that error. A generic <code>\"Operation failed\"<\/code> is an anti-pattern: the agent can't decide whether to retry, rephrase, apologize, or escalate. Return <strong>structured metadata<\/strong>: <code>errorCategory<\/code> (<strong>transient / validation / business / permission<\/strong>), an <code>isRetryable<\/code> boolean, and a human-readable description. For business-rule violations, include <code>retriable: false<\/code> plus a <strong>customer-friendly explanation<\/strong> so the agent can relay it verbatim. Two more distinctions the exam grades: <strong>empty result \u2260 failure<\/strong> (a successful query with zero matches must not be reported as an error, and an access failure must not be disguised as an empty success), and <strong>recover locally first<\/strong> \u2014 subagents handle transient failures themselves (retry/backoff) and propagate upward only what they can't resolve, together with partial results and what was attempted.<\/p>\n<pre><code class=\"language-python\"># MCP tool returning a structured error (Python MCP server, conceptual)\nreturn {\n    &quot;isError&quot;: True,\n    &quot;content&quot;: [{&quot;type&quot;: &quot;text&quot;, &quot;text&quot;: json.dumps({\n        &quot;errorCategory&quot;: &quot;business&quot;,       # transient | validation | business | permission\n        &quot;isRetryable&quot;: False,              # don't waste retries on policy violations\n        &quot;message&quot;: &quot;Refunds over $500 require supervisor approval.&quot;,\n        &quot;customerExplanation&quot;: &quot;This refund needs a manager's sign-off; I'm escalating it now.&quot;,\n    })}],\n}\n\n# vs. a VALID EMPTY RESULT \u2014 success, not an error:\nreturn {&quot;isError&quot;: False,\n        &quot;content&quot;: [{&quot;type&quot;: &quot;text&quot;,\n                     &quot;text&quot;: '{&quot;matches&quot;: [], &quot;note&quot;: &quot;Query succeeded; no orders found for this customer.&quot;}'}]}\n<\/code><\/pre>\n<p>The four categories, mapped to what the agent should do:<\/p>\n<table>\n<thead>\n<tr>\n<th>errorCategory<\/th>\n<th>Example<\/th>\n<th>isRetryable<\/th>\n<th>Agent's correct reaction<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>transient<\/strong><\/td>\n<td>timeout, service unavailable<\/td>\n<td>true<\/td>\n<td>retry (locally, with backoff)<\/td>\n<\/tr>\n<tr>\n<td><strong>validation<\/strong><\/td>\n<td>malformed order ID<\/td>\n<td>false as-is<\/td>\n<td>fix the input and re-call<\/td>\n<\/tr>\n<tr>\n<td><strong>business<\/strong><\/td>\n<td>refund &gt; policy limit<\/td>\n<td>false<\/td>\n<td>explain to user / escalate \u2014 never retry<\/td>\n<\/tr>\n<tr>\n<td><strong>permission<\/strong><\/td>\n<td>agent lacks access<\/td>\n<td>false<\/td>\n<td>escalate or use an alternate path<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Tool failures leave agent guessing what to do next<\/td>\n<td>Return <code>errorCategory<\/code> + <code>isRetryable<\/code> + human-readable message via <code>isError<\/code><\/td>\n<td>Structured metadata drives correct recovery decisions<\/td>\n<td>Uniform generic \"Operation failed\" for every failure type<\/td>\n<\/tr>\n<tr>\n<td>Business rule blocks the action (refund &gt; $500)<\/td>\n<td><code>retriable: false<\/code> + customer-friendly explanation<\/td>\n<td>Agent must communicate the policy, not hammer retries<\/td>\n<td>Marking it transient/retryable \u2192 wasted retry loop<\/td>\n<\/tr>\n<tr>\n<td>Query runs fine, finds nothing<\/td>\n<td>Return success with empty results and say so explicitly<\/td>\n<td>Empty \u2260 broken; agent should proceed, not retry/escalate<\/td>\n<td>Returning <code>isError: true<\/code> for zero matches \u2014 or the mirror image: catching a timeout and returning empty-marked-success<\/td>\n<\/tr>\n<tr>\n<td>Subagent hits a transient failure<\/td>\n<td>Retry locally; propagate to coordinator only unresolvable errors <strong>with partial results + what was attempted<\/strong><\/td>\n<td>Coordinator gets decision-grade context without noise from recoverable blips<\/td>\n<td>Propagating every timeout upward, or exhausting retries then returning generic \"search unavailable\"<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>Task 2.3 \u2014 Tool distribution across agents + tool_choice<\/h2>\n<h3>Plain words<\/h3>\n<p>More tools = worse selection. The exam's canonical number: an agent with <strong>18 tools instead of 4\u20135<\/strong> degrades tool-selection reliability because decision complexity goes up. And agents holding tools outside their specialization <em>use them wrong<\/em> \u2014 a synthesis agent with web-search tools will attempt searches instead of synthesizing. The fix is <strong>scoped access<\/strong>: each agent gets only its role's tools. Exception (sample Q9): when a cross-role need is <strong>high-frequency and simple<\/strong> (85% of the synthesis agent's verifications are quick fact-checks), give it one <strong>scoped, constrained<\/strong> cross-role tool (<code>verify_fact<\/code>) and keep routing the complex 15% through the coordinator. Same spirit: replace a generic <code>fetch_url<\/code> with a constrained <code>load_document<\/code> that validates document URLs \u2014 narrow the blast radius.<\/p>\n<p><code>tool_choice<\/code> is how you control <em>whether/which<\/em> tool gets called on an API request:<\/p>\n<pre><code class=\"language-python\"># &quot;auto&quot; (default): model may call a tool OR just answer in text\ntool_choice={&quot;type&quot;: &quot;auto&quot;}\n\n# &quot;any&quot;: model MUST call some tool \u2014 no conversational text response\ntool_choice={&quot;type&quot;: &quot;any&quot;}\n\n# forced: model MUST call this specific tool\ntool_choice={&quot;type&quot;: &quot;tool&quot;, &quot;name&quot;: &quot;extract_metadata&quot;}\n<\/code><\/pre>\n<p>Forced selection is for guaranteeing a specific tool runs <strong>first<\/strong> (e.g., force <code>extract_metadata<\/code> before enrichment tools) \u2014 you force it on the first request, then process subsequent steps in follow-up turns with a looser setting. <code>\"any\"<\/code> is for guaranteeing structured output when several extraction schemas exist and you don't know which fits \u2014 the model must pick <em>a<\/em> tool but chooses which.<\/p>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Agent has 18 tools, selection is flaky<\/td>\n<td>Cut to the 4\u20135 its role needs<\/td>\n<td>Fewer options = higher selection reliability<\/td>\n<td>\"Better descriptions will fix it\" \u2014 description quality can't rescue an oversized toolset<\/td>\n<\/tr>\n<tr>\n<td>Synthesis agent misusing web-search tools<\/td>\n<td>Remove out-of-role tools; restrict each subagent to role-relevant set<\/td>\n<td>Agents misuse tools outside their specialization<\/td>\n<td>Giving every agent everything \"for flexibility\" (sample Q9 option C \u2014 violates least privilege)<\/td>\n<\/tr>\n<tr>\n<td>Frequent simple cross-role need, occasional complex one (85/15)<\/td>\n<td>One scoped tool (<code>verify_fact<\/code>) for the common case; coordinator routes the complex case<\/td>\n<td>Least privilege + kills the 2\u20133 round trips per task<\/td>\n<td>Full tool access (over-provision), batching verifications at end (blocking dependencies), speculative caching<\/td>\n<\/tr>\n<tr>\n<td>Generic tool invites misuse (<code>fetch_url<\/code>)<\/td>\n<td>Replace with constrained variant (<code>load_document<\/code> that validates document URLs)<\/td>\n<td>Constrained contract prevents off-purpose calls<\/td>\n<td>Prompt-begging the agent to only fetch documents<\/td>\n<\/tr>\n<tr>\n<td>Must guarantee a tool call, any tool, no prose<\/td>\n<td><code>tool_choice: {\"type\": \"any\"}<\/code><\/td>\n<td>Model cannot return conversational text<\/td>\n<td>Leaving <code>\"auto\"<\/code> and instructing \"always use a tool\" \u2014 probabilistic<\/td>\n<\/tr>\n<tr>\n<td>A specific tool must run first<\/td>\n<td><code>tool_choice: {\"type\": \"tool\", \"name\": \"...\"}<\/code> on that turn, then follow-up turns<\/td>\n<td>Deterministic first step<\/td>\n<td>Prompt ordering instructions (\"call extract_metadata first\") \u2014 non-zero failure rate<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>Task 2.4 \u2014 MCP server integration (Claude Code + agents)<\/h2>\n<h3>Plain words<\/h3>\n<p>Two config scopes, one rule: <strong>shared team tooling \u2192 project-scoped <code>.mcp.json<\/code><\/strong> (repo root, version-controlled, every dev gets it on clone/pull); <strong>personal or experimental servers \u2192 user-scoped <code>~/.claude.json<\/code><\/strong> (your machine only, teammates never see it). Secrets never go in the committed file \u2014 <code>.mcp.json<\/code> supports <strong>environment variable expansion<\/strong> like <code>${GITHUB_TOKEN}<\/code>, resolved from each dev's environment at runtime. Tools from <strong>all configured servers are discovered at connection time and are available simultaneously<\/strong> \u2014 project + user servers coexist in one session.<\/p>\n<pre><code class=\"language-json\">// .mcp.json \u2014 project scope, committed to the repo\n{\n  &quot;mcpServers&quot;: {\n    &quot;github&quot;: {\n      &quot;command&quot;: &quot;npx&quot;,\n      &quot;args&quot;: [&quot;-y&quot;, &quot;@modelcontextprotocol/server-github&quot;],\n      &quot;env&quot;: { &quot;GITHUB_TOKEN&quot;: &quot;${GITHUB_TOKEN}&quot; }\n    }\n  }\n}\n<\/code><\/pre>\n<pre><code>repo/\n\u251c\u2500\u2500 .mcp.json            \u2190 team-shared servers (env-expanded creds, no secrets committed)\n\u2514\u2500\u2500 ...\n~/.claude.json           \u2190 your personal/experimental servers\n<\/code><\/pre>\n<p>Three more testable ideas here:<\/p>\n<ul>\n<li><strong>MCP resources = content catalogs.<\/strong> Tools are for <em>actions<\/em>; resources expose <em>browsable content<\/em> \u2014 issue summaries, documentation hierarchies, database schemas \u2014 so the agent can see what data exists <strong>without burning exploratory tool calls<\/strong>.<\/li>\n<li><strong>Description quality drives adoption.<\/strong> If your MCP tool's description is thin, the agent will keep reaching for built-ins (e.g., using Grep instead of your more capable code-search MCP tool). Enhance MCP descriptions to spell out capabilities and outputs.<\/li>\n<li><strong>Community vs custom:<\/strong> standard integration (Jira, GitHub) \u2192 use the existing <strong>community server<\/strong>. Build <strong>custom<\/strong> only for team-specific workflows nothing off-the-shelf covers.<\/li>\n<\/ul>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Whole team needs the same MCP server<\/td>\n<td>Project <code>.mcp.json<\/code>, committed<\/td>\n<td>Version control distributes it on clone/pull<\/td>\n<td>Each dev hand-editing <code>~/.claude.json<\/code>; or expecting user-scope config to reach teammates<\/td>\n<\/tr>\n<tr>\n<td>Trying out a server just for yourself<\/td>\n<td>User <code>~/.claude.json<\/code><\/td>\n<td>Doesn't pollute the team's config<\/td>\n<td>Committing your experiment into <code>.mcp.json<\/code><\/td>\n<\/tr>\n<tr>\n<td>Server needs an API token<\/td>\n<td><code>\"${GITHUB_TOKEN}\"<\/code>-style expansion in <code>.mcp.json<\/code><\/td>\n<td>Credentials come from each dev's env; no secrets in git<\/td>\n<td>Hardcoding the token in the committed file<\/td>\n<\/tr>\n<tr>\n<td>Agent wastes turns probing \"what data is there?\"<\/td>\n<td>Expose the catalog as <strong>MCP resources<\/strong><\/td>\n<td>Visibility into available data without exploratory tool calls<\/td>\n<td>Adding more query <em>tools<\/em>, or dumping the catalog into the system prompt<\/td>\n<\/tr>\n<tr>\n<td>Agent ignores your capable MCP tool, uses Grep instead<\/td>\n<td>Enrich the MCP tool's description (capabilities + outputs)<\/td>\n<td>Built-ins win by default when the MCP description is vague<\/td>\n<td>Disabling built-ins as the first move<\/td>\n<\/tr>\n<tr>\n<td>Need Jira/GitHub/etc. integration<\/td>\n<td>Existing community MCP server<\/td>\n<td>Standard problem, solved artifact<\/td>\n<td>Building custom for a standard integration (reserve custom for team-specific workflows)<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>Task 2.5 \u2014 Built-in tools: Read, Write, Edit, Bash, Grep, Glob<\/h2>\n<h3>Plain words<\/h3>\n<p>You know these from daily Claude Code use \u2014 the exam tests whether you can name the <em>right<\/em> one for a described job, and one specific failure path. The map:<\/p>\n<table>\n<thead>\n<tr>\n<th>Tool<\/th>\n<th>Job<\/th>\n<th>Exam-phrase trigger<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Grep<\/strong><\/td>\n<td>Search file <strong>contents<\/strong> for patterns<\/td>\n<td>\"find all callers of a function,\" \"locate this error message,\" \"find import statements\"<\/td>\n<\/tr>\n<tr>\n<td><strong>Glob<\/strong><\/td>\n<td>Match file <strong>paths/names<\/strong> by pattern<\/td>\n<td>\"find all <code>**/*.test.tsx<\/code>,\" \"files matching a naming pattern\"<\/td>\n<\/tr>\n<tr>\n<td><strong>Read<\/strong><\/td>\n<td>Load full file contents<\/td>\n<td>reading a file before modifying, following imports<\/td>\n<\/tr>\n<tr>\n<td><strong>Write<\/strong><\/td>\n<td>Write a full file<\/td>\n<td>new file, or full-file replacement<\/td>\n<\/tr>\n<tr>\n<td><strong>Edit<\/strong><\/td>\n<td><strong>Targeted<\/strong> modification via <strong>unique text matching<\/strong><\/td>\n<td>small precise change with a unique anchor<\/td>\n<\/tr>\n<tr>\n<td><strong>Bash<\/strong><\/td>\n<td>Run commands<\/td>\n<td>builds, tests, git<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>The tested failure path: <strong>Edit fails when its anchor text is non-unique<\/strong> (matches multiple places). The fallback is <strong>Read the full file, then Write the corrected whole file<\/strong> \u2014 deterministic, no anchor needed.<\/p>\n<p>Exploration strategy (S4 territory): build codebase understanding <strong>incrementally<\/strong> \u2014 <strong>Grep to find entry points \u2192 Read to follow imports and trace flows<\/strong>. Never \"read all files upfront.\" For tracing usage through wrapper modules: <strong>first identify all exported names, then Grep for each name<\/strong> across the codebase \u2014 searching only the original function name misses re-exports.<\/p>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>\"Find every place <code>processRefund<\/code> is called\"<\/td>\n<td>Grep<\/td>\n<td>Content search<\/td>\n<td>Glob (paths only), or Read-everything<\/td>\n<\/tr>\n<tr>\n<td>\"Find all test files regardless of location\"<\/td>\n<td>Glob <code>**/*.test.tsx<\/code><\/td>\n<td>Filename/path pattern<\/td>\n<td>Grep (that's for contents)<\/td>\n<\/tr>\n<tr>\n<td>Small change, unique surrounding text<\/td>\n<td>Edit<\/td>\n<td>Targeted, minimal diff<\/td>\n<td>Rewriting the whole file for a one-liner<\/td>\n<\/tr>\n<tr>\n<td>Edit fails \u2014 anchor text matches multiple spots<\/td>\n<td>Read full file \u2192 Write corrected file<\/td>\n<td>Reliable when uniqueness can't be had<\/td>\n<td>Retrying Edit with slightly bigger anchors forever, or Bash/sed hacks<\/td>\n<\/tr>\n<tr>\n<td>\"Understand this unfamiliar codebase\"<\/td>\n<td>Incremental: Grep entry points \u2192 Read to follow imports/flows<\/td>\n<td>Preserves context, scales<\/td>\n<td>Reading all files upfront (context exhaustion)<\/td>\n<\/tr>\n<tr>\n<td>Function re-exported through wrapper modules<\/td>\n<td>List all exported names first, then Grep each name<\/td>\n<td>Aliases hide usages from a single-name search<\/td>\n<td>Grepping only the original definition's name<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>Memorize cold<\/h2>\n<p>Flashcard facts \u2014 any one of these can be the hinge of a question.<\/p>\n<p><strong>tool_choice (API field):<\/strong>\n- <code>{\"type\": \"auto\"}<\/code> \u2014 default; model <strong>may<\/strong> return plain text instead of calling a tool\n- <code>{\"type\": \"any\"}<\/code> \u2014 model <strong>must<\/strong> call a tool, <strong>chooses which<\/strong>\n- <code>{\"type\": \"tool\", \"name\": \"extract_metadata\"}<\/code> \u2014 model <strong>must call that specific tool<\/strong> (\"forced\")\n- Guarantee structured output, unknown doc type, multiple schemas \u2192 <code>\"any\"<\/code>\n- Guarantee a specific tool runs first \u2192 forced, then follow-up turns for later steps<\/p>\n<p><strong>MCP error fields:<\/strong>\n- Failure flag: <strong><code>isError<\/code><\/strong> (on the tool result)\n- <strong><code>errorCategory<\/code><\/strong> values: <strong>transient / validation / business / permission<\/strong> (guide lists the metadata triple as transient/validation/permission; <em>business<\/em> appears in the knowledge statement and the exercise \u2014 know all four)\n- <strong><code>isRetryable<\/code><\/strong> boolean; business violations get <strong><code>retriable: false<\/code><\/strong> + customer-friendly explanation\n- transient = timeouts/service unavailability \u2192 retryable; validation = bad input; business = policy violation; permission = access denied\n- <strong>Valid empty result = success with no matches \u2260 error.<\/strong> Access failure \u2260 empty result.\n- Subagents: <strong>local recovery for transient failures<\/strong>; propagate only unresolvable errors, with <strong>partial results + what was attempted<\/strong><\/p>\n<p><strong>Tool distribution numbers &amp; names:<\/strong>\n- Degraded selection: <strong>18 tools<\/strong>; healthy: <strong>4\u20135<\/strong>\n- Scoped cross-role tool example: <strong><code>verify_fact<\/code><\/strong> for the synthesis agent (85% simple / 15% via coordinator)\n- Constrained replacement example: <code>fetch_url<\/code> \u2192 <strong><code>load_document<\/code><\/strong> (validates document URLs)\n- Rename example: <code>analyze_content<\/code> \u2192 <strong><code>extract_web_results<\/code><\/strong>\n- Split example: <code>analyze_document<\/code> \u2192 <strong><code>extract_data_points<\/code><\/strong>, <strong><code>summarize_content<\/code><\/strong>, <strong><code>verify_claim_against_source<\/code><\/strong><\/p>\n<p><strong>MCP config paths:<\/strong>\n- Project/team scope: <strong><code>.mcp.json<\/code><\/strong> (repo root, version-controlled)\n- User/personal scope: <strong><code>~/.claude.json<\/code><\/strong>\n- Env expansion syntax: <strong><code>${GITHUB_TOKEN}<\/code><\/strong> inside <code>.mcp.json<\/code>\n- Tools from <strong>all<\/strong> configured servers: discovered <strong>at connection time<\/strong>, available <strong>simultaneously<\/strong>\n- <strong>MCP resources<\/strong> = content catalogs (issue summaries, doc hierarchies, DB schemas) \u2192 fewer exploratory tool calls; <strong>tools = actions, resources = content<\/strong>\n- Community server for standard integrations (<strong>Jira<\/strong> is the guide's example); custom only for team-specific workflows<\/p>\n<p><strong>Built-ins:<\/strong>\n- <strong>Grep = contents<\/strong>, <strong>Glob = paths/names<\/strong>, <strong>Read/Write = full file<\/strong>, <strong>Edit = targeted via unique text match<\/strong>, <strong>Bash = commands<\/strong>\n- <strong>Edit non-unique-match failure \u2192 Read + Write fallback<\/strong>\n- Exploration order: <strong>Grep entry points \u2192 Read follow imports<\/strong> (never read-all-upfront)\n- Wrapper tracing: <strong>enumerate exported names first, then search each<\/strong><\/p>\n<p><strong>Adjacent facts that leak into D2 questions:<\/strong>\n- Descriptions are the <strong>primary tool-selection mechanism<\/strong> (the literal phrase from sample Q2's answer)\n- A good description contains: <strong>input formats, example queries, edge cases, boundaries vs. similar tools<\/strong>\n- System-prompt keywords can <strong>override<\/strong> tool descriptions \u2014 audit both\n- Weak MCP descriptions \u2192 agent prefers built-ins (Grep) over your better MCP tool<\/p>\n<hr />\n<h2>Anti-pattern wall<\/h2>\n<p>Recognize these on sight \u2014 they're the distractor answers.<\/p>\n<table>\n<thead>\n<tr>\n<th>#<\/th>\n<th>Anti-pattern<\/th>\n<th>Why it's wrong / what the exam wants instead<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>1<\/td>\n<td><strong>Minimal one-line tool descriptions<\/strong> (\"Retrieves order details\")<\/td>\n<td>Root cause of misrouting; expand with formats/examples/boundaries first<\/td>\n<\/tr>\n<tr>\n<td>2<\/td>\n<td><strong>Few-shot examples or a keyword-routing layer as the <em>first<\/em> fix for tool misselection<\/strong><\/td>\n<td>Token overhead / over-engineering; fix descriptions first (sample Q2 distractors A &amp; C)<\/td>\n<\/tr>\n<tr>\n<td>3<\/td>\n<td><strong>Consolidating similar tools into one <code>lookup_entity<\/code> as a quick fix<\/strong><\/td>\n<td>Valid architecture, wrong \"first step\" \u2014 too much effort vs. rewriting descriptions<\/td>\n<\/tr>\n<tr>\n<td>4<\/td>\n<td><strong>Overlapping tool names/descriptions<\/strong> (<code>analyze_content<\/code> vs <code>analyze_document<\/code>)<\/td>\n<td>Causes misrouting; rename/split to eliminate functional overlap<\/td>\n<\/tr>\n<tr>\n<td>5<\/td>\n<td><strong>Uniform generic errors<\/strong> (\"Operation failed\")<\/td>\n<td>Agent can't choose recovery; return errorCategory + isRetryable + message<\/td>\n<\/tr>\n<tr>\n<td>6<\/td>\n<td><strong>Returning empty results marked as success when the call actually failed<\/strong> (or an error for a legit zero-match query)<\/td>\n<td>Conflates access failure with valid emptiness in both directions<\/td>\n<\/tr>\n<tr>\n<td>7<\/td>\n<td><strong>Retrying business/permission errors<\/strong><\/td>\n<td>Non-retryable by definition \u2014 wasted attempts; needs <code>retriable: false<\/code> + explanation<\/td>\n<\/tr>\n<tr>\n<td>8<\/td>\n<td><strong>Propagating every transient error to the coordinator<\/strong> (or generic \"search unavailable\" after silent retries)<\/td>\n<td>Subagent should recover locally, propagate only unresolvables with partial results + attempts<\/td>\n<\/tr>\n<tr>\n<td>9<\/td>\n<td><strong>The 18-tool agent<\/strong><\/td>\n<td>Selection reliability degrades with decision complexity; scope to 4\u20135 per role<\/td>\n<\/tr>\n<tr>\n<td>10<\/td>\n<td><strong>Cross-specialization tool access<\/strong> (\"give synthesis all the search tools\")<\/td>\n<td>Agents misuse out-of-role tools; least privilege + scoped cross-role tool for the common case<\/td>\n<\/tr>\n<tr>\n<td>11<\/td>\n<td><strong>Prompt instructions to force tool order/usage<\/strong> (\"always call X first\")<\/td>\n<td>Probabilistic; use <code>tool_choice<\/code> forced/<code>any<\/code> (or hooks \u2014 D1) for guarantees<\/td>\n<\/tr>\n<tr>\n<td>12<\/td>\n<td><strong>Secrets hardcoded in committed <code>.mcp.json<\/code><\/strong><\/td>\n<td>Use <code>${VAR}<\/code> env expansion<\/td>\n<\/tr>\n<tr>\n<td>13<\/td>\n<td><strong>Team tooling configured in <code>~/.claude.json<\/code><\/strong><\/td>\n<td>User scope never reaches teammates; shared servers belong in project <code>.mcp.json<\/code><\/td>\n<\/tr>\n<tr>\n<td>14<\/td>\n<td><strong>Building a custom MCP server for a standard integration<\/strong> (Jira)<\/td>\n<td>Community server exists; custom is for team-specific workflows only<\/td>\n<\/tr>\n<tr>\n<td>15<\/td>\n<td><strong>More query tools instead of MCP resources<\/strong> for \"what data exists?\"<\/td>\n<td>Resources expose content catalogs without exploratory calls<\/td>\n<\/tr>\n<tr>\n<td>16<\/td>\n<td><strong>Reading all files upfront to \"understand the codebase\"<\/strong><\/td>\n<td>Context exhaustion; go incremental \u2014 Grep entry points, Read to trace<\/td>\n<\/tr>\n<tr>\n<td>17<\/td>\n<td><strong>Fighting Edit after non-unique match failures<\/strong><\/td>\n<td>Fall back to Read + Write<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>How this shows up in the scenarios<\/h2>\n<ul>\n<li><strong>S1 Customer Support<\/strong> (<code>get_customer<\/code>, <code>lookup_order<\/code>, <code>process_refund<\/code>, <code>escalate_to_human<\/code>): description-quality questions (Q2 style), business-error handling with <code>retriable: false<\/code>, empty-vs-failure on customer/order lookups.<\/li>\n<li><strong>S3 Multi-Agent Research<\/strong>: tool distribution per subagent, scoped <code>verify_fact<\/code> (Q9 style), local recovery vs. propagation with partial results.<\/li>\n<li><strong>S4 Developer Productivity<\/strong>: built-in tool selection, Edit\u2192Read+Write fallback, incremental exploration, MCP servers + resources, MCP-description-vs-built-in preference.<\/li>\n<\/ul>\n<p><strong>Build-it drill (from the guide's Exercise 1 &amp; 2, D2 parts):<\/strong> define 3\u20134 MCP tools where two are deliberately similar and only descriptions disambiguate; add structured errors (<code>errorCategory<\/code>, <code>isRetryable<\/code>) and verify the agent retries transient but explains business; configure one server in <code>.mcp.json<\/code> with <code>${VAR}<\/code> expansion and one in <code>~/.claude.json<\/code>, confirm both sets of tools are live simultaneously.<\/p>","words":3116},"domain-3-claude-code-config":{"title":"Domain 3 \u2014 Claude Code Configuration & Workflows (20% of exam, ~12 of 60 questions)","group":"Domain playbooks","html":"<h1>Domain 3 \u2014 Claude Code Configuration &amp; Workflows (20% of exam, ~12 of 60 questions)<\/h1>\n<p>Source of truth: official exam guide, Task Statements 3.1\u20133.6. This is the domain where you have the\nmost hands-on hours \u2014 the risk is not concepts, it's <strong>exact file paths, exact flag names, and the\ndistractor patterns<\/strong> the exam uses. Primary scenarios that pull from this domain: Scenario 2 (Code\nGeneration with Claude Code), Scenario 4 (Developer Productivity), Scenario 5 (Claude Code for CI).<\/p>\n<hr />\n<h2>3.1 CLAUDE.md hierarchy, @import, .claude/rules/, /memory<\/h2>\n<h3>Concepts in plain words<\/h3>\n<p><strong>Three levels of CLAUDE.md.<\/strong> User-level (<code>~/.claude/CLAUDE.md<\/code>) is yours alone \u2014 it lives in your\nhome dir, it is never in the repo, teammates never see it. Project-level (<code>.claude/CLAUDE.md<\/code> or a\n<code>CLAUDE.md<\/code> at repo root) is committed to version control and applies to everyone who clones the repo.\nDirectory-level (a <code>CLAUDE.md<\/code> inside a subdirectory) applies to work in that subtree. The classic exam\ndiagnosis: \"a new team member isn't getting the team's instructions\" \u2192 those instructions are sitting\nin someone's user-level file instead of the project-level file.<\/p>\n<pre><code>~/.claude/CLAUDE.md              # user-level \u2014 personal, NOT shared via git\nrepo/\n\u251c\u2500\u2500 CLAUDE.md                    # project-level (root form) \u2014 shared via git\n\u251c\u2500\u2500 .claude/\n\u2502   \u251c\u2500\u2500 CLAUDE.md                # project-level (alternate form)\n\u2502   \u2514\u2500\u2500 rules/\n\u2502       \u251c\u2500\u2500 testing.md           # topic-specific rule files\n\u2502       \u251c\u2500\u2500 api-conventions.md\n\u2502       \u2514\u2500\u2500 deployment.md\n\u2514\u2500\u2500 packages/billing/\n    \u2514\u2500\u2500 CLAUDE.md                # directory-level \u2014 applies to this subtree\n<\/code><\/pre>\n<p><strong>@import.<\/strong> Instead of one giant CLAUDE.md, reference external files with <code>@import<\/code> so each\npackage's CLAUDE.md pulls in only the standards files relevant to it (maintainers pick what applies to\ntheir domain):<\/p>\n<pre><code class=\"language-markdown\"># packages/billing/CLAUDE.md\n@import ../../standards/typescript.md\n@import ../../standards/payments-compliance.md\n<\/code><\/pre>\n<p><strong>.claude/rules/ as the anti-monolith.<\/strong> Splitting a bloated CLAUDE.md into focused topic files\n(<code>testing.md<\/code>, <code>api-conventions.md<\/code>, <code>deployment.md<\/code>) under <code>.claude/rules/<\/code> is the sanctioned modular\norganization pattern.<\/p>\n<p><strong>/memory.<\/strong> When Claude behaves inconsistently across sessions (\"it follows the rule on my machine\nbut not Jake's\"), <code>/memory<\/code> shows <strong>which memory files are actually loaded<\/strong>. It's the diagnostic\ncommand for hierarchy problems \u2014 run it before rewriting anything.<\/p>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Team standard must apply to every dev who clones the repo<\/td>\n<td>Project-level CLAUDE.md (root or <code>.claude/CLAUDE.md<\/code>)<\/td>\n<td>Version-controlled \u2192 distributed with the repo<\/td>\n<td>Putting it in <code>~/.claude/CLAUDE.md<\/code> \u2014 works on your machine, invisible to teammates<\/td>\n<\/tr>\n<tr>\n<td>New teammate not receiving instructions everyone else has<\/td>\n<td>Diagnose: instructions are user-level, move them to project-level<\/td>\n<td>User-level config never leaves the author's home dir<\/td>\n<td>Assuming it's a bug/model issue and rewording the instruction<\/td>\n<\/tr>\n<tr>\n<td>Personal preferences (your editor quirks, your tone)<\/td>\n<td>User-level <code>~/.claude/CLAUDE.md<\/code><\/td>\n<td>Shouldn't pollute team config<\/td>\n<td>Committing personal prefs to project CLAUDE.md<\/td>\n<\/tr>\n<tr>\n<td>Conventions specific to one subdirectory<\/td>\n<td>Directory-level CLAUDE.md in that subdirectory<\/td>\n<td>Loads for work in that subtree only<\/td>\n<td>Bloating the root file with area-specific rules<\/td>\n<\/tr>\n<tr>\n<td>CLAUDE.md has grown huge and unfocused<\/td>\n<td>Split into topic files in <code>.claude/rules/<\/code> (testing.md, api-conventions.md, \u2026)<\/td>\n<td>Modular, focused, maintainable<\/td>\n<td>One monolith with headers, \"Claude will infer which section applies\" \u2014 inference is unreliable<\/td>\n<\/tr>\n<tr>\n<td>Each package needs only its relevant standards<\/td>\n<td><code>@import<\/code> the specific standards files in each package's CLAUDE.md<\/td>\n<td>Selective inclusion, maintainer-owned<\/td>\n<td>Copy-pasting standards into every package (drift)<\/td>\n<\/tr>\n<tr>\n<td>Inconsistent behavior across sessions/machines<\/td>\n<td>Run <code>/memory<\/code> to verify which memory files loaded<\/td>\n<td>Direct observation beats guessing<\/td>\n<td>Rewriting prompts before checking what's actually loaded<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>3.2 Custom slash commands and skills<\/h2>\n<h3>Concepts in plain words<\/h3>\n<p><strong>Commands have two scopes.<\/strong> <code>.claude/commands/<\/code> in the repo = project-scoped, version-controlled,\nevery dev gets it on clone/pull. <code>~/.claude/commands/<\/code> = user-scoped, personal, not shared. That's the\nwhole model \u2014 there is <strong>no<\/strong> <code>.claude/config.json<\/code> with a <code>commands<\/code> array (a real exam distractor,\nsample Q4).<\/p>\n<p><strong>Skills live in <code>.claude/skills/<\/code> with a SKILL.md<\/strong> whose YAML frontmatter carries three tested keys:<\/p>\n<pre><code>.claude/skills/analyze-deps/SKILL.md\n<\/code><\/pre>\n<pre><code class=\"language-yaml\">---\ncontext: fork                 # run in isolated sub-agent context\nallowed-tools: Read, Grep     # restrict tools during skill execution\nargument-hint: &lt;package-name&gt; # shown when invoked without arguments\n---\nAnalyze the dependency graph of $ARGUMENTS and report unused packages.\n<\/code><\/pre>\n<ul>\n<li><code>context: fork<\/code> \u2192 the skill runs in an isolated sub-agent context so verbose output (codebase\n  analysis dumps) or exploratory content (brainstorming alternatives) doesn't pollute the main\n  conversation.<\/li>\n<li><code>allowed-tools<\/code> \u2192 restricts what tools the skill may use while executing (e.g., limit to file-write\n  operations so a skill can't run destructive Bash).<\/li>\n<li><code>argument-hint<\/code> \u2192 prompts the developer for the required parameter when they invoke the skill with\n  no arguments.<\/li>\n<\/ul>\n<p><strong>Personal skill variants.<\/strong> Want your own version of a team skill without breaking teammates? Create\nit in <code>~/.claude/skills/<\/code> <strong>with a different name<\/strong>.<\/p>\n<p><strong>Skills vs CLAUDE.md.<\/strong> Skills = on-demand invocation for task-specific workflows. CLAUDE.md =\nalways-loaded universal standards. If it must apply on every interaction, it's not a skill.<\/p>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Team <code>/review<\/code> checklist command for every dev on clone/pull<\/td>\n<td>File in <code>.claude/commands/<\/code> in the repo<\/td>\n<td>Version-controlled, auto-available<\/td>\n<td><code>~/.claude/commands/<\/code> (personal only); CLAUDE.md (context, not commands); <code>.claude/config.json<\/code> commands array (<strong>doesn't exist<\/strong>)<\/td>\n<\/tr>\n<tr>\n<td>Personal experimental command<\/td>\n<td><code>~/.claude/commands/<\/code><\/td>\n<td>Doesn't touch teammates<\/td>\n<td>Committing experiments to the shared repo<\/td>\n<\/tr>\n<tr>\n<td>Skill produces huge verbose output (codebase analysis, brainstorming)<\/td>\n<td><code>context: fork<\/code> in SKILL.md frontmatter<\/td>\n<td>Isolated sub-agent context, main conversation stays clean<\/td>\n<td>Running it inline and burning the main context window<\/td>\n<\/tr>\n<tr>\n<td>Skill must never take destructive actions<\/td>\n<td><code>allowed-tools<\/code> in frontmatter listing only what's needed<\/td>\n<td>Deterministic tool restriction at execution time<\/td>\n<td>Prompt text saying \"don't run rm\" \u2014 probabilistic, not enforced<\/td>\n<\/tr>\n<tr>\n<td>Devs keep invoking a skill without required params<\/td>\n<td><code>argument-hint<\/code> in frontmatter<\/td>\n<td>Prompts for the parameter on bare invocation<\/td>\n<td>Documenting params only in a README nobody reads<\/td>\n<\/tr>\n<tr>\n<td>You want a customized version of a team skill<\/td>\n<td>Personal variant in <code>~/.claude/skills/<\/code> under a <strong>different name<\/strong><\/td>\n<td>Team skill untouched<\/td>\n<td>Editing the shared skill in-place (affects everyone)<\/td>\n<\/tr>\n<tr>\n<td>Rule must apply always, everywhere<\/td>\n<td>CLAUDE.md, not a skill<\/td>\n<td>Skills require invocation; CLAUDE.md is always loaded<\/td>\n<td>Encoding universal standards as a skill and hoping it gets invoked<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>3.3 Path-scoped rules (conditional convention loading)<\/h2>\n<h3>Concepts in plain words<\/h3>\n<p>Files in <code>.claude/rules/<\/code> can carry YAML frontmatter with a <code>paths<\/code> field of glob patterns. The rule\nloads <strong>only when Claude edits a file matching the glob<\/strong> \u2014 matching by <em>file path pattern<\/em>, not by\ndirectory. That buys you two things: conventions follow the file type wherever it lives, and irrelevant\nrules stay out of context (token savings).<\/p>\n<pre><code class=\"language-yaml\"># .claude/rules/testing.md\n---\npaths: [&quot;**/*.test.tsx&quot;]\n---\nAll tests use React Testing Library. No snapshot tests. Arrange-Act-Assert structure.\n<\/code><\/pre>\n<pre><c
