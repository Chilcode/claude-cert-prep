hoice={\"type\": \"tool\", \"name\": \"record_invoice\"}<\/code> to <code>{\"type\": \"auto\"}<\/code> and remove <code>thinking={\"type\": \"disabled\"}<\/code> if you like. Run all three docs a handful of times. Usually it still calls the tool \u2014 but sometimes (especially on <code>DOC_EMAIL<\/code>, which reads like a message someone might <em>reply<\/em> to) it answers in prose, and your <code>next(b for b in resp.content if b.type == \"tool_use\")<\/code> throws <code>StopIteration<\/code>. A pipeline that crashes on 1-in-20 documents is not a pipeline. <strong>Lesson:<\/strong> <code>\"auto\"<\/code> means <em>the model may return text instead<\/em>; <code>\"any\"<\/code> guarantees <em>some<\/em> tool; forced <code>{\"type\": \"tool\", \"name\": ...}<\/code> guarantees <em>that<\/em> tool. For extraction, force it. Restore.<\/p>\n<h3>Break-it #3 \u2014 Retry a doc where the information doesn't exist (Task 4.4)<\/h3>\n<p>Add this doc and run it through <code>extract()<\/code>:<\/p>\n<pre><code class=\"language-python\">DOC_NO_TOTAL = &quot;&quot;&quot;QUOTE \u2014 Ferrier Consulting\nScope: services as described in SOW-114.\nPricing: per the attached rate card and hours actually incurred.\nPayment terms: Net 30 upon invoice.&quot;&quot;&quot;\n<\/code><\/pre>\n<p><code>total_amount<\/code> is required and non-nullable \u2014 and genuinely absent (it lives in an attachment you don't have). Watch every retry attempt fail or fabricate: the error feedback can't conjure information that isn't in the source. Compare with <code>DOC_TAX<\/code>, where retry #1 fixed it. <strong>Lesson:<\/strong> the exam's exact distinction \u2014 retries resolve <em>format and structural<\/em> errors; they are useless when the information is <em>absent from the source<\/em>. Classify your failures: format-mismatch \u2192 retry; info-absent \u2192 null the field (schema fix) or route to human, and cap retries so you don't burn tokens flailing.<\/p>\n<hr />\n<h1>Exercise 4 \u2014 Design and Debug a Multi-Agent Research Pipeline<\/h1>\n<h2>4.1 Objective + exam mapping<\/h2>\n<p>Build a coordinator that delegates to isolated subagents via a hand-rolled <code>Task<\/code> tool: explicit context passing, parallel Task calls in one response, structured claim/evidence/source/date findings, a simulated timeout with structured error propagation and coverage-gap annotation, and conflicting-source handling with attribution.<\/p>\n<table>\n<thead>\n<tr>\n<th>What you build<\/th>\n<th>Task statements drilled<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Coordinator with <code>Task<\/code> in its tool list; hub-and-spoke, coordinator decomposes + aggregates<\/td>\n<td><strong>1.2<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Subagents as fresh isolated conversations; ALL context passed explicitly in the prompt<\/td>\n<td><strong>1.3<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Parallel subagents = multiple Task calls in ONE response (ThreadPoolExecutor + timing)<\/td>\n<td><strong>1.3<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Per-role tool restriction (search agent can't read docs, synthesis agent has no data tools)<\/td>\n<td><strong>2.3<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Structured findings: claim / evidence / source / date, preserved through synthesis<\/td>\n<td><strong>5.6, 5.1<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Simulated timeout \u2192 structured error (failure type, attempted query, partial results, alternatives) \u2192 coordinator proceeds + annotates coverage gaps<\/td>\n<td><strong>5.3<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Conflicting stats from credible sources \u2192 both preserved with attribution, well-established vs. contested<\/td>\n<td><strong>5.6<\/strong><\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>This is exam Scenario 3. Sample Q7 (too-narrow decomposition), Q8 (structured error propagation), and Q9 (scoped cross-role tools) all live in this build.<\/p>\n<h2>4.2 Setup<\/h2>\n<p>Same venv, no new packages. Create <code>research.py<\/code> next to <code>extract.py<\/code>. There's no live web search here \u2014 a canned corpus stands in for the web, so runs are deterministic-ish and free of flaky networking. The two \"credible sources that disagree\" are baked in on purpose.<\/p>\n<h2>4.3 Step-by-step build<\/h2>\n<h3>Step 1 \u2014 Corpus + isolated subagent runner<\/h3>\n<p>A subagent is nothing magical: <strong>a brand-new <code>messages<\/code> list with its own system prompt and its own (restricted) tool set.<\/strong> It knows exactly what its prompt string tells it \u2014 nothing else. In the Agent SDK this is what the <code>Task<\/code> tool + <code>AgentDefinition<\/code> gives you; here you build it so the isolation is visible.<\/p>\n<p>Each research subagent must return findings through a <code>report_findings<\/code> tool whose schema forces <strong>claim / evidence / source / date<\/strong> on every finding. That structure is what survives the trip back to the coordinator \u2014 separate content from metadata, or attribution dies in transit (Task 5.6).<\/p>\n<p>Create <code>research.py<\/code>:<\/p>\n<pre><code class=\"language-python\">import concurrent.futures\nimport json\nimport time\n\nimport anthropic\n\nclient = anthropic.Anthropic()\nMODEL = &quot;claude-sonnet-5&quot;\nSIMULATE_TIMEOUT = False   # flipped on in Step 4\n\n# ---------------------------------------------------------------- fake web + local docs\nWEB = [\n    {&quot;url&quot;: &quot;https://econlab.example/remote-meta-2025&quot;, &quot;date&quot;: &quot;2025-11-02&quot;,\n     &quot;text&quot;: &quot;Meta-analysis across 42 firms (n=310,000): fully remote teams showed a 4% DECLINE in &quot;\n             &quot;measured output vs in-office baselines, concentrated in collaboration-heavy roles.&quot;},\n    {&quot;url&quot;: &quot;https://futureofwork.example/pulse-2026&quot;, &quot;date&quot;: &quot;2026-03-18&quot;,\n     &quot;text&quot;: &quot;Pulse survey of 1,200 knowledge workers: respondents self-report a 13% INCREASE in &quot;\n             &quot;productivity when remote. Self-selected sample; productivity self-reported, not measured.&quot;},\n    {&quot;url&quot;: &quot;https://hbs.example/hybrid-rct&quot;, &quot;date&quot;: &quot;2026-01-20&quot;,\n     &quot;text&quot;: &quot;RCT at a 1,600-person firm: hybrid (2 days remote) output statistically indistinguishable &quot;\n             &quot;from full-office, with 35% lower attrition.&quot;},\n]\nDOCS = {\n    &quot;internal_productivity_review.pdf&quot;: {&quot;date&quot;: &quot;2026-05-10&quot;,\n        &quot;text&quot;: &quot;ACME internal review: ticket throughput per engineer flat YoY after the remote policy &quot;\n                &quot;change; code-review latency up 22%; employee satisfaction up 18 points.&quot;},\n}\n\n# ---------------------------------------------------------------- subagent tools\nSEARCH_TOOL = {\n    &quot;name&quot;: &quot;search_web&quot;,\n    &quot;description&quot;: (&quot;Search the web. Input: a short keyword query. Returns a list of {url, date, text}. &quot;\n                    &quot;An empty list is a VALID result (no matches) \u2014 it is not an error.&quot;),\n    &quot;input_schema&quot;: {&quot;type&quot;: &quot;object&quot;, &quot;properties&quot;: {&quot;query&quot;: {&quot;type&quot;: &quot;string&quot;}},\n                     &quot;required&quot;: [&quot;query&quot;]},\n}\nREAD_TOOL = {\n    &quot;name&quot;: &quot;read_document&quot;,\n    &quot;description&quot;: &quot;Read a document from the local research library. Available: internal_productivity_review.pdf&quot;,\n    &quot;input_schema&quot;: {&quot;type&quot;: &quot;object&quot;, &quot;properties&quot;: {&quot;name&quot;: {&quot;type&quot;: &quot;string&quot;}},\n                     &quot;required&quot;: [&quot;name&quot;]},\n}\nFINDINGS_TOOL = {\n    &quot;name&quot;: &quot;report_findings&quot;,\n    &quot;description&quot;: (&quot;Submit your final findings. Call exactly once, when done. Every finding MUST carry &quot;\n                    &quot;verbatim evidence, the source URL/document name, and the source's publication date \u2014 &quot;\n                    &quot;downstream agents cannot see the raw sources.&quot;),\n    &quot;input_schema&quot;: {&quot;type&quot;: &quot;object&quot;, &quot;properties&quot;: {\n        &quot;findings&quot;: {&quot;type&quot;: &quot;array&quot;, &quot;items&quot;: {&quot;type&quot;: &quot;object&quot;, &quot;properties&quot;: {\n            &quot;claim&quot;:    {&quot;type&quot;: &quot;string&quot;},\n            &quot;evidence&quot;: {&quot;type&quot;: &quot;string&quot;, &quot;description&quot;: &quot;verbatim excerpt&quot;},\n            &quot;source&quot;:   {&quot;type&quot;: &quot;string&quot;, &quot;description&quot;: &quot;URL or document name&quot;},\n            &quot;date&quot;:     {&quot;type&quot;: &quot;string&quot;, &quot;description&quot;: &quot;source publication date&quot;}},\n            &quot;required&quot;: [&quot;claim&quot;, &quot;evidence&quot;, &quot;source&quot;, &quot;date&quot;]}},\n        &quot;notes&quot;: {&quot;type&quot;: &quot;string&quot;}},\n        &quot;required&quot;: [&quot;findings&quot;]},\n}\nREPORT_TOOL = {\n    &quot;name&quot;: &quot;submit_report&quot;,\n    &quot;description&quot;: &quot;Submit the final synthesized research report. Call exactly once.&quot;,\n    &quot;input_schema&quot;: {&quot;type&quot;: &quot;object&quot;, &quot;properties&quot;: {\n        &quot;well_established&quot;: {&quot;type&quot;: &quot;array&quot;, &quot;items&quot;: {&quot;type&quot;: &quot;object&quot;, &quot;properties&quot;: {\n            &quot;claim&quot;: {&quot;type&quot;: &quot;string&quot;},\n            &quot;sources&quot;: {&quot;type&quot;: &quot;array&quot;, &quot;items&quot;: {&quot;type&quot;: &quot;object&quot;, &quot;properties&quot;: {\n                &quot;source&quot;: {&quot;type&quot;: &quot;string&quot;}, &quot;date&quot;: {&quot;type&quot;: &quot;string&quot;}},\n                &quot;required&quot;: [&quot;source&quot;, &quot;date&quot;]}}},\n            &quot;required&quot;: [&quot;claim&quot;, &quot;sources&quot;]}},\n        &quot;contested&quot;: {&quot;type&quot;: &quot;array&quot;, &quot;items&quot;: {&quot;type&quot;: &quot;object&quot;, &quot;properties&quot;: {\n            &quot;question&quot;: {&quot;type&quot;: &quot;string&quot;},\n            &quot;positions&quot;: {&quot;type&quot;: &quot;array&quot;, &quot;items&quot;: {&quot;type&quot;: &quot;object&quot;, &quot;properties&quot;: {\n                &quot;position&quot;: {&quot;type&quot;: &quot;string&quot;}, &quot;source&quot;: {&quot;type&quot;: &quot;string&quot;}, &quot;date&quot;: {&quot;type&quot;: &quot;string&quot;}},\n                &quot;required&quot;: [&quot;position&quot;, &quot;source&quot;, &quot;date&quot;]}}},\n            &quot;required&quot;: [&quot;question&quot;, &quot;positions&quot;]}},\n        &quot;coverage_gaps&quot;: {&quot;type&quot;: &quot;array&quot;, &quot;items&quot;: {&quot;type&quot;: &quot;string&quot;}}},\n        &quot;required&quot;: [&quot;well_established&quot;, &quot;contested&quot;, &quot;coverage_gaps&quot;]},\n}\n\n# Each subagent gets ONLY the tools its role needs (Task 2.3: scoped tool access).\nAGENTS = {\n    &quot;web_search&quot;: {\n        &quot;system&quot;: (&quot;You are a web-search subagent. Search for sources relevant to your task, then call &quot;\n                   &quot;report_findings exactly once. Report only what sources actually say.&quot;),\n        &quot;tools&quot;: [SEARCH_TOOL, FINDINGS_TOOL],\n    },\n    &quot;doc_analysis&quot;: {\n        &quot;system&quot;: (&quot;You are a document-analysis subagent. Read the document(s) named in your task, then &quot;\n                   &quot;call report_findings exactly once.&quot;),\n        &quot;tools&quot;: [READ_TOOL, FINDINGS_TOOL],\n    },\n    &quot;synthesis&quot;: {\n        &quot;system&quot;: (&quot;You are a synthesis subagent. Your prompt contains research findings \u2014 you have NO &quot;\n                   &quot;search tools and NO other source of information. Call submit_report exactly once. &quot;\n                   &quot;Preserve source attribution on every claim. When credible sources conflict, put BOTH &quot;\n                   &quot;positions under 'contested' with their sources and dates \u2014 never pick a winner &quot;\n                   &quot;(differing dates may mean change over time, not contradiction). List any subtopics &quot;\n                   &quot;that failed or are missing under coverage_gaps.&quot;),\n        &quot;tools&quot;: [REPORT_TOOL],\n    },\n}\n\n# ---------------------------------------------------------------- subagent runner\ndef execute_subagent_tool(name, tool_input):\n    if name == &quot;search_web&quot;:\n        q = tool_input[&quot;query&quot;].lower()\n        hits = [d for d in WEB if any(w in d[&quot;text&quot;].lower() for w in q.split() if len(w) &gt; 3)]\n        return {&quot;results&quot;: hits}\n    if name == &quot;read_document&quot;:\n        doc = DOCS.get(tool_input[&quot;name&quot;])\n        return doc or {&quot;error&quot;: {&quot;errorCategory&quot;: &quot;validation&quot;, &quot;isRetryable&quot;: False,\n                                 &quot;message&quot;: f&quot;No document named '{tool_input['name']}'&quot;}}\n    return {&quot;error&quot;: f&quot;unknown tool {name}&quot;}\n\ndef run_subagent(agent_type, prompt):\n    spec = AGENTS[agent_type]\n    messages = [{&quot;role&quot;: &quot;user&quot;, &quot;content&quot;: prompt}]   # &lt;- this prompt is ALL the context it gets\n    for _ in range(8):\n        resp = client.messages.create(model=MODEL, max_tokens=4096, system=spec[&quot;system&quot;],\n                                      tools=spec[&quot;tools&quot;], thinking={&quot;type&quot;: &quot;disabled&quot;},\n                                      messages=messages)\n        messages.append({&quot;role&quot;: &quot;assistant&quot;, &quot;content&quot;: resp.content})\n        results = []\n        for block in resp.content:\n            if block.type != &quot;tool_use&quot;:\n                continue\n            if block.name in (&quot;report_findings&quot;, &quot;submit_report&quot;):     # terminal tool\n                return {&quot;status&quot;: &quot;ok&quot;, &quot;agent&quot;: agent_type, &quot;output&quot;: block.input}\n            out = execute_subagent_tool(block.name, block.input)\n            results.append({&quot;type&quot;: &quot;tool_result&quot;, &quot;tool_use_id&quot;: block.id,\n                            &quot;content&quot;: json.dumps(out)})\n        if not results:   # ended without reporting \u2014 that's a structured error, not silence\n            return {&quot;status&quot;: &quot;error&quot;, &quot;failure_type&quot;: &quot;no_structured_output&quot;, &quot;agent&quot;: agent_type,\n                    &quot;message&quot;: &quot;subagent ended its turn without calling its report tool&quot;}\n        messages.append({&quot;role&quot;: &quot;user&quot;, &quot;content&quot;: results})\n    return {&quot;status&quot;: &quot;error&quot;, &quot;failure_type&quot;: &quot;max_steps_exceeded&quot;, &quot;agent&quot;: agent_type}\n<\/code><\/pre>\n<p><strong>Checkpoint 1.<\/strong> Run a subagent directly:<\/p>\n<pre><code class=\"language-python\">if __name__ == &quot;__main__&quot;:\n    out = run_subagent(&quot;web_search&quot;, &quot;Find evidence on how remote work affects measured productivity.&quot;)\n    print(json.dumps(out, indent=2))\n<\/code><\/pre>\n<p>You should get <code>status: ok<\/code> with 2\u20133 findings, each carrying <code>claim<\/code>, verbatim <code>evidence<\/code>, <code>source<\/code> URL, and <code>date<\/code>. Also try <code>run_subagent(\"synthesis\", \"Write a report about remote work.\")<\/code> \u2014 with no findings in the prompt and no tools to fetch any, it produces a near-empty or hedged report. It literally cannot know anything you didn't pass. That's context isolation, experienced firsthand.<\/p>\n<h3>Step 2 \u2014 The coordinator: Task tool + hub-and-spoke loop<\/h3>\n<p>The coordinator's tool list contains exactly one tool: <code>Task<\/code>. That's the raw-API equivalent of <code>allowedTools: [\"Task\"]<\/code> \u2014 no Task in the tool list, no subagents, full stop. The Task tool's <em>description<\/em> carries the two rules the exam hammers: subagents see <strong>only the prompt you pass<\/strong> (so pass findings verbatim), and independent subtasks go out as <strong>multiple Task calls in a single response<\/strong>.<\/p>\n<p>Add to <code>research.py<\/code>:<\/p>\n<pre><code class=\"language-python\"># ---------------------------------------------------------------- coordinator\nTASK_TOOL = {\n    &quot;name&quot;: &quot;Task&quot;,\n    &quot;description&quot;: (\n        &quot;Spawn a subagent. subagent_type: 'web_search' (searches the web, returns structured findings), &quot;\n        &quot;'doc_analysis' (reads local research documents; available: internal_productivity_review.pdf), &quot;\n        &quot;'synthesis' (combines findings into a final report \u2014 it has NO tools and NO memory of this &quot;\n        &quot;conversation, so its prompt must contain, VERBATIM, every finding it should use, including each &quot;\n        &quot;claim's evidence, source, and date). Subagents are isolated: they see ONLY the prompt string &quot;\n        &quot;passed here. For independent subtasks, emit multiple Task calls in a SINGLE response so they &quot;\n        &quot;run in parallel.&quot;),\n    &quot;input_schema&quot;: {&quot;type&quot;: &quot;object&quot;, &quot;properties&quot;: {\n        &quot;subagent_type&quot;: {&quot;type&quot;: &quot;string&quot;, &quot;enum&quot;: [&quot;web_search&quot;, &quot;doc_analysis&quot;, &quot;synthesis&quot;]},\n        &quot;prompt&quot;: {&quot;type&quot;: &quot;string&quot;}},\n        &quot;required&quot;: [&quot;subagent_type&quot;, &quot;prompt&quot;]},\n}\n\nCOORDINATOR_SYSTEM = (\n    &quot;You are a research coordinator. Decompose the research question into subtopics covering its FULL &quot;\n    &quot;scope, delegate research via Task, then delegate synthesis. Rules: &quot;\n    &quot;(1) run independent research subtasks in parallel \u2014 multiple Task calls in one response; &quot;\n    &quot;(2) pass complete findings verbatim into the synthesis prompt; &quot;\n    &quot;(3) if a subagent fails, decide based on its error: retry, use an alternative approach, or proceed &quot;\n    &quot;with partial results \u2014 any subtopic you drop MUST end up in the report's coverage_gaps; &quot;\n    &quot;(4) never resolve conflicting statistics yourself \u2014 pass all positions, with sources and dates, to &quot;\n    &quot;synthesis. After synthesis returns, present the report to the user, preserving attribution.&quot;\n)\n\ndef run_task(subagent_type, prompt):\n    if SIMULATE_TIMEOUT and subagent_type == &quot;web_search&quot; and &quot;gig&quot; in prompt.lower():\n        return {&quot;status&quot;: &quot;error&quot;, &quot;failure_type&quot;: &quot;timeout&quot;,\n                &quot;attempted_task&quot;: prompt[:150], &quot;partial_results&quot;: [],\n                &quot;alternatives&quot;: [&quot;retry once with a narrower query&quot;,\n                                 &quot;proceed without this subtopic and flag it as a coverage gap&quot;]}\n    if subagent_type == &quot;synthesis&quot;:\n        print(f&quot;\\n  [prompt passed to synthesis \u2014 first 400 chars]\\n  {prompt[:400]}\\n&quot;)\n    return run_subagent(subagent_type, prompt)\n\ndef run_research(question):\n    messages = [{&quot;role&quot;: &quot;user&quot;, &quot;content&quot;: question}]\n    for step in range(12):\n        resp = client.messages.create(model=MODEL, max_tokens=4096, system=COORDINATOR_SYSTEM,\n                                      tools=[TASK_TOOL],           # &lt;- &quot;allowedTools includes Task&quot;\n                                      thinking={&quot;type&quot;: &quot;disabled&quot;}, messages=messages)\n        print(f&quot;\\n[coordinator step {step}] stop_reason={resp.stop_reason}&quot;)\n        if resp.stop_reason == &quot;end_turn&quot;:\n            final = &quot;&quot;.join(b.text for b in resp.content if b.type == &quot;text&quot;)\n            print(&quot;\\n=== FINAL ===\\n&quot; + final)\n            return final\n        messages.append({&quot;role&quot;: &quot;assistant&quot;, &quot;content&quot;: resp.content})\n        calls = [b for b in resp.content if b.type == &quot;tool_use&quot;]\n        for c in calls:\n            print(f&quot;  Task -&gt; {c.input['subagent_type']}: {c.input['prompt'][:90]}...&quot;)\n        t0 = time.perf_counter()\n        with concurrent.futures.ThreadPoolExecutor(max_workers=4) as ex:\n            outputs = list(ex.map(lambda c: run_task(c.input[&quot;subagent_type&quot;], c.input[&quot;prompt&quot;]), calls))\n        print(f&quot;  {len(calls)} task(s) completed in {time.perf_counter() - t0:.1f}s&quot;)\n        messages.append({&quot;role&quot;: &quot;user&quot;, &quot;content&quot;: [\n            {&quot;type&quot;: &quot;tool_result&quot;, &quot;tool_use_id&quot;: c.id, &quot;content&quot;: json.dumps(o),\n             &quot;is_error&quot;: o.get(&quot;status&quot;) == &quot;error&quot;}\n            for c, o in zip(calls, outputs)]})\n    print(&quot;hit safety cap&quot;)\n\nif __name__ == &quot;__main__&quot;:\n    run_research(&quot;Research: how does remote work affect productivity? Cover measured-output studies, &quot;\n                 &quot;worker self-reports, hybrid arrangements, and our internal company data.&quot;)\n<\/code><\/pre>\n<p><strong>Checkpoint 2.<\/strong> Run it. Watch the shape: coordinator decomposes \u2192 Task calls to <code>web_search<\/code> and <code>doc_analysis<\/code> \u2192 findings come back \u2192 coordinator spawns <code>synthesis<\/code>. Read the printed <strong>synthesis prompt<\/strong>: it should contain the actual findings \u2014 claims, evidence excerpts, URLs, dates \u2014 copied in verbatim, because the coordinator was told (twice: system prompt + tool description) that synthesis can't see anything else. That's Task 1.3's core skill: <strong>explicit context passing, in the prompt, every time.<\/strong> Also note sample Q7's failure lives right here: if the coordinator decomposed \"productivity\" into only measured-output subtopics and skipped self-reports, the miss happened at <em>decomposition<\/em> \u2014 the subagents downstream would all be executing their narrow briefs perfectly.<\/p>\n<h3>Step 3 \u2014 Prove the parallelism<\/h3>\n<p>You already execute concurrently (<code>ThreadPoolExecutor<\/code>), but parallelism only happens if the model <strong>emits multiple Task calls in one response<\/strong>. Task calls spread across separate turns serialize no matter what your executor does \u2014 that's the exam's exact phrasing.<\/p>\n<p>Run Step 2's script twice and compare the timing lines:<\/p>\n<ol>\n<li>As-is. Expect step 0 to show <code>Task -&gt; web_search<\/code> <em>and<\/em> <code>Task -&gt; doc_analysis<\/code> together, and <code>2 task(s) completed in ~Ns<\/code> where N \u2248 the <em>slower<\/em> subagent, not the sum.<\/li>\n<li>Now edit <code>COORDINATOR_SYSTEM<\/code> rule (1) to say: <em>\"run subtasks one at a time \u2014 emit at most one Task call per response, wait for each result before the next.\"<\/em> Re-run. Same subagents, now sequential turns: total wall-clock roughly the <em>sum<\/em> of subagent times, plus an extra coordinator round-trip per task.<\/li>\n<\/ol>\n<p><strong>Checkpoint 3.<\/strong> Write down both wall-clock numbers. The parallel run should be meaningfully faster (typically 1.5\u20132x here; more with more subagents). Restore rule (1). <strong>Lesson:<\/strong> parallelism is a <em>model-output pattern<\/em> (N tool_use blocks in one assistant message) that your executor then exploits \u2014 not something the executor can create on its own.<\/p>\n<h3>Step 4 \u2014 Simulated timeout: structured error \u2192 partial results \u2192 coverage gap<\/h3>\n<p>Sample Q8, live. Flip the switch and add a subtopic that will fail:<\/p>\n<pre><code class=\"language-python\">SIMULATE_TIMEOUT = True\n\nif __name__ == &quot;__main__&quot;:\n    run_research(&quot;Research: how does remote work affect productivity? Cover measured-output studies, &quot;\n                 &quot;worker self-reports, hybrid arrangements, our internal company data, AND gig-economy &quot;\n                 &quot;platform work.&quot;)\n<\/code><\/pre>\n<p>Any <code>web_search<\/code> task mentioning gig work now returns a <strong>structured error<\/strong>: <code>failure_type: \"timeout\"<\/code>, the attempted task, (empty) partial results, and two concrete alternatives. It does <em>not<\/em> return a generic <code>\"search unavailable\"<\/code> (hides context \u2014 Q8 option B), does <em>not<\/em> return an empty result marked success (silent suppression \u2014 option C), and does <em>not<\/em> crash the whole run (workflow termination \u2014 option D).<\/p>\n<p><strong>Checkpoint 4.<\/strong> Watch the coordinator's next step after the error lands: with the alternatives spelled out, it should either retry once or proceed \u2014 and either way, the final report's <code>coverage_gaps<\/code> array should name gig-economy work as unresearched. The other four subtopics still get covered. That's the full Task 5.3 chain: <strong>structured error \u2192 informed coordinator decision \u2192 partial results used \u2192 gap annotated instead of hidden.<\/strong> Leave <code>SIMULATE_TIMEOUT = True<\/code> for Break-it #2; set it back to <code>False<\/code> for Step 5.<\/p>\n<h3>Step 5 \u2014 Conflicting sources: preserve both, attribute, don't arbitrate<\/h3>\n<p>Your corpus already contains the landmine: econlab.example (2025-11-02) says measured output <em>fell 4%<\/em>; futureofwork.example (2026-03-18) says self-reported productivity <em>rose 13%<\/em>. Both \"credible,\" different dates, different methodologies. The wrong behaviors: pick one, average them, or fuzz it into \"studies show mixed results\" with no attribution.<\/p>\n<p>Re-run Step 2's original question and read the synthesis output's <code>contested<\/code> section closely.<\/p>\n<p><strong>Checkpoint 5.<\/strong> The report should show, under one contested question, <strong>both<\/strong> positions \u2014 each with its own source URL and date \u2014 and ideally note the methodological difference (measured output vs. self-report) that the evidence excerpts carry. The hybrid-RCT and internal-doc findings should sit in <code>well_established<\/code> with their sources. If the model editorializes a winner, tighten the synthesis system prompt (\"never pick a winner\") \u2014 but you'll usually find the <em>schema<\/em> did the heavy lifting: because <code>positions[].source<\/code> and <code>positions[].date<\/code> are required fields, the model can't structurally drop attribution. <strong>Schema design is behavior design.<\/strong> The <code>date<\/code> field also matters on its own: two different numbers from 2025 vs 2026 might be change-over-time, not contradiction \u2014 without dates, synthesis can't tell (Task 5.6).<\/p>\n<h2>4.4 Break it on purpose<\/h2>\n<h3>Break-it #1 \u2014 Assume context inheritance, watch synthesis hallucinate (Task 1.3)<\/h3>\n<p>In <code>TASK_TOOL<\/code>'s description, delete the isolation warning and replace it with a lie: <em>\"Subagents can see this conversation, so keep Task prompts short \u2014 e.g. 'synthesize the findings above'.\"<\/em> Delete rule (2) from <code>COORDINATOR_SYSTEM<\/code> too. Re-run. The coordinator now sends synthesis a stub prompt; the printed synthesis prompt shows no findings in it. Synthesis \u2014 which genuinely cannot see the conversation \u2014 either returns a hollow report or, worse, <strong>fabricates plausible findings with invented sources<\/strong>. On the exam, \"subagent output ignores the actual research\" is diagnosed as missing explicit context passing, every time. Restore both texts.<\/p>\n<h3>Break-it #2 \u2014 Degrade the structured error to a generic string (Task 5.3)<\/h3>\n<p>With <code>SIMULATE_TIMEOUT = True<\/code>, replace the timeout return in <code>run_task<\/code> with the exam's anti-pattern:<\/p>\n<pre><code class=\"language-python\">return {&quot;status&quot;: &quot;error&quot;, &quot;message&quot;: &quot;search unavailable&quot;}\n<\/code><\/pre>\n<p>Re-run the Step 4 question a few times. The coordinator now has nothing to reason with: no failure type (transient? permanent?), no attempted query (retry what?), no alternatives. Watch it retry blindly, or silently drop the gig-economy subtopic \u2014 and check the final report: <code>coverage_gaps<\/code> frequently comes back empty, because nothing downstream knew there <em>was<\/em> a gap. Compare against the Step 4 run. <strong>Lesson:<\/strong> generic errors don't just lose debugging info \u2014 they destroy the coordinator's ability to make recovery decisions and the report's honesty about its own coverage. Restore the structured error.<\/p>\n<h3>Break-it #3 \u2014 Strip source/date from findings, watch attribution die (Task 5.6)<\/h3>\n<p>In <code>FINDINGS_TOOL<\/code>, remove <code>source<\/code> and <code>date<\/code> from the item properties and from <code>required<\/code> (leave <code>claim<\/code> and <code>evidence<\/code>). Re-run Step 5's question. The search agent still finds both conflicting studies \u2014 but the findings arrive at synthesis as bare claims. Now synthesis faces \"-4%\" vs \"+13%\" with no way to attribute either, no dates to consider change-over-time, and required <code>source<\/code>/<code>date<\/code> fields in <em>its<\/em> output schema that it can't honestly fill. Watch it invent attribution, collapse the conflict into mush (\"estimates vary\"), or arbitrarily crown one number. <strong>Lesson:<\/strong> provenance is lost at the <em>first<\/em> hop that drops it \u2014 no downstream prompt can reconstruct a claim-source mapping that was never carried. Structure the metadata into every intermediate output, not just the final one. Restore the schema.<\/p>\n<hr />\n<h2>Where this maps on the exam<\/h2>\n<ul>\n<li><strong>Exercise 3<\/strong> is Domain 4 (Prompt Engineering &amp; Structured Output, 20%) + Domain 5 (Context Management &amp; Reliability, 15%): schemas, tool_choice, nullable-vs-fabrication, validation-retry, few-shot, batches, confidence routing. Exam Scenario 6, sample Q11.<\/li>\n<li><strong>Exercise 4<\/strong> is Domain 1 (Agentic Architecture &amp; Orchestration, 27%) + slices of Domain 2 (scoped tool distribution) and Domain 5 (error propagation, provenance): coordinator/Task, isolation, parallel spawning, structured errors, conflict handling. Exam Scenario 3, sample Q7\u2013Q9.<\/li>\n<\/ul>\n<p>Stacked with Exercises 1 &amp; 2, you've now built against every scenario except CI/CD \u2014 and the failure modes you deliberately caused tonight (fabrication from a non-nullable field, hallucinated synthesis from missing context, a coverage gap nobody reported) are precisely the wrong-answer options you'll be eliminating on test day.<\/p>","words":3356}}};

const TOKEN_RE = /(--[a-z][a-z-]+|~\/\.claude[.\w\/-]*|\.mcp\.json|\.claude\/[\w.\/-]*|CLAUDE\.md|SKILL\.md|\/memory\b|\/compact\b|\b[a-z][a-z0-9]*_[a-z0-9_]+\b|\bisError\b|\bisRetryable\b|\ballowedTools\b|\bAgentDefinition\b|\bPostToolUse\b|"(?:auto|any|tool_use|end_turn)")/g;

function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function fmt(s) { return esc(s).replace(TOKEN_RE, m => '<code>' + m + '</code>'); }
function shuffle(a) { a = a.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
const $ = sel => document.querySelector(sel);
const app = document.getElementById('app');
const homeBtn = document.getElementById('homeBtn');

/* ---------- persistence ---------- */
const LS = 'ccaf-stats-v1';
function loadStats() { try { return JSON.parse(localStorage.getItem(LS)) || {}; } catch { return {}; } }
function saveStats(st) { try { localStorage.setItem(LS, JSON.stringify(st)); } catch {} }
function recordAnswer(qid, ok) {
  const st = loadStats(); st.q = st.q || {};
  const e = st.q[qid] = st.q[qid] || { r: 0, w: 0 };
  ok ? e.r++ : e.w++; e.last = ok ? 'r' : 'w';
  saveStats(st);
}
function recordExam(pct) {
  const st = loadStats();
  if (st.bestExam == null || pct > st.bestExam) st.bestExam = pct;
  st.lastExam = pct; saveStats(st);
}
function missedIds() { const st = loadStats(); return Object.keys(st.q || {}).filter(id => st.q[id].last === 'w'); }

/* ---------- speech ---------- */
const hasTTS = 'speechSynthesis' in window;
const AK = 'ccaf-audio-v1';
function audioPrefs() { try { return JSON.parse(localStorage.getItem(AK)) || {}; } catch { return {}; } }
function saveAudioPrefs(p) { try { localStorage.setItem(AK, JSON.stringify(p)); } catch {} }

let VOICES = [];
function refreshVoices() { VOICES = speechSynthesis.getVoices().filter(v => v.lang.toLowerCase().startsWith('en')); }
if (hasTTS) {
  refreshVoices();
  speechSynthesis.addEventListener('voiceschanged', () => { refreshVoices(); populateVoiceSel(); });
}
function populateVoiceSel() {
  const sel = document.getElementById('ttsVoice');
  if (!sel || !VOICES.length) return;
  const saved = audioPrefs().voice;
  const preferred = pickVoice();
  sel.innerHTML = VOICES.map(v =>
    `<option value="${esc(v.name)}" ${(saved ? v.name === saved : v === preferred) ? 'selected' : ''}>${esc(v.name.replace(/^Microsoft |^Google /, ''))}</option>`
  ).join('');
}
function pickVoice() {
  const want = audioPrefs().voice;
  if (want) { const v = VOICES.find(v => v.name === want); if (v) return v; }
  return VOICES.find(v => /natural/i.test(v.name)) || VOICES.find(v => v.default) || VOICES[0] || null;
}

/* make technical tokens listenable */
function speakable(s) {
  return s
    .replace(/`/g, '')
    .replace(/--([a-z][a-z-]*)/g, (m, f) => f.replace(/-/g, ' ') + ' flag')
    .replace(/~\/\.claude/g, 'home dot claude')
    .replace(/\.mcp\.json/gi, 'dot M C P dot json')
    .replace(/\.claude\//g, 'dot claude slash ')
    .replace(/CLAUDE\.md/g, 'claude dot M D')
    .replace(/SKILL\.md/g, 'skill dot M D')
    .replace(/_/g, ' ')
    .replace(/&/g, ' and ')
    .replace(/[►▸→←]/g, ', ')
    .replace(/\s+/g, ' ');
}
function chunk(text) {
  const parts = [];
  for (const seg of text.split(/(?<=[.!?;:])\s+/)) {
    const t = seg.trim(); if (!t) continue;
    if (parts.length && (parts[parts.length - 1] + ' ' + t).length <= 200) parts[parts.length - 1] += ' ' + t;
    else parts.push(t);
  }
  return parts;
}

/* ---------- ElevenLabs engine ---------- */
function engine() { return audioPrefs().engine === 'el' ? 'el' : 'system'; }
const EL = { audio: null, abort: null, urls: [] };
const elSession = { chars: 0, cachedChars: 0 };

let idbP = null;
function idb() {
  if (!('indexedDB' in window)) return Promise.resolve(null);
  idbP = idbP || new Promise(res => {
    const r = indexedDB.open('ccaf-el-cache', 1);
    r.onupgradeneeded = () => r.result.createObjectStore('audio');
    r.onsuccess = () => res(r.result);
    r.onerror = () => res(null);
  });
  return idbP;
}
async function cacheGet(k) {
  const db = await idb(); if (!db) return null;
  return new Promise(res => {
    try {
      const t = db.transaction('audio').objectStore('audio').get(k);
      t.onsuccess = () => res(t.result || null); t.onerror = () => res(null);
    } catch { res(null); }
  });
}
async function cachePut(k, buf) {
  const db = await idb(); if (!db) return;
  try { db.transaction('audio', 'readwrite').objectStore('audio').put(buf, k); } catch {}
}
async function sha(s) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return [...new Uint8Array(b)].slice(0, 16).map(x => x.toString(16).padStart(2, '0')).join('');
}
function updateElStatus() {
  const el = document.getElementById('elStatus'); if (!el) return;
  const mult = (audioPrefs().elModel || 'eleven_flash_v2_5') === 'eleven_multilingual_v2' ? 1 : 0.5;
  el.textContent = elSession.chars || elSession.cachedChars
    ? `≈${Math.round(elSession.chars * mult).toLocaleString()} credits used this session · ${elSession.cachedChars.toLocaleString()} characters replayed free from cache`
    : '';
}
function elError(e) {
  console.error(e);
  alert(e.message || 'ElevenLabs request failed.');
}
async function elLoadVoices() {
  const keyEl = document.getElementById('elKey');
  const key = keyEl ? keyEl.value.trim() : audioPrefs().elKey;
  if (!key) { alert('Paste your ElevenLabs API key first.'); return; }
  saveAudioPrefs({ ...audioPrefs(), elKey: key });
  try {
    const res = await fetch('https://api.elevenlabs.io/v1/voices', { headers: { 'xi-api-key': key } });
    if (!res.ok) throw new Error('ElevenLabs error ' + res.status + (res.status === 401 ? ' — check the key' : ''));
    const j = await res.json();
    const sel = document.getElementById('elVoice');
    if (sel) {
      sel.innerHTML = j.voices.map(v =>
        `<option value="${esc(v.voice_id)}" ${audioPrefs().elVoice === v.voice_id ? 'selected' : ''}>${esc(v.name)}${v.category === 'cloned' ? ' · cloned' : ''}</option>`
      ).join('');
      const chosen = sel.selectedOptions[0];
      if (chosen) saveAudioPrefs({ ...audioPrefs(), elVoice: chosen.value, elVoiceName: chosen.textContent });
    }
    const st = document.getElementById('elStatus');
    if (st) st.textContent = j.voices.length + ' voices loaded from your account.';
  } catch (e) { elError(e); }
}
async function elTTS(text, signal) {
  const p = audioPrefs();
  if (!p.elKey) throw new Error('No ElevenLabs API key — set it under Audio on the Practice tab.');
  if (!p.elVoice) throw new Error('No ElevenLabs voice selected — hit “Load my voices” under Audio on the Practice tab.');
  const model = p.elModel || 'eleven_flash_v2_5';
  const k = await sha(p.elVoice + '|' + model + '|' + text);
  const hit = await cacheGet(k);
  if (hit) { elSession.cachedChars += text.length; updateElStatus(); return hit; }
  const res = await fetch('https://api.elevenlabs.io/v1/text-to-speech/' + encodeURIComponent(p.elVoice) + '?output_format=mp3_44100_64', {
    method: 'POST', signal,
    headers: { 'xi-api-key': p.elKey, 'Content-Type': 'application/json' },
    body: JSON.stringify({ text, model_id: model }),
  });
  if (!res.ok) {
    let msg = '';
    try { const j = await res.json(); msg = (j.detail && (j.detail.message || j.detail.status)) || ''; } catch {}
    throw new Error('ElevenLabs error ' + res.status + (msg ? ': ' + msg : res.status === 401 ? ' — check your API key' : ''));
  }
  const buf = await res.arrayBuffer();
  elSession.chars += text.length; updateElStatus();
  cachePut(k, buf);
  return buf;
}
function playBuffer(buf) {
  return new Promise(resolve => {
    const url = URL.createObjectURL(new Blob([buf], { type: 'audio/mpeg' }));
    EL.urls.push(url);
    const a = new Audio(url);
    a.playbackRate = audioPrefs().rate || 1;
    EL.audio = a;
    a.onended = a.onerror = () => resolve();
    a.play().catch(() => resolve());
  });
}
function elCleanup() {
  if (EL.abort) { EL.abort.abort(); EL.abort = null; }
  if (EL.audio) { EL.audio.onended = EL.audio.onerror = null; EL.audio.pause(); EL.audio = null; }
  EL.urls.forEach(u => URL.revokeObjectURL(u)); EL.urls = [];
}
async function elSpeak(text, onDone) {
  elCleanup();
  const tok = ++speakToken;
  setListenBtn(true);
  EL.abort = new AbortController();
  try {
    const buf = await elTTS(speakable(text), EL.abort.signal);
    if (tok !== speakToken) return;
    await playBuffer(buf);
  } catch (e) { if (e.name !== 'AbortError') elError(e); }
  if (tok === speakToken) { setListenBtn(false); if (onDone) onDone(); }
}
async function elDocFrom(startIdx) {
  elCleanup();
  if (hasTTS) speechSynthesis.cancel();
  speakToken++;
  const tok = ++docSpeakToken;
  setDocBtn(true);
  EL.abort = new AbortController();
  const texts = docBlocks.map(el => speakable(blockText(el)).trim());
  let pending = null;
  try {
    for (let i = startIdx; i < docBlocks.length; i++) {
      if (tok !== docSpeakToken) return;
      if (!texts[i]) continue;
      const bufP = pending && pending.i === i ? pending.p : elTTS(texts[i], EL.abort.signal);
      let j = i + 1; while (j < texts.length && !texts[j]) j++;
      if (j < texts.length) { const pf = elTTS(texts[j], EL.abort.signal); pf.catch(() => {}); pending = { i: j, p: pf }; }
      else pending = null;
      const buf = await bufP;
      if (tok !== docSpeakToken) return;
      clearReading(); docBlocks[i].classList.add('reading');
      docBlocks[i].scrollIntoView({ block: 'center' });
      await playBuffer(buf);
    }
  } catch (e) { if (e.name !== 'AbortError') elError(e); }
  if (tok === docSpeakToken) { clearReading(); setDocBtn(false); }
}

let speakToken = 0;
function speak(text, onDone) {
  if (engine() === 'el') { if (hasTTS) speechSynthesis.cancel(); elSpeak(text, onDone); return; }
  if (!hasTTS) return;
  elCleanup();
  speechSynthesis.cancel();
  const myToken = ++speakToken;
  const rate = audioPrefs().rate || 1;
  const voice = pickVoice();
  const parts = chunk(speakable(text));
  setListenBtn(true);
  let remaining = parts.length;
  if (!remaining) { setListenBtn(false); if (onDone) onDone(); return; }
  for (const p of parts) {
    const u = new SpeechSynthesisUtterance(p);
    u.rate = rate; if (voice) u.voice = voice;
    u.onend = u.onerror = () => {
      if (--remaining === 0 && myToken === speakToken) { setListenBtn(false); if (onDone) onDone(); }
    };
    speechSynthesis.speak(u);
  }
}
function stopSpeak() {
  speakToken++; docSpeakToken++;
  if (hasTTS) speechSynthesis.cancel();
  elCleanup();
  setListenBtn(false); setDocBtn(false); clearReading();
}
function setListenBtn(on) {
  const b = document.getElementById('listenBtn');
  if (b) { b.classList.toggle('speaking', on); b.textContent = on ? '⏹ Stop' : '🔊 Listen'; }
}

function questionSpeech(q, includeScenario) {
  let t = includeScenario ? 'Scenario: ' + SCENARIOS[q.id.split('-')[0]] + '. ' : '';
  t += q.stem + ' ';
  S.current.order.forEach((oi, pos) => { t += 'Option ' + 'ABCD'[pos] + '. ' + q.options[oi] + ' '; });
  return t;
}
function verdictSpeech(a) {
  let t = a.ok ? 'Correct. ' : 'Incorrect. The correct answer is ' + 'ABCD'[a.order.indexOf(a.q.correct)] + '. ';
  t += a.q.explanation + ' ';
  if (a.q.rule) t += 'The rule this drills: ' + a.q.rule;
  return t;
}
function speakCurrent() {
  if (!S.current) return;
  const btn = document.getElementById('listenBtn');
  if (btn && btn.classList.contains('speaking')) { stopSpeak(); return; }
  if (S.current.picked == null) speak(questionSpeech(S.current.q, true));
  else speak(verdictSpeech(S.answers[S.answers.length - 1]));
}

/* ---------- doc read-along ---------- */
let docBlocks = [], docSpeakToken = 0;
function clearReading() { document.querySelectorAll('.reading').forEach(el => el.classList.remove('reading')); }
function setDocBtn(on) {
  const b = document.getElementById('docListenBtn');
  if (b) { b.classList.toggle('speaking', on); b.textContent = on ? '⏹ Stop' : '▶ Listen to this doc'; }
}
function collectBlocks() {
  docBlocks = [...document.querySelectorAll('article.doc h1, article.doc h2, article.doc h3, article.doc h4, article.doc p, article.doc li, article.doc tr, article.doc pre')]
    .filter(el => !(el.tagName === 'P' && el.parentElement.tagName === 'LI'));
}
function blockText(el) {
  if (el.tagName === 'PRE') return 'Code example, shown on screen.';
  if (el.tagName === 'TR') return [...el.children].map(c => c.textContent.trim()).filter(Boolean).join('. ');
  if (el.tagName === 'LI') { const c = el.cloneNode(true); c.querySelectorAll('ul,ol').forEach(u => u.remove()); return c.textContent; }
  if (/^H\d$/.test(el.tagName)) return 'Section. ' + el.textContent + '.';
  return el.textContent;
}
function speakDocFrom(startIdx) {
  if (engine() === 'el') { clearReading(); elDocFrom(startIdx); return; }
  if (!hasTTS) return;
  elCleanup();
  speakToken++; speechSynthesis.cancel(); clearReading();
  const tok = ++docSpeakToken;
  const rate = audioPrefs().rate || 1;
  const voice = pickVoice();
  setDocBtn(true);
  const step = idx => {
    if (tok !== docSpeakToken) return;
    if (idx >= docBlocks.length) { clearReading(); setDocBtn(false); return; }
    const el = docBlocks[idx];
    clearReading(); el.classList.add('reading');
    el.scrollIntoView({ block: 'center' });
    const parts = chunk(speakable(blockText(el)));
    if (!parts.length) { step(idx + 1); return; }
    let rem = parts.length;
    for (const p of parts) {
      const u = new SpeechSynthesisUtterance(p);
      u.rate = rate; if (voice) u.voice = voice;
      u.onend = u.onerror = () => { if (--rem === 0 && tok === docSpeakToken) step(idx + 1); };
      speechSynthesis.speak(u);
    }
  };
  step(startIdx);
}

function startDrill() {
  const scens = [...document.querySelectorAll('#scenChips input:checked')].map(i => i.dataset.scen);
  const doms = [...document.querySelectorAll('#domChips input:checked')].map(i => +i.dataset.dom);
  const count = +$('#countSel').value;
  const missOnly = $('#missOnly').checked;
  const missSet = new Set(missedIds());
  let pool = BANK.questions.filter(q => scens.includes(q.id.split('-')[0]) && doms.includes(q.domain));
  if (missOnly) pool = pool.filter(q => missSet.has(q.id));
  if (!pool.length) { alert('No questions match those filters.'); return; }
  begin({ mode: 'drill', queue: shuffle(pool).slice(0, count) });
}

function startExam() {
  const scens = shuffle(Object.keys(SCENARIOS)).slice(0, 4);
  const queue = scens.flatMap(s => BANK.questions.filter(q => q.id.startsWith(s + '-')));
  begin({ mode: 'exam', queue, deadline: Date.now() + queue.length * 2 * 60 * 1000 });
}

function begin(cfg) {
  S = { ...cfg, idx: 0, answers: [], done: false };
  homeBtn.hidden = false;
  if (S.mode === 'exam') {
    timerId = setInterval(() => {
      const el = $('#timer'); if (!el) return;
      const left = S.deadline - Date.now();
      if (left <= 0) { stopTimer(); finish(); return; }
      const m = Math.floor(left / 60000), s = Math.floor(left % 60000 / 1000);
      el.textContent = m + ':' + String(s).padStart(2, '0');
      el.classList.toggle('low', left < 10 * 60 * 1000);
    }, 500);
  }
  renderQ();
}

/* ---------- question ---------- */
function renderQ() {
  const q = S.queue[S.idx];
  const scen = q.id.split('-')[0];
  const newScen = S.idx === 0 || S.queue[S.idx - 1].id.split('-')[0] !== scen;
  const order = shuffle([0, 1, 2, 3]);
  S.current = { q, order, picked: null };

  app.innerHTML = `
    <div class="qhead">
      <span class="eyebrow"><b>${SCENARIOS[scen]}</b> · D${q.domain} ${DOMAINS[q.domain].name}${q.difficulty === 'stretch' ? ' · stretch' : ''}</span>
      <span class="prog">${hasTTS ? '<button class="ghost small" id="listenBtn">🔊 Listen</button>' : ''}${S.idx + 1} / ${S.queue.length}${S.mode === 'exam' ? ' <span class="timer" id="timer">—</span>' : ''}</span>
    </div>
    ${newScen && S.mode === 'exam' ? `<p class="scen-banner">Scenario: ${SCENARIOS[scen]}</p>` : ''}
    <div class="card qcard">
      <div class="stem">${fmt(q.stem)}</div>
      <div class="opts" id="opts">
        ${order.map((oi, pos) => `
          <button class="opt" data-pos="${pos}">
            <span class="key">${'ABCD'[pos]}</span>
            <span>${fmt(q.options[oi])}</span>
          </button>`).join('')}
      </div>
      <div id="verdict"></div>
      <div class="qfoot">
        <span class="hint">Keys: A–D or 1–4${hasTTS ? ' · R reads aloud' : ''}${S.mode === 'drill' ? ' · Enter for next' : ''}</span>
        <span id="nextSlot"></span>
      </div>
    </div>
  `;
  document.querySelectorAll('.opt').forEach(b => b.addEventListener('click', () => pick(+b.dataset.pos)));
  const lb = document.getElementById('listenBtn');
  if (lb) lb.addEventListener('click', speakCurrent);
  window.scrollTo(0, 0);
  if (hasTTS && audioPrefs().auto) speak(questionSpeech(q, newScen));
}

function pick(pos) {
  if (S.current.picked != null) return;
  stopSpeak();
  const { q, order } = S.current;
  S.current.picked = pos;
  const ok = order[pos] === q.correct;
  S.answers.push({ q, order, pos, ok });
  recordAnswer(q.id, ok);

  if (S.mode === 'exam') { next(); return; }

  const correctPos = order.indexOf(q.correct);
  document.querySelectorAll('.opt').forEach((b, i) => {
    b.disabled = true;
    if (i === correctPos) b.classList.add('right');
    else if (i === pos) b.classList.add('wrong');
    else b.classList.add('dim');
  });
  $('#verdict').innerHTML = `
    <div class="verdict ${ok ? 'ok' : 'no'}">
      <h3>${ok ? 'Correct' : 'Incorrect — the answer is ' + 'ABCD'[correctPos]}</h3>
      <div class="ex">${fmt(q.explanation)}</div>
      ${q.rule ? `<div class="rule"><b>The rule this drills</b>${fmt(q.rule)}</div>` : ''}
    </div>`;
  $('#nextSlot').innerHTML = `<button class="primary" id="nextBtn">${S.idx + 1 < S.queue.length ? 'Next question' : 'See results'}</button>`;
  $('#nextBtn').addEventListener('click', next);
  $('#nextBtn').focus();
  if (hasTTS && audioPrefs().auto) speak(verdictSpeech(S.answers[S.answers.length - 1]));
}

function next() {
  stopSpeak();
  if (S.idx + 1 < S.queue.length) { S.idx++; renderQ(); }
  else finish();
}

document.addEventListener('keydown', e => {
  if (e.target.matches('input, select, textarea')) return;
  const k = e.key.toUpperCase();
  if (k === 'R' && hasTTS) {
    if (S.current && !S.done) { e.preventDefault(); speakCurrent(); return; }
    if (currentDoc) { e.preventDefault(); speakDocFrom(0); return; }
  }
  if (!S.mode || S.done || !S.current) return;
  const map = { A: 0, B: 1, C: 2, D: 3, 1: 0, 2: 1, 3: 2, 4: 3 };
  if (k in map && S.current.picked == null) { e.preventDefault(); pick(map[k]); }
  else if (e.key === 'Enter' && S.mode === 'drill' && S.current.picked != null) {
    const btn = $('#nextBtn'); if (btn && document.activeElement !== btn) { e.preventDefault(); next(); }
  }
});

/* ---------- results ---------- */
function finish() {
  stopTimer(); stopSpeak(); S.done = true; homeBtn.hidden = true;
  const total = S.answers.length;
  const right = S.answers.filter(a => a.ok).length;
  const pct = total ? Math.round(100 * right / total) : 0;
  const pass = pct >= PASS_PCT;
  if (S.mode === 'exam' && total === S.queue.length) recordExam(pct);

  const byDom = {}, byScen = {};
  for (const a of S.answers) {
    const d = byDom[a.q.domain] = byDom[a.q.domain] || { r: 0, t: 0 };
    d.t++; if (a.ok) d.r++;
    const s = byScen[a.q.id.split('-')[0]] = byScen[a.q.id.split('-')[0]] || { r: 0, t: 0 };
    s.t++; if (a.ok) s.r++;
  }
  const misses = S.answers.filter(a => !a.ok);

  app.innerHTML = `
    <div class="card score-hero">
      <div class="eyebrow">${S.mode === 'exam' ? 'Exam simulation' : 'Drill'} complete</div>
      <div class="big">${pct}<small>%</small></div>
      <div>${right} of ${total} correct</div>
      <span class="badge ${pass ? 'pass' : 'fail'}">${pass ? 'On pass pace' : 'Below pass line'}</span>
      <div class="passnote">Real exam passes at 720/1000 scaled — roughly ${PASS_PCT}% is the working target.</div>
    </div>

    <div class="section-label">By domain</div>
    <div class="card bars">
      ${Object.keys(byDom).sort().map(d => bar('D' + d + ' · ' + DOMAINS[d].name, byDom[d])).join('')}
    </div>

    ${Object.keys(byScen).length > 1 ? `
    <div class="section-label">By scenario</div>
    <div class="card bars">
      ${Object.keys(byScen).sort().map(s => bar(SCENARIOS[s], byScen[s])).join('')}
    </div>` : ''}

    ${misses.length ? `
    <div class="section-label">Review your ${misses.length} miss${misses.length > 1 ? 'es' : ''}</div>
    ${misses.map(a => {
      const corrPos = a.order.indexOf(a.q.correct);
      return `<details class="miss">
        <summary>${fmt(a.q.stem)}</summary>
        <div class="body">
          <p class="yourpick"><b>Your answer:</b> ${fmt(a.q.options[a.order[a.pos]])}</p>
          <p class="rightpick"><b>Correct (${'ABCD'[corrPos]}):</b> ${fmt(a.q.options[a.q.correct])}</p>
          <p>${fmt(a.q.explanation)}</p>
          ${a.q.rule ? `<div class="rule"><b>The rule</b>${fmt(a.q.rule)}</div>` : ''}
          <p class="hint">${SCENARIOS[a.q.id.split('-')[0]]} · D${a.q.domain} ${DOMAINS[a.q.domain].name}</p>
        </div>
      </details>`;
    }).join('')}` : `<p class="sub" style="margin-top:20px">Clean sheet. Go take the real practice test.</p>`}

    <div class="actions">
      <button class="primary" id="againBtn">${S.mode === 'exam' ? 'New exam sim' : 'Drill again'}</button>
      ${misses.length ? '<button class="ghost" id="missBtn">Drill these misses now</button>' : ''}
      <button class="ghost" id="backBtn">Practice home</button>
    </div>
  `;
  $('#againBtn').addEventListener('click', () => S.mode === 'exam' ? startExam() : begin({ mode: 'drill', queue: shuffle(S.queue) }));
  $('#backBtn').addEventListener('click', home);
  const mb = $('#missBtn');
  if (mb) mb.addEventListener('click', () => begin({ mode: 'drill', queue: shuffle(misses.map(a => a.q)) }));
  window.scrollTo(0, 0);
}

function bar(label, e) {
  const p = Math.round(100 * e.r / e.t);
  return `<div class="bar-row">
    <span>${label}</span>
    <span class="track"><span class="fill ${p < PASS_PCT ? 'lowacc' : ''}" style="width:${p}%"></span></span>
    <span class="num">${e.r}/${e.t} · ${p}%</span>
  </div>`;
}

showStudy();
</script>

</body>
</html>
