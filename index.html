ode>{\"type\": \"tool\", \"name\": \"...\"}<\/code><\/td>\n<td>Deterministic, not prompt-hoped<\/td>\n<td><code>\"auto\"<\/code> \u2014 model may just answer in text<\/td>\n<\/tr>\n<tr>\n<td>Tool failure handling<\/td>\n<td><code>isError<\/code> + <code>errorCategory<\/code> (transient/validation/permission/business) + <code>isRetryable<\/code> + readable message<\/td>\n<td>Agent can decide: retry, rephrase, escalate<\/td>\n<td>Generic \"Operation failed\" \u2014 blocks recovery decisions<\/td>\n<\/tr>\n<tr>\n<td>Query succeeded, zero matches<\/td>\n<td>Return as <strong>valid empty result<\/strong><\/td>\n<td>Distinct from access failure; prevents wasted retries<\/td>\n<td>Marking empties as errors, or errors as empty successes<\/td>\n<\/tr>\n<tr>\n<td>Team-shared vs personal MCP server<\/td>\n<td><code>.mcp.json<\/code> (project, committed) vs <code>~/.claude.json<\/code> (user)<\/td>\n<td>Version control distributes team config<\/td>\n<td>Putting shared servers in user config; hardcoding tokens instead of <code>${VAR}<\/code><\/td>\n<\/tr>\n<tr>\n<td>Agent won't use the capable MCP tool, sticks to built-in Grep<\/td>\n<td>Enrich the MCP tool's description (capabilities + outputs)<\/td>\n<td>Selection follows description quality<\/td>\n<td>Removing built-in tools; forcing via system prompt<\/td>\n<\/tr>\n<tr>\n<td>Agent wastes calls discovering what data exists<\/td>\n<td>Expose a catalog as an <strong>MCP resource<\/strong><\/td>\n<td>Resources = consultable content; tools = actions<\/td>\n<td>Building a <code>list_everything<\/code> tool<\/td>\n<\/tr>\n<tr>\n<td>Need a standard Jira/GitHub integration<\/td>\n<td>Existing community MCP server<\/td>\n<td>Custom is for team-specific workflows only<\/td>\n<td>Building custom for standard integrations<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3>D3 \u2014 Claude Code Configuration &amp; Workflows<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Standard/command must reach every teammate<\/td>\n<td>Project scope: root <code>CLAUDE.md<\/code> / <code>.claude/commands/<\/code><\/td>\n<td>Version control distributes it<\/td>\n<td><code>~/.claude/...<\/code> \u2014 user-level, never shared via git<\/td>\n<\/tr>\n<tr>\n<td>New teammate doesn't get instructions others get<\/td>\n<td>Check config hierarchy \u2014 it's sitting in someone's user-level file; verify with <code>/memory<\/code><\/td>\n<td>User scope applies to that user only<\/td>\n<td>Blaming the model or re-prompting<\/td>\n<\/tr>\n<tr>\n<td>Conventions for file <em>types<\/em> scattered across directories (tests everywhere)<\/td>\n<td><code>.claude/rules/<\/code> file with YAML frontmatter <code>paths: [\"**/*.test.tsx\"]<\/code><\/td>\n<td>Glob matching is location-independent and deterministic<\/td>\n<td>Per-directory CLAUDE.md (directory-bound); one big CLAUDE.md (relies on inference); skills (need invocation)<\/td>\n<\/tr>\n<tr>\n<td>CLAUDE.md turning monolithic<\/td>\n<td>Split into <code>.claude/rules/<\/code> topic files; <code>@import<\/code> shared standards per package<\/td>\n<td>Modular, loads what's relevant<\/td>\n<td>One giant file with headers<\/td>\n<\/tr>\n<tr>\n<td>Skill produces verbose/exploratory output<\/td>\n<td><code>context: fork<\/code> in SKILL.md frontmatter<\/td>\n<td>Isolated sub-agent context; no pollution of main session<\/td>\n<td>Running in main context and <code>/compact<\/code>-ing after<\/td>\n<\/tr>\n<tr>\n<td>Skill shouldn't be able to do damage<\/td>\n<td><code>allowed-tools<\/code> frontmatter restriction<\/td>\n<td>Deterministic tool scoping during skill execution<\/td>\n<td>Prompt-level \"please don't\"<\/td>\n<\/tr>\n<tr>\n<td>Devs invoke skill without required params<\/td>\n<td><code>argument-hint<\/code> frontmatter<\/td>\n<td>Prompts for the parameter<\/td>\n<td>Failing silently<\/td>\n<\/tr>\n<tr>\n<td>Architectural, multi-file, multiple-valid-approaches task<\/td>\n<td>Plan mode first<\/td>\n<td>Safe exploration before committing; prevents rework<\/td>\n<td>\"Start direct, escalate to plan if needed\" when complexity is already known<\/td>\n<\/tr>\n<tr>\n<td>Simple scoped fix<\/td>\n<td>Direct execution<\/td>\n<td>Plan mode is overhead here<\/td>\n<td>Plan mode for everything<\/td>\n<\/tr>\n<tr>\n<td>Discovery output flooding a multi-phase task<\/td>\n<td>Explore subagent<\/td>\n<td>Verbose output isolated, summary returned<\/td>\n<td>Reading everything in the main session<\/td>\n<\/tr>\n<tr>\n<td>Run in CI/automation<\/td>\n<td><code>claude -p \"...\"<\/code> (+ <code>--output-format json --json-schema<\/code> for structured findings)<\/td>\n<td><code>-p<\/code>/<code>--print<\/code> is the real non-interactive flag<\/td>\n<td><code>--batch<\/code> and <code>CLAUDE_HEADLESS=true<\/code> <strong>do not exist<\/strong>; <code>&lt; /dev/null<\/code> is a wrong workaround<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3>D1 \u2014 Agentic Architecture &amp; Orchestration<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>When does the loop stop?<\/td>\n<td><code>stop_reason == \"end_turn\"<\/code>; continue on <code>\"tool_use\"<\/code><\/td>\n<td>Model-driven termination is the contract<\/td>\n<td>Text parsing, iteration caps as primary stop, \"assistant produced text = done\"<\/td>\n<\/tr>\n<tr>\n<td>Model needs tool output to plan next step<\/td>\n<td>Append <code>tool_result<\/code> to history, resend full conversation<\/td>\n<td>That's how new info enters reasoning<\/td>\n<td>Fresh request per step (amnesia)<\/td>\n<\/tr>\n<tr>\n<td>Coordinator must spawn subagents<\/td>\n<td><code>allowedTools<\/code> includes <code>\"Task\"<\/code><\/td>\n<td>Task tool is <em>the<\/em> spawning mechanism<\/td>\n<td>Assuming spawning is ambient<\/td>\n<\/tr>\n<tr>\n<td>Subagent needs prior findings<\/td>\n<td>Paste complete findings into its prompt; structured format separating content from metadata (URLs, doc names) for attribution<\/td>\n<td>No automatic context inheritance, no shared memory<\/td>\n<td>Assuming it \"sees\" the parent conversation<\/td>\n<\/tr>\n<tr>\n<td>Independent subtasks<\/td>\n<td>Multiple Task calls in <strong>one<\/strong> coordinator response<\/td>\n<td>That's what runs them in parallel<\/td>\n<td>One Task call per turn (serialized)<\/td>\n<\/tr>\n<tr>\n<td>Predictable multi-aspect review vs open-ended investigation<\/td>\n<td>Prompt chaining (fixed sequence: per-file passes + cross-file integration pass) vs dynamic decomposition (map structure \u2192 high-impact areas \u2192 adaptive prioritized plan)<\/td>\n<td>Match decomposition to workflow shape<\/td>\n<td>One-size-fits-all pipelines<\/td>\n<\/tr>\n<tr>\n<td>\"Add comprehensive tests to a legacy codebase\"<\/td>\n<td>Dynamic: map structure first, identify high-impact areas, plan adapts as dependencies surface<\/td>\n<td>Open-ended tasks can't be pre-sequenced<\/td>\n<td>Fixed pipeline defined upfront<\/td>\n<\/tr>\n<tr>\n<td>Rule must ALWAYS hold (destructive ops, ordering prerequisites)<\/td>\n<td>Programmatic hook / prerequisite gate<\/td>\n<td>Deterministic; prompts have non-zero failure rate<\/td>\n<td>\"Strengthen the system prompt\", few-shot compliance<\/td>\n<\/tr>\n<tr>\n<td>Heterogeneous formats from multiple MCP servers<\/td>\n<td>PostToolUse hook normalizes before the model sees results<\/td>\n<td>Deterministic normalization beats prompt gymnastics<\/td>\n<td>Prompting the model to mentally convert every time<\/td>\n<\/tr>\n<tr>\n<td>Resume vs fresh vs fork<\/td>\n<td>Resume when context valid (+ tell it what files changed); fresh + injected summary when stale; <code>fork_session<\/code> for divergent exploration from a shared baseline<\/td>\n<td>Stale tool results mislead resumed sessions<\/td>\n<td>Always resuming; full re-exploration after small changes<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>4. Failure-modes drill<\/h2>\n<p>Eight production symptoms, exam-style. Cover the fix column and self-test.<\/p>\n<table>\n<thead>\n<tr>\n<th>#<\/th>\n<th>Production symptom<\/th>\n<th>Root cause<\/th>\n<th>Fix<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>1<\/td>\n<td>CI job invoking <code>claude \"review this PR\"<\/code> hangs forever; logs show it waiting for interactive input<\/td>\n<td>Claude Code launched in interactive mode<\/td>\n<td><code>claude -p \"review this PR\"<\/code>. The distractors \u2014 <code>--batch<\/code>, <code>CLAUDE_HEADLESS=true<\/code> \u2014 are <strong>fake features<\/strong>; <code>&lt; /dev/null<\/code> doesn't address the command syntax<\/td>\n<\/tr>\n<tr>\n<td>2<\/td>\n<td>You shipped a powerful MCP code-intelligence server but the agent keeps using built-in Grep for everything<\/td>\n<td>The MCP tools' descriptions are minimal; the model can't see why they're better<\/td>\n<td>Enhance the MCP tool descriptions to explain capabilities and outputs in detail \u2014 description quality drives selection<\/td>\n<\/tr>\n<tr>\n<td>3<\/td>\n<td>Agent repeatedly fails to modify a legacy file with Edit; loop churns on the same edit<\/td>\n<td>Edit needs a <strong>unique<\/strong> text anchor; the target snippet appears multiple times<\/td>\n<td>Fall back to <strong>Read the full file, then Write<\/strong> the modified version<\/td>\n<\/tr>\n<tr>\n<td>4<\/td>\n<td>New hire clones the repo; Claude Code ignores the team's testing standards that work on your machine<\/td>\n<td>Standards live in <em>your<\/em> <code>~/.claude/CLAUDE.md<\/code> (user scope) \u2014 never distributed via version control<\/td>\n<td>Move them to project scope (root <code>CLAUDE.md<\/code> / <code>.claude/rules/<\/code>); diagnose with <code>/memory<\/code> to see what's actually loaded<\/td>\n<\/tr>\n<tr>\n<td>5<\/td>\n<td>Three hours into a codebase exploration, the agent gives inconsistent answers and cites \"typical patterns\" instead of the specific classes it found earlier<\/td>\n<td>Context degradation in the extended session<\/td>\n<td>Scratchpad files persisting key findings + delegate verbose exploration to subagents + summarize each phase before the next + <code>/compact<\/code> when discovery output fills the window<\/td>\n<\/tr>\n<tr>\n<td>6<\/td>\n<td>Coordinator's plan says \"delegating to the test-mapping subagent\" but no subagent ever runs<\/td>\n<td>Coordinator's <code>allowedTools<\/code> doesn't include <code>\"Task\"<\/code> \u2014 the spawning mechanism is unavailable<\/td>\n<td>Add <code>\"Task\"<\/code> to the coordinator's <code>allowedTools<\/code><\/td>\n<\/tr>\n<tr>\n<td>7<\/td>\n<td>You <code>--resume<\/code> yesterday's investigation after a teammate refactored two modules; the agent confidently reasons from function signatures that no longer exist<\/td>\n<td>Resumed session carries stale tool results from before the refactor<\/td>\n<td>Tell the resumed session exactly which files changed for targeted re-analysis \u2014 or, if staleness is broad, start a fresh session with a structured summary injected<\/td>\n<\/tr>\n<tr>\n<td>8<\/td>\n<td>Synthesis-style subagent with access to the full search tool set starts issuing its own web searches mid-task, off-spec and slow<\/td>\n<td>Tools outside an agent's specialization get misused; over-broad tool grants<\/td>\n<td>Restrict each subagent to its 4\u20135 role-relevant tools; for the frequent simple case, add one <strong>scoped<\/strong> cross-role tool (<code>verify_fact<\/code>), routing complex cases back through the coordinator<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>Bonus tell for question-writing patterns: when a symptom is \"agent skips a required step sometimes,\" the answer is <strong>never<\/strong> a stronger prompt \u2014 it's a programmatic gate or hook. When a symptom is \"wrong tool chosen,\" the answer is almost always <strong>fix the descriptions first<\/strong>.<\/p>\n<hr />\n<h2>Cram card (last 5 minutes before the exam)<\/h2>\n<ul>\n<li>Loop: continue on <code>stop_reason==\"tool_use\"<\/code>, stop on <code>\"end_turn\"<\/code>. Never parse text, never cap iterations as the primary stop.<\/li>\n<li>Grep = contents. Glob = paths. Edit needs unique anchor; non-unique \u2192 Read+Write.<\/li>\n<li>Explore = Grep entry points \u2192 Read to follow imports. Never read everything upfront.<\/li>\n<li>Descriptions drive tool selection. Fix descriptions before few-shot, routers, or consolidation.<\/li>\n<li>4\u20135 tools per agent. <code>\"Task\"<\/code> in <code>allowedTools<\/code> to spawn. Subagents inherit nothing \u2014 context goes in the prompt. Parallel = multiple Task calls in one response.<\/li>\n<li>Hooks = deterministic guarantees. Prompts = probabilistic judgment. PostToolUse = normalize results before the model sees them.<\/li>\n<li><code>.mcp.json<\/code> = project/shared, <code>${ENV_VAR}<\/code> for secrets. <code>~/.claude.json<\/code> = personal. Resources = catalogs, tools = actions. Community server &gt; custom for standard integrations.<\/li>\n<li>Project <code>CLAUDE.md<\/code> / <code>.claude/commands/<\/code> = shared via git. <code>~/.claude/...<\/code> = yours alone. <code>/memory<\/code> to debug. <code>.claude/rules/<\/code> + <code>paths:<\/code> globs for scattered file types.<\/li>\n<li>SKILL.md frontmatter: <code>context: fork<\/code> (isolation), <code>allowed-tools<\/code> (restriction), <code>argument-hint<\/code> (params).<\/li>\n<li>Plan mode = architectural/multi-file/multiple approaches. Direct = scoped single fix. Explore subagent = verbose discovery.<\/li>\n<li><code>-p<\/code> is real. <code>--batch<\/code> and <code>CLAUDE_HEADLESS<\/code> are fake.<\/li>\n<li>Resume when valid (+ declare changed files); fresh + summary when stale; <code>fork_session<\/code> to compare approaches from a shared baseline.<\/li>\n<\/ul>","words":3501},"05-claude-code-ci":{"title":"Scenario 5 \u2014 Claude Code for Continuous Integration","group":"Scenario walkthroughs","html":"<h1>Scenario 5 \u2014 Claude Code for Continuous Integration<\/h1>\n<blockquote>\n<p><strong>Exam framing (verbatim intent):<\/strong> You are integrating Claude Code into your CI/CD pipeline. The system runs automated code reviews, generates test cases, and provides feedback on pull requests. You must design prompts that provide actionable feedback and minimize false positives.<\/p>\n<p><strong>Primary domains:<\/strong> D3 Claude Code Configuration &amp; Workflows (20%), D4 Prompt Engineering &amp; Structured Output (20%). Three of the guide's 12 sample questions (Q10\u2013Q12) come from this exact scenario \u2014 this is high-yield territory.<\/p>\n<\/blockquote>\n<hr />\n<h2>1. The system at a glance<\/h2>\n<p>Two lanes, and the exam loves testing whether you know which workload goes in which lane:<\/p>\n<ul>\n<li><strong>Sync lane (blocking):<\/strong> PR opens \u2192 CI runner checks out the repo \u2192 runs <code>claude -p<\/code> headless \u2192 Claude Code reads the repo's committed config (CLAUDE.md, <code>.claude/rules/<\/code>, <code>.claude/commands/<\/code>, <code>.mcp.json<\/code>) \u2192 emits schema-enforced JSON findings \u2192 a small script posts them as inline PR comments. Developers are waiting, so this must be a synchronous real-time call.<\/li>\n<li><strong>Batch lane (latency-tolerant):<\/strong> Nightly test generation and weekly tech-debt reports go through the <strong>Message Batches API<\/strong> \u2014 50% cheaper, up to 24-hour processing window, no latency SLA. Never put anything blocking in this lane.<\/li>\n<\/ul>\n<pre><code>                    PR opened / updated\n                           \u2502\n                           \u25bc\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 CI runner (sync lane) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502 git checkout \u2500\u2500 repo carries the config Claude Code reads:      \u2502\n\u2502    CLAUDE.md            review criteria, test standards,        \u2502\n\u2502    .claude/rules/        fixtures (path-scoped via globs)       \u2502\n\u2502    .claude/commands/    /review-pr prompt (team-shared)         \u2502\n\u2502    .mcp.json            MCP servers, ${GITHUB_TOKEN} expansion  \u2502\n\u2502                                                                 \u2502\n\u2502 claude -p &quot;/review-pr&quot; --output-format json \\                   \u2502\n\u2502        --json-schema .claude/schemas/findings.json              \u2502\n\u2502              \u2502                                                  \u2502\n\u2502              \u25bc                                                  \u2502\n\u2502 findings.json \u2500\u2500\u25ba post_comments.py \u2500\u2500\u25ba inline PR comments       \u2502\n\u2502      \u25b2                                                          \u2502\n\u2502      \u2514\u2500\u2500 prior-run findings fed back in on re-review (dedup)    \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 overnight (batch lane) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502 Message Batches API: nightly test generation, weekly audits     \u2502\n\u2502 50% cost \u00b7 \u226424 h window \u00b7 no SLA \u00b7 custom_id correlation        \u2502\n\u2502 NO multi-turn tool calling inside a batch request               \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n<\/code><\/pre>\n<p>Key architectural principle baked in from the start: the <strong>review instance is independent from any instance that generated the code<\/strong>. A session that wrote the code retains its generation reasoning and won't question its own decisions. CI reviews always run fresh.<\/p>\n<hr />\n<h2>2. Build it step by step<\/h2>\n<h3>Step 1 \u2014 Prove the headless invocation<\/h3>\n<p>Everything else is useless if the CI job hangs. Claude Code is interactive by default; in a pipeline you run it with <strong><code>-p<\/code> (or <code>--print<\/code>)<\/strong> \u2014 non-interactive mode: process the prompt, print to stdout, exit.<\/p>\n<pre><code class=\"language-bash\">claude -p &quot;Review the diff between main and HEAD for security issues&quot;\n<\/code><\/pre>\n<p>Burn this in: <code>-p<\/code>/<code>--print<\/code> is the <strong>only<\/strong> documented mechanism. <code>CLAUDE_HEADLESS=true<\/code> and <code>--batch<\/code> <strong>do not exist<\/strong> \u2014 they are distractors on the real exam (sample Q10). Redirecting stdin from <code>/dev/null<\/code> is a Unix hack that doesn't address Claude Code's syntax either.<\/p>\n<h3>Step 2 \u2014 Put project context where CI can see it<\/h3>\n<p>CI runners clone the repo. Anything in your personal <code>~/.claude/CLAUDE.md<\/code> (user-level) never reaches the runner \u2014 or your teammates. So all review criteria, testing standards, and fixture documentation go in <strong>project-level, version-controlled<\/strong> config:<\/p>\n<pre><code>repo/\n\u251c\u2500\u2500 CLAUDE.md                      # universal: review criteria, test standards\n\u251c\u2500\u2500 .claude/\n\u2502   \u251c\u2500\u2500 rules/\n\u2502   \u2502   \u251c\u2500\u2500 testing.md             # path-scoped: loads only for test files\n\u2502   \u2502   \u2514\u2500\u2500 api-conventions.md     # path-scoped: loads only under src/api/\n\u2502   \u251c\u2500\u2500 commands/\n\u2502   \u2502   \u2514\u2500\u2500 review-pr.md           # team-shared slash command\n\u2502   \u2514\u2500\u2500 schemas/\n\u2502       \u2514\u2500\u2500 findings.json          # JSON schema for --json-schema\n\u251c\u2500\u2500 .mcp.json                      # project-scoped MCP servers\n\u2514\u2500\u2500 scripts/\n    \u2514\u2500\u2500 post_comments.py\n<\/code><\/pre>\n<p><strong>CLAUDE.md<\/strong> (root, project-level \u2014 loaded on every invocation):<\/p>\n<pre><code class=\"language-markdown\"># Code Review Standards\n- Report: logic bugs, security vulnerabilities, data-loss risks.\n- Skip: style preferences, patterns consistent with the local codebase.\n\n# Testing Standards\n- A valuable test covers a distinct behavior or branch, not a restated implementation.\n- Fixtures live in tests/fixtures/ \u2014 factory_user(), factory_order(). Use them;\n  do not construct raw model objects in tests.\n- Existing suites: tests/unit/, tests/integration/. Check before proposing new cases.\n<\/code><\/pre>\n<p>This is D3.6 verbatim: <em>CLAUDE.md is the mechanism for providing project context (testing standards, fixture conventions, review criteria) to CI-invoked Claude Code.<\/em> Documenting valuable-test criteria and available fixtures here is what \"improves test generation quality and reduces low-value test output.\"<\/p>\n<p><strong>Path-scoped rules<\/strong> \u2014 <code>.claude/rules/testing.md<\/code> with YAML frontmatter glob patterns. Rules load only when Claude edits matching files, saving tokens and keeping context relevant. Globs beat per-directory CLAUDE.md files when the convention applies to files <em>spread across<\/em> the codebase (e.g., <code>Button.test.tsx<\/code> next to <code>Button.tsx<\/code> everywhere):<\/p>\n<pre><code class=\"language-markdown\">---\npaths: [&quot;**/*.test.*&quot;, &quot;tests/**/*&quot;]\n---\n- Use pytest parametrize for input matrices; no copy-pasted test bodies.\n- Every test asserts on behavior, never on log output.\n<\/code><\/pre>\n<p>Sanity-check what actually loads with the <strong><code>/memory<\/code><\/strong> command \u2014 that's the diagnostic tool the guide names for \"instructions applied on my machine but not in CI / for the new teammate.\"<\/p>\n<h3>Step 3 \u2014 Write the review prompt as a shared slash command<\/h3>\n<p>Project-scoped commands live in <strong><code>.claude/commands/<\/code><\/strong> (version-controlled, every developer and every CI run gets them on clone/pull). <code>~/.claude/commands/<\/code> is personal-only \u2014 wrong answer for anything \"the whole team should have.\"<\/p>\n<p><code>.claude/commands/review-pr.md<\/code> \u2014 and this file is where D4.1 and D4.2 live or die:<\/p>\n<pre><code class=\"language-markdown\">Review the diff between origin/main and HEAD.\n\nREPORT only these categories:\n- Bugs: code that produces incorrect results, unhandled failure paths, race conditions.\n- Security: injection, authn/authz gaps, secrets in code, unsafe deserialization.\n- Comment contradictions: flag a comment ONLY when its claimed behavior\n  contradicts what the code actually does.\n\nSKIP entirely:\n- Style and formatting preferences.\n- Patterns consistent with surrounding code in this repo.\n- Speculative performance concerns without a concrete hot path.\n\nSeverity \u2014 classify using these anchors:\n- critical: exploitable security flaw or guaranteed data corruption.\n  e.g. `query = f&quot;SELECT * FROM users WHERE id = {user_input}&quot;`\n- major: wrong behavior on realistic inputs.\n  e.g. `if discount &gt; 100:` where percent discounts are stored as 0\u20131 floats\n- minor: correct today, fragile tomorrow (dead branch, misleading name).\n\nExamples of correct judgment:\n\n&lt;example&gt;\nCode: `except Exception: pass` inside a metrics-emit helper\nVerdict: SKIP \u2014 swallowing errors in fire-and-forget telemetry matches this\nrepo's established pattern (see CLAUDE.md); not a genuine issue.\n&lt;/example&gt;\n\n&lt;example&gt;\nCode: `except Exception: pass` wrapping a payment capture call\nVerdict: REPORT, severity=critical \u2014 silently dropped payment failures cause\nrevenue loss with no operator signal.\nSuggested fix: catch the specific gateway error, log, and re-raise.\n&lt;/example&gt;\n<\/code><\/pre>\n<p>Why it's built this way \u2014 three guide rules:<\/p>\n<ol>\n<li><strong>Explicit categorical criteria beat vague instructions.<\/strong> \"Flag comments only when claimed behavior contradicts actual code behavior\" works; \"check that comments are accurate\" doesn't. And blanket instructions like <em>\"be conservative\"<\/em> or <em>\"only report high-confidence findings\"<\/em> <strong>fail to improve precision<\/strong> \u2014 that's stated flat-out in D4.1 and it's a favorite wrong answer.<\/li>\n<li><strong>Severity needs concrete code examples per level<\/strong> to classify consistently \u2014 prose definitions alone drift.<\/li>\n<li><strong>2\u20134 targeted few-shot examples for the ambiguous cases<\/strong>, showing the <em>reasoning<\/em> for why one verdict beat the plausible alternative \u2014 including an acceptable-pattern example that is explicitly NOT flagged. That's how you cut false positives while still letting the model generalize to novel patterns (few-shot generalizes; hard-coded pattern lists don't).<\/li>\n<\/ol>\n<p>One more D4.1 lever for production: if one category (say, comment-accuracy) is generating most of the false positives, <strong>temporarily disable that category<\/strong> while you improve its prompt. High-FP categories poison developer trust in the <em>accurate<\/em> categories too.<\/p>\n<h3>Step 4 \u2014 Enforce structured output<\/h3>\n<p>Prose findings can't be posted as inline PR comments by a script. The CI flags are <strong><code>--output-format json<\/code><\/strong> plus <strong><code>--json-schema<\/code><\/strong> to get machine-parseable, schema-enforced findings.<\/p>\n<p><code>.claude/schemas/findings.json<\/code>:<\/p>\n<pre><code class=\"language-json\">{\n  &quot;type&quot;: &quot;object&quot;,\n  &quot;properties&quot;: {\n    &quot;findings&quot;: {\n      &quot;type&quot;: &quot;array&quot;,\n      &quot;items&quot;: {\n        &quot;type&quot;: &quot;object&quot;,\n        &quot;properties&quot;: {\n          &quot;file&quot;:             { &quot;type&quot;: &quot;string&quot; },\n          &quot;line&quot;:             { &quot;type&quot;: &quot;integer&quot; },\n          &quot;category&quot;:         { &quot;type&quot;: &quot;string&quot;,\n                                &quot;enum&quot;: [&quot;bug&quot;, &quot;security&quot;, &quot;comment_contradiction&quot;, &quot;other&quot;] },\n          &quot;category_detail&quot;:  { &quot;type&quot;: [&quot;string&quot;, &quot;null&quot;] },\n          &quot;severity&quot;:         { &quot;type&quot;: &quot;string&quot;, &quot;enum&quot;: [&quot;critical&quot;, &quot;major&quot;, &quot;minor&quot;] },\n          &quot;issue&quot;:            { &quot;type&quot;: &quot;string&quot; },\n          &quot;suggested_fix&quot;:    { &quot;type&quot;: [&quot;string&quot;, &quot;null&quot;] },\n          &quot;detected_pattern&quot;: { &quot;type&quot;: &quot;string&quot; },\n          &quot;confidence&quot;:       { &quot;type&quot;: &quot;number&quot; }\n        },\n        &quot;required&quot;: [&quot;file&quot;, &quot;line&quot;, &quot;category&quot;, &quot;severity&quot;, &quot;issue&quot;, &quot;detected_pattern&quot;]\n      }\n    }\n  },\n  &quot;required&quot;: [&quot;findings&quot;]\n}\n<\/code><\/pre>\n<p>Schema design decisions the exam tests (D4.3/D4.4):<\/p>\n<table>\n<thead>\n<tr>\n<th>Field<\/th>\n<th>Why it's shaped this way<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><code>suggested_fix<\/code> nullable<\/td>\n<td>Optional/nullable fields prevent the model <strong>fabricating values<\/strong> just to satisfy <code>required<\/code><\/td>\n<\/tr>\n<tr>\n<td><code>category<\/code> enum + <code>\"other\"<\/code> + <code>category_detail<\/code><\/td>\n<td>The \"other + detail string\" pattern keeps categories extensible without schema churn<\/td>\n<\/tr>\n<tr>\n<td><code>detected_pattern<\/code><\/td>\n<td>When developers dismiss findings, you can analyze <strong>which code constructs trigger false positives<\/strong> systematically \u2014 the guide's named feedback-loop mechanism<\/td>\n<\/tr>\n<tr>\n<td><code>confidence<\/code><\/td>\n<td>Self-reported confidence per finding enables <strong>calibrated review routing<\/strong> (D4.6) \u2014 but it is NOT a precision fix on its own<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>And the limit you must know cold: <strong>strict schemas eliminate JSON syntax errors, not semantic errors.<\/strong> The output will always parse; the <code>line<\/code> number can still be wrong, the severity can still be misassigned. Validation-retry loops (append the specific validation error and retry) fix format/structure errors \u2014 they cannot conjure information that isn't in the diff.<\/p>\n<h3>Step 5 \u2014 Wire the pipeline<\/h3>\n<pre><code class=\"language-yaml\"># .github/workflows/claude-review.yml (sketch)\njobs:\n  claude-review:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n        with: { fetch-depth: 0 }\n      - name: Run review\n        env:\n          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}\n        run: |\n          claude -p &quot;/review-pr&quot; \\\n            --output-format json \\\n            --json-schema .claude/schemas/findings.json \\\n            &gt; findings.json\n      - name: Post inline comments\n        run: python scripts/post_comments.py findings.json &quot;$PR_NUMBER&quot;\n<\/code><\/pre>\n<p><code>scripts/post_comments.py<\/code> \u2014 plain Python, nothing clever:<\/p>\n<pre><code class=\"language-python\">import json, sys\n\nfindings = json.load(open(sys.argv[1]))[&quot;findings&quot;]\nfor f in findings:\n    post_review_comment(          # gh api / REST call\n        pr=sys.argv[2],\n        path=f[&quot;file&quot;], line=f[&quot;line&quot;],\n        body=f&quot;**{f['severity']} {f['category']}**: {f['issue']}\\n\\n&quot;\n             + (f&quot;Suggested fix: {f['suggested_fix']}&quot; if f[&quot;suggested_fix&quot;] else &quot;&quot;),\n    )\n<\/code><\/pre>\n<p>If an MCP server is involved (e.g., a GitHub server so Claude can read PR metadata itself), it goes in <strong>project-scoped <code>.mcp.json<\/code> with environment-variable expansion<\/strong> so no secret is ever committed:<\/p>\n<pre><code class=\"language-json\">{\n  &quot;mcpServers&quot;: {\n    &quot;github&quot;: {\n      &quot;command&quot;: &quot;npx&quot;,\n      &quot;args&quot;: [&quot;-y&quot;, &quot;@modelcontextprotocol/server-github&quot;],\n      &quot;env&quot;: { &quot;GITHUB_PERSONAL_ACCESS_TOKEN&quot;: &quot;${GITHUB_TOKEN}&quot; }\n    }\n  }\n}\n<\/code><\/pre>\n<p>Project scope (<code>.mcp.json<\/code>, committed) = shared team tooling. User scope (<code>~/.claude.json<\/code>) = personal/experimental servers. Both are available simultaneously when configured.<\/p>\n<h3>Step 6 \u2014 Handle scale: multi-pass review and re-run dedup<\/h3>\n<p><strong>Large PRs (the 14-file problem, sample Q12).<\/strong> A single pass over many files produces attention dilution: detailed feedback on some files, superficial on others, and contradictory verdicts on identical code. The fix is structural, not a bigger model:<\/p>\n<ol>\n<li><strong>Per-file passes<\/strong> \u2014 analyze each file individually for local issues (consistent depth per file).<\/li>\n<li><strong>One separate cross-file integration pass<\/strong> \u2014 data flow, interface mismatches between files.<\/li>\n<\/ol>\n<p>This is prompt chaining (D1.6) applied to review. Wrong answers to recognize: bigger context window (context size \u2260 attention quality), forcing developers to split PRs (shifts burden, fixes nothing), consensus voting across 3 runs (suppresses real bugs that are caught intermittently).<\/p>\n<p><strong>Re-runs after new commits.<\/strong> A stateless re-review reposts every old comment and craters trust. The guide's pattern: <strong>include the prior run's findings in context and instruct Claude to report only new or still-unaddressed issues.<\/strong><\/p>\n<pre><code class=\"language-bash\">claude -p &quot;/review-pr Prior findings from the last run are in prior-findings.json. \\\nReport ONLY issues that are new in this diff or previously reported and still \\\nunfixed. Do not re-report resolved or unchanged findings.&quot; \\\n  --output-format json --json-schema .claude/schemas/findings.json\n<\/code><\/pre>\n<p><strong>Reviewing Claude-generated code.<\/strong> If Claude Code generated the change, the review must run in a <strong>fresh, independent instance<\/strong>. Same-session self-review retains the generation reasoning and won't question its own decisions; self-review instructions and extended thinking do not fix this (D3.6 + D4.6). In CI this is free \u2014 every job is a new session. Don't break it by resuming the generator's session for the review.<\/p>\n<h3>Step 7 \u2014 Test generation, and the batch lane<\/h3>\n<p>Test generation quality hinges on two context inputs, both already staged in Step 2:<\/p>\n<ol>\n<li><strong>Existing test files in context<\/strong> \u2192 avoids proposing duplicate scenarios the suite already covers.<\/li>\n<li><strong>CLAUDE.md testing standards + fixture docs<\/strong> \u2192 avoids low-value tests and raw-object construction.<\/li>\n<\/ol>\n<p>Now the economics. Two workflows want Claude: a <strong>blocking pre-merge check<\/strong> and <strong>nightly/weekly analysis<\/strong>. The Message Batches API gives 50% cost savings \u2014 but processing takes <strong>up to 24 hours with no latency SLA<\/strong>. So (sample Q11): batch the overnight work only; keep synchronous calls for anything a developer waits on. \"Batch both with a timeout fallback\" is added complexity for a mismatched tool \u2014 a distractor.<\/p>\n<pre><code class=\"language-python\"># nightly_testgen.py \u2014 Message Batches API sketch\nimport anthropic\nclient = anthropic.Anthropic()\n\nbatch = client.messages.batches.create(\n    requests=[\n        {\n            &quot;custom_id&quot;: f&quot;testgen::{path}&quot;,       # correlates request -&gt; result\n            &quot;params&quot;: {\n                &quot;model&quot;: MODEL,\n                &quot;max_tokens&quot;: 4096,\n                &quot;messages&quot;: [{\n                    &quot;role&quot;: &quot;user&quot;,\n                    # Batch requests CANNOT tool-call mid-request (no multi-turn\n                    # tool use) -&gt; inline the source AND existing tests up front.\n                    &quot;content&quot;: build_prompt(source=read(path),\n                                            existing_tests=read_tests_for(path)),\n                }],\n            },\n        }\n        for path in modules_missing_coverage()\n    ],\n)\n\n# Poll for completion (24h worst case). On failures: resubmit ONLY the failed\n# custom_ids, with modifications (e.g., chunk files that blew the context limit).\n<\/code><\/pre>\n<p>Three batch facts that show up as exam decision points:<\/p>\n<ul>\n<li><strong>No multi-turn tool calling inside a batch request<\/strong> \u2014 the agentic Read/Grep loop is unavailable; everything the model needs must be in the prompt.<\/li>\n<li><strong>Failure handling is per-<code>custom_id<\/code><\/strong>: resubmit only the failed items, modified \u2014 never rerun the whole batch.<\/li>\n<li><strong>SLA math<\/strong>: with a 24 h worst-case processing window, submitting batches every 4 hours means an item waits \u2264 4 h + 24 h = 28 h \u2014 that's how you guarantee a 30 h SLA. Submission frequency = SLA \u2212 processing window.<\/li>\n<li>Before batch-processing a large volume, <strong>refine the prompt on a small sample set<\/strong> first \u2014 maximizes first-pass success and avoids paying for iterative resubmissions.<\/li>\n<\/ul>\n<hr />\n<h2>3. The decision points this scenario tests<\/h2>\n<p>Each row maps to a task statement (TS) from the guide. These are the exact judgment calls the distractors are built around.<\/p>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>CI job hangs; logs show Claude Code waiting for input (TS 3.6)<\/td>\n<td><code>claude -p \"...\"<\/code> (<code>--print<\/code>)<\/td>\n<td>Documented non-interactive mode: prompt \u2192 stdout \u2192 exit<\/td>\n<td><code>CLAUDE_HEADLESS=true<\/code>, <code>--batch<\/code> (both <strong>fake<\/strong>), <code>&lt; /dev/null<\/code><\/td>\n<\/tr>\n<tr>\n<td>Findings must post as inline PR comments (TS 3.6)<\/td>\n<td><code>--output-format json<\/code> + <code>--json-schema<\/code><\/td>\n<td>Machine-parseable, schema-enforced output<\/td>\n<td>Regex-parse prose; \"return JSON\" in the prompt with no enforcement<\/td>\n<\/tr>\n<tr>\n<td>CI reviews ignore team standards that work on your laptop (TS 3.1/3.6)<\/td>\n<td>Move criteria to project CLAUDE.md / <code>.claude/rules/<\/code>, verify with <code>/memory<\/code><\/td>\n<td>User-level <code>~/.claude/CLAUDE.md<\/code> isn't in the repo \u2014 CI and teammates never load it<\/td>\n<td>\"Increase model temperature\", re-prompting, or copying config to each runner by hand<\/td>\n<\/tr>\n<tr>\n<td>Team-wide review command (TS 3.2)<\/td>\n<td><code>.claude/commands/<\/code> in the repo<\/td>\n<td>Version control ships it on clone/pull<\/td>\n<td><code>~/.claude/commands/<\/code> (personal only); putting command defs in CLAUDE.md; a nonexistent <code>config.json<\/code> commands array<\/td>\n<\/tr>\n<tr>\n<td>Test-file conventions, files scattered repo-wide (TS 3.3)<\/td>\n<td><code>.claude/rules/<\/code> file, frontmatter <code>paths: [\"**/*.test.*\"]<\/code><\/td>\n<td>Globs match by file type regardless of directory; load only when relevant<\/td>\n<td>Per-directory CLAUDE.md (directory-bound); one monolithic CLAUDE.md relying on inference<\/td>\n<\/tr>\n<tr>\n<td>Verbose skill (codebase analysis) pollutes main context (TS 3.2)<\/td>\n<td><code>context: fork<\/code> in SKILL.md frontmatter; restrict via <code>allowed-tools<\/code><\/td>\n<td>Runs in isolated sub-agent context; outputs don't flood the session<\/td>\n<td>Running it inline and <code>/compact<\/code>-ing afterward<\/td>\n<\/tr>\n<tr>\n<td>Too many false positives, devs losing trust (TS 4.1)<\/td>\n<td>Explicit report/skip categories + few-shot examples separating acceptable patterns from genuine issues<\/td>\n<td>Precision comes from criteria, not caution<\/td>\n<td>\"Be conservative\" / \"only report high-confidence findings\" \u2014 the guide says these <strong>fail<\/strong><\/td>\n<\/tr>\n<tr>\n<td>One category generates most FPs (TS 4.1)<\/td>\n<td>Temporarily disable that category while fixing its prompt<\/td>\n<td>High-FP categories undermine trust in accurate ones<\/td>\n<td>Global confidence thresholds; ignoring it<\/td>\n<\/tr>\n<tr>\n<td>Severity labels inconsistent across runs (TS 4.1)<\/td>\n<td>Explicit severity criteria with a concrete code example per level<\/td>\n<td>Anchored definitions classify consistently<\/td>\n<td>Confidence-based filtering; longer prose definitions<\/td>\n<\/tr>\n<tr>\n<td>Output format inconsistent despite detailed instructions (TS 4.2)<\/td>\n<td>2\u20134 few-shot examples demonstrating the exact format (location, issue, severity, fix)<\/td>\n<td>Few-shot is the most effective consistency technique; generalizes to novel cases<\/td>\n<td>Piling on more prose instructions<\/td>\n<\/tr>\n<tr>\n<td>Re-review after fixes duplicates old comments (TS 3.6)<\/td>\n<td>Feed prior findings into context; instruct \"only new or still-unaddressed\"<\/td>\n<td>The model can't dedup against runs it never saw<\/td>\n<td>Post-hoc string-match dedup only; wiping comments and reposting<\/td>\n<\/tr>\n<tr>\n<td>Generated tests duplicate existing coverage (TS 3.6)<\/td>\n<td>Provide existing test files in context + valuable-test criteria and fixtures in CLAUDE.md<\/td>\n<td>Model can't avoid duplicating what it can't see<\/td>\n<td>\"Don't duplicate tests\" instruction with no test files provided<\/td>\n<\/tr>\n<tr>\n<td>14-file PR: inconsistent, contradictory review (TS 4.6/1.6)<\/td>\n<td>Per-file local passes + separate cross-file integration pass<\/td>\n<td>Fixes attention dilution structurally<\/td>\n<td>Bigger context model; force smaller PRs; 2-of-3 consensus voting<\/td>\n<\/tr>\n<tr>\n<td>Reviewing code Claude just generated (TS 3.6/4.6)<\/td>\n<td>Fresh independent instance, no generator context<\/td>\n<td>Generator session won't question its own reasoning<\/td>\n<td>Self-review instructions; extended thinking in the same session<\/td>\n<\/tr>\n<tr>\n<td>Cut costs: blocking pre-merge check + overnight report (TS 4.5)<\/td>\n<td>Batch API for overnight only; sync for pre-merge<\/td>\n<td>Batch = 50% cheaper, \u226424 h, <strong>no SLA<\/strong> \u2014 never on a blocking path<\/td>\n<td>Batch both; batch with timeout-fallback-to-sync<\/td>\n<\/tr>\n<tr>\n<td>Some batch requests fail (oversized files) (TS 4.5)<\/td>\n<td>Resubmit only failed <code>custom_id<\/code>s, modified (chunked)<\/td>\n<td><code>custom_id<\/code> exists precisely for request/response correlation<\/td>\n<td>Rerun the entire batch; abandon failed items<\/td>\n<\/tr>\n<tr>\n<td>Devs dismiss findings, you want to learn why (TS 4.4)<\/td>\n<td><code>detected_pattern<\/code> field in the findings schema<\/td>\n<td>Enables systematic analysis of which constructs trigger FPs<\/td>\n<td>Reading dismissals ad hoc; asking the model to \"do better\"<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>4. Failure-modes drill<\/h2>\n<p>Styled like the guide's sample questions: symptom \u2192 root cause \u2192 fix. Cover the distractor in your head before reading the fix.<\/p>\n<p><strong>1. Pipeline job hangs indefinitely; logs show Claude Code awaiting interactive input.<\/strong>\nRoot cause: invoked without non-interactive mode.\nFix: <code>claude -p \"...\"<\/code>. Not <code>CLAUDE_HEADLESS<\/code>, not <code>--batch<\/code> \u2014 neither exists. That's sample Q10 verbatim.<\/p>\n<p><strong>2. The comment-posting script crashes intermittently on malformed JSON.<\/strong>\nRoot cause: JSON requested via prompt text only \u2014 nothing enforces it.\nFix: <code>--output-format json --json-schema findings.json<\/code>. Remember the boundary: this eliminates <em>syntax<\/em> errors; <em>semantic<\/em> errors (wrong line number, misfiled severity) survive and need validation + retry-with-error-feedback.<\/p>\n<p><strong>3. Reviews follow your standards locally but CI output is generic; a new teammate sees the same gap.<\/strong>\nRoot cause: criteria live in user-level <code>~/.claude/CLAUDE.md<\/code>, which is never cloned.\nFix: move them to project-level CLAUDE.md / <code>.claude/rules/<\/code>, commit, and use <code>/memory<\/code> to verify which memory files actually load.<\/p>\n<p><strong>4. Developers have started auto-dismissing the bot \u2014 including its correct security findings.<\/strong>\nRoot cause: one high-false-positive category (e.g., comment accuracy prompted as \"check that comments are accurate\") destroyed trust across all categories.\nFix: rewrite as explicit contrast criteria (\"flag only when claimed behavior contradicts actual code behavior\"), add few-shot examples of acceptable-pattern vs genuine-issue, and temporarily disable the worst category until its precision recovers. Adding \"be conservative\" is the trap \u2014 the guide says it doesn't work.<\/p>\n<p><strong>5. On a 14-file PR: deep feedback on 3 files, superficial on the rest, and the same pattern flagged in one file but approved in another.<\/strong>\nRoot cause: attention dilution in a single all-files pass.\nFix: restructure into per-file local passes plus a separate cross-file integration pass. Not a larger context window (attention, not capacity), not consensus-of-three (suppresses intermittently-caught real bugs). Sample Q12.<\/p>\n<p><strong>6. After a developer pushes fix commits, the bot reposts all 11 original comments.<\/strong>\nRoot cause: each run is stateless; the model has no knowledge of prior findings.\nFix: include the previous run's findings in the new run's context and instruct: report only new or still-unaddressed issues.<\/p>\n<p><strong>7. Nightly test generation proposes tests the suite already has, plus trivial getter tests nobody wants.<\/strong>\nRoot cause: missing context \u2014 no existing test files provided, no definition of a valuable test.\nFix: inline the relevant existing test files in the prompt, and document testing standards + valuable-test criteria + available fixtures in CLAUDE.md so every CI invocation inherits them.<\/p>\n<p><strong>8. You moved the pre-merge check to the Batches API for the 50% savings; developers are now blocked for hours.<\/strong>\nRoot cause: batch has an up-to-24-hour window and no latency SLA \u2014 it's for latency-tolerant work only.\nFix: sync API for anything blocking; batch for overnight/weekly jobs. And within batch: single-shot prompts only (no mid-request tool calling), failures resubmitted per <code>custom_id<\/code> after modification. Sample Q11.<\/p>\n<hr />\n<h2>Quick-recall card<\/h2>\n<ul>\n<li><code>-p<\/code> / <code>--print<\/code> = headless CI mode. <code>--batch<\/code> and <code>CLAUDE_HEADLESS<\/code> are fictional.<\/li>\n<li><code>--output-format json<\/code> + <code>--json-schema<\/code> = structured CI findings.<\/li>\n<li>Project CLAUDE.md = CI's context channel (review criteria, test standards, fixtures).<\/li>\n<li><code>.claude/commands/<\/code> shared \u00b7 <code>~/.claude/commands/<\/code> personal. Same split: <code>.mcp.json<\/code> vs <code>~/.claude.json<\/code> (with <code>${VAR}<\/code> expansion for secrets).<\/li>\n<li><code>.claude/rules/<\/code> + <code>paths:<\/code> globs &gt; directory CLAUDE.md for scattered file types.<\/li>\n<li>Precision = explicit categories + severity anchors + 2\u20134 few-shot; never \"be conservative.\"<\/li>\n<li>Big PR = per-file passes + one integration pass. Generated code = independent reviewer instance.<\/li>\n<li>Batch API: 50% off, \u226424 h, no SLA, <code>custom_id<\/code>, no multi-turn tools \u2014 never blocking.<\/li>\n<\/ul>","words":2691},"06-structured-extraction":{"title":"Scenario 6 \u2014 Structured Data Extraction","group":"Scenario walkthroughs","html":"<h1>Scenario 6 \u2014 Structured Data Extraction<\/h1>\n<blockquote>\n<p><strong>Exam framing:<\/strong> \"You are building a structured data extraction system using Claude. The system extracts information from unstructured documents, validates the output using JSON schemas, and maintains high accuracy. It must handle edge cases gracefully and integrate with downstream systems.\"<\/p>\n<p><strong>Primary domains:<\/strong> D4 Prompt Engineering &amp; Structured Output (20%) + D5 Context Management &amp; Reliability (15%). If this scenario is drawn, you're answering ~10 questions worth of pipeline-architecture judgment. This is a raw <strong>Claude API<\/strong> scenario \u2014 no Agent SDK, no Claude Code config. Vision/OCR is explicitly out of scope; documents arrive as text.<\/p>\n<\/blockquote>\n<hr />\n<h2>1. The system at a glance<\/h2>\n<p>Five components. The core insight the whole scenario hangs on: <strong>you don't ask Claude to \"respond in JSON\" \u2014 you define a tool whose <code>input_schema<\/code> IS your output schema, force Claude to call it, and read the arguments.<\/strong> The tool is never executed; it's a schema container. Everything else is plumbing around that call.<\/p>\n<pre><code>                 \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n                 \u2502                EXTRACTION PIPELINE                   \u2502\n                 \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n\n  docs (text) \u2500\u2500\u25ba [1] PRE-PROCESS \u2500\u2500\u25ba [2] EXTRACTION CALL \u2500\u2500\u25ba [3] VALIDATE\n                   chunk oversized      tool_use + JSON          Pydantic:\n                   docs; key info       schema, forced           schema +\n                   up front             tool_choice              semantic checks\n                                             \u25b2                        \u2502\n                                             \u2502  retry w/ specific     \u2502 fail\n                                             \u2514\u2500\u2500 validation error \u25c4\u2500\u2500\u2500\u2524 (max N)\n                                                 appended             \u2502\n                                                                      \u25bc pass\n                                              [4] CONFIDENCE ROUTER\n                                              field-level confidence,\n                                              calibrated thresholds\n                                               \u2502                \u2502\n                                     low conf /\u2502                \u2502 high conf\n                                     conflicts \u25bc                \u25bc\n                                        HUMAN REVIEW      [5] DOWNSTREAM\n                                        queue             systems (DB, API)\n                                             \u25b2                  \u2502\n                                             \u2514\u2500\u2500 stratified \u2500\u2500\u2500\u2500\u2518\n                                                 random sample\n                                                 (ongoing QA)\n\n  Volume path: same call params \u2192 Message Batches API (50% cheaper, \u226424h,\n  no SLA) \u2192 correlate &amp; resubmit failures by custom_id\n<\/code><\/pre>\n<p>Data flow in one sentence: document text goes in, a forced tool call returns schema-shaped data, Pydantic validates it (syntax is already guaranteed \u2014 you're checking <em>semantics<\/em>), failures retry with the specific error appended, survivors route by confidence to either humans or downstream systems, and a stratified sample of the \"good\" output gets audited forever.<\/p>\n<hr />\n<h2>2. Build it step by step<\/h2>\n<p>The exam guide's Exercise 3 is literally this build order (steps 11\u201315 of the guide). Build in this sequence because each layer catches what the previous one can't.<\/p>\n<h3>Step 1 \u2014 The schema-as-tool (get this right and half the scenario is solved)<\/h3>\n<p>Design decisions baked into the schema, each one an exam question:<\/p>\n<ul>\n<li><strong>Nullable/optional fields<\/strong> for anything the source may not contain \u2014 a <code>required<\/code> field the document lacks forces the model to <em>fabricate<\/em> a value to satisfy the schema.<\/li>\n<li><strong>Enum + <code>\"other\"<\/code> + detail string<\/strong> for extensible categories; <strong><code>\"unclear\"<\/code><\/strong> enum value for ambiguous cases.<\/li>\n<li><strong>Self-correction fields<\/strong>: extract <code>calculated_total<\/code> <em>alongside<\/em> <code>stated_total<\/code> so discrepancies get flagged, and a <code>conflict_detected<\/code> boolean for inconsistent source data.<\/li>\n<li><strong>Field-level confidence<\/strong> so Step 5 has something to route on.<\/li>\n<\/ul>\n<pre><code class=\"language-python\">import anthropic\n\nclient = anthropic.Anthropic()\nMODEL = &quot;claude-sonnet-4-5&quot;  # any current model; exam doesn't test model IDs\n\nINVOICE_TOOL = {\n    &quot;name&quot;: &quot;record_invoice&quot;,\n    &quot;description&quot;: (\n        &quot;Record structured data extracted from an invoice document. &quot;\n        &quot;Call this exactly once with every field you can ground in the &quot;\n        &quot;document text. Use null for any field not present in the document \u2014 &quot;\n        &quot;never guess or infer missing values.&quot;\n    ),\n    &quot;input_schema&quot;: {\n        &quot;type&quot;: &quot;object&quot;,\n        &quot;properties&quot;: {\n            &quot;vendor_name&quot;: {&quot;type&quot;: &quot;string&quot;},\n            &quot;invoice_date&quot;: {\n                &quot;type&quot;: [&quot;string&quot;, &quot;null&quot;],\n                &quot;description&quot;: &quot;ISO 8601 (YYYY-MM-DD). Null if no date appears in the document.&quot;,\n            },\n            &quot;po_number&quot;: {\n                &quot;type&quot;: [&quot;string&quot;, &quot;null&quot;],\n                &quot;description&quot;: &quot;Null if the document has no purchase order number.&quot;,\n            },\n            &quot;category&quot;: {\n                &quot;type&quot;: &quot;string&quot;,\n                &quot;enum&quot;: [&quot;utilities&quot;, &quot;software&quot;, &quot;hardware&quot;, &quot;services&quot;, &quot;other&quot;, &quot;unclear&quot;],\n            },\n            &quot;category_detail&quot;: {\n                &quot;type&quot;: [&quot;string&quot;, &quot;null&quot;],\n                &quot;description&quot;: &quot;Required free-text detail when category is 'other'.&quot;,\n            },\n            &quot;line_items&quot;: {\n                &quot;type&quot;: &quot;array&quot;,\n                &quot;items&quot;: {\n                    &quot;type&quot;: &quot;object&quot;,\n                    &quot;properties&quot;: {\n                        &quot;description&quot;: {&quot;type&quot;: &quot;string&quot;},\n                        &quot;amount&quot;: {&quot;type&quot;: &quot;number&quot;},\n                    },\n                    &quot;required&quot;: [&quot;description&quot;, &quot;amount&quot;],\n                },\n            },\n            &quot;stated_total&quot;: {&quot;type&quot;: &quot;number&quot;, &quot;description&quot;: &quot;Total as printed on the document.&quot;},\n            &quot;calculated_total&quot;: {&quot;type&quot;: &quot;number&quot;, &quot;description&quot;: &quot;Sum of line item amounts, computed by you.&quot;},\n            &quot;conflict_detected&quot;: {\n                &quot;type&quot;: &quot;boolean&quot;,\n                &quot;description&quot;: &quot;True if the document contains internally inconsistent values.&quot;,\n            },\n            &quot;field_confidence&quot;: {\n                &quot;type&quot;: &quot;object&quot;,\n                &quot;description&quot;: &quot;Confidence 0.0-1.0 per extracted field.&quot;,\n                &quot;properties&quot;: {\n                    &quot;vendor_name&quot;: {&quot;type&quot;: &quot;number&quot;},\n                    &quot;invoice_date&quot;: {&quot;type&quot;: &quot;number&quot;},\n                    &quot;stated_total&quot;: {&quot;type&quot;: &quot;number&quot;},\n                },\n            },\n        },\n        # required = fields every invoice genuinely has. Everything else stays optional.\n        &quot;required&quot;: [&quot;vendor_name&quot;, &quot;line_items&quot;, &quot;stated_total&quot;,\n                     &quot;calculated_total&quot;, &quot;conflict_detected&quot;, &quot;category&quot;],\n    },\n}\n<\/code><\/pre>\n<h3>Step 2 \u2014 The extraction call: forced tool_choice, few-shot in the system prompt<\/h3>\n<p>Know the three <code>tool_choice<\/code> modes cold:<\/p>\n<table>\n<thead>\n<tr>\n<th>Mode<\/th>\n<th>Behavior<\/th>\n<th>Use here when<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><code>{\"type\": \"auto\"}<\/code><\/td>\n<td>Model <em>may<\/em> return plain text instead of calling a tool<\/td>\n<td>Never for extraction \u2014 text responses break your parser<\/td>\n<\/tr>\n<tr>\n<td><code>{\"type\": \"any\"}<\/code><\/td>\n<td>Model <em>must<\/em> call some tool, its choice which<\/td>\n<td>Multiple extraction schemas (invoice/contract/receipt tools) and <strong>document type is unknown<\/strong><\/td>\n<\/tr>\n<tr>\n<td><code>{\"type\": \"tool\", \"name\": \"record_invoice\"}<\/code><\/td>\n<td>Model must call <em>that<\/em> tool<\/td>\n<td>Document type is known; also to force a specific step (guide's example: force <code>extract_metadata<\/code> before enrichment tools run in follow-up turns)<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>The system prompt carries the two things the schema can't enforce: <strong>format normalization rules<\/strong> (\"dates \u2192 ISO 8601, currency \u2192 number without symbols\") and <strong>2\u20134 few-shot examples<\/strong> showing correct extraction from <em>varied document formats<\/em> \u2014 that's the guide's stated fix for hallucination and for empty/null extraction of required fields. Target examples at the ambiguous cases: informal measurements, inline data vs. tabular data, a document that's missing a field (show null being returned).<\/p>\n<pre><code class=\"language-python\">SYSTEM = &quot;&quot;&quot;You extract invoice data. Rules:\n- Dates: convert any format to ISO 8601 (YYYY-MM-DD).\n- Amounts: numbers only, no currency symbols or thousands separators.\n- If a field is not in the document, return null. Never infer or fabricate.\n\n&lt;example&gt;\nDocument: &quot;Bill from Acme Corp, March 3rd 2026... services rendered $1,200&quot;\nCorrect: vendor_name=&quot;Acme Corp&quot;, invoice_date=&quot;2026-03-03&quot;,\n         stated_total=1200, po_number=null (no PO in document)\n&lt;/example&gt;\n&lt;example&gt;\nDocument: &quot;INVOICE #A-99 ... [tabular line items, no date anywhere]&quot;\nCorrect: invoice_date=null \u2014 the document contains no date; do not use today's date.\n&lt;/example&gt;&quot;&quot;&quot;\n\ndef extract(doc_text: str):\n    msg = client.messages.create(\n        model=MODEL,\n        max_tokens=2048,\n        system=SYSTEM,\n        messages=[{&quot;role&quot;: &quot;user&quot;, &quot;content&quot;: doc_text}],\n        tools=[INVOICE_TOOL],\n        tool_choice={&quot;type&quot;: &quot;tool&quot;, &quot;name&quot;: &quot;record_invoice&quot;},\n    )\n    block = next(b for b in msg.content if b.type == &quot;tool_use&quot;)\n    return msg, block  # block.input is your schema-shaped dict\n<\/code><\/pre>\n<p><strong>Architectural note the exam probes:<\/strong> this is <em>not<\/em> an agentic loop. With forced <code>tool_choice<\/code>, <code>stop_reason<\/code> is <code>\"tool_use\"<\/code> every time \u2014 there is no <code>\"end_turn\"<\/code> to wait for, and the tool never executes. The loop that matters in this scenario is the <strong>validation-retry loop your code drives<\/strong> (Step 4). A distractor will offer you a D1-style agentic loop here; it's solving a different problem.<\/p>\n<h3>Step 3 \u2014 Semantic validation with Pydantic<\/h3>\n<p>The single most-tested fact in this scenario: <strong>tool use with a strict JSON schema eliminates <em>syntax<\/em> errors (malformed JSON, wrong types) but does NOT prevent <em>semantic<\/em> errors<\/strong> \u2014 line items that don't sum to the total, values landed in the wrong field. That's what this layer exists for.<\/p>\n<pre><code class=\"language-python\">from pydantic import BaseModel, ValidationError, model_validator\n\nclass LineItem(BaseModel):\n    description: str\n    amount: float\n\nclass Invoice(BaseModel):\n    vendor_name: str\n    invoice_date: str | None = None\n    po_number: str | None = None\n    category: str\n    category_detail: str | None = None\n    line_items: list[LineItem]\n    stated_total: float\n    calculated_total: float\n    conflict_detected: bool\n    field_confidence: dict[str, float] = {}\n\n    @model_validator(mode=&quot;after&quot;)\n    def totals_consistent(self):\n        if abs(sum(li.amount for li in self.line_items) - self.stated_total) &gt; 0.01 \\\n                and not self.conflict_detected:\n            raise ValueError(\n                &quot;line_items sum &quot;\n                f&quot;({sum(li.amount for li in self.line_items):.2f}) != stated_total &quot;\n                f&quot;({self.stated_total:.2f}) but conflict_detected is false&quot;\n            )\n        return self\n<\/code><\/pre>\n<h3>Step 4 \u2014 Retry with error feedback (and knowing when NOT to retry)<\/h3>\n<p>The guide's pattern: the follow-up request must contain <strong>the original document, the failed extraction, and the specific validation errors<\/strong>. Continuing the conversation gives you the first two for free; the <code>tool_result<\/code> carries the third.<\/p>\n<pre><code class=\"language-python\">def extract_validated(doc_text: str, max_retries: int = 2):\n    messages = [{&quot;role&quot;: &quot;user&quot;, &quot;content&quot;: doc_text}]\n    for attempt in range(max_retries + 1):\n        msg = client.messages.create(\n            model=MODEL, max_tokens=2048, system=SYSTEM,\n            messages=messages,\n            tools=[INVOICE_TOOL],\n            tool_choice={&quot;type&quot;: &quot;tool&quot;, &quot;name&quot;: &quot;record_invoice&quot;},\n        )\n        block = next(b for b in msg.content if b.type == &quot;tool_use&quot;)\n        try:\n            return Invoice.model_validate(block.input)          # success\n        except ValidationError as e:\n            messages.append({&quot;role&quot;: &quot;assistant&quot;, &quot;content&quot;: msg.content})\n            messages.append({&quot;role&quot;: &quot;user&quot;, &quot;content&quot;: [{\n                &quot;type&quot;: &quot;tool_result&quot;,\n                &quot;tool_use_id&quot;: block.id,\n                &quot;content&quot;: (\n                    f&quot;Extraction failed validation:\\n{e}\\n&quot;\n                    &quot;Re-extract the document and correct ONLY these errors. &quot;\n                    &quot;If the information is absent from the document, return null &quot;\n                    &quot;\u2014 do not invent a value.&quot;\n                ),\n            }]})\n    return route_to_human(doc_text, block.input, str(e))        # retries exhausted\n<\/code><\/pre>\n<p>The judgment call the exam tests harder than the code: <strong>retries fix format and structural errors; retries can never fix information that is absent from the source document.<\/strong> \"Extract the PO number\" from a document with no PO number will fail forever \u2014 burn zero retries on it, return null, and route by confidence instead. Classify your validation failures before retrying.<\/p>\n<h3>Step 5 \u2014 Confidence routing + human review (D5.5)<\/h3>\n<p>Three rules from the guide, in build order:<\/p>\n<ol>\n<li><strong>Model outputs field-level confidence scores<\/strong> (already in the schema), then you <strong>calibrate review thresholds against a labeled validation set<\/strong> \u2014 never trust raw self-reported confidence uncalibrated.<\/li>\n<li><strong>Route to human review<\/strong>: low-confidence fields, and documents with ambiguous/contradictory source data (<code>conflict_detected: true<\/code>). Prioritize limited reviewer capacity there.<\/li>\n<li><strong>Never stop auditing the auto-approved lane<\/strong>: stratified random sampling of <em>high-confidence<\/em> extractions measures ongoing error rate and catches novel error patterns.<\/li>\n<\/ol>\n<p>And the trap that guards this whole step: <strong>aggregate accuracy (e.g., \"97% overall\") can mask terrible performance on one document type or one field.<\/strong> Analyze accuracy <strong>by document type AND by field<\/strong> before you reduce human review anywhere.<\/p>\n<pre><code class=\"language-python\">THRESHOLDS = {&quot;vendor_name&quot;: 0.90, &quot;stated_total&quot;: 0.95, &quot;invoice_date&quot;: 0.85}\n# values come from a labeled validation set, not from vibes\n\ndef route(inv: Invoice, doc_text: str):\n    low = [f for f, t in THRESHOLDS.items()\n           if inv.field_confidence.get(f, 0.0) &lt; t]\n    if low or inv.conflict_detected:\n        return human_review_queue(inv, doc_text, reasons=low)\n    if random.random() &lt; STRATIFIED_SAMPLE_RATE[inv.category]:   # per-segment QA\n        audit_queue(inv, doc_text)\n    return push_downstream(inv)      # trimmed to fields downstream actually needs\n<\/code><\/pre>\n<h3>Step 6 \u2014 Scale it: Message Batches API (D4.5)<\/h3>\n<p>Facts to memorize verbatim \u2014 they show up as distractors: <strong>50% cost savings, processing window up to 24 hours, NO guaranteed latency SLA, <code>custom_id<\/code> correlates request/response pairs, and no multi-turn tool calling within a single batch request.<\/strong> That last one is fine here \u2014 forced-tool extraction is single-shot (the tool never executes, so no tool results ever need returning). What you <em>can't<\/em> do in a batch is the Step 4 retry conversation \u2014 retries go into the <em>next<\/em> batch (or sync calls) as resubmissions.<\/p>\n<pre><code class=\"language-python\">batch = client.messages.batches.create(requests=[\n    {\n        &quot;custom_id&quot;: f&quot;doc-{d.id}&quot;,\n        &quot;params&quot;: {\n            &quot;model&quot;: MODEL, &quot;max_tokens&quot;: 2048, &quot;system&quot;: SYSTEM,\n            &quot;messages&quot;: [{&quot;role&quot;: &quot;user&quot;, &quot;content&quot;: d.text}],\n            &quot;tools&quot;: [INVOICE_TOOL],\n            &quot;tool_choice&quot;: {&quot;type&quot;: &quot;tool&quot;, &quot;name&quot;: &quot;record_invoice&quot;},\n        },\n    } for d in docs\n])\n\n# poll until processing_status == &quot;ended&quot;, then:\nfailed = []\nfor r in client.messages.batches.results(batch.id):\n    if r.result.type == &quot;succeeded&quot;:\n        handle(r.custom_id, r.result.message)\n    else:\n        failed.append(r.custom_id)   # resubmit ONLY these, with modifications\n<\/code><\/pre>\n<p>Operational rules the exam tests:<\/p>\n<ul>\n<li><strong>Match API to latency tolerance.<\/strong> Blocking workflows (anything a human waits on) \u2192 synchronous API. Overnight reports, weekly audits, nightly runs \u2192 batch.<\/li>\n<li><strong>SLA math.<\/strong> 24h max processing means submission cadence is your lever: e.g., submitting every 4 hours guarantees a 30-hour end-to-end SLA (4h max queue wait + 24h processing + buffer).<\/li>\n<li><strong>Failure handling = resubmit only the failed <code>custom_id<\/code>s, with modifications<\/strong> \u2014 e.g., chunk the documents that blew the context limit. Never resubmit the whole batch.<\/li>\n<li><strong>Refine the prompt on a sample set first<\/strong>, then batch the large volume \u2014 maximizes first-pass success and avoids paying for iterative resubmission at scale.<\/li>\n<\/ul>\n<h3>Step 7 \u2014 Long documents: context management (D5.1)<\/h3>\n<p>For 80-page contracts, three moves:<\/p>\n<ul>\n<li><strong>Lost-in-the-middle is real<\/strong>: models reliably process the beginning and end of long inputs and drop middle content. Put a key-information summary <strong>at the beginning<\/strong> of aggregated input and organize the rest with <strong>explicit section headers<\/strong>.<\/li>\n<li><strong>Chunk oversized documents<\/strong> (this is also the standard fix when a batch item fails on context limits).<\/li>\n<li><strong>Trim before it accumulates<\/strong>: pass downstream systems only the relevant fields, not the full extraction blob \u2014 verbose payloads consume tokens disproportionately to their relevance in any later Claude-in-the-loop step.<\/li>\n<\/ul>\n<hr />\n<h2>3. The decision points this scenario tests<\/h2>\n<p>Each row is a task statement converted to the exam's actual shape: a situation, one correct move, three plausible wrong ones.<\/p>\n<h3>D4.3 \u2014 Enforcing structured output<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Need guaranteed schema-compliant JSON from extraction<\/td>\n<td>Define a tool with the JSON schema as <code>input_schema<\/code>; read the <code>tool_use<\/code> block's input<\/td>\n<td>Tool use eliminates JSON syntax errors entirely<\/td>\n<td>\"Respond only in valid JSON\" prompting + a regex/parser cleanup layer<\/td>\n<\/tr>\n<tr>\n<td>Multiple extraction schemas, document type unknown<\/td>\n<td><code>tool_choice: {\"type\": \"any\"}<\/code><\/td>\n<td>Guarantees a tool call while letting the model pick the right schema<\/td>\n<td>Forcing one specific tool (wrong schema for half the docs), or <code>\"auto\"<\/code> (model may answer in prose)<\/td>\n<\/tr>\n<tr>\n<td>A specific extraction must run before enrichment steps<\/td>\n<td><code>tool_choice: {\"type\": \"tool\", \"name\": \"extract_metadata\"}<\/code>, then process later steps in follow-up turns<\/td>\n<td>Forced selection is deterministic; prompt ordering is probabilistic<\/td>\n<td>System-prompt instruction \"always call extract_metadata first\"<\/td>\n<\/tr>\n<tr>\n<td>Source docs sometimes lack a field<\/td>\n<td>Make it optional/nullable in the schema<\/td>\n<td>A required field the doc lacks pressures the model to fabricate a value<\/td>\n<td>Making everything required \"for data quality\"<\/td>\n<\/tr>\n<tr>\n<td>Categories won't stay fixed forever; some cases are genuinely ambiguous<\/td>\n<td>Enum + <code>\"other\"<\/code> with a detail string; add <code>\"unclear\"<\/code> for ambiguity<\/td>\n<td>Extensible without schema churn; ambiguity becomes visible data<\/td>\n<td>Free-text category field, or forcing every doc into the closed enum<\/td>\n<\/tr>\n<tr>\n<td>Source formatting is inconsistent (dates, currencies)<\/td>\n<td>Format normalization rules in the prompt <strong>alongside<\/strong> the strict schema<\/td>\n<td>Schema constrains shape; prompt constrains content conventions<\/td>\n<td>Assuming the schema alone normalizes formats<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3>D4.4 \u2014 Validation, retry, feedback loops<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Schema-valid output but line items don't sum to total<\/td>\n<td>Pydantic semantic validation + retry with the specific error appended<\/td>\n<td>Strict schemas kill syntax errors, <strong>not<\/strong> semantic errors<\/td>\n<td>\"Tighten the JSON schema\" \u2014 no schema expresses cross-field arithmetic<\/td>\n<\/tr>\n<tr>\n<td>Validation fails, deciding whether to retry<\/td>\n<td>Retry format/structural errors; <strong>don't<\/strong> retry when the info is absent from the source<\/td>\n<td>Retries can't create information that isn't there<\/td>\n<td>Uniform retry-3-times policy for every failure class<\/td>\n<\/tr>\n<tr>\n<td>Building the retry request<\/td>\n<td>Include the original document + the failed extraction + the specific validation errors<\/td>\n<td>The model needs all three to self-correct<\/td>\n<td>Bare re-ask (\"try again, output valid JSON\") with no error context<\/td>\n<\/tr>\n<tr>\n<td>Totals on source docs are sometimes internally wrong<\/td>\n<td>Extract <code>calculated_total<\/code> alongside <code>stated_total<\/code>; add <code>conflict_detected<\/code> boolean<\/td>\n<td>Self-correction flow flags discrepancies instead of hiding them<\/td>\n<td>Extracting only <code>stated_total<\/code> and trusting the document<\/td>\n<\/tr>\n<tr>\n<td>Want to learn from reviewer dismissals / false positives<\/td>\n<td>Add a <code>detected_pattern<\/code> field to structured findings<\/td>\n<td>Enables systematic analysis of what triggers bad output<\/td>\n<td>Reading dismissal comments ad hoc<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3>D4.2 \u2014 Few-shot prompting for extraction<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Required fields come back empty/null on unusual layouts<\/td>\n<td>Add few-shot examples showing correct extraction from <strong>varied document formats<\/strong><\/td>\n<td>Examples demonstrate structural variety; the model generalizes<\/td>\n<td>Longer prose instructions (\"be thorough, check tables too\")<\/td>\n<\/tr>\n<tr>\n<td>Hallucinated values on informal/odd inputs<\/td>\n<td>2\u20134 targeted few-shot examples covering exactly those ambiguous cases, showing the reasoning<\/td>\n<td>Few-shot is the guide's stated hallucination-reducer for extraction<\/td>\n<td>15+ examples covering everything (token bloat, no targeting)<\/td>\n<\/tr>\n<tr>\n<td>Output format drifts run to run<\/td>\n<td>Few-shot examples demonstrating the exact desired output<\/td>\n<td>Format demonstration beats format description<\/td>\n<td>Re-describing the format in more detail<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3>D4.5 \u2014 Batch processing<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Nightly 10K-document extraction + an on-demand single-doc lane<\/td>\n<td>Batch API for the nightly run; synchronous API for on-demand<\/td>\n<td>Batch = 50% cheaper but \u226424h, no SLA \u2014 latency-tolerant only<\/td>\n<td>Batch for both (\"it usually finishes fast\")<\/td>\n<\/tr>\n<tr>\n<td>12 of 5,000 batch items failed<\/td>\n<td>Resubmit only those <code>custom_id<\/code>s, modified (e.g., chunk oversized docs)<\/td>\n<td><code>custom_id<\/code> exists precisely for correlation and selective retry<\/td>\n<td>Rerunning the full batch<\/td>\n<\/tr>\n<tr>\n<td>Must guarantee 30h turnaround with 24h batch processing<\/td>\n<td>Submit batches every 4 hours<\/td>\n<td>4h max queue wait + 24h processing &lt; 30h<\/td>\n<td>One giant daily batch and hoping<\/td>\n<\/tr>\n<tr>\n<td>New prompt, 100K docs to process<\/td>\n<td>Refine on a sample set first, then batch the volume<\/td>\n<td>First-pass success is the cost lever; resubmission at scale is expensive<\/td>\n<td>Batch everything immediately, iterate on failures<\/td>\n<\/tr>\n<tr>\n<td>Extraction needs a mid-request tool round-trip<\/td>\n<td>Restructure to single-shot, or use the sync API<\/td>\n<td>Batch requests do not support multi-turn tool calling<\/td>\n<td>Assuming batch behaves like the sync API with tools<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3>D5.5 \u2014 Human review &amp; confidence calibration<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>\"97% overall accuracy \u2014 can we drop human review?\"<\/td>\n<td>Analyze accuracy <strong>by document type and by field<\/strong> first<\/td>\n<td>Aggregate metrics mask segment-level failure<\/td>\n<td>Trusting the aggregate number<\/td>\n<\/tr>\n<tr>\n<td>Limited reviewer capacity<\/td>\n<td>Route low-confidence fields + ambiguous/contradictory source docs to review<\/td>\n<td>Puts scarce attention where errors concentrate<\/td>\n<td>Reviewing a flat random N% of everything<\/td>\n<\/tr>\n<tr>\n<td>Using model confidence to route<\/td>\n<td>Calibrate thresholds against a <strong>labeled validation set<\/strong><\/td>\n<td>Raw self-reported confidence is poorly calibrated<\/td>\n<td>Trusting confidence scores as-is (same failure as sentiment-based escalation)<\/td>\n<\/tr>\n<tr>\n<td>High-confidence lane fully automated<\/td>\n<td>Stratified random sampling of it, forever<\/td>\n<td>Measures ongoing error rate; detects <strong>novel<\/strong> error patterns<\/td>\n<td>\"It passed validation, we're done\"<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3>D5.1 \u2014 Long-document context<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Fields from the middle of long docs come back null/wrong<\/td>\n<td>Key-info summary at the beginning + explicit section headers; chunk if oversized<\/td>\n<td>Lost-in-the-middle: start/end are processed reliably, middles get dropped<\/td>\n<td>\"Use the bigger context window\" \u2014 capacity \u2260 attention quality<\/td>\n<\/tr>\n<tr>\n<td>Downstream step chokes on huge extraction payloads<\/td>\n<td>Trim to only the relevant fields before passing on<\/td>\n<td>Verbose outputs eat tokens disproportionately to relevance<\/td>\n<td>Forwarding the full 40-field blob because \"more context is better\"<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>4. Failure-modes drill<\/h2>\n<p>Styled like the guide's sample questions: production symptom \u2192 root cause \u2192 fix. Cover these and you can reverse-engineer most distractors.<\/p>\n<p><strong>1. Invoices with no date come back with plausible-looking dates that aren't in the document.<\/strong>\nRoot cause: <code>invoice_date<\/code> is a <strong>required<\/strong> schema field, so the model fabricates a value to satisfy it.\nFix: make fields the source may lack optional/nullable, and state \"return null, never infer\" in the tool description and prompt. (Not: \"add instructions to be more careful.\")<\/p>\n<p><strong>2. ~5% of responses fail <code>json.loads<\/code> \u2014 markdown fences, trailing commas, prose preambles.<\/strong>\nRoot cause: output is prompted JSON in a text response, not tool use.\nFix: define an extraction tool with the JSON schema as <code>input_schema<\/code> and read the <code>tool_use<\/code> block. Tool use eliminates syntax errors by construction. (Not: a regex cleanup layer, or \"respond ONLY with JSON\" in caps.)<\/p>\n<p><strong>3. Every extraction passes the JSON schema, but finance reports line items that don't sum to the stated total.<\/strong>\nRoot cause: strict schemas eliminate syntax errors only \u2014 semantic errors sail through.\nFix: Pydantic semantic validation (cross-field checks) + retry-with-error-feedback; add <code>calculated_total<\/code> next to <code>stated_total<\/code> and a <code>conflict_detected<\/code> boolean so discrepancies surface as data. (Not: making the schema stricter.)<\/p>\n<p><strong>4. The retry loop burns 3 attempts per document on a batch of receipts, then fails anyway \u2014 the failing field is <code>po_number<\/code> and receipts don't have PO numbers.<\/strong>\nRoot cause: retrying an information-absence failure. Retries fix format/structural errors; they cannot fix information missing from the source.\nFix: classify validation failures; absent-info failures return null immediately and route by confidence \u2014 zero retries. (Not: raising max_retries or \"improving\" the retraction prompt.)<\/p>\n<p><strong>5. With three extraction tools registered (invoice/contract/receipt), the model occasionally replies \"This appears to be an invoice for...\" \u2014 plain text, no tool call.<\/strong>\nRoot cause: <code>tool_choice: \"auto\"<\/code> permits text responses.\nFix: <code>tool_choice: {\"type\": \"any\"}<\/code> \u2014 a tool call is guaranteed, the model picks the schema (doc type is unknown, so don't force one). (Not: prompt instructions to \"always use a tool.\")<\/p>\n<p><strong>6. Team moved the customer-facing, on-demand extraction endpoint to the Batches API for the 50% savings; users now sometimes wait hours.<\/str
