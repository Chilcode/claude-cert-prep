<body>
<title>CCAF Study Hub</title>
<style>
  :root {
    --bg: #FAF7F2; --surface: #FFFFFF; --surface2: #F2EDE3; --ink: #26221B;
    --ink-soft: #6E6659; --line: #E3DCCD; --line-strong: #C9C0AC;
    --accent: #9A6B00; --accent-ink: #7A5500; --accent-bg: #F6E9CB;
    --good: #2E7D4F; --good-bg: #E3F1E7; --bad: #C0392E; --bad-bg: #F9E6E2;
    --shadow: 0 1px 2px rgba(60,50,30,.06), 0 4px 16px rgba(60,50,30,.07);
    --serif: Charter, 'Bitstream Charter', 'Sitka Text', Cambria, Georgia, serif;
    --sans: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --mono: ui-monospace, 'Cascadia Code', Consolas, 'SF Mono', Menlo, monospace;
  }
  @media (prefers-color-scheme: dark) { :root {
    --bg: #15181E; --surface: #1C2027; --surface2: #242933; --ink: #EAE4D6;
    --ink-soft: #A39A88; --line: #2D3340; --line-strong: #475062;
    --accent: #E8B04B; --accent-ink: #F0BE63; --accent-bg: #2E2A1C;
    --good: #4CC38A; --good-bg: #1C2E24; --bad: #E5695C; --bad-bg: #33211E;
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 6px 20px rgba(0,0,0,.35);
  }}
  :root[data-theme="light"] {
    --bg: #FAF7F2; --surface: #FFFFFF; --surface2: #F2EDE3; --ink: #26221B;
    --ink-soft: #6E6659; --line: #E3DCCD; --line-strong: #C9C0AC;
    --accent: #9A6B00; --accent-ink: #7A5500; --accent-bg: #F6E9CB;
    --good: #2E7D4F; --good-bg: #E3F1E7; --bad: #C0392E; --bad-bg: #F9E6E2;
    --shadow: 0 1px 2px rgba(60,50,30,.06), 0 4px 16px rgba(60,50,30,.07);
  }
  :root[data-theme="dark"] {
    --bg: #15181E; --surface: #1C2027; --surface2: #242933; --ink: #EAE4D6;
    --ink-soft: #A39A88; --line: #2D3340; --line-strong: #475062;
    --accent: #E8B04B; --accent-ink: #F0BE63; --accent-bg: #2E2A1C;
    --good: #4CC38A; --good-bg: #1C2E24; --bad: #E5695C; --bad-bg: #33211E;
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 6px 20px rgba(0,0,0,.35);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); font-family: var(--sans); line-height: 1.5; }
  .wrap { max-width: 780px; margin: 0 auto; padding: 16px 20px 90px; }
  .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-soft); }
  .eyebrow b { color: var(--accent-ink); font-weight: 700; }
  h1 { font-family: var(--serif); font-size: 30px; line-height: 1.15; margin: 6px 0 4px; text-wrap: balance; }
  .sub { color: var(--ink-soft); font-size: 14px; margin: 0 0 6px; }
  code { font-family: var(--mono); font-size: .88em; background: var(--surface2); border: 1px solid var(--line); border-radius: 4px; padding: 0 4px; white-space: nowrap; }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: 10px; box-shadow: var(--shadow); }
  button { font: inherit; color: inherit; cursor: pointer; }
  button:focus-visible, .chip input:focus-visible + span { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* top bar + tabs */
  .topbar { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 22px; }
  .brand { font-size: 12px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-soft); white-space: nowrap; }
  .brand b { color: var(--accent-ink); }
  .tabs { display: flex; gap: 4px; }
  .tabs button { border: 0; background: none; padding: 6px 14px; border-radius: 999px; font-size: 13.5px; color: var(--ink-soft); }
  .tabs button.active { background: var(--accent-bg); color: var(--ink); font-weight: 700; }
  .tabs button:hover:not(.active) { background: var(--surface2); }

  /* home / practice */
  .modes { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 18px; }
  @media (max-width: 620px) { .modes { grid-template-columns: 1fr; } }
  .mode { padding: 18px; text-align: left; border: 1px solid var(--line); background: var(--surface); border-radius: 10px; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 6px; }
  .mode:hover { border-color: var(--accent); }
  .mode h2 { margin: 0; font-family: var(--serif); font-size: 20px; }
  .mode p { margin: 0; color: var(--ink-soft); font-size: 13.5px; }
  .mode .go { margin-top: 8px; align-self: flex-start; font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--accent-ink); }
  fieldset { border: 1px solid var(--line); border-radius: 10px; margin: 18px 0 0; padding: 14px 16px 16px; background: var(--surface); }
  legend { font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-soft); padding: 0 6px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { display: inline-flex; }
  .chip input { position: absolute; opacity: 0; pointer-events: none; }
  .chip span { display: inline-block; padding: 5px 12px; border: 1px solid var(--line-strong); border-radius: 999px; font-size: 13px; color: var(--ink-soft); background: var(--surface); cursor: pointer; user-select: none; }
  .chip input:checked + span { background: var(--accent-bg); border-color: var(--accent); color: var(--ink); font-weight: 600; }
  .row { display: flex; flex-wrap: wrap; gap: 10px 22px; align-items: center; margin-top: 12px; }
  .row label { font-size: 13px; color: var(--ink-soft); display: inline-flex; align-items: center; gap: 6px; }
  select { font: inherit; font-size: 13px; background: var(--surface); color: var(--ink); border: 1px solid var(--line-strong); border-radius: 6px; padding: 4px 8px; max-width: 260px; }
  .primary { background: var(--accent-bg); border: 1px solid var(--accent); color: var(--ink); font-weight: 700; padding: 10px 22px; border-radius: 8px; font-size: 15px; }
  .primary:hover { filter: brightness(1.04); }
  .ghost { background: none; border: 1px solid var(--line-strong); border-radius: 8px; padding: 8px 16px; font-size: 13.5px; color: var(--ink-soft); }
  .ghost:hover { border-color: var(--accent); color: var(--ink); }
  .ghost.small { padding: 4px 10px; font-size: 12px; border-radius: 6px; white-space: nowrap; }
  .ghost.speaking { border-color: var(--accent); color: var(--accent-ink); font-weight: 700; }
  .audio-note { font-size: 12px; color: var(--ink-soft); margin: 8px 0 0; }
  .statline { display: flex; gap: 26px; flex-wrap: wrap; margin-top: 18px; padding: 12px 16px; background: var(--surface2); border-radius: 10px; font-variant-numeric: tabular-nums; }
  .statline div { font-size: 13px; color: var(--ink-soft); }
  .statline b { display: block; font-size: 19px; color: var(--ink); font-family: var(--serif); }

  /* study list */
  .study-group { margin-top: 22px; }
  .study-group > h2 { font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-soft); margin: 0 0 8px; }
  .study-item { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; width: 100%; text-align: left; padding: 12px 16px; background: var(--surface); border: 1px solid var(--line); border-radius: 8px; margin-top: 6px; font-size: 14.5px; }
  .study-item:hover { border-color: var(--accent); }
  .study-item .t { font-family: var(--serif); }
  .study-item .m { font-size: 12px; color: var(--ink-soft); white-space: nowrap; font-variant-numeric: tabular-nums; }

  /* doc reader */
  .doc-toolbar { position: sticky; top: 0; background: var(--bg); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; padding: 10px 0; border-bottom: 1px solid var(--line); margin-bottom: 4px; z-index: 5; }
  .doc-toolbar .spacer { flex: 1; }
  .doc-hint { font-size: 11.5px; color: var(--ink-soft); }
  article.doc { font-family: var(--serif); font-size: 16.5px; line-height: 1.65; max-width: 68ch; }
  article.doc h1 { font-size: 28px; margin: 18px 0 6px; }
  article.doc h2 { font-family: var(--serif); font-size: 21px; margin: 28px 0 8px; line-height: 1.25; text-wrap: balance; }
  article.doc h3 { font-family: var(--sans); font-size: 15px; margin: 22px 0 6px; }
  article.doc h4 { font-family: var(--sans); font-size: 13px; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-soft); margin: 18px 0 4px; }
  article.doc p, article.doc li { margin: 8px 0; }
  article.doc pre { font-family: var(--mono); font-size: 12.5px; line-height: 1.5; background: var(--surface2); border: 1px solid var(--line); border-radius: 8px; padding: 12px 14px; overflow-x: auto; }
  article.doc pre code { background: none; border: 0; padding: 0; white-space: pre; }
  article.doc table { border-collapse: collapse; font-family: var(--sans); font-size: 13px; line-height: 1.45; display: block; overflow-x: auto; margin: 12px 0; }
  article.doc th, article.doc td { border: 1px solid var(--line); padding: 7px 10px; text-align: left; vertical-align: top; min-width: 110px; }
  article.doc th { background: var(--surface2); font-size: 12px; }
  article.doc blockquote { margin: 10px 0; padding: 4px 14px; border-left: 3px solid var(--accent); color: var(--ink-soft); }
  article.doc hr { border: 0; border-top: 1px solid var(--line); margin: 22px 0; }
  .reading { background: var(--accent-bg); border-radius: 4px; box-shadow: 0 0 0 4px var(--accent-bg); }
  tr.reading td, tr.reading th { background: var(--accent-bg); }

  /* question */
  .qhead { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .qhead .prog { font-variant-numeric: tabular-nums; font-size: 13px; color: var(--ink-soft); white-space: nowrap; display: inline-flex; align-items: center; gap: 8px; }
  .timer { font-family: var(--mono); font-size: 14px; padding: 2px 10px; border-radius: 6px; background: var(--surface2); border: 1px solid var(--line); font-variant-numeric: tabular-nums; }
  .timer.low { color: var(--bad); border-color: var(--bad); font-weight: 700; }
  .scen-banner { font-family: var(--serif); font-size: 15px; font-style: italic; color: var(--ink-soft); border-left: 3px solid var(--accent); padding: 6px 12px; margin: 0 0 14px; background: var(--surface); border-radius: 0 8px 8px 0; }
  .qcard { padding: 22px 24px; }
  .stem { font-family: var(--serif); font-size: 17.5px; line-height: 1.55; margin: 10px 0 18px; }
  .opts { display: flex; flex-direction: column; gap: 10px; }
  .opt { display: flex; gap: 12px; align-items: flex-start; text-align: left; width: 100%; padding: 12px 14px; border: 1px solid var(--line-strong); border-radius: 8px; background: var(--surface); font-size: 14.5px; line-height: 1.5; }
  .opt:hover:not(:disabled) { border-color: var(--accent); background: var(--surface2); }
  .opt:disabled { cursor: default; }
  .opt .key { flex: 0 0 auto; width: 24px; height: 24px; border-radius: 6px; border: 1px solid var(--line-strong); display: grid; place-items: center; font-family: var(--mono); font-size: 12.5px; font-weight: 700; color: var(--ink-soft); margin-top: 1px; }
  .opt.right { border-color: var(--good); background: var(--good-bg); }
  .opt.right .key { background: var(--good); border-color: var(--good); color: #fff; }
  .opt.wrong { border-color: var(--bad); background: var(--bad-bg); }
  .opt.wrong .key { background: var(--bad); border-color: var(--bad); color: #fff; }
  .opt.dim { opacity: .55; }
  .verdict { margin-top: 16px; border-radius: 8px; padding: 14px 16px; font-size: 14px; }
  .verdict.ok { background: var(--good-bg); border: 1px solid var(--good); }
  .verdict.no { background: var(--bad-bg); border: 1px solid var(--bad); }
  .verdict h3 { margin: 0 0 6px; font-size: 14px; }
  .verdict .ex { font-family: var(--serif); font-size: 14.5px; line-height: 1.55; }
  .rule { margin-top: 10px; padding: 8px 12px; background: var(--accent-bg); border-left: 3px solid var(--accent); border-radius: 0 6px 6px 0; font-size: 13px; }
  .rule b { letter-spacing: .1em; text-transform: uppercase; font-size: 10.5px; color: var(--accent-ink); display: block; margin-bottom: 2px; }
  .qfoot { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; gap: 12px; }
  .hint { font-size: 12px; color: var(--ink-soft); }

  /* results */
  .score-hero { text-align: center; padding: 28px 20px 22px; }
  .score-hero .big { font-family: var(--serif); font-size: 56px; line-height: 1; font-variant-numeric: tabular-nums; }
  .score-hero .big small { font-size: 22px; color: var(--ink-soft); }
  .badge { display: inline-block; margin-top: 8px; padding: 4px 14px; border-radius: 999px; font-size: 12.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
  .badge.pass { background: var(--good-bg); color: var(--good); border: 1px solid var(--good); }
  .badge.fail { background: var(--bad-bg); color: var(--bad); border: 1px solid var(--bad); }
  .passnote { font-size: 12.5px; color: var(--ink-soft); margin-top: 10px; }
  .bars { padding: 6px 20px 18px; }
  .bar-row { display: grid; grid-template-columns: minmax(140px, 1fr) 2fr 76px; gap: 12px; align-items: center; padding: 7px 0; border-top: 1px solid var(--line); font-size: 13px; }
  .bar-row:first-child { border-top: 0; }
  .track { height: 8px; border-radius: 4px; background: var(--surface2); overflow: hidden; }
  .fill { height: 100%; border-radius: 4px; background: var(--accent); }
  .fill.lowacc { background: var(--bad); }
  .bar-row .num { text-align: right; font-variant-numeric: tabular-nums; color: var(--ink-soft); }
  details.miss { border: 1px solid var(--line); border-radius: 8px; margin-top: 10px; background: var(--surface); }
  details.miss summary { cursor: pointer; padding: 12px 14px; font-family: var(--serif); font-size: 14.5px; line-height: 1.45; }
  details.miss[open] summary { border-bottom: 1px solid var(--line); }
  details.miss .body { padding: 12px 16px 14px; font-size: 13.5px; }
  details.miss .body p { margin: 6px 0; }
  .yourpick { color: var(--bad); } .rightpick { color: var(--good); }
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-soft); margin: 26px 0 8px; }
  .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
  @media (prefers-reduced-motion: no-preference) {
    .qcard, .score-hero { animation: rise .25s ease-out; }
    @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    html { scroll-behavior: smooth; }
  }
</style>

<div class="wrap">
  <div class="topbar">
    <div class="brand">CCAF <b>Study Hub</b></div>
    <nav class="tabs">
      <button id="tabStudy">Study</button>
      <button id="tabPractice">Practice</button>
    </nav>
    <button class="ghost small" id="homeBtn" hidden>End session</button>
  </div>
  <main id="app"></main>
</div>

<script>
const BANK = {"meta":{"exam":"Claude Certified Architect - Foundations","built":"2026-07-11","source":"official exam guide v0.2 (2026-06-30)","count":60},"questions":[{"id":"s1-q1","domain":1,"difficulty":"core","rule":"Loop control comes from stop_reason only \u2014 continue on \"tool_use\", terminate on \"end_turn\"; text parsing and iteration caps are anti-patterns.","stem":"A developer implemented the support agent's main loop to terminate when the assistant's reply text contains the phrase \"CASE CLOSED,\" with a hard cap of 10 iterations as a backstop. In production, 8% of sessions end mid-investigation with tool calls still pending, while other sessions keep looping after the customer's issue is fully resolved. What change most effectively fixes the loop control?","options":["Raise the iteration cap from 10 to 30 and strengthen the system prompt instruction that every final reply must end with \"CASE CLOSED\".","Rework the loop to continue while stop_reason is \"tool_use\" and terminate when stop_reason is \"end_turn\".","Terminate the loop whenever the response contains a text content block, since text output indicates the model has finished reasoning.","Add a signal_completion MCP tool the agent is instructed to call when done, and terminate the loop when that tool is invoked."],"correct":1,"explanation":"stop_reason is the API's deterministic loop-control signal: \"tool_use\" means the model requested tools and expects results back; \"end_turn\" means it is done. Option B replaces two named anti-patterns (natural-language termination signals and an iteration cap as the primary stop) with the correct mechanism. Option A doubles down on both anti-patterns \u2014 a bigger cap still truncates or over-runs arbitrarily, and phrase emission remains probabilistic. Option C is itself a named anti-pattern: assistant turns can contain text alongside tool_use blocks, so text presence does not indicate completion. Option D adds an unnecessary tool whose invocation is still a probabilistic model behavior \u2014 the deterministic signal already exists in stop_reason."},{"id":"s1-q2","domain":1,"difficulty":"stretch","rule":"Business rules with financial consequences go in interception hooks that block AND redirect to the alternative workflow \u2014 never prompt-only, never a generic failure.","stem":"Company policy caps autonomous refunds at $500. The rule is stated in three places in the system prompt, yet a monthly audit finds four refunds between $620 and $940 were processed autonomously. Which change most effectively enforces the policy?","options":["Set temperature to 0 and add an all-caps MUST NOT instruction \u2014 deterministic decoding guarantees the model follows the prompt's refund rule.","A tool-call interception hook that blocks the over-limit call and returns a generic \"Operation failed\" error so the refund never executes.","A tool-call interception hook that blocks process_refund calls with amount over $500 and returns a result directing the agent to call escalate_to_human with a structured handoff.","Route every proposed refund through a second reviewer agent that approves or rejects the amount before the tool executes."],"correct":2,"explanation":"Option C gives a deterministic guarantee (the hook fires in code, regardless of what the model decides) and redirects to the correct alternative workflow \u2014 the guide's pattern is to block policy-violating actions AND route to escalation, so the customer still gets served. Option B blocks the call but returns a uniform generic error, which prevents appropriate recovery: the agent may retry, misreport a system outage, or dead-end instead of escalating. Option A is a misconception \u2014 temperature 0 makes sampling greedy, not compliant; prompt adherence remains probabilistic, which the audit already proved insufficient. Option D is over-engineered and still probabilistic: an LLM reviewer can also fail to enforce the threshold, and a simple numeric comparison needs code, not another model."},{"id":"s1-q3","domain":1,"difficulty":"core","rule":"Multi-concern requests: decompose into distinct items, investigate each with shared context, synthesize one unified resolution.","stem":"A customer writes: \"I received the wrong size, I was charged twice for it, and now I'm locked out of my account.\" Transcript review shows the agent investigates and resolves only the duplicate charge, then ends its turn; the customer must re-send the other two issues. Multi-issue sessions now average 2.4 contacts against your one-contact resolution target. What's the most effective design change?","options":["Spawn a dedicated subagent per issue, each with its own isolated context, and concatenate their three independent replies to the customer.","Update the support intake form to require one issue per submission so every request maps to a single resolution path.","Set tool_choice to \"any\" so the agent is forced to keep calling tools each turn until every issue has been addressed.","Have the agent decompose multi-concern messages into distinct items, investigate each using the shared conversation context, then synthesize one unified resolution addressing all items."],"correct":3,"explanation":"Option D is the guide's pattern for multi-concern requests: decompose, investigate each item (in parallel where possible) against shared context, then synthesize \u2014 the issues are related (the duplicate charge is on the wrong-size order), so shared context matters. Option A is over-engineered and loses that shared context: isolated subagents can't see that the three issues involve the same order and account, and this single-agent scenario doesn't need subagents. Option B shifts the burden to customers, degrading their experience without improving the system \u2014 a named anti-pattern shape. Option C solves a different problem: \"any\" forces some tool call on each turn but does nothing to guarantee coverage of all three concerns, and it prevents the agent from ever replying conversationally."},{"id":"s1-q4","domain":1,"difficulty":"core","rule":"Escalation handoff = structured, self-contained summary (customer ID, root cause, refund amount, recommended action) \u2014 the human never sees the transcript.","stem":"Human agents reject or re-triage 60% of tickets escalated by the agent, reporting that tickets arrive saying only \"Customer needs help with a refund\" and they must re-contact customers for basic details. Human agents have no access to the AI conversation transcript. What's the most effective fix?","options":["Make escalate_to_human require a structured handoff \u2014 customer ID, root-cause analysis, refund amount, and recommended action \u2014 so every ticket is complete and self-contained.","Attach the full raw conversation history, including all tool results, to every escalated ticket so nothing is lost.","Build a dashboard that gives human agents live read access to the agent's session store for any escalated case.","Add a system prompt instruction: \"Always provide helpful context when escalating to a human.\""],"correct":0,"explanation":"Option A implements the guide's structured handoff protocol for mid-process escalation: the exact fields (customer ID, root cause, refund amount, recommended action) give the human everything needed to act without transcript access, and requiring them in the tool schema makes the handoff deterministic. Option B dumps unprocessed data \u2014 40-field tool payloads and dozens of turns bury the key facts and force the human to reconstruct the analysis the agent already did. Option C is over-engineered infrastructure that still leaves humans reading raw transcripts instead of receiving a synthesized handoff. Option D is vague prompt-only guidance \u2014 \"helpful context\" is unenforced and unstructured, so completeness remains probabilistic."},{"id":"s1-q5","domain":2,"difficulty":"core","rule":"Tool errors carry errorCategory + isRetryable + readable message; business denials are retriable: false with a customer-friendly explanation.","stem":"A customer requests a refund on an order delivered 47 days ago; the policy window is 30 days. process_refund correctly denies the request but returns {\"error\": \"Operation failed\"}. The agent retries the call twice more, then tells the customer \"our refund system is experiencing issues \u2014 please try again later.\" What change most effectively fixes this behavior?","options":["Add a system prompt rule: \"Never retry a process_refund call that returns an error.\"","Return structured error metadata via the MCP isError pattern: errorCategory \"business\", retriable: false, and a customer-friendly explanation of the return-window policy the agent can relay.","Have process_refund return an empty success result for policy denials so the agent stops retrying.","Add a loop-level retry cap of one attempt for all tool calls."],"correct":1,"explanation":"The root cause is a uniform generic error: the agent cannot distinguish a business-rule denial from a transient fault, so it retries and then misinforms the customer. Option B fixes that root cause \u2014 the category tells the agent not to retry, and the readable message lets it explain the actual policy. Option A is prompt-only (probabilistic) and overcorrects: it would also stop legitimate retries of transient timeouts on process_refund. Option C is the named anti-pattern of silently returning failure as success \u2014 the agent would tell the customer nothing useful or, worse, imply the refund succeeded. Option D patches the symptom: retries stop, but the agent still can't explain the denial and genuine transient failures lose their recovery path."},{"id":"s1-q6","domain":2,"difficulty":"core","rule":"Scope each agent to the 4-5 tools its role needs \u2014 too many visible tools degrades selection reliability even with good descriptions.","stem":"To \"future-proof\" the support agent, your team registers three additional departmental MCP servers, raising its visible tool count from 4 to 19 (loyalty, marketing, and logistics tools). All 19 descriptions are detailed and non-overlapping. Within a week, tool-misselection incidents rise from about 1% to 9% \u2014 for example, the agent calls check_loyalty_balance when asked about a refund's status. What's the most effective fix?","options":["Expand each of the 19 tool descriptions further with additional example queries and boundary explanations.","Add few-shot examples to the system prompt demonstrating correct tool selection across all 19 tools.","Restrict the support agent's configuration to the four or five tools its role actually requires, removing the other departments' tools from its tool set.","Add a keyword-based routing layer that inspects each request and enables only the subset of tools relevant to it."],"correct":2,"explanation":"The guide's principle: giving an agent far more tools than its role needs (e.g., 18 instead of 4-5) degrades selection reliability by increasing decision complexity. The descriptions are already good, so the root cause is tool-set size \u2014 Option C applies scoped tool access and removes the complexity. Option A solves a different problem: descriptions are the primary selection mechanism, but they're already detailed here; more prose can't offset 19-way decision load. Option D is over-engineered infrastructure that bypasses the model's language understanding and adds a new brittle component. Option B adds token overhead and probabilistic guidance without reducing the decision complexity that caused the regression."},{"id":"s1-q7","domain":2,"difficulty":"stretch","rule":"When good descriptions are still being ignored, audit the system prompt for keyword-sensitive wording creating unintended tool associations.","stem":"You've already rewritten get_customer and lookup_order descriptions to include input formats, example queries, edge cases, and explicit when-to-use boundaries. Yet the agent still calls get_customer for order-status queries like \"where is order ORD-55821?\" in 15% of cases. The system prompt opens with: \"Your first priority is always understanding the customer \u2014 begin every interaction by getting to know the customer's situation.\" What's the most likely effective fix?","options":["Revise the system prompt to remove the keyword-sensitive wording (\"getting to know the customer\") that creates an unintended association with the get_customer tool.","Rewrite the two tool descriptions again, adding more order-number format examples to lookup_order.","Consolidate get_customer and lookup_order into a single lookup_entity tool that accepts any identifier and routes internally.","Add pre-processing that forces tool_choice to lookup_order whenever the user's message contains the string \"ORD-\"."],"correct":0,"explanation":"The guide notes that system prompt wording can override well-written tool descriptions: keyword-sensitive instructions create unintended tool associations. Here \"getting to know the customer\" semantically pulls the model toward get_customer on every interaction \u2014 that's the remaining root cause, since descriptions were already fixed. Option B re-solves an already-solved problem; the descriptions aren't the failure point anymore. Option C is a disproportionate architectural change that discards the clean identity-vs-order separation the prerequisite design depends on. Option D is an over-engineered keyword router that bypasses the model's language understanding and misfires whenever \"ORD-\" appears in a message that isn't an order-status query (or is absent from one that is)."},{"id":"s1-q8","domain":5,"difficulty":"core","rule":"Facts with digits (amounts, dates, IDs, stated expectations) live in a persistent case-facts block outside summarized history.","stem":"In multi-issue sessions longer than about 25 turns, the conversation history is progressively summarized to stay within the context budget. Reviewers find that late in these sessions the agent quotes an $84.50 refund for a $119.99 order and re-offers store credit that the customer explicitly refused back in turn 3. What's the most effective fix?","options":["Switch to a model with a larger context window and disable summarization so the full transcript is always present.","Instruct the summarizer to \"preserve all important details, especially numbers\" when compressing the history.","Store the full transcript in a vector database and retrieve the most semantically relevant chunks into context each turn.","Extract transactional facts \u2014 amounts, dates, order IDs, statuses, and customer-stated expectations \u2014 into a persistent case-facts block included with every request, outside the summarized history."],"correct":3,"explanation":"The root cause is a known progressive-summarization risk: numerical values, dates, and customer-stated expectations get condensed into vague prose. Option D is the guide's fix \u2014 keep transactional facts in a structured, persistent layer that never passes through summarization, so exact figures and the store-credit refusal survive every turn. Option A over-provisions: it raises cost and, on very long transcripts, key mid-conversation facts still degrade via the lost-in-the-middle effect. Option B is vague prompt-only guidance \u2014 summarization remains lossy and compliance is probabilistic, which is exactly what already failed. Option C is over-engineered infrastructure whose semantic retrieval can still miss the specific transactional fact needed on a given turn; deterministic persistence beats probabilistic retrieval for a handful of critical facts."},{"id":"s1-q9","domain":5,"difficulty":"core","rule":"An explicit customer request for a human is a first-class escalation trigger \u2014 escalate immediately, no investigation first.","stem":"Transcript audits show that when customers explicitly say \"I want to talk to a human,\" the agent replies \"Let me first check your account,\" runs get_customer and lookup_order, and offers a resolution \u2014 escalating only after roughly 40% of these customers repeat the demand. CSAT for these interactions runs 31 points below baseline. What change best addresses this?","options":["Add sentiment analysis that automatically escalates whenever negative sentiment crosses a threshold.","Instruct the agent to honor explicit requests for a human by calling escalate_to_human immediately, without attempting investigation first.","Parallelize the get_customer and lookup_order calls so the agent can present its resolution offer faster.","Have the agent self-report a confidence score before each reply and escalate whenever confidence falls below a threshold."],"correct":1,"explanation":"An explicit customer request for a human is a first-class escalation trigger that should be honored immediately \u2014 investigating first is exactly the failure the logs show, and it directly damages satisfaction. Option B fixes that root cause. Option A solves a different problem and uses an unreliable proxy: the trigger here is an explicit stated request, not tone, and sentiment doesn't correlate with the need to escalate (a calm customer can still demand a human; the separate rule for frustrated-but-simple cases is to acknowledge and offer resolution, not auto-escalate). Option C optimizes the wrong path \u2014 the customer asked for a person, so a faster unwanted resolution offer doesn't help. Option D relies on self-reported confidence, which the guide names as poorly calibrated and unrelated to this trigger."},{"id":"s1-q10","domain":5,"difficulty":"stretch","rule":"Multiple customer matches \u2192 ask for an additional identifier; never select heuristically (in the prompt, the tool, or an ML layer).","stem":"get_customer returns three accounts matching \"M. Garcia\" in the same zip code. The agent selects the most recently active account and processes a $75 refund \u2014 to the wrong customer. What's the most effective design change?","options":["Modify get_customer to internally rank the candidates and return only the single highest-confidence match to the agent.","Configure the enforcement layer to invoke escalate_to_human automatically whenever get_customer returns more than one match.","Instruct the agent that when get_customer returns multiple matches, it must ask the customer for an additional identifier (order number, email, or billing phone) rather than selecting an account heuristically.","Train a fuzzy-matching model on historical resolution data to disambiguate between candidate accounts automatically."],"correct":2,"explanation":"The guide is explicit: multiple customer matches require clarification \u2014 request additional identifiers \u2014 rather than heuristic selection. Option C puts the disambiguation decision with the only party who actually knows the answer: the customer. Option A just relocates the heuristic from the prompt into the tool; it hides the ambiguity from the agent entirely, so the same wrong-account refunds occur with less visibility. Option B is disproportionate: valid escalation triggers are explicit customer requests, policy gaps, and inability to make progress \u2014 and asking one clarifying question IS meaningful progress, so burning human capacity on every common-name match wrecks the 80% first-contact-resolution target. Option D is over-engineered ML infrastructure that still guesses; no confidence score eliminates the misidentification risk that a direct question resolves deterministically."},{"id":"s2-q1","domain":3,"difficulty":"core","rule":"User-level ~/.claude/CLAUDE.md is never shared via version control; team standards belong in project-level CLAUDE.md.","stem":"You configured Claude Code with your team's coding standards six months ago, and it follows them consistently in your sessions. Two engineers who joined this sprint cloned the repository, but report that Claude ignores every standard \u2014 generated code uses `any` types and skips the required integration tests. What is the root cause and the most effective fix?","options":["Have the new engineers copy your ~/.claude/CLAUDE.md file to their own home directories so their sessions match yours.","The standards live in your ~/.claude/CLAUDE.md, which is user-level and not distributed via version control; move them to the project-level CLAUDE.md and commit it.","Enable \"syncSettings\": true in .claude/config.json so user-level configuration propagates to everyone who clones the repository.","Create a /standards slash command in .claude/commands/ that new engineers run at the start of each session to load the conventions."],"correct":1,"explanation":"User-level configuration (~/.claude/CLAUDE.md) applies only to that user and is invisible to teammates \u2014 the repo clone carried no standards at all. Moving the instructions to project-level CLAUDE.md fixes the mechanism: every clone or pull gets them automatically. Option A patches two individuals but breaks again on the next hire and drifts whenever you update your copy \u2014 it shifts burden instead of fixing the root cause. Option C references a configuration mechanism that does not exist in Claude Code. Option D solves a different problem: slash commands are on-demand prompts, not always-loaded standards, and depend on developers remembering to invoke them every session."},{"id":"s2-q2","domain":3,"difficulty":"core","rule":"Skills with verbose output get context: fork so they run in an isolated sub-agent context and return only the result.","stem":"Your team's /analyze-module skill maps a module's dependency graph and dumps roughly 15,000 tokens of raw dependency data into the conversation. Developers report that after running it, Claude's answers about unrelated parts of the codebase get noticeably worse for the rest of the session. What change most effectively addresses this?","options":["Add an instruction to the skill's prompt telling it to output only a brief summary and omit the raw dependency data.","Document that developers should run /compact immediately after each invocation of the skill.","Switch sessions that use the skill to a model with a larger context window so the dependency data fits without crowding out other context.","Add context: fork to the skill's SKILL.md frontmatter so it runs in an isolated sub-agent context and returns only its summary to the main conversation."],"correct":3,"explanation":"context: fork is the designed mechanism for exactly this failure: the skill executes in an isolated sub-agent context, its verbose intermediate output never enters the main conversation, and only the result comes back. Option A relies on probabilistic prompt compliance and also degrades the analysis itself, since the skill may need the raw data internally to reason before summarizing. Option B is a manual, lossy symptom patch \u2014 compaction after pollution can still discard earlier findings and depends on developers remembering to run it. Option C misdiagnoses the problem as capacity: the issue is irrelevant tokens degrading attention and answer quality, which a larger window does not fix."},{"id":"s2-q3","domain":3,"difficulty":"core","rule":"Preventing destructive actions during skill execution requires the deterministic allowed-tools frontmatter restriction, not prompt instructions.","stem":"A documentation-generation skill in .claude/skills/ only ever needs to read source files and write markdown, but it occasionally runs Bash commands during execution \u2014 one run executed `git checkout .` and wiped a developer's uncommitted changes. What is the most effective way to prevent this from recurring?","options":["Set allowed-tools in the skill's SKILL.md frontmatter to permit only Read, Grep, Glob, and Write during skill execution.","Add \"Never run git or destructive shell commands\" to the skill's prompt body.","Require developers to run the skill in plan mode so every proposed action is reviewed before execution.","Instruct developers to commit or stash all local changes before invoking the skill."],"correct":0,"explanation":"allowed-tools is the deterministic enforcement mechanism: with Bash excluded from the frontmatter, the skill structurally cannot run shell commands, no matter what the model decides mid-execution. Option B is prompt-based guidance with a non-zero failure rate \u2014 unacceptable when the failure destroys work. Option C misapplies plan mode, which is a task-complexity workflow choice, not a skill sandboxing mechanism, and adds approval friction to every doc run. Option D shifts the burden to developers and merely reduces the blast radius of the defect instead of removing the skill's ability to cause it."},{"id":"s2-q4","domain":3,"difficulty":"core","rule":"Match execution mode to task scope: direct execution for well-scoped single-file changes, plan mode for architectural or multi-file work.","stem":"After a botched refactor, your team mandated plan mode for every Claude Code task. Two sprints later, developers report that simple fixes \u2014 such as adding a null check to one function identified by a clear stack trace \u2014 now take roughly three times as long, while quality on large changes is unchanged from before the mandate. What policy change is most appropriate?","options":["Keep the blanket mandate but automatically approve any plan whose proposed diff is under 50 lines.","Drop plan mode entirely and instead provide comprehensive upfront instructions describing exactly how each change should be implemented.","Match mode to task scope: use direct execution for simple, well-scoped single-file changes, and reserve plan mode for multi-file changes, architectural decisions, and tasks with multiple valid approaches.","Route every incoming task through the Explore subagent first and let its findings determine which mode to use."],"correct":2,"explanation":"Plan mode exists for complex work \u2014 large-scale changes, multiple valid approaches, architectural decisions \u2014 while direct execution is the documented fit for simple, well-scoped changes like a single-file bug fix with a clear stack trace. Matching mode to scope removes the overhead without sacrificing the safety plan mode provides where it matters. Option A keeps the ceremony while gutting its value: auto-approved plans are pure latency with no review. Option B swings to the opposite extreme and assumes you already know the right structure for complex changes, recreating the original rework risk. Option D over-engineers triage \u2014 the Explore subagent exists to isolate verbose discovery output during large tasks, not to classify trivially scoped fixes, and it adds a round trip to every one-line change."},{"id":"s2-q5","domain":3,"difficulty":"core","rule":"Use @import so each package's CLAUDE.md pulls in only the standards files relevant to it, chosen by maintainer domain knowledge.","stem":"Your monorepo has six packages and a shared docs/standards/ directory containing nine standards files (API, frontend, database, deployment, and others). Loading all nine into every session bloats context, and Claude sometimes applies frontend conventions to database code. Each package's maintainers know exactly which standards apply to their package. What is the most maintainable configuration?","options":["Give each package its own CLAUDE.md that uses @import to include only the standards files relevant to that package.","Keep a single root CLAUDE.md containing all nine standards under clearly labeled section headers and rely on Claude to apply the correct section.","Convert each standards file into a skill in .claude/skills/ that maintainers invoke when working inside their package.","Register a package-to-standards mapping in .claude/config.json so Claude Code loads the correct files per package."],"correct":0,"explanation":"The @import syntax exists precisely for modular CLAUDE.md organization: each package's file imports only the relevant standards, chosen by the maintainers who hold the domain knowledge, so sessions load focused context automatically. Option B is the monolith anti-pattern \u2014 it burns tokens on eight irrelevant standards and relies on the model inferring which section applies, which is exactly the cross-contamination already being observed. Option C converts always-applicable standards into on-demand skills, which require manual invocation and are skipped whenever a developer forgets. Option D references a configuration mechanism that does not exist in Claude Code."},{"id":"s2-q6","domain":3,"difficulty":"core","rule":"When conventions apply inconsistently across sessions or machines, run /memory first to verify which memory files are actually loaded.","stem":"A convention in your project's CLAUDE.md \u2014 \"use the shared logger, never console.log\" \u2014 is followed in some developers' sessions but ignored in others, even though everyone is on an identical checkout of the repository. What is the most effective first step to diagnose the inconsistency?","options":["Rewrite the convention with stronger imperative wording such as \"MUST\" and \"CRITICAL\" so it is harder to ignore.","Run /memory in an affected developer's session to verify which memory files are actually being loaded.","Duplicate the convention into a directory-level CLAUDE.md in every source directory so it loads regardless of configuration state.","Have the affected developers reinstall Claude Code to reset any corrupted local configuration."],"correct":1,"explanation":"The /memory command shows exactly which memory files a session loaded, which is the documented diagnostic for inconsistent behavior across sessions and machines \u2014 perhaps an affected developer's user-level file overrides the project file, or the project file is not loading at all. Diagnosing before changing anything is the proportionate first step. Option A rewrites a prompt without knowing whether it is even in context; if the file is not loaded, no wording helps. Option C sprays duplicate configuration everywhere without explaining the variance and creates a maintenance burden. Option D is a shotgun reset that solves a different (hypothetical) problem and destroys the evidence needed to find the real cause."},{"id":"s2-q7","domain":5,"difficulty":"core","rule":"Counter context degradation in long exploration with scratchpad files, scoped subagent delegation, and /compact \u2014 not more context capacity.","stem":"Four hours into exploring a 400,000-line legacy codebase, Claude begins describing \"typical repository patterns\" instead of the specific classes it read earlier, and gives answers that contradict its own findings from the first hour. What is the most effective way to restore reliability for the remainder of the exploration?","options":["Switch the session to a model with a larger context window so all of the discovery output fits without truncation.","Restart the session and have Claude read every relevant file upfront before answering any further questions.","Ask each remaining question in three independent sessions and accept only answers that at least two sessions agree on.","Have the agent maintain scratchpad files recording key findings and reference them for later questions, delegate scoped investigations to subagents, and run /compact when verbose discovery output accumulates."],"correct":3,"explanation":"The symptoms \u2014 generic \"typical patterns\" replacing specific discovered facts, self-contradiction \u2014 are classic context degradation in an extended session. Scratchpad files persist key findings outside the conversation, subagents isolate verbose exploration while the main agent keeps high-level coordination, and /compact reclaims context from accumulated discovery output; together these directly counter the failure mode. Option A misreads the problem as capacity when it is attention quality \u2014 a bigger window still degrades under thousands of lines of accumulated noise. Option B recreates the failure faster: reading everything upfront floods context before the first question is asked. Option C is over-engineered consensus voting that triples cost, and agreement between degraded sessions does not make an answer correct."},{"id":"s2-q8","domain":5,"difficulty":"stretch","rule":"When prior tool results are broadly stale, start a fresh session with an injected structured summary instead of resuming.","stem":"You run --resume on a named session from last Thursday to continue a refactoring investigation. Since then, a large merge rewrote most of the module the session had analyzed, and Claude immediately proposes edits to three functions that no longer exist. What is the most reliable way to proceed?","options":["Stay in the resumed session and tell Claude exactly which files changed so it can re-analyze those files before continuing.","Stay in the resumed session and instruct Claude to re-verify every prior conclusion against the current code before proposing any edit.","Start a new session and inject a structured summary of the current codebase state and the key decisions from the prior investigation.","Use fork_session to branch a clean copy of the investigation and continue the work in the fork."],"correct":2,"explanation":"Most of the analyzed module was rewritten, so the session's tool results are broadly stale \u2014 and starting fresh with a structured summary of current state plus prior decisions is documented as more reliable than resuming over stale results. Option A is the correct move only when changes are contained and the prior context is mostly valid; here \"most of the module\" was rewritten, so targeted re-analysis leaves the session reasoning atop a majority-invalid foundation. Option B is prompt-based mitigation with a non-zero failure rate \u2014 the stale conclusions remain in context and keep influencing reasoning even when told to re-verify. Option D solves a different problem entirely: fork_session branches divergent explorations from a shared baseline, and forking here just duplicates the same stale baseline."},{"id":"s2-q9","domain":5,"difficulty":"stretch","rule":"Use fork_session to explore divergent approaches from a shared analysis baseline without duplicate analysis or cross-contamination.","stem":"Your team spent 45 minutes having Claude Code build a thorough analysis of a legacy payment module. Two developers now want to evaluate competing refactoring strategies \u2014 strangler-fig extraction versus in-place rewrite \u2014 each starting from that same analysis, without either strategy's reasoning influencing the other. What is the most efficient approach?","options":["Spawn two parallel subagents from the session, since subagents automatically inherit the parent session's analysis context.","Use fork_session to create two independent branches from the shared analysis baseline, one per strategy.","Explore both strategies sequentially in the original session, instructing Claude to disregard the first strategy's discussion before starting the second.","Start two fresh sessions and have each one re-analyze the payment module before exploring its assigned strategy."],"correct":1,"explanation":"fork_session exists for exactly this: independent branches spun off a shared analysis baseline, so both strategies start from the same 45 minutes of investigation while remaining isolated from each other. Option A rests on a false premise \u2014 subagents do not automatically inherit parent context; their context must be explicitly provided in the prompt, so each would start blind. Option C guarantees contamination: the first strategy's reasoning stays in the conversation history and cannot actually be \"disregarded\" on instruction. Option D achieves isolation but pays for the expensive analysis twice, and the two re-analyses may not even reach identical conclusions, undermining the comparison."},{"id":"s2-q10","domain":5,"difficulty":"stretch","rule":"Crash recovery for long multi-phase workflows requires structured state exports (manifests) loaded and injected on resume \u2014 not conversation history.","stem":"A multi-phase overnight workflow in Claude Code (map the codebase, draft documentation, cross-check against source) runs four to six hours. Twice this month it crashed during phase two, and both reruns started from zero because nothing from phase one survived. What design change most effectively enables recovery?","options":["Rely on --resume to reattach to the crashed session and continue from its conversation history.","Wrap the workflow in a supervisor script that automatically restarts the full run, up to a maximum of five attempts.","Have Claude periodically summarize its progress within the conversation so a recovery point exists after a crash.","Have each phase export structured state \u2014 key findings, completed items, open questions \u2014 as a manifest to a known file location, and on restart load the manifest and inject it into the next phase's prompts."],"correct":3,"explanation":"Structured state persistence is the documented crash-recovery pattern: each phase exports a manifest to a known location, and on resume the coordinator loads it and injects it into prompts, so completed work survives regardless of what happened to the process. Option A bets recovery on conversation history surviving the crash intact, and even when it does, resuming over hours of stale, verbose tool results is less reliable than injecting a structured summary of confirmed state. Option B is a retry cap that restarts from zero each attempt \u2014 it bounds the number of failures without preserving any progress, the same flaw already observed twice. Option C puts the recovery point inside the very artifact that is lost in a crash: a summary living only in the conversation provides nothing once the session dies."},{"id":"s3-q1","domain":1,"difficulty":"core","rule":"Loop termination = stop_reason only: continue on \"tool_use\", stop on \"end_turn\" \u2014 never text sentinels or iteration caps.","stem":"Your coordinator's agentic loop intermittently misbehaves: in 8% of runs it exits before the report generation subagent is ever invoked, and in others it hangs waiting for more turns. Reviewing the loop code, you find it terminates whenever the model's response text contains the phrase \"RESEARCH COMPLETE\" \u2014 a sentinel your coordinator prompt instructs the model to emit when finished. Logs show the model sometimes paraphrases (\"the research is now complete\") and sometimes emits the phrase mid-run while summarizing progress. What change would most effectively fix the loop control?","options":["Remove the sentinel entirely and drive the loop off stop_reason: continue executing tools while it is \"tool_use\" and terminate when it is \"end_turn\".","Strengthen the prompt with few-shot examples showing the exact sentinel format and instruct the model to emit \"RESEARCH COMPLETE\" only as the final line of its final message.","Replace the sentinel check with a hard cap of 25 loop iterations so runs can neither exit early nor hang indefinitely.","Broaden the termination check to a case-insensitive regex that also matches common paraphrases such as \"research is complete\" and \"research finished\"."],"correct":0,"explanation":"The API already provides a deterministic termination signal: stop_reason is \"tool_use\" while the model wants tools executed and \"end_turn\" when it is done. Parsing natural-language signals for termination is a named anti-pattern \u2014 the observed paraphrasing and mid-run emissions are exactly why. Option B keeps the flawed mechanism and relies on probabilistic prompt compliance, so paraphrase failures will still occur at some rate. Option C swaps one anti-pattern for another: an arbitrary iteration cap as the stopping mechanism both truncates legitimate long runs and wastes turns on short ones \u2014 it belongs only as a safety backstop behind stop_reason. Option D patches the symptom by matching more strings; it can never enumerate every paraphrase and still fires on mid-run progress summaries."},{"id":"s3-q2","domain":1,"difficulty":"core","rule":"Parallel subagents = multiple Task tool calls emitted in a single coordinator response, not one per turn.","stem":"End-to-end research runs average 14 minutes. Tracing reveals the coordinator decomposes each topic into four independent subtopics but spawns the four web search subagents strictly sequentially \u2014 one Task tool call per assistant turn, waiting for each subagent's results before spawning the next \u2014 even though no subtopic depends on another's output. What change would most effectively reduce run latency?","options":["Update the coordinator so that independent research tasks are delegated by emitting multiple Task tool calls within a single response, executing the subagents in parallel.","Set a parallel_tasks: 4 option in the coordinator's AgentDefinition so the Agent SDK automatically fans out Task invocations.","Deploy four coordinator instances behind a job queue, assigning one subtopic to each coordinator so the searches run on separate processes.","Reduce the decomposition to two subagents with broader subtopics so fewer sequential round trips are needed."],"correct":0,"explanation":"The mechanism for parallel subagent execution is emitting multiple Task tool calls in one coordinator response rather than across separate turns; independent subtopics then complete concurrently. Option B references a configuration flag that does not exist in the Agent SDK \u2014 parallelism comes from the tool-call structure, not an AgentDefinition option. Option C is over-engineered infrastructure that abandons hub-and-spoke coordination (result aggregation, gap evaluation, and error handling now span four uncoordinated processes) to solve something the existing coordinator can do in one turn. Option D merely shrinks the problem instead of fixing it: the remaining spawns are still sequential, and coarsening the decomposition degrades coverage quality of each subtopic while leaving the underlying one-call-per-turn flaw in place."},{"id":"s3-q3","domain":1,"difficulty":"core","rule":"Subagents have isolated context \u2014 anything they need must be placed explicitly in their prompt.","stem":"In 9 of your last 20 runs, the synthesis subagent produced summaries that contradict the search findings and cited sources that were never retrieved. Logs show the coordinator invokes it with the prompt \"Synthesize the research findings gathered so far into a coherent, cited summary\" \u2014 with no findings attached. The coordinator's own conversation history contains all of the search and analysis results. What is the correct fix?","options":["Have the coordinator include the complete structured findings from the search and analysis subagents directly in the synthesis subagent's prompt when invoking it.","Set include_parent_history: true in the synthesis subagent's AgentDefinition so it inherits the coordinator's conversation context.","Stand up a shared vector-store memory layer that all subagents write findings to and read from at the start of each invocation.","Give the synthesis subagent the web_search and extract_web_results tools so it can gather the findings it needs itself."],"correct":0,"explanation":"Subagents operate with isolated context: they do not inherit the parent's conversation history or share memory between invocations, so the synthesis agent was invoked with nothing to synthesize and hallucinated to fill the gap. The fix is explicit context passing \u2014 include the complete prior findings directly in its prompt. Option B references a configuration flag that does not exist; there is no automatic context inheritance to switch on. Option C is over-engineered infrastructure for a problem solved by prompt construction, and it weakens the coordinator's controlled information flow. Option D breaks specialization \u2014 an agent given tools outside its role tends to misuse them, and it would be redundantly re-running research the system already paid for rather than synthesizing the findings that already exist."},{"id":"s3-q4","domain":1,"difficulty":"stretch","rule":"When compliance must be guaranteed, use a hook (deterministic), not a prompt instruction (probabilistic).","stem":"Your three research MCP servers return timestamps in different formats: the web search server returns Unix epoch seconds, the document server returns ISO 8601 strings, and a community news server returns \"MM/DD/YYYY\". The synthesis agent misorders events in about 9% of reports. You added a system-prompt rule \u2014 \"convert all dates to ISO 8601 before comparing them\" \u2014 which cut errors to 4% but did not eliminate them. Correct temporal ordering is a hard requirement for the timeline sections your clients rely on. What change would most effectively address this?","options":["Implement a PostToolUse hook that intercepts every tool result and normalizes all date formats to a canonical form before the model processes them.","Add few-shot examples to the system prompt demonstrating correct conversion of each of the three date formats into ISO 8601.","Fork all three MCP servers and modify each one to emit ISO 8601 timestamps natively.","Insert a dedicated normalization subagent between the coordinator and the other agents that rewrites all findings into a canonical date format."],"correct":0,"explanation":"The requirement is guaranteed compliance, and the prompt approach has already demonstrated a residual failure rate \u2014 more prompting cannot get to zero. A PostToolUse hook is the SDK's mechanism for exactly this: deterministic transformation of heterogeneous tool results (Unix timestamps, ISO 8601, other formats) in code before the model ever sees them. Option B stays in the probabilistic layer that already failed; few-shot examples reduce but cannot eliminate errors. Option C might work but is high-effort and creates a permanent maintenance burden across three codebases (one of them community-maintained) when a single hook achieves the same guarantee at one choke point. Option D is over-engineered and still unreliable \u2014 the normalization \"subagent\" is itself an LLM, so the conversion remains probabilistic while adding latency and cost."},{"id":"s3-q5","domain":2,"difficulty":"core","rule":"MCP resources expose content catalogs so agents see what's available without burning exploratory tool calls.","stem":"Your document corpus contains 3,400 research documents behind an MCP server. Traces show the document analysis subagent spends its first 5-7 tool calls of every task issuing broad exploratory search_documents queries simply to discover what exists in the corpus before it can start real analysis, consuming roughly 30% of its context budget on discovery output. What is the most effective way to eliminate this overhead?","options":["Expose a corpus catalog \u2014 document titles, types, and dates \u2014 as an MCP resource so the agent has visibility into available content without exploratory tool calls.","Add a list_documents tool that returns the catalog, and instruct the agent to call it once at the start of each task.","Paste the full 3,400-document catalog into the document analysis subagent's system prompt so no discovery is ever needed.","Raise the subagent's maximum turn limit and context budget so the exploratory phase no longer crowds out analysis."],"correct":0,"explanation":"This is the distinction MCP resources exist for: resources expose content catalogs (what data is available) while tools perform actions, and exposing a catalog as a resource gives the agent visibility into available data without requiring exploratory tool calls at all. Option B still spends tool calls and turns on discovery, keeps a large catalog payload inside the tool-result stream, and depends on the agent remembering (or being prompted) to call it \u2014 it converts the exploratory phase into a mandatory call rather than eliminating the overhead. Option C bloats every invocation with 3,400 entries whether or not they are relevant and goes stale as the corpus changes, trading one context problem for another. Option D is symptom accommodation: it pays for the waste with a bigger budget instead of removing the wasted discovery phase, and the exploratory output still dilutes the agent's attention."},{"id":"s3-q6","domain":2,"difficulty":"core","rule":"tool_choice: \"any\" guarantees a tool call when \"auto\" would permit a plain-text reply; force a named tool only when one specific tool must run.","stem":"In about 7% of invocations, your web search subagent responds with conversational text (\"Here's what I found about AI in film scoring...\") instead of calling one of its tools to return structured findings, and the coordinator's result parser fails on those runs. Which of the subagent's several tools is appropriate legitimately varies by task. What configuration change guarantees the parser always receives tool output?","options":["Set tool_choice: \"any\" on the subagent's requests so the model must call a tool but can still choose the appropriate one.","Set tool_choice: {\"type\": \"tool\", \"name\": \"extract_web_results\"} so every response is forced through a single known tool.","Add a system prompt instruction stating the agent must always respond with a tool call and never with plain text.","Extend the coordinator's parser to detect text responses and convert them into the structured findings format before aggregation."],"correct":0,"explanation":"tool_choice: \"any\" is the deterministic mechanism for exactly this failure: it guarantees the model calls a tool rather than returning conversational text, while leaving tool selection to the model \u2014 which matters here because the right tool varies by task. Option B over-constrains: forcing one named tool would break the tasks where a different tool is appropriate, and forced selection is the pattern for ensuring a specific tool runs first, not for general text suppression. Option C is prompt-based compliance \u2014 probabilistic, which is precisely what is already failing 7% of the time. Option D patches the symptom downstream: an LLM-or-regex conversion of free text into structured findings reintroduces the parsing fragility and provenance loss that structured tool output exists to prevent."},{"id":"s3-q7","domain":2,"difficulty":"stretch","rule":"When misrouting persists after descriptions are already rich, eliminate functional overlap itself \u2014 rename or split the tools.","stem":"Three weeks ago you expanded the descriptions of two document-analysis-server tools, analyze_content (intended for web search results) and analyze_document (intended for PDFs and uploaded files), to include input formats, example queries, and boundary guidance. Misrouting dropped from 30% to 12% but persists: the agent still regularly sends PDF analysis requests to analyze_content. What is the most effective next step?","options":["Rename the tools to eliminate the functional overlap \u2014 for example, rename analyze_content to extract_web_results with a web-specific description \u2014 so their purposes are unambiguous from the names down.","Add 6-8 few-shot examples to the system prompt demonstrating correct routing between the two tools for representative queries.","Build a deterministic pre-router that inspects each request for URLs versus file paths and injects the correct tool choice before the model responds.","Consolidate both into a single analyze(source_type) tool that accepts either input and internally dispatches to the correct backend."],"correct":0,"explanation":"Descriptions have already been improved and the residual misrouting traces to the remaining root cause: two near-identical names both starting with \"analyze_\" that signal overlapping purposes. Renaming to purpose-specific names (extract_web_results) is the guide's named remedy for exactly this pair \u2014 names carry selection signal alongside descriptions, and the fix is small and permanent. Option B adds token overhead in the wrong layer while leaving the overlapping identities that cause the confusion intact. Option C is over-engineered: a keyword router bypasses the model's language understanding and becomes a second routing system to maintain and debug. Option D can work but is the heaviest change \u2014 it rewrites the interface contract for every caller and hides the two distinct input/output contracts inside one opaque parameter, when a rename resolves the ambiguity directly."},{"id":"s3-q8","domain":5,"difficulty":"core","rule":"Provenance is structural: subagents emit claim-source mappings that every downstream hop must preserve \u2014 citations cannot be reconstructed after prose summarization.","stem":"An audit of 30 final reports finds that 22% of claims carry citations pointing to the wrong sources, and 14 claims cite documents that were never retrieved during their runs. Tracing the pipeline, you find the search and analysis subagents return their findings as narrative prose paragraphs, and the synthesis agent's prompt instructs it to \"always cite your sources.\" What change would most effectively fix the citation integrity problem?","options":["Require every subagent to output structured claim-source mappings (claim, evidence excerpt, source URL, document name, publication date) and require the synthesis agent to preserve and merge those mappings rather than regenerating citations.","Strengthen the synthesis agent's prompt with few-shot examples demonstrating rigorous citation practice and explicit penalties for uncited claims.","Add a post-synthesis verification pass that re-searches the web for each claim in the draft report and attaches the best-matching source it finds.","Have the report generation agent rebuild the bibliography from the coordinator's execution logs, which record every source the search agents retrieved."],"correct":0,"explanation":"Attribution was destroyed upstream: once findings are compressed into prose, the claim-to-source mapping no longer exists anywhere, so the synthesis agent can only invent citations no matter how firmly it is told to cite. The structural fix is to make provenance a data requirement \u2014 structured mappings emitted at the source and preserved through every hop. Option B is prompt-only pressure applied after the information is already gone; it cannot restore mappings that were never passed. Option C is over-engineered and unsound: re-searching finds plausible-looking sources, not the actual ones the claims came from, laundering the hallucination rather than fixing it. Option D solves a different problem \u2014 the logs prove which sources were retrieved but contain no linkage between individual claims and individual sources, which is exactly the missing piece."},{"id":"s3-q9","domain":5,"difficulty":"stretch","rule":"Lost-in-the-middle is a position effect: put a key-findings summary at the beginning and use explicit section headers \u2014 a bigger context window doesn't fix attention position.","stem":"Your coordinator aggregates findings from five parallel subagents into a single 60K-token input for the synthesis agent. Across dozens of runs, the synthesized reports consistently represent the first and fifth subagents' findings well, while material from the second, third, and fourth subagents is thin or missing entirely. Logging confirms all five agents' findings are present in the synthesis prompt, well within the model's context window. What change would most effectively address this?","options":["Place a key-findings summary from all five subagents at the beginning of the aggregated input and organize the detailed results under explicit per-agent section headers.","Switch the synthesis agent to a model with a larger context window so all five findings sections receive adequate processing capacity.","Run the synthesis three times on the same input and include in the report only findings that appear in at least two of the three outputs.","Add a system prompt instruction directing the synthesis agent to give equal weight to every section of the input regardless of its position."],"correct":0,"explanation":"The symptom \u2014 reliable coverage of the first and last sections with the middle dropped \u2014 is the lost-in-the-middle effect, a position-based attention pattern. The mitigation is structural input design: a key-findings summary up front puts every agent's critical material in the reliably-processed position, and explicit section headers help the model navigate the detail. Option B misdiagnoses it as a capacity problem; the input already fits, and a larger window does not change where attention concentrates. Option C is the consensus-voting anti-pattern: middle-section findings that surface only intermittently are exactly what majority filtering would suppress, making the omission worse. Option D asks the model to override its own attention behavior via instruction \u2014 a probabilistic request that does not change the positional processing causing the loss."},{"id":"s3-q10","domain":5,"difficulty":"core","rule":"Crash recovery = structured per-agent state exports plus a coordinator-loaded manifest on resume \u2014 not restart-from-zero or trusting session history.","stem":"Your deep research runs average five hours and hundreds of paid search and analysis calls. Three of the last twenty runs died mid-execution from network failures, and each time the team restarted the research from zero, re-paying every completed search and analysis call. What design change most effectively addresses this?","options":["Have each agent export structured state (findings so far, sources covered, subtopics remaining) to a known location during the run, and have the coordinator load a manifest on resume and inject the prior state into agent prompts.","Wrap the pipeline in an automatic supervisor that detects failures and immediately relaunches the full research run without human intervention.","Resume the crashed coordinator session by name with --resume, relying on the preserved conversation history to restore the run's progress.","Cache every API response keyed by a hash of the request so that a restarted run replays completed calls from cache at no cost."],"correct":0,"explanation":"Designed crash recovery means persisting structured agent state outside the live conversation: each agent exports what it has found and what remains, and on resume the coordinator loads a manifest and injects that state into agent prompts, so work resumes where it stopped and completed calls are never re-paid. Option B automates the exact failure mode \u2014 it still restarts from zero and re-pays everything, just faster. Option C relies on conversation history surviving the crash and being a usable recovery substrate; it is not structured state, is fragile after an abnormal termination, and by resume time may carry stale tool results that poison further reasoning \u2014 starting fresh with a structured summary is the more reliable pattern. Option D is speculative caching that does not hold in practice: an agentic run's requests depend on prior responses, so a restarted run's request sequence diverges after the first non-identical call and the cache stops hitting \u2014 and it restores no agent-level plan state."},{"id":"s4-q1","domain":1,"difficulty":"core","rule":"Loop termination is decided by stop_reason (continue on \"tool_use\", stop on \"end_turn\") \u2014 never by text content, sentinel markers, or iteration caps.","stem":"Your Agent SDK codebase-exploration tool runs an agentic loop that executes requested tools and re-invokes Claude. To decide when a task is finished, the loop checks whether the latest assistant response contains a text block and exits if it does. In roughly 30% of runs the agent stops after only 2-3 tool calls, leaving investigations half-finished \u2014 logs show Claude was narrating its plan (\"Now I'll check the import graph...\") alongside its tool_use blocks when the loop exited. What change most effectively fixes the premature termination?","options":["Instruct the model in the system prompt to emit no explanatory text until the investigation is complete, so a text block reliably signals completion.","Base the control flow on stop_reason: continue executing tools while stop_reason is \"tool_use\" and terminate only when stop_reason is \"end_turn\".","Replace the text check with a fixed cap of 25 loop iterations so every investigation is guaranteed enough turns before stopping.","Have the model end its final message with a \"TASK_COMPLETE\" marker and terminate the loop when that marker appears in the response text."],"correct":1,"explanation":"The agentic loop's contract is model-driven termination signaled by stop_reason: \"tool_use\" means more tools to run, \"end_turn\" means Claude has decided it is done. Checking for assistant text is a named anti-pattern \u2014 Claude routinely emits narration alongside tool calls, which is exactly what the logs show. The first option is prompt-based, probabilistic suppression of a behavior that is normal and harmless; it will still fail some fraction of the time and doesn't fix the broken termination logic. The 25-iteration cap swaps one anti-pattern for another: arbitrary caps as the primary stopping mechanism either cut off long tasks or waste turns on short ones (caps are acceptable only as a safety ceiling). The \"TASK_COMPLETE\" marker is the parsing-natural-language-signals anti-pattern \u2014 it reintroduces text parsing as the termination test instead of using the deterministic signal the API already provides."},{"id":"s4-q2","domain":1,"difficulty":"core","rule":"Subagents run with isolated context and inherit nothing \u2014 everything they need must be passed explicitly in the Task prompt.","stem":"A coordinator agent spends twenty turns exploring a legacy service and catalogs its conventions: a custom error-wrapping pattern, repository-style data access, and strict naming rules. It then spawns a boilerplate-writer subagent via the Task tool with the prompt \"Generate CRUD handlers for the orders module.\" The generated handlers compile, but they use raw SQL and a completely different error pattern \u2014 ignoring every convention the coordinator documented. What is the root cause and the most effective fix?","options":["Subagents operate with isolated context and do not inherit the coordinator's conversation history; include the catalogued conventions and example snippets directly in the Task prompt when spawning the subagent.","The SDK's context-inheritance option is disabled by default; enable it on the boilerplate-writer's AgentDefinition so subagents automatically receive the parent conversation.","The subagent lacks discovery tools; grant it Grep, Glob, and Bash so it can rediscover the codebase conventions itself before generating the handlers.","The coordinator should accept the output and run a follow-up review pass that rewrites the generated handlers to match the documented conventions."],"correct":0,"explanation":"Subagents spawned via the Task tool get a fresh, isolated context \u2014 they see nothing of the coordinator's twenty turns of discovery unless it is pasted into their prompt. The spawn prompt here contained only the task, so the subagent had no way to know the conventions existed; passing the complete findings explicitly in the prompt is the mechanism the SDK defines for this. A context-inheritance flag on AgentDefinition does not exist \u2014 context passing is always explicit. Granting discovery tools so the subagent re-explores duplicates twenty turns of work the coordinator already did, adds latency and tokens, and may still converge on different conclusions \u2014 it solves the problem by brute force rather than fixing the missing handoff. A rewrite-after-the-fact review pass patches the symptom downstream while leaving every future spawn broken, doublin
