>\n<h3>Plan mode vs direct execution (TS 3.4)<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Monolith \u2192 microservices; dozens of files; service-boundary decisions<\/td>\n<td>Plan mode first: explore, understand dependencies, design<\/td>\n<td>Architectural decisions + multiple valid approaches = plan-mode signature; prevents costly rework<\/td>\n<td>Direct + \"comprehensive upfront instructions\" (assumes you already know the structure); incremental direct (\"implementation will reveal boundaries\")<\/td>\n<\/tr>\n<tr>\n<td>Single-file bug fix with a clear stack trace; add one date-validation conditional<\/td>\n<td>Direct execution<\/td>\n<td>Simple, well-scoped, one obvious approach \u2014 planning is overhead<\/td>\n<td>Plan mode reflexively for everything<\/td>\n<\/tr>\n<tr>\n<td>Complexity stated in the task itself<\/td>\n<td>Plan mode from the start<\/td>\n<td>Complexity is known, not emergent<\/td>\n<td>\"Start direct, switch to plan if I hit complexity\"<\/td>\n<\/tr>\n<tr>\n<td>Multi-phase task; discovery output flooding context<\/td>\n<td>Explore subagent for discovery; summaries return to main<\/td>\n<td>Isolates verbose output, preserves main context<\/td>\n<td>Doing all exploration in the main conversation<\/td>\n<\/tr>\n<tr>\n<td>Library migration<\/td>\n<td>Plan mode to investigate \u2192 direct execution to implement the plan<\/td>\n<td>The blessed two-phase pattern<\/td>\n<td>Treating the modes as mutually exclusive<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3>Sessions and long-running context (TS 1.7, 5.1, 5.4)<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Continue yesterday's named investigation<\/td>\n<td><code>--resume &lt;session-name&gt;<\/code><\/td>\n<td>Prior context is mostly valid \u2014 reuse it<\/td>\n<td>Fresh session and re-explaining everything<\/td>\n<\/tr>\n<tr>\n<td>Compare two refactoring/testing strategies from one codebase analysis<\/td>\n<td><code>fork_session<\/code> per branch<\/td>\n<td>Independent branches from a shared baseline; no duplicate analysis<\/td>\n<td>Sequential trials in one session (approach A's context contaminates B)<\/td>\n<\/tr>\n<tr>\n<td>Resuming after files changed<\/td>\n<td>Tell the agent <em>which<\/em> files changed \u2192 targeted re-analysis<\/td>\n<td>Cheaper than full re-exploration, avoids stale conclusions<\/td>\n<td>Resuming silently and trusting stale tool results<\/td>\n<\/tr>\n<tr>\n<td>Most prior tool results now stale<\/td>\n<td>New session + inject a structured summary<\/td>\n<td>More reliable than resuming over stale results<\/td>\n<td><code>--resume<\/code> because \"the context is already there\"<\/td>\n<\/tr>\n<tr>\n<td>Hours-long exploration; answers drift to \"typical patterns\"<\/td>\n<td>Scratchpad files for key findings + subagents for scoped questions + <code>/compact<\/code><\/td>\n<td>Persists facts across context pressure; isolates verbosity<\/td>\n<td>Larger context window / new model (attention quality, not capacity, is the issue)<\/td>\n<\/tr>\n<tr>\n<td>Long multi-phase workflow might crash<\/td>\n<td>Each agent exports state to a known location; coordinator loads the manifest on resume<\/td>\n<td>Structured state persistence = recoverability<\/td>\n<td>Relying on conversation history surviving the crash<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3>Steering generation quality (TS 3.5)<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Claude interprets your prose transformation spec inconsistently<\/td>\n<td>2\u20133 concrete input/output examples<\/td>\n<td>Examples pin down what prose can't<\/td>\n<td>Longer, more detailed prose<\/td>\n<\/tr>\n<tr>\n<td>Migration script breaks on nulls<\/td>\n<td>Give specific failing test cases: input + expected output<\/td>\n<td>Concrete cases fix edge-case handling<\/td>\n<td>\"Handle edge cases better\"<\/td>\n<\/tr>\n<tr>\n<td>Implementing in a domain where you don't know what you don't know<\/td>\n<td>Interview pattern \u2014 Claude asks questions before implementing<\/td>\n<td>Surfaces considerations (cache invalidation, failure modes) you didn't anticipate<\/td>\n<td>Just implementing from your incomplete spec<\/td>\n<\/tr>\n<tr>\n<td>Several bugs whose fixes interact<\/td>\n<td>One detailed message with all issues<\/td>\n<td>Sequential fixing of interacting issues thrashes<\/td>\n<td>One-at-a-time when fixes conflict (fine only for independent issues)<\/td>\n<\/tr>\n<tr>\n<td>Want steady, verifiable improvement<\/td>\n<td>Tests first, then iterate on failures<\/td>\n<td>Failures are unambiguous feedback<\/td>\n<td>Vibes-based \"looks better now\"<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3>Built-in tool selection (TS 2.5)<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Find every caller of a function / an error string<\/td>\n<td><strong>Grep<\/strong> \u2014 content search<\/td>\n<td>Grep searches file <em>contents<\/em> for patterns<\/td>\n<td>Glob (paths only), reading files one by one<\/td>\n<\/tr>\n<tr>\n<td>Find all files matching <code>**/*.test.tsx<\/code><\/td>\n<td><strong>Glob<\/strong> \u2014 path pattern match<\/td>\n<td>Glob matches file <em>names/paths<\/em><\/td>\n<td>Grep for filenames<\/td>\n<\/tr>\n<tr>\n<td>Edit fails: anchor text not unique<\/td>\n<td><strong>Read + Write<\/strong> the full file<\/td>\n<td>Documented fallback when unique matching fails<\/td>\n<td>Retrying Edit with the same anchor; regex heroics in Bash<\/td>\n<\/tr>\n<tr>\n<td>Understand an unfamiliar codebase<\/td>\n<td>Incremental: Grep for entry points \u2192 Read to follow imports and trace flows<\/td>\n<td>Builds understanding without flooding context<\/td>\n<td>Reading every file upfront<\/td>\n<\/tr>\n<tr>\n<td>Trace usage through wrapper modules<\/td>\n<td>Enumerate exported names first, then Grep each name across the codebase<\/td>\n<td>Wrappers hide direct call sites<\/td>\n<td>Grepping only the original function name<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>4. Failure-modes drill<\/h2>\n<p>Guide-style: production symptom \u2192 root cause \u2192 the fix (and the fake answers to eliminate).<\/p>\n<p><strong>1. CI job hangs forever on <code>claude \"Analyze this PR\"<\/code>.<\/strong>\nRoot cause: Claude Code launched interactively; it's waiting for input.\nFix: <code>claude -p \"Analyze this PR\"<\/code> \u2014 <code>-p<\/code>/<code>--print<\/code> is the documented non-interactive mode: process, print to stdout, exit. Eliminate on sight: <code>CLAUDE_HEADLESS=true<\/code> and <code>--batch<\/code> <strong>do not exist<\/strong>; <code>&lt; /dev/null<\/code> is a Unix workaround that doesn't address Claude Code's syntax.<\/p>\n<p><strong>2. You onboard a new developer; Claude ignores every team convention for them, works fine for you.<\/strong>\nRoot cause: the conventions live in <em>your<\/em> <code>~/.claude/CLAUDE.md<\/code> \u2014 user-level config is never shared via version control.\nFix: move them to project-level CLAUDE.md (root or <code>.claude/CLAUDE.md<\/code>), commit, then have both of you run <code>/memory<\/code> to confirm what's loaded.<\/p>\n<p><strong>3. Claude applies testing conventions in <code>src/components/<\/code> but not in <code>src/utils/<\/code>, despite tests in both.<\/strong>\nRoot cause: conventions live in a directory-level CLAUDE.md that only covers one subtree \u2014 directory files are directory-bound, and your test files are spread everywhere.\nFix: <code>.claude/rules/testing.md<\/code> with <code>paths: [\"**/*.test.tsx\", \"**/*.test.ts\"]<\/code> \u2014 glob scoping applies by file type regardless of location, and loads only when editing matching files.<\/p>\n<p><strong>4. <code>/review<\/code> works on your machine; teammates get \"unknown command.\"<\/strong>\nRoot cause: the command file is in <code>~/.claude/commands/<\/code> (personal scope).\nFix: move <code>review.md<\/code> into the repo's <code>.claude/commands/<\/code> and commit. Not CLAUDE.md (context, not commands), not a config.json commands array (fake).<\/p>\n<p><strong>5. Three hours into a legacy-codebase session, Claude describes \"typical repository patterns\" instead of the actual classes it read earlier, and contradicts its own earlier answers.<\/strong>\nRoot cause: context degradation in an extended session \u2014 earlier findings have been squeezed out.\nFix: have the agent maintain scratchpad files of key findings and reference them; delegate scoped questions (\"find all test files,\" \"trace the refund flow\") to subagents so the main context stays high-level; run <code>/compact<\/code> when discovery output piles up. Wrong answer: \"use a bigger context window\" \u2014 attention quality, not capacity, is the failure.<\/p>\n<p><strong>6. You <code>--resume<\/code> last week's refactoring session; Claude proposes edits to functions that were deleted in Friday's merge.<\/strong>\nRoot cause: resumed session is reasoning over stale tool results.\nFix: if changes are contained, tell the agent exactly which files changed and have it re-analyze those; if the analysis is broadly stale, start a <strong>new<\/strong> session and inject a structured summary of current state. Fresh + summary beats resuming stale context.<\/p>\n<p><strong>7. Edit keeps failing while updating one entry in a config file full of near-identical blocks.<\/strong>\nRoot cause: Edit needs unique anchor text; the file has repeated content, so no match is unique.\nFix: Read the full file, then Write the corrected version \u2014 the documented fallback for non-unique matches.<\/p>\n<p><strong>8. Your codebase-analysis skill works, but after each run the main conversation is stuffed with raw dependency dumps and answers get worse.<\/strong>\nRoot cause: the skill runs in the main conversation context; its verbose output pollutes the session.\nFix: add <code>context: fork<\/code> to the SKILL.md frontmatter so it runs in an isolated sub-agent context and returns only the result. While you're in the frontmatter: <code>allowed-tools<\/code> to fence off destructive tools, <code>argument-hint<\/code> so devs invoking it bare get prompted for the module name.<\/p>\n<hr />\n<h2>Cram card<\/h2>\n<ul>\n<li>Shared \u2192 repo (<code>CLAUDE.md<\/code>, <code>.claude/commands|rules|skills/<\/code>, <code>.mcp.json<\/code>). Personal \u2192 home (<code>~/.claude/*<\/code>, <code>~/.claude.json<\/code>). User-level is invisible to teammates.<\/li>\n<li>Conventions for scattered file types \u2192 <code>.claude/rules/<\/code> + <code>paths:<\/code> globs, never per-directory CLAUDE.md.<\/li>\n<li>Plan mode = architectural / multi-file / multiple valid approaches. Direct = single-file, well-scoped. Plan-then-execute is the pattern; \"escalate to plan mode later\" is the distractor.<\/li>\n<li>Skills = on-demand workflows; CLAUDE.md = always-loaded standards. <code>context: fork<\/code> isolates verbose skills.<\/li>\n<li>CI = <code>-p<\/code> + <code>--output-format json<\/code> + <code>--json-schema<\/code>. <code>--batch<\/code> and <code>CLAUDE_HEADLESS<\/code> are fake.<\/li>\n<li>Stale session \u2192 fresh session + structured summary. Valid session \u2192 <code>--resume<\/code>; divergent experiments \u2192 <code>fork_session<\/code>.<\/li>\n<li>Long exploration \u2192 scratchpads, subagents, <code>/compact<\/code> \u2014 not a bigger context window.<\/li>\n<\/ul>","words":3207},"03-multi-agent-research":{"title":"Scenario 3: Multi-Agent Research System","group":"Scenario walkthroughs","html":"<h1>Scenario 3: Multi-Agent Research System<\/h1>\n<blockquote>\n<p><strong>Exam framing:<\/strong> \"You are building a multi-agent research system using the Claude Agent SDK. A coordinator agent delegates to specialized subagents: one searches the web, one analyzes documents, one synthesizes findings, and one generates reports. The system researches topics and produces comprehensive, cited reports.\"<\/p>\n<p><strong>Primary domains:<\/strong> D1 Agentic Architecture &amp; Orchestration (27%), D2 Tool Design &amp; MCP Integration (18%), D5 Context Management &amp; Reliability (15%). If this scenario is drawn, it frames roughly a quarter of your exam \u2014 and it hits the two heaviest-weighted domains plus D5. This is the highest-yield scenario in the bank.<\/p>\n<\/blockquote>\n<hr />\n<h2>1. The system at a glance<\/h2>\n<p>Five agents. One coordinator, four specialists. <strong>Hub-and-spoke<\/strong>: every message between subagents flows <em>through the coordinator<\/em> \u2014 subagents never talk to each other directly. That's not a style preference; the guide says it's for <strong>observability, consistent error handling, and controlled information flow<\/strong>.<\/p>\n<p><strong>The pieces:<\/strong><\/p>\n<table>\n<thead>\n<tr>\n<th>Component<\/th>\n<th>Job<\/th>\n<th>Tools it gets<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Coordinator<\/td>\n<td>Decompose the topic, pick which subagents to invoke, route results, evaluate coverage, re-delegate on gaps<\/td>\n<td><code>Task<\/code> (must be in <code>allowedTools<\/code> or it can't spawn anything)<\/td>\n<\/tr>\n<tr>\n<td>Web search subagent<\/td>\n<td>Find sources for its assigned subtopic<\/td>\n<td><code>web_search<\/code>, <code>extract_web_results<\/code><\/td>\n<\/tr>\n<tr>\n<td>Document analysis subagent<\/td>\n<td>Pull facts out of documents<\/td>\n<td><code>extract_data_points<\/code>, <code>summarize_content<\/code>, <code>verify_claim_against_source<\/code><\/td>\n<\/tr>\n<tr>\n<td>Synthesis subagent<\/td>\n<td>Merge findings, preserve citations, flag gaps<\/td>\n<td><code>verify_fact<\/code> (scoped, for simple lookups only)<\/td>\n<\/tr>\n<tr>\n<td>Report generation subagent<\/td>\n<td>Render the final cited report<\/td>\n<td>file-write tools<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p><strong>Data flow:<\/strong> coordinator decomposes topic \u2192 spawns search + analysis subagents <strong>in parallel<\/strong> (multiple Task calls in <em>one<\/em> response) \u2192 subagents return <strong>structured findings with claim-source mappings<\/strong> \u2192 coordinator aggregates and passes complete findings <em>in the synthesis agent's prompt<\/em> (no automatic context inheritance) \u2192 synthesis returns merged findings with coverage annotations \u2192 coordinator checks for gaps \u2192 either re-delegates targeted queries or hands off to report generation.<\/p>\n<pre><code>                        \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n       topic \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u25b6\u2502   COORDINATOR    \u2502\u25c0\u2500\u2500\u2500\u2500 all results, all errors\n                        \u2502 (allowedTools    \u2502      flow back through here\n                        \u2502  includes &quot;Task&quot;)\u2502\n                        \u2514\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u252c\u2500\u2500\u2518\n              Task calls    \u2502   \u2502   \u2502   \u2502     (parallel = multiple Task\n          in ONE response \u2500\u25b6\u2502   \u2502   \u2502   \u2502      calls in a single turn)\n                \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518   \u2502   \u2502   \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n                \u25bc               \u25bc   \u25bc                   \u25bc\n        \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510 \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510 \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510 \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n        \u2502  WEB SEARCH  \u2502 \u2502  DOC        \u2502 \u2502 SYNTHESIS \u2502 \u2502  REPORT    \u2502\n        \u2502  subagent    \u2502 \u2502  ANALYSIS   \u2502 \u2502 subagent  \u2502 \u2502  GEN       \u2502\n        \u2502              \u2502 \u2502  subagent   \u2502 \u2502 +verify_  \u2502 \u2502  subagent  \u2502\n        \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518 \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518 \u2502  fact     \u2502 \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n                                         \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n        Each subagent: isolated context, role-scoped tools (4-5 max),\n        returns structured findings: {claim, excerpt, source URL,\n        doc name, publication date} \u2014 never prose blobs.\n<\/code><\/pre>\n<p><strong>The three rules that generate most correct answers here:<\/strong><\/p>\n<ol>\n<li><strong>Subagents have isolated context.<\/strong> They do NOT inherit the coordinator's conversation history or share memory between invocations. Anything a subagent needs must be placed explicitly in its prompt.<\/li>\n<li><strong>The coordinator owns decomposition quality.<\/strong> If the final report has coverage holes, look at what the coordinator <em>assigned<\/em> before blaming downstream agents.<\/li>\n<li><strong>Provenance is structural, not stylistic.<\/strong> Citations survive only if every hop passes structured claim-source mappings. Summarize findings into prose anywhere in the pipeline and attribution is gone.<\/li>\n<\/ol>\n<hr />\n<h2>2. Build it step by step<\/h2>\n<p>Build order matters: loop first (nothing works without it), then tools, then subagents, then orchestration, then reliability layers.<\/p>\n<h3>Step 1 \u2014 The agentic loop (raw Messages API)<\/h3>\n<p>Everything in the Agent SDK sits on top of this loop. The exam tests it directly (Task 1.1): continue on <code>stop_reason == \"tool_use\"<\/code>, terminate on <code>stop_reason == \"end_turn\"<\/code>, append tool results to history so the model can reason about the next action.<\/p>\n<pre><code class=\"language-python\">import anthropic\n\nclient = anthropic.Anthropic()\n\nmessages = [{&quot;role&quot;: &quot;user&quot;,\n             &quot;content&quot;: &quot;Research: impact of AI on creative industries. Cited report.&quot;}]\n\nwhile True:\n    response = client.messages.create(\n        model=&quot;claude-sonnet-4-5&quot;,\n        max_tokens=4096,\n        system=COORDINATOR_SYSTEM_PROMPT,\n        tools=TOOLS,\n        messages=messages,\n    )\n\n    if response.stop_reason == &quot;end_turn&quot;:\n        break                      # the ONLY correct termination signal\n\n    if response.stop_reason == &quot;tool_use&quot;:\n        # Append the assistant turn. It may contain MULTIPLE tool_use\n        # blocks \u2014 that is how parallel delegation happens.\n        messages.append({&quot;role&quot;: &quot;assistant&quot;, &quot;content&quot;: response.content})\n\n        tool_results = []\n        for block in response.content:\n            if block.type == &quot;tool_use&quot;:\n                result = run_tool(block.name, block.input)   # your code runs the tool\n                tool_results.append({\n                    &quot;type&quot;: &quot;tool_result&quot;,\n                    &quot;tool_use_id&quot;: block.id,\n                    &quot;content&quot;: result,\n                })\n        # Tool results go back as a USER turn \u2014 this is how new\n        # information enters the model's reasoning for the next iteration.\n        messages.append({&quot;role&quot;: &quot;user&quot;, &quot;content&quot;: tool_results})\n<\/code><\/pre>\n<p><strong>Anti-patterns the exam names explicitly<\/strong> (any of these as an answer option = wrong):<\/p>\n<ul>\n<li>Parsing natural-language signals (\"DONE\", \"task complete\") to decide termination<\/li>\n<li>An arbitrary iteration cap as the <em>primary<\/em> stopping mechanism<\/li>\n<li>Checking whether the assistant produced text content as a completion indicator<\/li>\n<\/ul>\n<p>The model drives the decisions (\"model-driven decision-making\"); your code just executes tools and checks <code>stop_reason<\/code>. A pre-configured decision tree of tool sequences is the opposite of agentic \u2014 distractors love it.<\/p>\n<h3>Step 2 \u2014 Tool definitions with rich descriptions<\/h3>\n<p>Tool descriptions are <strong>the primary mechanism LLMs use for tool selection<\/strong>. Minimal descriptions (\"Retrieves order details\") are the root cause in tool-misrouting questions. Write each description with: purpose, input formats, example queries, edge cases, and <em>when to use it versus similar tools<\/em>.<\/p>\n<pre><code class=\"language-python\">TOOLS = [\n    {\n        &quot;name&quot;: &quot;extract_web_results&quot;,   # renamed from vague &quot;analyze_content&quot;\n        &quot;description&quot;: (\n            &quot;Extracts structured findings from WEB SEARCH results only. &quot;\n            &quot;Input: a list of result URLs plus the research subtopic. &quot;\n            &quot;Returns per-source findings: claim, evidence excerpt, source URL, &quot;\n            &quot;publication date. Use this for web pages and news articles. &quot;\n            &quot;Do NOT use for PDFs or uploaded documents \u2014 use &quot;\n            &quot;extract_data_points for those.&quot;\n        ),\n        &quot;input_schema&quot;: {\n            &quot;type&quot;: &quot;object&quot;,\n            &quot;properties&quot;: {\n                &quot;urls&quot;: {&quot;type&quot;: &quot;array&quot;, &quot;items&quot;: {&quot;type&quot;: &quot;string&quot;}},\n                &quot;subtopic&quot;: {&quot;type&quot;: &quot;string&quot;},\n            },\n            &quot;required&quot;: [&quot;urls&quot;, &quot;subtopic&quot;],\n        },\n    },\n    # ...\n]\n<\/code><\/pre>\n<p>Two moves the guide calls out by name:<\/p>\n<ul>\n<li><strong>Rename to eliminate overlap:<\/strong> <code>analyze_content<\/code> vs <code>analyze_document<\/code> with near-identical descriptions causes misrouting \u2192 rename to <code>extract_web_results<\/code> with a web-specific description.<\/li>\n<li><strong>Split generic tools:<\/strong> one <code>analyze_document<\/code> \u2192 <code>extract_data_points<\/code>, <code>summarize_content<\/code>, <code>verify_claim_against_source<\/code>, each with a defined input/output contract.<\/li>\n<li><strong>Constrain generic tools:<\/strong> replace <code>fetch_url<\/code> with <code>load_document<\/code> that validates document URLs.<\/li>\n<\/ul>\n<p>Also check the <strong>system prompt<\/strong> for keyword-sensitive instructions \u2014 a stray \"always analyze content thoroughly\" can override well-written tool descriptions and create unintended tool associations.<\/p>\n<h3>Step 3 \u2014 Structured subagent output (provenance from day one)<\/h3>\n<p>Every finding a subagent returns must <strong>separate content from metadata<\/strong>. This is what keeps citations alive through synthesis and lets temporal data be interpreted correctly.<\/p>\n<pre><code class=\"language-json\">{\n  &quot;findings&quot;: [\n    {\n      &quot;claim&quot;: &quot;Generative AI adoption in music production grew 3x in 2025&quot;,\n      &quot;evidence_excerpt&quot;: &quot;\u2026survey of 2,400 producers found\u2026&quot;,\n      &quot;source_url&quot;: &quot;https://example.com/report&quot;,\n      &quot;document_name&quot;: &quot;MIDiA 2025 Producer Survey&quot;,\n      &quot;publication_date&quot;: &quot;2025-11-04&quot;,\n      &quot;relevance_score&quot;: 0.9\n    }\n  ],\n  &quot;coverage_notes&quot;: &quot;No sources found for film-scoring subtopic; only 2 sources newer than 2024.&quot;\n}\n<\/code><\/pre>\n<p>Publication dates are not optional garnish: without them, a 2019 statistic and a 2025 statistic look like a <strong>contradiction<\/strong> instead of a trend. The guide tests this exact confusion.<\/p>\n<h3>Step 4 \u2014 AgentDefinitions and role-scoped tools (Agent SDK)<\/h3>\n<pre><code class=\"language-python\"># SKETCH \u2014 Agent SDK concepts using exam terminology.\n# The exam tests the concepts (AgentDefinition, allowedTools, Task tool),\n# not exact SDK call signatures.\n\nweb_search_agent = AgentDefinition(\n    description=(\n        &quot;Web research specialist. Finds and extracts sources for one &quot;\n        &quot;assigned subtopic. Use for current articles, statistics, primary &quot;\n        &quot;sources on the web. Not for analyzing provided documents.&quot;\n    ),\n    prompt=WEB_SEARCH_SYSTEM_PROMPT,          # includes the structured-output contract\n    tools=[&quot;web_search&quot;, &quot;extract_web_results&quot;],   # role-scoped: 4-5 tools max\n)\n\nsynthesis_agent = AgentDefinition(\n    description=&quot;Merges structured findings into a coherent, cited synthesis. &quot;\n                &quot;Flags coverage gaps. Verifies simple facts itself; routes &quot;\n                &quot;complex verification back to the coordinator.&quot;,\n    prompt=SYNTHESIS_SYSTEM_PROMPT,\n    tools=[&quot;verify_fact&quot;],    # scoped cross-role tool for the 85% simple case\n)\n\ncoordinator = AgentDefinition(\n    description=&quot;Research coordinator: decomposes topics, delegates, aggregates.&quot;,\n    prompt=COORDINATOR_SYSTEM_PROMPT,\n    tools=[&quot;Task&quot;],           # allowedTools MUST include &quot;Task&quot; to spawn subagents\n)\n<\/code><\/pre>\n<p>Tool distribution rules the exam tests (Task 2.3):<\/p>\n<ul>\n<li><strong>Too many tools degrades selection.<\/strong> 18 tools instead of 4-5 increases decision complexity and makes selection unreliable. Give each agent only its role's tools.<\/li>\n<li><strong>Agents misuse tools outside their specialization<\/strong> \u2014 a synthesis agent with full web-search access will attempt (bad) web searches. Don't give it that access.<\/li>\n<li><strong>Scoped cross-role tool for high-frequency needs:<\/strong> if 85% of synthesis verifications are simple fact-checks, give synthesis a scoped <code>verify_fact<\/code> tool; the 15% complex cases keep routing through the coordinator to the web search agent. Least privilege, existing coordination preserved.<\/li>\n<\/ul>\n<h3>Step 5 \u2014 The coordinator: decomposition, delegation, parallelism<\/h3>\n<p>The coordinator's prompt should specify <strong>research goals and quality criteria, not step-by-step procedures<\/strong> \u2014 that's what lets subagents adapt. And it must decompose <strong>broadly enough to cover the whole topic<\/strong>: the guide's own sample question (Q7) is a report on \"AI in creative industries\" that covers only visual arts because the coordinator decomposed into three visual-arts subtasks. Correct diagnosis: <strong>coordinator decomposition too narrow<\/strong>, not any downstream agent.<\/p>\n<pre><code class=\"language-python\">COORDINATOR_SYSTEM_PROMPT = &quot;&quot;&quot;\nYou coordinate a research pipeline. For each topic:\n\n1. Decompose into subtopics that TOGETHER cover the full scope of the\n   topic. Enumerate the major domains first, then assign one subagent\n   task per domain. Partition scope so subagents do not duplicate work\n   (distinct subtopics or distinct source types per agent).\n2. Dynamically select which subagents a query actually needs \u2014 do not\n   always run the full pipeline.\n3. Spawn independent research tasks IN PARALLEL by emitting multiple\n   Task tool calls in a single response.\n4. When invoking synthesis, include the COMPLETE structured findings\n   from search and analysis directly in its prompt. Subagents do not\n   see your conversation history.\n5. Evaluate synthesis output for coverage gaps. If gaps exist,\n   re-delegate targeted queries to search/analysis and re-invoke\n   synthesis until coverage is sufficient.\n\nQuality bar: every claim in the final report carries a source; coverage\ngaps and conflicting sources are explicitly annotated, never hidden.\n&quot;&quot;&quot;\n<\/code><\/pre>\n<p>Two mechanics the exam checks precisely:<\/p>\n<ul>\n<li><strong>Parallel subagents = multiple Task tool calls in a single coordinator response<\/strong>, not one call per turn across separate turns.<\/li>\n<li><strong>Context passing is explicit.<\/strong> The synthesis subagent gets web search results + document analysis output <em>pasted into its prompt<\/em>. There is no automatic inheritance and no shared memory between invocations.<\/li>\n<\/ul>\n<p>Step 4 of the coordinator prompt is the <strong>iterative refinement loop<\/strong> (Task 1.2): evaluate \u2192 re-delegate targeted \u2192 re-synthesize. One-shot pipelines that never loop back are the distractor.<\/p>\n<h3>Step 6 \u2014 Structured errors and propagation<\/h3>\n<p>MCP tools signal failure with the <strong><code>isError<\/code> flag<\/strong> plus structured metadata. A uniform \"Operation failed\" prevents the agent from making recovery decisions.<\/p>\n<pre><code class=\"language-json\">{\n  &quot;isError&quot;: true,\n  &quot;errorCategory&quot;: &quot;transient&quot;,        // transient | validation | permission | business\n  &quot;isRetryable&quot;: true,\n  &quot;description&quot;: &quot;Search API timeout after 30s&quot;,\n  &quot;attempted_query&quot;: &quot;AI adoption film scoring 2025&quot;,\n  &quot;partial_results&quot;: [ { &quot;claim&quot;: &quot;...&quot;, &quot;source_url&quot;: &quot;...&quot; } ],\n  &quot;alternatives&quot;: [&quot;narrow the query&quot;, &quot;try the news-specific index&quot;]\n}\n<\/code><\/pre>\n<p>Propagation policy across the multi-agent system (Tasks 2.2 + 5.3):<\/p>\n<ul>\n<li><strong>Subagents recover locally from transient failures<\/strong> (retry the timeout themselves). They propagate to the coordinator only errors they cannot resolve \u2014 <em>with<\/em> failure type, what was attempted, partial results, and alternatives.<\/li>\n<li><strong>Never<\/strong> return an empty result set marked successful (silent suppression), and <strong>never<\/strong> let one subagent failure terminate the whole workflow. Both are named anti-patterns.<\/li>\n<li><strong>Distinguish access failures from valid empty results.<\/strong> A timeout needs a retry decision; a successful query with zero matches is an answer. Conflating them corrupts coordinator decisions in both directions.<\/li>\n<li>When sources stay unavailable, the coordinator proceeds with partial results and the synthesis output carries <strong>coverage annotations<\/strong>: which findings are well-supported vs which topic areas have gaps.<\/li>\n<\/ul>\n<h3>Step 7 \u2014 Hooks for deterministic normalization<\/h3>\n<p>Your search MCP tool returns Unix timestamps; your document tool returns ISO 8601; a third returns numeric status codes. Prompting \"please normalize dates\" is probabilistic. A <strong>PostToolUse hook<\/strong> intercepts every tool result and transforms it <em>before the model processes it<\/em> \u2014 deterministic.<\/p>\n<pre><code class=\"language-python\"># SKETCH \u2014 Agent SDK hook concept, exam terminology.\ndef normalize_dates(tool_name, tool_result):\n    &quot;&quot;&quot;PostToolUse hook: normalize heterogeneous formats from different\n    MCP tools (Unix timestamps, ISO 8601, numeric status codes) before\n    the agent sees them.&quot;&quot;&quot;\n    return canonicalize(tool_result)   # every date -&gt; ISO 8601, every status -&gt; enum\n\nhooks = {&quot;PostToolUse&quot;: [normalize_dates]}\n<\/code><\/pre>\n<p>The rule (Task 1.5): <strong>hooks for deterministic guarantees, prompts for probabilistic guidance.<\/strong> Hooks can also intercept <em>outgoing<\/em> tool calls to block policy-violating actions. If a question says \"must always\" or \"guaranteed,\" the answer is a hook or programmatic gate, never a system-prompt sentence.<\/p>\n<h3>Step 8 \u2014 Sessions, forking, crash recovery<\/h3>\n<ul>\n<li><code>--resume &lt;session-name&gt;<\/code> continues a <strong>named<\/strong> prior session. If files changed since, tell the resumed session <em>which<\/em> files changed for targeted re-analysis \u2014 don't force a full re-exploration. If prior tool results are <strong>stale<\/strong>, starting a <em>new<\/em> session with a structured summary injected is more reliable than resuming.<\/li>\n<li><strong><code>fork_session<\/code><\/strong> creates independent branches from a shared analysis baseline \u2014 e.g., run the expensive corpus analysis once, then fork twice to compare two synthesis strategies without paying for or contaminating re-analysis.<\/li>\n<li><strong>Crash recovery:<\/strong> each agent exports structured state (findings so far, sources covered) to a known location; the coordinator loads a <strong>manifest<\/strong> on resume and injects state into agent prompts. Long research runs die; design for it.<\/li>\n<li>Long exploration filling context: delegate verbose discovery to subagents that return summaries, keep <strong>scratchpad files<\/strong> of key findings, and use <code>/compact<\/code> in Claude Code sessions.<\/li>\n<\/ul>\n<h3>Step 9 \u2014 Wiring MCP servers (if the search/doc tools live in MCP servers)<\/h3>\n<pre><code class=\"language-json\">// .mcp.json \u2014 project scope, committed, shared with the team\n{\n  &quot;mcpServers&quot;: {\n    &quot;research-search&quot;: {\n      &quot;command&quot;: &quot;npx&quot;,\n      &quot;args&quot;: [&quot;-y&quot;, &quot;@yourorg/search-mcp&quot;],\n      &quot;env&quot;: { &quot;SEARCH_API_KEY&quot;: &quot;${SEARCH_API_KEY}&quot; }   // env var expansion \u2014 no secrets committed\n    }\n  }\n}\n<\/code><\/pre>\n<ul>\n<li>Project-scoped <code>.mcp.json<\/code> = shared team tooling. User-scoped <code>~/.claude.json<\/code> = personal/experimental servers. Both are discovered at connection time and available <strong>simultaneously<\/strong>.<\/li>\n<li><strong>MCP resources<\/strong> (vs tools): expose content catalogs \u2014 the document corpus index, source lists \u2014 so agents see what's available <em>without exploratory tool calls<\/em>. Resources for content, tools for actions.<\/li>\n<li>Prefer existing community MCP servers for standard integrations; write custom servers only for team-specific workflows.<\/li>\n<\/ul>\n<hr />\n<h2>3. The decision points this scenario tests<\/h2>\n<p>Each row is a task statement converted to exam form. The \"trap\" column is what the wrong-but-plausible option looks like.<\/p>\n<h3>D1 \u2014 Orchestration<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Deciding when the agent loop ends<\/td>\n<td>Check <code>stop_reason<\/code>: continue on <code>\"tool_use\"<\/code>, stop on <code>\"end_turn\"<\/code><\/td>\n<td>It's the model's explicit signal<\/td>\n<td>Parse text for \"done\"; iteration cap as primary stop; check for assistant text<\/td>\n<\/tr>\n<tr>\n<td>Report misses whole subdomains; all subagents ran clean<\/td>\n<td>Fix coordinator decomposition breadth<\/td>\n<td>Subagents only cover what they're assigned<\/td>\n<td>Blame synthesis gap-detection, search query breadth, or analysis filtering<\/td>\n<\/tr>\n<tr>\n<td>Every query runs the full 4-agent pipeline, simple ones included<\/td>\n<td>Coordinator dynamically selects which subagents each query needs<\/td>\n<td>Coordinator's job includes invocation decisions by query complexity<\/td>\n<td>Hardcode the pipeline \"for consistency\"<\/td>\n<\/tr>\n<tr>\n<td>Two subagents keep researching the same sources<\/td>\n<td>Partition scope: distinct subtopics or source types per agent<\/td>\n<td>Minimizes duplication by construction<\/td>\n<td>\"Tell them to avoid duplication\" (prompt hope, no partition)<\/td>\n<\/tr>\n<tr>\n<td>Synthesis output has gaps<\/td>\n<td>Iterative refinement: coordinator evaluates, re-delegates targeted queries, re-invokes synthesis<\/td>\n<td>Coverage is a loop, not a pass<\/td>\n<td>One-shot pipeline; or asking synthesis to \"try harder\"<\/td>\n<\/tr>\n<tr>\n<td>Need search + analysis running at once<\/td>\n<td>Multiple Task tool calls in a <strong>single<\/strong> coordinator response<\/td>\n<td>That's the parallel-spawn mechanism<\/td>\n<td>One Task call per turn, sequentially<\/td>\n<\/tr>\n<tr>\n<td>Coordinator can't spawn subagents at all<\/td>\n<td>Add <code>\"Task\"<\/code> to its <code>allowedTools<\/code><\/td>\n<td>Task tool is <em>the<\/em> spawn mechanism and must be allowed<\/td>\n<td>Fiddle with subagent configs or prompts<\/td>\n<\/tr>\n<tr>\n<td>Subagent needs prior findings<\/td>\n<td>Paste complete findings directly into its prompt<\/td>\n<td>Isolated context; no inheritance, no shared memory<\/td>\n<td>Assume it sees the coordinator's history<\/td>\n<\/tr>\n<tr>\n<td>Writing the coordinator prompt<\/td>\n<td>Research goals + quality criteria<\/td>\n<td>Enables subagent adaptability<\/td>\n<td>Step-by-step procedural instructions<\/td>\n<\/tr>\n<tr>\n<td>Compare two report structures from one expensive analysis<\/td>\n<td><code>fork_session<\/code> from the shared baseline<\/td>\n<td>Independent branches, analysis paid once<\/td>\n<td>Re-run analysis per approach; or mutate one session back and forth<\/td>\n<\/tr>\n<tr>\n<td>Dates arrive in 3 formats from 3 MCP tools<\/td>\n<td>PostToolUse hook normalizes before the model sees them<\/td>\n<td>Deterministic guarantee<\/td>\n<td>System-prompt instruction to normalize (probabilistic)<\/td>\n<\/tr>\n<tr>\n<td>Resuming a long research session after source docs changed<\/td>\n<td>Tell the resumed session which files changed; if results are stale, start fresh with an injected summary<\/td>\n<td>Stale tool results poison resumed reasoning<\/td>\n<td>Blind <code>--resume<\/code> and trust old context; or full re-exploration<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3>D2 \u2014 Tool design &amp; MCP<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Agent picks the wrong tool between two similar tools with thin descriptions<\/td>\n<td><strong>First step:<\/strong> expand descriptions \u2014 inputs, example queries, edge cases, boundaries vs similar tools<\/td>\n<td>Descriptions are the primary selection mechanism; lowest-effort fix at the root cause<\/td>\n<td>Few-shot examples (token overhead, wrong layer); keyword routing layer (over-engineered); merging tools (bigger change than \"first step\" warrants)<\/td>\n<\/tr>\n<tr>\n<td><code>analyze_content<\/code> vs <code>analyze_document<\/code> misrouting persists<\/td>\n<td>Rename to eliminate overlap (<code>extract_web_results<\/code>) + web-specific description<\/td>\n<td>Names + descriptions carry the differentiation<\/td>\n<td>Keep names, add more prompt warnings<\/td>\n<\/tr>\n<tr>\n<td>One mega <code>analyze_document<\/code> tool used inconsistently<\/td>\n<td>Split into <code>extract_data_points<\/code>, <code>summarize_content<\/code>, <code>verify_claim_against_source<\/code><\/td>\n<td>Purpose-specific tools with defined contracts<\/td>\n<td>One bigger description on the mega-tool<\/td>\n<\/tr>\n<tr>\n<td>An agent has 18 tools and picks badly<\/td>\n<td>Cut to the 4-5 tools its role needs<\/td>\n<td>Tool count drives selection complexity<\/td>\n<td>More selection guidance in the prompt<\/td>\n<\/tr>\n<tr>\n<td>Synthesis needs frequent simple fact-checks (85%), rare deep dives (15%)<\/td>\n<td>Scoped <code>verify_fact<\/code> on synthesis; complex cases still route through coordinator<\/td>\n<td>Least privilege for the common case, coordination for the rest<\/td>\n<td>Full web-search access for synthesis; batch all verifications to the end (blocks dependent steps); speculative pre-caching<\/td>\n<\/tr>\n<tr>\n<td>Must guarantee the model calls <em>some<\/em> tool, never plain text<\/td>\n<td><code>tool_choice: \"any\"<\/code><\/td>\n<td>\"auto\" permits a text-only reply<\/td>\n<td>Prompt \"you must use a tool\"<\/td>\n<\/tr>\n<tr>\n<td>A specific tool must run first (e.g., <code>extract_metadata<\/code> before enrichment)<\/td>\n<td><code>tool_choice: {\"type\": \"tool\", \"name\": \"extract_metadata\"}<\/code>, then follow-up turns<\/td>\n<td>Forced selection is deterministic<\/td>\n<td>Ordering instructions in the prompt<\/td>\n<\/tr>\n<tr>\n<td>Tool fails \u2014 what goes back to the agent?<\/td>\n<td><code>isError<\/code> + <code>errorCategory<\/code> + <code>isRetryable<\/code> + human-readable description<\/td>\n<td>Enables correct recovery; avoids wasted retries on non-retryable errors<\/td>\n<td>Generic \"Operation failed\"<\/td>\n<\/tr>\n<tr>\n<td>Agents burn turns discovering what documents exist<\/td>\n<td>Expose the catalog as an <strong>MCP resource<\/strong><\/td>\n<td>Resources = content visibility without exploratory tool calls<\/td>\n<td>Add a <code>list_documents<\/code> tool loop<\/td>\n<\/tr>\n<tr>\n<td>Agent prefers built-in Grep over your capable MCP search tool<\/td>\n<td>Enhance the MCP tool's description to explain capabilities and outputs in detail<\/td>\n<td>Selection follows descriptions<\/td>\n<td>Disable built-ins<\/td>\n<\/tr>\n<tr>\n<td>Team needs shared search server; you're testing a new one<\/td>\n<td>Shared \u2192 project <code>.mcp.json<\/code> (env-var expansion for creds); experimental \u2192 <code>~/.claude.json<\/code><\/td>\n<td>Scoping rule + no committed secrets<\/td>\n<td>Hardcode keys in <code>.mcp.json<\/code>; put team server in user scope<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3>D5 \u2014 Context &amp; reliability<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Final report has claims but citations vanished<\/td>\n<td>Structured claim-source mappings emitted by subagents and <strong>preserved through synthesis<\/strong><\/td>\n<td>Attribution dies in prose summarization<\/td>\n<td>\"Instruct synthesis to cite better\" after provenance is already lost<\/td>\n<\/tr>\n<tr>\n<td>Two credible sources give different statistics<\/td>\n<td>Include <strong>both<\/strong>, annotated with source attribution; coordinator decides reconciliation before synthesis<\/td>\n<td>Arbitrary selection hides real disagreement<\/td>\n<td>Pick the more credible-looking one; average them<\/td>\n<\/tr>\n<tr>\n<td>2019 vs 2025 figures flagged as a contradiction<\/td>\n<td>Require publication/collection dates in every structured finding<\/td>\n<td>Temporal difference \u2260 contradiction<\/td>\n<td>Conflict-resolution logic without dates<\/td>\n<\/tr>\n<tr>\n<td>Synthesis ignores findings from the middle of a big aggregated input<\/td>\n<td>Key-findings summary at the <strong>beginning<\/strong>, explicit section headers throughout<\/td>\n<td>Lost-in-the-middle: start and end get processed reliably<\/td>\n<td>Bigger context window (doesn't fix attention position effects)<\/td>\n<\/tr>\n<tr>\n<td>Verbose search results blow the synthesis agent's context budget<\/td>\n<td>Upstream agents return structured data (key facts, citations, relevance scores), not raw content + reasoning chains; trim tool outputs to relevant fields<\/td>\n<td>Tool results consume tokens disproportionately to relevance<\/td>\n<td>Progressive summarization that blurs numbers, dates, stated specifics<\/td>\n<\/tr>\n<tr>\n<td>Web search times out mid-research<\/td>\n<td>Structured error context to coordinator: failure type, attempted query, partial results, alternatives<\/td>\n<td>Coordinator can retry-modified, reroute, or proceed with partials<\/td>\n<td>Generic \"search unavailable\" after silent retries; empty-set-as-success; kill the whole workflow<\/td>\n<\/tr>\n<tr>\n<td>Some sources permanently unavailable<\/td>\n<td>Proceed; synthesis annotates well-supported findings vs coverage gaps<\/td>\n<td>Honest partial output beats fake completeness<\/td>\n<td>Block the report until everything resolves<\/td>\n<\/tr>\n<tr>\n<td>Long run crashes at hour 3<\/td>\n<td>Structured state exports per agent + coordinator loads a manifest on resume<\/td>\n<td>Designed recovery, not luck<\/td>\n<td>Restart from zero; rely on session history surviving<\/td>\n<\/tr>\n<tr>\n<td>Extended exploration: agent starts citing \"typical patterns\" instead of the actual sources it read<\/td>\n<td>Scratchpad files of key findings; subagents for verbose phases; summarize before each next phase; <code>/compact<\/code><\/td>\n<td>Context degradation is predictable; externalize the facts<\/td>\n<td>Push on in the same overloaded session<\/td>\n<\/tr>\n<tr>\n<td>Financial data, news, and technical findings all rendered as uniform prose<\/td>\n<td>Render per content type: tables for financial data, prose for news, structured lists for technical findings<\/td>\n<td>Format should match content, not flatten it<\/td>\n<td>One uniform output template for everything<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>4. Failure-modes drill<\/h2>\n<p>Guide-style: production symptom \u2192 root cause \u2192 fix. These mirror the actual sample questions (Q7-Q9 are from this scenario) plus the task statements most likely to become questions.<\/p>\n<p><strong>1. Every subagent runs clean, but the \"AI in creative industries\" report covers only visual arts \u2014 no music, writing, or film.<\/strong> Coordinator logs show subtasks: \"AI in digital art,\" \"AI in graphic design,\" \"AI in photography.\"\n\u2192 Root cause: <strong>coordinator task decomposition too narrow.<\/strong> The subagents did exactly what they were assigned.\n\u2192 Fix: coordinator decomposes by enumerating the topic's full domain coverage first, then assigns; add a coverage-evaluation + re-delegation refinement loop.\n<em>(This is sample Q7. Distractors blame synthesis, search queries, or analysis filtering \u2014 all downstream agents working correctly within assigned scope.)<\/em><\/p>\n<p><strong>2. Web search subagent times out; coordinator either retries the identical failing query forever or gives up on the topic.<\/strong>\n\u2192 Root cause: error came back as a generic status (or was swallowed as an empty \"success\"), so the coordinator has nothing to reason with.\n\u2192 Fix: structured error context \u2014 failure type, attempted query, partial results, alternative approaches. Subagent handles transient retries locally; only unresolvable errors propagate. <em>(Sample Q8.)<\/em><\/p>\n<p><strong>3. Latency up 40%; logs show 2-3 coordinator round-trips per task because synthesis keeps requesting fact verification. 85% of the verifications are simple date/name/statistic checks.<\/strong>\n\u2192 Root cause: synthesis has zero verification capability, so even trivial checks route synthesis \u2192 coordinator \u2192 web search \u2192 coordinator \u2192 synthesis.\n\u2192 Fix: give synthesis a <strong>scoped <code>verify_fact<\/code> tool<\/strong> for simple lookups; the 15% complex verifications keep the coordinator path. Not full web-search access (over-provisioning, specialization break), not end-of-pass batching (later synthesis steps depend on earlier verified facts). <em>(Sample Q9.)<\/em><\/p>\n<p><strong>4. Final reports read well but citations are missing or attached to the wrong claims.<\/strong>\n\u2192 Root cause: a middle hop compressed findings into prose summaries; claim-source mappings were never a structural requirement, so attribution was lost before synthesis ever saw it.\n\u2192 Fix: every subagent outputs <code>{claim, evidence excerpt, source URL, document name, publication date}<\/code>; synthesis is required to preserve and <strong>merge<\/strong> the mappings, not regenerate citations from memory.<\/p>\n<p><strong>5. Two credible sources report different market-size numbers; the report confidently states one of them.<\/strong>\n\u2192 Root cause: an agent silently resolved the conflict by picking a value.\n\u2192 Fix: document analysis completes <strong>with both conflicting values included and explicitly annotated<\/strong>; the coordinator decides reconciliation before synthesis; the report separates well-established findings from contested ones, preserving original source characterizations and methodological context.<\/p>\n<p><strong>6. Report flags a \"data inconsistency\" between two statistics that are actually a 2019 baseline and a 2025 update.<\/strong>\n\u2192 Root cause: structured findings carry no publication/collection dates, so temporal differences read as contradictions.\n\u2192 Fix: make <code>publication_date<\/code> a required field in every subagent's structured output; synthesis interprets time-separated values as trend data.<\/p>\n<p><strong>7. Synthesis output consistently reflects the first and last search agents' findings; the middle agents' material is thin or missing. All findings verifiably reached the synthesis prompt.<\/strong>\n\u2192 Root cause: <strong>lost-in-the-middle<\/strong> \u2014 long aggregated inputs get reliable attention at the beginning and end, not the middle.\n\u2192 Fix: put a key-findings summary at the top of the aggregated input and organize detail under explicit section headers. A bigger context window is the trap answer \u2014 capacity doesn't fix position effects.<\/p>\n<p><strong>8. Six-hour research run dies at hour four (crash/network); restart begins from zero and re-pays every search and analysis call.<\/strong>\n\u2192 Root cause: no state persistence outside the live conversation context.\n\u2192 Fix: each agent exports structured state (findings, sources covered, subtopics remaining) to a known location; the coordinator loads a <strong>manifest<\/strong> on resume and injects prior state into agent prompts. For comparing alternative approaches from the recovered baseline, <code>fork_session<\/code> instead of mutating one session.<\/p>\n<hr />\n<h2>Cram card \u2014 10 rules<\/h2>\n<ol>\n<li>Loop control = <code>stop_reason<\/code> only: <code>\"tool_use\"<\/code> continue, <code>\"end_turn\"<\/code> stop. Text-parsing and iteration caps are named anti-patterns.<\/li>\n<li>Coverage holes in the report = coordinator decomposition too narrow. Diagnose the assignment, not the subagents.<\/li>\n<li>Subagents inherit nothing. Pass complete prior findings explicitly in the subagent's prompt.<\/li>\n<li>Parallelism = multiple Task calls in ONE coordinator response; coordinator's <code>allowedTools<\/code> must include <code>\"Task\"<\/code>.<\/li>\n<li>Tool misrouting? First fix is always richer tool descriptions (inputs, examples, boundaries) \u2014 not few-shot, not a routing layer, not merging tools.<\/li>\n<li>4-5 role-scoped tools per agent; high-frequency cross-role need gets one scoped tool (<code>verify_fact<\/code>), complex cases stay with the coordinator.<\/li>\n<li>Errors: <code>isError<\/code> + <code>errorCategory<\/code> + <code>isRetryable<\/code> + partials + alternatives. Local retry for transient; never empty-as-success; never kill the workflow.<\/li>\n<li>\"Must always happen\" = hook or programmatic gate (deterministic). Prompt instructions = probabilistic; wrong when compliance is required.<\/li>\n<li>Provenance is structured claim-source mappings with publication dates, preserved through every hop. Conflicts get annotated with attribution, never silently resolved.<\/li>\n<li>Long inputs: summary first + section headers (lost-in-the-middle); long runs: state manifests + scratchpads; alternative approaches: <code>fork_session<\/code> from a shared baseline.<\/li>\n<\/ol>","words":3604},"04-dev-productivity-agent":{"title":"Scenario 4 \u2014 Developer Productivity with Claude","group":"Scenario walkthroughs","html":"<h1>Scenario 4 \u2014 Developer Productivity with Claude<\/h1>\n<blockquote>\n<p><strong>Guide definition:<\/strong> You are building developer productivity tools using the Claude Agent SDK. The agent helps engineers explore unfamiliar codebases, understand legacy systems, generate boilerplate code, and automate repetitive tasks. It uses the built-in tools (Read, Write, Bash, Grep, Glob) and integrates with MCP servers.<\/p>\n<p><strong>Primary domains:<\/strong> D2 Tool Design &amp; MCP Integration (18%), D3 Claude Code Configuration &amp; Workflows (20%), D1 Agentic Architecture &amp; Orchestration (27%).<\/p>\n<\/blockquote>\n<p>This is the scenario closest to your daily life \u2014 it's basically \"build Claude Code yourself, then configure Claude Code for a team.\" That's an advantage and a trap: the exam tests the <em>mechanics underneath<\/em> the CLI you already use. You need to know <strong>why<\/strong> Grep-then-Read works, <strong>where<\/strong> each config file lives, and <strong>what actually exists<\/strong> (the distractors are fake flags and fake config files).<\/p>\n<hr />\n<h2>1. The system at a glance<\/h2>\n<p>Two halves, one system:<\/p>\n<p><strong>Half A \u2014 the Agent SDK program.<\/strong> A Python process running an agentic loop against the Claude API. Claude gets built-in tools (Read, Write, Edit, Bash, Grep, Glob) plus MCP tools from connected servers. The loop sends a request, inspects <code>stop_reason<\/code>, executes whatever tool Claude asked for, appends the result to conversation history, and repeats until <code>stop_reason == \"end_turn\"<\/code>. For big jobs (map a legacy codebase, add tests everywhere) a coordinator agent spawns subagents via the <strong>Task tool<\/strong>, each with its own isolated context and restricted tool set.<\/p>\n<p><strong>Half B \u2014 the Claude Code team configuration.<\/strong> The repo carries the shared brain: <code>CLAUDE.md<\/code> (universal standards), <code>.claude/rules/<\/code> (path-scoped conventions), <code>.claude/commands/<\/code> (shared slash commands), <code>.claude/skills/<\/code> (on-demand workflows), <code>.mcp.json<\/code> (shared MCP servers with env-var credentials). Personal stuff lives in the home directory (<code>~/.claude/CLAUDE.md<\/code>, <code>~/.claude/commands/<\/code>, <code>~/.claude.json<\/code>).<\/p>\n<pre><code> ENGINEER\n    \u2502 &quot;explain this legacy billing module&quot;\n    \u25bc\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502 COORDINATOR AGENT (agentic loop)                \u2502\n\u2502   while stop_reason == &quot;tool_use&quot;: run tools    \u2502\n\u2502   allowedTools: [Task, Read, Grep, Glob, ...]   \u2502\n\u2502   PostToolUse hooks: normalize / enforce        \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n       \u2502 Task         \u2502 Task          \u2502 Task   (parallel = multiple\n       \u25bc              \u25bc               \u25bc         Task calls in ONE response)\n \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510   \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510   \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n \u2502 Explore  \u2502   \u2502 Test-map \u2502   \u2502 Boilerplate  \u2502   subagents: ISOLATED\n \u2502 subagent \u2502   \u2502 subagent \u2502   \u2502 subagent     \u2502   context \u2014 coordinator\n \u2502 Grep,Read\u2502   \u2502 Grep,Glob\u2502   \u2502 Read,Write   \u2502   must pass findings\n \u2514\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2518   \u2514\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2518   \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518   explicitly in prompt\n      \u25bc              \u25bc                \u25bc\n \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n \u2502 TOOLS                                           \u2502\n \u2502  built-in: Read Write Edit Bash Grep Glob       \u2502\n \u2502  MCP servers (.mcp.json): jira, github, docs    \u2502\n \u2502  MCP resources: schema/issue catalogs           \u2502\n \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n      \u25b2\n scratchpad files + state manifests (crash recovery,\n counteracting context degradation in long sessions)\n<\/code><\/pre>\n<p>Data flow to memorize: <strong>user request \u2192 coordinator decomposes \u2192 subagents explore with scoped tools \u2192 structured summaries flow back through the coordinator \u2192 coordinator synthesizes<\/strong>. Subagents never talk to each other directly (hub-and-spoke), and they inherit <em>nothing<\/em> automatically \u2014 context passing is explicit, in the prompt.<\/p>\n<hr />\n<h2>2. Build it step by step<\/h2>\n<h3>Step 1 \u2014 The agentic loop (the engine everything sits on)<\/h3>\n<p>First thing you build, because nothing else runs without it. The loop's contract: <strong>continue while <code>stop_reason == \"tool_use\"<\/code>, terminate when <code>stop_reason == \"end_turn\"<\/code>.<\/strong> Nothing else decides termination.<\/p>\n<pre><code class=\"language-python\">import anthropic\n\nclient = anthropic.Anthropic()\n\ntools = [...]           # defined in Step 2\nmessages = [{&quot;role&quot;: &quot;user&quot;, &quot;content&quot;: &quot;Trace how invoices get created in this repo.&quot;}]\n\nwhile True:\n    response = client.messages.create(\n        model=&quot;claude-sonnet-4-5&quot;,\n        max_tokens=4096,\n        system=&quot;You are a codebase exploration agent. Build understanding &quot;\n               &quot;incrementally: Grep for entry points first, then Read to follow imports.&quot;,\n        tools=tools,\n        messages=messages,\n    )\n\n    # Assistant turn (may contain text + tool_use blocks) goes into history\n    messages.append({&quot;role&quot;: &quot;assistant&quot;, &quot;content&quot;: response.content})\n\n    if response.stop_reason == &quot;tool_use&quot;:\n        tool_results = []\n        for block in response.content:\n            if block.type == &quot;tool_use&quot;:\n                result = execute_tool(block.name, block.input)   # your dispatch\n                tool_results.append({\n                    &quot;type&quot;: &quot;tool_result&quot;,\n                    &quot;tool_use_id&quot;: block.id,\n                    &quot;content&quot;: result,\n                })\n        # Tool results go back as a USER message \u2192 next iteration reasons over them\n        messages.append({&quot;role&quot;: &quot;user&quot;, &quot;content&quot;: tool_results})\n        continue\n\n    if response.stop_reason == &quot;end_turn&quot;:\n        break            # Claude decided it's done. THIS is the stop condition.\n<\/code><\/pre>\n<p>Burn in the three anti-patterns the guide names explicitly \u2014 each is a distractor on the exam:<\/p>\n<ol>\n<li><strong>Parsing natural-language signals<\/strong> (\"if the reply contains 'done', stop\") \u2014 never.<\/li>\n<li><strong>An arbitrary iteration cap as the <em>primary<\/em> stopping mechanism<\/strong> \u2014 a safety ceiling is fine; it must not be how the loop normally ends.<\/li>\n<li><strong>Checking for assistant text content as a completion indicator<\/strong> \u2014 Claude emits text alongside tool calls all the time.<\/li>\n<\/ol>\n<p>Also core: tool results are <strong>appended to conversation history<\/strong> so the model can reason about the next action. That append-and-resend is <em>the<\/em> mechanism; drop it and the agent goes amnesiac between iterations.<\/p>\n<h3>Step 2 \u2014 Tool definitions with descriptions that carry their weight<\/h3>\n<p>Tool descriptions are <strong>the primary mechanism LLMs use for tool selection<\/strong>. Minimal descriptions \u2192 misrouting between similar tools. A good description covers: purpose, input formats, example queries, edge cases, and <strong>boundaries \u2014 when to use it vs. its neighbors<\/strong>.<\/p>\n<pre><code class=\"language-python\">tools = [\n    {\n        &quot;name&quot;: &quot;search_code&quot;,\n        &quot;description&quot;: (\n            &quot;Search FILE CONTENTS for a regex pattern (function names, error &quot;\n            &quot;messages, import statements). Returns matching lines with file:line. &quot;\n            &quot;Input: a regex plus optional path filter. Use this to find WHERE &quot;\n            &quot;something is referenced in code. Do NOT use this to find files by &quot;\n            &quot;name \u2014 use find_files for filename/extension patterns.&quot;\n        ),\n        &quot;input_schema&quot;: {\n            &quot;type&quot;: &quot;object&quot;,\n            &quot;properties&quot;: {\n                &quot;pattern&quot;: {&quot;type&quot;: &quot;string&quot;, &quot;description&quot;: &quot;Regex, e.g. 'def create_invoice'&quot;},\n                &quot;path&quot;:    {&quot;type&quot;: &quot;string&quot;, &quot;description&quot;: &quot;Optional dir to scope the search&quot;},\n            },\n            &quot;required&quot;: [&quot;pattern&quot;],\n        },\n    },\n    {\n        &quot;name&quot;: &quot;find_files&quot;,\n        &quot;description&quot;: (\n            &quot;Find FILE PATHS matching a glob pattern (e.g. '**/*.test.tsx', &quot;\n            &quot;'src/billing/**/*.py'). Returns paths only, no contents. Use this &quot;\n            &quot;to locate files by naming convention. Do NOT use this to search &quot;\n            &quot;inside files \u2014 use search_code for content.&quot;\n        ),\n        &quot;input_schema&quot;: {\n            &quot;type&quot;: &quot;object&quot;,\n            &quot;properties&quot;: {&quot;glob&quot;: {&quot;type&quot;: &quot;string&quot;}},\n            &quot;required&quot;: [&quot;glob&quot;],\n        },\n    },\n]\n<\/code><\/pre>\n<p>If two tools keep getting confused (<code>analyze_content<\/code> vs <code>analyze_document<\/code>), the guide's fixes, in order: <strong>expand/differentiate the descriptions first<\/strong> (low effort, high leverage), <strong>rename to eliminate overlap<\/strong> (<code>analyze_content<\/code> \u2192 <code>extract_web_results<\/code>), or <strong>split a generic tool into purpose-specific tools<\/strong> with defined I/O contracts. Also <strong>review the system prompt for keyword-sensitive instructions<\/strong> that can override well-written descriptions. Few-shot routing examples and pre-parse routing layers are the plausible-but-wrong answers for a <em>first<\/em> step.<\/p>\n<p>Structured errors, from day one \u2014 the agent can't recover from <code>\"Operation failed\"<\/code>:<\/p>\n<pre><code class=\"language-python\"># What a well-designed MCP tool returns on failure (isError flag pattern)\n{\n    &quot;isError&quot;: True,\n    &quot;errorCategory&quot;: &quot;transient&quot;,        # transient | validation | permission | business\n    &quot;isRetryable&quot;: True,\n    &quot;message&quot;: &quot;Repo index service timed out after 10s; safe to retry.&quot;,\n}\n<\/code><\/pre>\n<p>And keep this distinction sacred: a query that ran fine and matched nothing is a <strong>valid empty result<\/strong> (success, no matches), not an error. Returning empties as failures \u2014 or failures as empties \u2014 poisons the agent's retry decisions.<\/p>\n<h3>Step 3 \u2014 Wire MCP servers and expose resources<\/h3>\n<p>Standard integration (GitHub, Jira)? <strong>Use an existing community MCP server.<\/strong> Custom servers are for team-specific workflows only. Two scopes:<\/p>\n<p><code>.mcp.json<\/code> \u2014 project scope, committed, shared with the whole team, <strong>env-var expansion so no secrets hit git<\/strong>:<\/p>\n<pre><code class=\"language-json\">{\n  &quot;mcpServers&quot;: {\n    &quot;github&quot;: {\n      &quot;command&quot;: &quot;npx&quot;,\n      &quot;args&quot;: [&quot;-y&quot;, &quot;@modelcontextprotocol/server-github&quot;],\n      &quot;env&quot;: { &quot;GITHUB_TOKEN&quot;: &quot;${GITHUB_TOKEN}&quot; }\n    }\n  }\n}\n<\/code><\/pre>\n<p><code>~/.claude.json<\/code> \u2014 user scope, for your personal/experimental servers. Both scopes' tools are <strong>discovered at connection time and available simultaneously<\/strong>.<\/p>\n<p>Two D2 facts that show up as questions:<\/p>\n<ul>\n<li><strong>The agent ignores your fancy MCP code-intel tool and keeps using built-in Grep<\/strong> \u2192 the MCP tool's description is too thin. Enhance it to explain capabilities and outputs in detail; the model picks tools by description.<\/li>\n<li><strong>The agent burns turns on exploratory tool calls just to learn what data exists<\/strong> \u2192 expose a content catalog (issue summaries, documentation hierarchy, database schema) as an <strong>MCP resource<\/strong>. Resources are for <em>content the agent can consult<\/em>; tools are for <em>actions<\/em>.<\/li>\n<\/ul>\n<h3>Step 4 \u2014 Subagents via the Task tool (Agent SDK)<\/h3>\n<p>When exploration output would drown the coordinator's context, delegate. <em>(Sketch code \u2014 exact SDK surface varies; the concepts and names below are what the exam tests.)<\/em><\/p>\n<pre><code class=\"language-python\"># SKETCH \u2014 Agent SDK concepts, exam terminology\nagents = {\n    &quot;code-explorer&quot;: AgentDefinition(\n        description=&quot;Investigates specific codebase questions: find files, &quot;\n                    &quot;trace call chains, map module dependencies. Returns a &quot;\n                    &quot;structured summary, not raw file dumps.&quot;,\n        prompt=&quot;Explore incrementally: Grep entry points, Read to follow imports. &quot;\n               &quot;Output findings as structured facts with file:line references.&quot;,\n        tools=[&quot;Read&quot;, &quot;Grep&quot;, &quot;Glob&quot;],          # scoped: read-only explorer\n    ),\n    &quot;boilerplate-writer&quot;: AgentDefinition(\n        description=&quot;Generates boilerplate from an approved spec and existing patterns.&quot;,\n        prompt=&quot;Follow the conventions in the examples provided in your prompt.&quot;,\n        tools=[&quot;Read&quot;, &quot;Write&quot;, &quot;Glob&quot;],          # no Bash: can't run anything\n    ),\n}\n\ncoordinator = AgentDefinition(\n    prompt=&quot;Decompose the engineer's request, delegate investigation to &quot;\n           &quot;subagents, synthesize their structured findings.&quot;,\n    allowedTools=[&quot;Task&quot;, &quot;Read&quot;, &quot;Grep&quot;, &quot;Glob&quot;],   # \u2190 &quot;Task&quot; REQUIRED to spawn\n)\n<\/code><\/pre>\n<p>The four rules the exam hammers:<\/p>\n<ol>\n<li><strong><code>allowedTools<\/code> must include <code>\"Task\"<\/code><\/strong> or the coordinator physically cannot spawn subagents.<\/li>\n<li><strong>Subagents do not inherit the coordinator's conversation history<\/strong> and don't share memory between invocations. Everything they need \u2014 prior findings, file lists, constraints \u2014 goes <strong>explicitly in the prompt<\/strong> you spawn them with.<\/li>\n<li><strong>Parallel subagents = multiple Task tool calls in a single coordinator response<\/strong>, not one per turn.<\/li>\n<li>Coordinator prompts should specify <strong>goals and quality criteria, not step-by-step procedures<\/strong> \u2014 that's what lets subagents adapt.<\/li>\n<\/ol>\n<p>Keep each agent's tool set at <strong>4\u20135 role-relevant tools<\/strong>; handing an agent 18 tools measurably degrades selection reliability, and agents misuse tools outside their specialization.<\/p>\n<h3>Step 5 \u2014 Hooks for deterministic guarantees<\/h3>\n<p>Prompt instructions are probabilistic; when a rule must <em>always<\/em> hold, use a hook. Two patterns:<\/p>\n<pre><code class=\"language-python\"># SKETCH \u2014 PostToolUse hook: normalize before the model sees the result.\n# Three MCP servers return dates as Unix epoch, ISO 8601, and &quot;MM/DD/YYYY&quot;?\n# Don't prompt around it \u2014 normalize deterministically.\ndef post_tool_use(tool_name, tool_result):\n    if tool_name in (&quot;jira_get_issue&quot;, &quot;github_get_pr&quot;):\n        tool_result = normalize_timestamps_to_iso8601(tool_result)\n        tool_result = normalize_status_codes(tool_result)\n    return tool_result\n\n# SKETCH \u2014 tool-call interception hook: block policy violations pre-execution.\ndef pre_tool_use(tool_name, tool_input):\n    if tool_name == &quot;Bash&quot; and is_destructive(tool_input[&quot;command&quot;]):\n        return block(reason=&quot;Destructive commands require human approval&quot;,\n                     redirect=&quot;escalate_to_human&quot;)\n    return allow()\n<\/code><\/pre>\n<p>Decision rule: <strong>hooks for guaranteed compliance, prompts for judgment.<\/strong> \"The system prompt says never do X\" still has a non-zero failure rate; the exam's correct answer to any \"must never happen\" requirement is programmatic enforcement.<\/p>\n<h3>Step 6 \u2014 Built-in tool discipline (the exploration playbook)<\/h3>\n<p>The selection table you must know cold:<\/p>\n<table>\n<thead>\n<tr>\n<th>Need<\/th>\n<th>Tool<\/th>\n<th>Note<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Find text <em>inside<\/em> files (callers, error strings, imports)<\/td>\n<td><strong>Grep<\/strong><\/td>\n<td>content search<\/td>\n<\/tr>\n<tr>\n<td>Find files by <em>name/extension<\/em> pattern (<code>**/*.test.tsx<\/code>)<\/td>\n<td><strong>Glob<\/strong><\/td>\n<td>path matching, no contents<\/td>\n<\/tr>\n<tr>\n<td>Load a whole file<\/td>\n<td><strong>Read<\/strong><\/td>\n<td>\u2014<\/td>\n<\/tr>\n<tr>\n<td>Create/replace a whole file<\/td>\n<td><strong>Write<\/strong><\/td>\n<td>\u2014<\/td>\n<\/tr>\n<tr>\n<td>Targeted in-place change<\/td>\n<td><strong>Edit<\/strong><\/td>\n<td>needs <strong>unique<\/strong> anchor text<\/td>\n<\/tr>\n<tr>\n<td>Edit keeps failing (anchor text non-unique)<\/td>\n<td><strong>Read + Write fallback<\/strong><\/td>\n<td>the guide's named recovery<\/td>\n<\/tr>\n<tr>\n<td>Run commands, tests, builds<\/td>\n<td><strong>Bash<\/strong><\/td>\n<td>\u2014<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>The exploration strategy (this exact phrasing wins exam points): <strong>build understanding incrementally \u2014 Grep to find entry points, then Read to follow imports and trace flows. Never read all files upfront.<\/strong> For tracing usage across wrapper/re-export modules: <strong>first identify all exported names, then Grep for each name across the codebase.<\/strong><\/p>\n<h3>Step 7 \u2014 Session state: <code>--resume<\/code>, <code>fork_session<\/code>, fresh-with-summary<\/h3>\n<p>Long-running codebase work spans days. Three moves:<\/p>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Move<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Continue yesterday's named investigation; prior context still valid<\/td>\n<td><code>--resume &lt;session-name&gt;<\/code><\/td>\n<\/tr>\n<tr>\n<td>Files changed since the session analyzed them<\/td>\n<td>Resume <strong>and tell the agent exactly which files changed<\/strong> for targeted re-analysis \u2014 don't force full re-exploration<\/td>\n<\/tr>\n<tr>\n<td>Prior tool results are substantially stale<\/td>\n<td><strong>Start a new session with a structured summary injected<\/strong> \u2014 more reliable than resuming on rotten context<\/td>\n<\/tr>\n<tr>\n<td>Compare two approaches (e.g., two testing strategies) from one shared analysis<\/td>\n<td><strong><code>fork_session<\/code><\/strong> \u2014 independent branches from the shared baseline, explore divergently<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>For crash recovery in multi-agent runs: each agent <strong>exports state to a known location (manifest)<\/strong>; on resume the coordinator loads the manifest and injects it into agent prompts. And for marathon sessions, counteract context degradation with <strong>scratchpad files<\/strong> (persist key findings, reference them later), <strong>subagent delegation<\/strong> (verbose discovery stays out of the main context), phase summaries before spawning the next phase, and <strong><code>/compact<\/code><\/strong> when discovery output fills the window.<\/p>\n<h3>Step 8 \u2014 Team Claude Code configuration (Half B)<\/h3>\n<p>The repo layout that answers half of D3:<\/p>\n<pre><code>repo/\n\u251c\u2500\u2500 CLAUDE.md                        # project scope: universal standards, all teammates\n\u2502                                    #   @import docs/standards/api.md   \u2190 modular imports\n\u251c\u2500\u2500 .claude/\n\u2502   \u251c\u2500\u2500 rules/\n\u2502   \u2502   \u251c\u2500\u2500 testing.md               # path-scoped: loads ONLY when editing matching files\n\u2502   \u2502   \u251c\u2500\u2500 terraform.md\n\u2502   \u2502   \u2514\u2500\u2500 api-conventions.md\n\u2502   \u251c\u2500\u2500 commands/\n\u2502   \u2502   \u2514\u2500\u2500 onboard.md               # /onboard \u2014 shared via version control\n\u2502   \u251c\u2500\u2500 skills/\n\u2502   \u2502   \u2514\u2500\u2500 explore-codebase/\n\u2502   \u2502       \u2514\u2500\u2500 SKILL.md             # frontmatter: context: fork, allowed-tools, argument-hint\n\u2502   \u2514\u2500\u2500 ...\n\u251c\u2500\u2500 .mcp.json                        # shared MCP servers, ${ENV_VAR} expansion\n\u2514\u2500\u2500 src/legacy/CLAUDE.md             # directory-level: legacy-module-specific context\n\n~/.claude/CLAUDE.md                  # user scope: YOUR prefs only \u2014 NOT shared via git\n~/.claude/commands/                  # personal slash commands\n~/.claude.json                       # personal/experimental MCP servers\n<\/code><\/pre>\n<p>Path-scoped rule \u2014 the answer whenever conventions apply to files <em>spread across<\/em> directories:<\/p>\n<pre><code class=\"language-markdown\">---\npaths: [&quot;**/*.test.tsx&quot;, &quot;**/*.test.ts&quot;]\n---\n# Testing conventions\n- Use React Testing Library; never enzyme.\n- One behavior per test; name tests &quot;does X when Y&quot;.\n<\/code><\/pre>\n<p>Loads only when editing matching files \u2192 less irrelevant context, fewer tokens. Beats per-directory CLAUDE.md files exactly because glob patterns don't care where the file sits.<\/p>\n<p>Skill with the three frontmatter options the exam names:<\/p>\n<pre><code class=\"language-markdown\">---\ncontext: fork              # runs in an isolated sub-agent context \u2014\n                           #   verbose analysis output can't pollute the main session\nallowed-tools: Read, Grep, Glob      # restrict what the skill may touch\nargument-hint: &lt;module-path&gt;         # prompts the dev if invoked without args\n---\n# Explore Codebase\nMap the module at $ARGUMENTS: entry points, dependencies, test coverage.\nReturn a structured summary only.\n<\/code><\/pre>\n<p><strong>Skills vs CLAUDE.md:<\/strong> skills = on-demand invocation for task-specific workflows; CLAUDE.md = always-loaded universal standards. Want a personal variant of a team skill? Create it in <code>~/.claude/skills/<\/code> <strong>under a different name<\/strong> so teammates are unaffected.<\/p>\n<p>Debugging config: <strong><code>/memory<\/code><\/strong> shows which memory files are loaded \u2014 first move when behavior differs across machines or sessions.<\/p>\n<h3>Step 9 \u2014 Plan mode vs direct execution<\/h3>\n<table>\n<thead>\n<tr>\n<th>Task<\/th>\n<th>Mode<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Monolith\u2192microservices restructuring, library migration touching 45+ files, multiple valid approaches, architectural decisions<\/td>\n<td><strong>Plan mode<\/strong> \u2014 explore and design before committing; prevents costly rework<\/td>\n<\/tr>\n<tr>\n<td>Single-file bug fix with a clear stack trace, adding one validation conditional<\/td>\n<td><strong>Direct execution<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Verbose discovery phase inside a multi-phase task<\/td>\n<td><strong>Explore subagent<\/strong> \u2014 isolates discovery output, returns summaries, preserves main context<\/td>\n<\/tr>\n<tr>\n<td>Big migration<\/td>\n<td><strong>Combine:<\/strong> plan mode to investigate \u2192 direct execution to implement the plan<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>The distractor pattern: \"start direct, switch to plan if it gets complex.\" Wrong when the complexity is <em>already stated in the requirements<\/em> \u2014 you don't wait for it to emerge.<\/p>\n<h3>Step 10 \u2014 Iterative refinement for boilerplate quality<\/h3>\n<p>When generated output misses the mark:<\/p>\n<ul>\n<li>Prose descriptions interpreted inconsistently \u2192 give <strong>2\u20133 concrete input/output examples<\/strong>. Most effective single move.<\/li>\n<li>Quality drift \u2192 <strong>test-driven iteration<\/strong>: write the test suite first, iterate by sharing test failures.<\/li>\n<li>Unfamiliar domain, unknown unknowns \u2192 <strong>interview pattern<\/strong>: have Claude ask questions first (surfaces cache invalidation, failure modes, things you didn't anticipate).<\/li>\n<li>Multiple issues to fix \u2192 <strong>interacting issues: one detailed message. Independent issues: sequential.<\/strong><\/li>\n<\/ul>\n<hr />\n<h2>3. The decision points this scenario tests<\/h2>\n<h3>D2 \u2014 Tool Design &amp; MCP Integration<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Agent confuses two similar tools with minimal descriptions<\/td>\n<td>Expand descriptions: input formats, example queries, edge cases, when-to-use-vs-alternatives<\/td>\n<td>Descriptions are the LLM's primary tool-selection signal; fixes root cause cheaply<\/td>\n<td>Few-shot routing examples, pre-parse routing layer, tool consolidation \u2014 all heavier than a \"first step\" warrants<\/td>\n<\/tr>\n<tr>\n<td>One generic tool used for wildly different jobs<\/td>\n<td>Split into purpose-specific tools with defined I/O contracts<\/td>\n<td>Each tool gets a clean selection signal<\/td>\n<td>Making the generic description longer<\/td>\n<\/tr>\n<tr>\n<td>Agent has 18 tools, selection is flaky<\/td>\n<td>Restrict each agent to 4\u20135 role-relevant tools<\/td>\n<td>Fewer options = higher selection reliability; out-of-specialty tools get misused<\/td>\n<td>\"More capable model\" or more prompt instructions<\/td>\n<\/tr>\n<tr>\n<td>Subagent needs one frequent cross-role operation (85% simple case)<\/td>\n<td>Scoped narrow tool (e.g., <code>verify_fact<\/code>) for the common case; complex cases still route through coordinator<\/td>\n<td>Least privilege + preserved coordination<\/td>\n<td>Granting the full foreign tool set (over-provisioning) or batching verifications (blocking dependencies)<\/td>\n<\/tr>\n<tr>\n<td>Must guarantee a tool call happens / a specific tool runs first<\/td>\n<td><code>tool_choice: \"any\"<\/code> (must call <em>some<\/em> tool) / forced <c
