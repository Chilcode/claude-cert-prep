g generation cost per module."},{"id":"s4-q3","domain":1,"difficulty":"stretch","rule":"Heterogeneous tool-result formats get normalized deterministically in a PostToolUse hook before the model sees them \u2014 not via prompt instructions.","stem":"Your productivity agent aggregates activity from three MCP servers: the Git server returns Unix epoch timestamps, the CI server returns ISO 8601 strings, and the ticketing server returns \"MM/DD/YYYY\" dates. The system prompt instructs the agent to convert everything to ISO 8601 before comparing, yet in about 8% of \"what changed right before this incident?\" tasks it orders events incorrectly, and it occasionally misreads the CI server's numeric status codes. What is the most reliable fix?","options":["Add few-shot examples to the system prompt demonstrating correct timestamp conversion from each of the three source formats into ISO 8601.","Ask the maintainers of the three MCP servers to standardize their outputs on ISO 8601 timestamps and named status strings.","Implement a PostToolUse hook that deterministically normalizes timestamps to a single format and maps status codes to named values before the model processes each tool result.","Spawn a dedicated normalization subagent and route every tool result through it for conversion before the result reaches the main agent."],"correct":2,"explanation":"Format normalization is a mechanical, rule-based transformation \u2014 exactly what PostToolUse hooks exist for. Intercepting each tool result and normalizing it deterministically guarantees the model only ever reasons over consistent data, driving the 8% error rate to zero for this failure class. Few-shot conversion examples keep the work probabilistic: the model already has instructions and still fails 8% of the time, and errors here corrupt incident timelines. Petitioning three server maintainers shifts the burden to parties you may not control, delivers nothing until all three ship changes, and breaks again when a fourth server is added. A dedicated normalization subagent is over-engineered \u2014 it spends model tokens and adds a full agent round-trip per tool call to do work that a few lines of deterministic code handle, and being LLM-based it is itself probabilistic."},{"id":"s4-q4","domain":1,"difficulty":"stretch","rule":"When prior session context is mostly valid, resume and explicitly declare which files changed for targeted re-analysis; go fresh-with-summary only when staleness is broad.","stem":"On Monday you ran a named Agent SDK session that mapped your billing module \u2014 about 40 files of analysis. Overnight, a teammate refactored 2 of those files, renaming three functions. On Tuesday you --resume the named session, and the agent confidently proposes changes that reference the old, now-deleted function signatures. The rest of Monday's analysis remains accurate. What is the most effective way to continue?","options":["Resume the named session and explicitly tell the agent which two files were refactored so it re-reads just those files and updates its understanding before proceeding.","Discard the session and start fresh, having the agent re-explore all ~40 files from scratch so no stale conclusions can survive.","Use fork_session to branch off Monday's session and continue Tuesday's work in the fork, keeping the original session's analysis intact.","Resume the session and instruct the agent to treat all of its prior findings as unverified, re-deriving each one before relying on it."],"correct":0,"explanation":"The guide's rule for resuming after code changes: inform the resumed session about the specific files that changed so it performs targeted re-analysis. Here staleness is narrow (2 of ~40 files), so resuming with a precise change declaration preserves the 95% of context that is still valid and fixes exactly what's wrong. Full re-exploration from scratch is the right move only when prior tool results are broadly stale; here it throws away a day of valid analysis and burns tokens and time disproportionate to a two-file refactor. fork_session solves a different problem \u2014 creating independent branches to explore divergent approaches from a shared baseline; the fork inherits the same stale tool results, so the wrong signatures come along with it. Marking all findings unverified forces the agent to re-derive 40 files' worth of conclusions anyway \u2014 full re-exploration with extra steps \u2014 instead of targeting the two files actually affected."},{"id":"s4-q5","domain":3,"difficulty":"core","rule":"Skills that produce verbose output run with context: fork so their intermediate output stays in an isolated sub-agent context.","stem":"Your team's /map-module skill performs a deep dependency analysis that emits several thousand lines of intermediate output before producing a one-page summary. Developers report that after invoking it, the rest of their session degrades: Claude starts quoting raw analysis dumps instead of the summary, and unrelated follow-up requests behave worse because the context window is nearly full. What is the most effective configuration change?","options":["Set allowed-tools in the skill's frontmatter to Read and Grep only, so the analysis is restricted and produces less output.","Move the skill's analysis instructions into the project CLAUDE.md so the behavior is always loaded and no separate invocation is needed.","Document that developers should run /compact immediately after invoking the skill to shrink the accumulated analysis output.","Add context: fork to the skill's SKILL.md frontmatter so it executes in an isolated sub-agent context and only its summary returns to the main conversation."],"correct":3,"explanation":"context: fork is the frontmatter option designed for exactly this: the skill runs in an isolated sub-agent context, its thousands of lines of intermediate output never enter the main session, and only the final summary comes back. That removes both symptoms \u2014 no raw dumps to quote and no context exhaustion. Restricting allowed-tools addresses tool safety, not output volume \u2014 the analysis still needs those tools and still emits its verbose working; it solves a different problem. Moving the instructions into CLAUDE.md makes things strictly worse: CLAUDE.md is for always-loaded universal standards, so a heavyweight analysis workflow would burden every session, not just invocations. Running /compact afterward is symptom patching \u2014 the pollution already happened, compaction can lose the very details the developer wanted, and it relies on every developer remembering a manual cleanup step every time."},{"id":"s4-q6","domain":3,"difficulty":"core","rule":"User-level ~/.claude/CLAUDE.md never travels via version control; diagnose what's loaded with /memory and move shared standards to project scope.","stem":"You configured Claude Code with your team's testing standards and it applies them consistently on your machine. A new engineer clones the repository, but her sessions generate tests that ignore the standards entirely. The repo's root CLAUDE.md contains only a project overview. What is the most likely cause, and what should you do first?","options":["Her Claude Code installation predates memory-file support; have her reinstall the latest version and re-clone the repository.","The standards live in your user-level ~/.claude/CLAUDE.md, which is never distributed through version control; run /memory in her session to confirm which memory files load, then move the standards into project scope.","CLAUDE.md files require running claude config sync on each new workstation before they take effect; run it on her machine.","Have her paste the testing standards into her prompt at the start of each session until her generated tests stabilize on the conventions."],"correct":1,"explanation":"The telltale is asymmetry: works on your machine, absent on hers, and the shared repo CLAUDE.md doesn't contain the standards. That means they live in your user-scoped ~/.claude/CLAUDE.md, which applies only to you and is never distributed via git. /memory is the diagnostic command that shows exactly which memory files a session loaded, confirming the hypothesis before you fix it by moving the standards to project scope (root CLAUDE.md or .claude/rules/). Blaming an outdated installation is speculative and doesn't explain why the repo's own CLAUDE.md lacks the standards. A claude config sync command does not exist \u2014 configuration hierarchy questions are resolved by file placement, not a sync step. Pasting standards into every prompt shifts a permanent configuration problem onto the new engineer as a recurring manual chore, and it evaporates the moment she forgets."},{"id":"s4-q7","domain":3,"difficulty":"core","rule":"Delegate verbose discovery phases to the Explore subagent so only structured summaries enter the main conversation.","stem":"You are using Claude Code for a multi-phase modernization of a legacy reporting system: discovery, then design, then implementation across many files. During discovery, reading dozens of files fills most of the context window; by the implementation phase Claude has lost track of design decisions made an hour earlier and re-asks questions it already answered. What is the most effective way to restructure the workflow?","options":["Delegate the discovery phase to the Explore subagent so verbose file-reading output stays isolated and only structured summaries enter the main conversation for the design and implementation phases.","Switch to a model tier with a much larger context window so all discovery output plus design decisions fit within a single session.","Read every relevant file at the very start of the session so all information is loaded into context before any design work begins.","Split the work into three separate sessions \u2014 discovery, design, implementation \u2014 each starting from an empty context to keep every phase lean."],"correct":0,"explanation":"The failure is context exhaustion caused by verbose discovery output crowding out later phases. The Explore subagent exists for precisely this: it absorbs the file dumps in its own isolated context and hands back summaries, so the main session retains its design decisions through implementation. A larger context window is the over-provisioned infrastructure distractor \u2014 it delays rather than solves the problem, costs more, and long undifferentiated contexts still suffer degraded recall of mid-context details. Reading everything upfront is the named anti-pattern (the guide's exploration playbook is incremental: Grep entry points, then Read to follow imports) and it fills the window even faster. Three blank-slate sessions destroy continuity \u2014 implementation needs the design decisions, and starting fresh works only when structured summaries are deliberately carried across, which this option omits."},{"id":"s4-q8","domain":2,"difficulty":"stretch","rule":"MCP resources expose consultable content catalogs; tools are for actions \u2014 catalogs of what exists belong in resources, not extra tool calls.","stem":"Your engineering-docs MCP server exposes two tools: get_document(id) and search_docs(query). Telemetry shows agents spend the first 5-8 tool calls of nearly every task issuing broad search_docs probes just to learn what documentation even exists \u2014 runbooks? ADRs? schema docs? \u2014 before starting the real work. What change best eliminates this exploratory overhead?","options":["Cache the results of previous sessions' search_docs probes and automatically replay them into each new session's starting context.","Paste the full documentation index into the agent's system prompt so it never needs to discover what exists.","Expose the documentation hierarchy as MCP resources so agents have visibility into the catalog of available content without spending tool calls to discover it.","Add a list_all_documents tool that returns every document's title and summary in a single call at the start of each task."],"correct":2,"explanation":"MCP draws a deliberate line between the two primitives: tools perform actions, resources expose content the agent can consult. A catalog of what documentation exists is consultable content \u2014 publishing the hierarchy as resources gives every agent visibility into available data with zero exploratory calls, which is exactly the pattern the guide prescribes for reducing discovery overhead. A list_all_documents tool is the tempting near-miss: it compresses 5-8 probes into one, but it still spends a tool call and a model round-trip every task on discovering static structure, and it misuses the action primitive for content. Pasting the index into the system prompt bloats every request with tokens whether or not docs are needed and goes stale the moment documentation changes, requiring manual prompt maintenance. Replaying cached probes is speculative caching \u2014 prior sessions' queries don't predict what the next task needs, and stale replayed results can actively mislead the agent."},{"id":"s4-q9","domain":2,"difficulty":"core","rule":"Structured error responses (isError + errorCategory + isRetryable) let the agent retry transient failures and immediately stop retrying permission failures.","stem":"Your custom code-search MCP tool returns the bare string \"Operation failed\" for every failure. Logs reveal two distinct failure modes: the search index rebuilds nightly and times out requests for about 10 minutes, and some repositories fall outside the access token's scope. Agents currently retry both cases 3-4 times, wasting several minutes per task on permission failures that can never succeed. What is the most effective fix?","options":["Add a global cap of one retry for any failed tool call so no failure mode can waste more than one extra attempt.","Update the system prompt: \"If a tool fails twice in a row, assume it is a permissions problem and stop retrying.\"","Return an empty result set with success status for repositories the token cannot access, so the agent simply moves on instead of retrying.","Return structured error responses using the isError flag with an errorCategory (transient vs permission), an isRetryable boolean, and a human-readable message, so the agent retries timeouts but immediately reports access failures."],"correct":3,"explanation":"The root cause is that a uniform \"Operation failed\" strips away the information the agent needs to choose a recovery strategy. Structured error metadata \u2014 errorCategory distinguishing transient from permission, isRetryable telling the agent whether retry can ever succeed, and a readable message it can act on or relay \u2014 restores that decision-making: timeouts get retried, access failures get surfaced immediately. A global one-retry cap patches the symptom symmetrically and wrongly: it cripples recovery from the nightly index rebuild (which genuinely warrants retries) while still wasting one doomed attempt on every permission failure. The prompt heuristic is probabilistic and factually wrong \u2014 two consecutive failures during the 10-minute rebuild window are transient, so the agent would abandon searches that a third attempt would satisfy. Returning empty results as success is a named anti-pattern: it silently suppresses the failure, makes inaccessible repos indistinguishable from repos with genuinely no matches, and leads the agent to report confidently incomplete findings."},{"id":"s4-q10","domain":2,"difficulty":"core","rule":"Team-shared MCP servers go in project-scoped .mcp.json with ${ENV_VAR} credential expansion; ~/.claude.json is personal and never shared.","stem":"You set up the GitHub MCP server in your personal ~/.claude.json and it works well, so the whole team wants it. One teammate copied your configuration into the repository as-is \u2014 including your hardcoded GitHub token, which then had to be revoked. Teammates who copied nothing still lack the server entirely. What is the correct way to share this integration?","options":["Commit each developer's ~/.claude.json to the repository so everyone's personal MCP server configurations are shared automatically.","Define the server in a project-scoped .mcp.json committed to the repository, referencing the credential as ${GITHUB_TOKEN} so each developer supplies their own token through an environment variable.","Keep the server user-scoped and add a README section walking each developer through creating their own ~/.claude.json entry with their own token.","Commit an .mcp.json containing the token in encrypted form, plus a startup script that decrypts it into place before Claude Code launches."],"correct":1,"explanation":"Project-scoped .mcp.json is the mechanism built for exactly this: the server definition is version-controlled so every teammate gets it on clone or pull, and ${GITHUB_TOKEN} environment-variable expansion keeps credentials out of git entirely \u2014 each developer supplies their own token locally. This fixes both failures at once (no distribution gap, no leaked secret). Committing ~/.claude.json files misuses the personal scope \u2014 that file holds individual, experimental configuration, and committing it would both leak whatever tokens it contains and clobber teammates' personal settings. The README walkthrough keeps a team dependency in per-user config: every new hire repeats manual setup, entries drift as the server config evolves, and nothing enforces consistency \u2014 burden shifted onto developers instead of solved by the system. Encrypting a token inside the committed file with a decrypt-on-launch script is over-engineered and still ships a secret (plus, eventually, its key) through version control when env-var expansion makes the whole apparatus unnecessary."},{"id":"s5-q1","domain":3,"difficulty":"core","rule":"CI runners only see version-controlled project config \u2014 user-level ~/.claude/CLAUDE.md never reaches them; verify what loads with /memory.","stem":"Your automated PR reviews follow your team's review criteria perfectly when you run Claude Code on your laptop, but the same prompt in the CI pipeline produces generic feedback that ignores the criteria entirely. A contractor who just cloned the repo reports the same generic behavior on her machine. What's the most effective first step?","options":["Bake the review criteria into the CI runner's base image so every pipeline job starts with the correct configuration files preinstalled.","Pass the review criteria to the CI invocation through the CLAUDE_RULES environment variable so the pipeline loads them at runtime.","Move the review criteria from ~/.claude/CLAUDE.md into the project-level CLAUDE.md, commit it, and use /memory to verify which memory files load in each environment.","Prepend the full review criteria to the prompt string in the CI script on every invocation."],"correct":2,"explanation":"The symptom pattern \u2014 works for you, fails in CI AND for a fresh clone \u2014 is the classic configuration-hierarchy diagnosis: the criteria live in user-level ~/.claude/CLAUDE.md, which is not version-controlled and never reaches the CI runner or teammates. Moving them to project-level CLAUDE.md (committed to the repo) fixes the root cause, and /memory is the documented diagnostic for verifying which memory files actually load. Option A patches the symptom in CI infrastructure but leaves teammates broken and creates config drift between the image and the repo. Option B references a CLAUDE_RULES environment variable that does not exist. Option D duplicates project context into every prompt, bypassing the mechanism CLAUDE.md exists for and requiring every script and developer to maintain the copy."},{"id":"s5-q2","domain":3,"difficulty":"core","rule":"On re-review after new commits, feed the prior run's findings into context and instruct Claude to report only new or still-unaddressed issues.","stem":"Your CI review bot runs on every push to a PR. After a developer pushes commits fixing 9 of the 11 issues from the first review, the second run reposts all 11 original comments plus 2 new ones, and developers are starting to complain about comment spam. What change would most effectively address this?","options":["Include the prior run's findings in the new run's context and instruct Claude to report only issues that are new or previously reported and still unfixed.","Add a post-processing step to the comment-posting script that string-matches new findings against existing PR comments and suppresses near-duplicates.","Resume the first review's session with --resume so the model retains its earlier findings and naturally avoids repeating them.","Delete all existing bot comments at the start of each run and repost the current findings as a clean slate."],"correct":0,"explanation":"The model reposts old findings because each CI run is stateless \u2014 it has no knowledge of what previous runs reported. Including the prior findings in context with an explicit 'only new or still-unaddressed' instruction fixes that root cause and lets the model reason about whether each old issue was actually resolved by the new commits. Option B patches the symptom downstream: string matching can't tell a still-unfixed issue from a resolved one, and rewording defeats the match. Option C resumes a session whose tool results are stale \u2014 the code has changed since that analysis, which is exactly when starting fresh with injected context is more reliable than resuming. Option D still notifies developers with a wall of reposted comments and destroys the comment-thread history where discussion happened."},{"id":"s5-q3","domain":3,"difficulty":"core","rule":"Test-generation quality comes from context: provide existing test files plus valuable-test criteria and fixture docs in CLAUDE.md \u2014 the model can't avoid duplicating what it can't see.","stem":"Your nightly test-generation job produces suggestions developers reject at a 60% rate: roughly half duplicate scenarios already covered in tests/unit/, and the rest are trivial getter/setter tests. The job currently receives only the source file under test in its prompt. What change would most effectively improve acceptance?","options":["Add a post-generation similarity filter that computes embedding distance between each proposed test and the existing suite, discarding matches above a threshold.","Add the instruction 'do not propose tests that already exist, and skip trivial tests' to the generation prompt.","Switch the nightly job to a higher-tier model with a larger context window so it can reason more carefully about test value.","Include the module's existing test files in the prompt, and document valuable-test criteria and available fixtures in the project CLAUDE.md."],"correct":3,"explanation":"Both failure modes are missing-context problems. The model duplicates existing scenarios because it has never seen the existing suite, and it produces low-value tests because nothing defines what a valuable test is for this team. Providing existing test files in context plus documented testing standards and fixtures in CLAUDE.md is the documented mechanism for exactly these two failures. Option B is prompt-only compliance against information the model doesn't have \u2014 it cannot avoid duplicating tests it can't see. Option A is over-engineered downstream filtering that discards wasted generations instead of preventing them, and does nothing about trivial tests. Option C misdiagnoses the problem as model capability: no model can check against a test suite that isn't in its context."},{"id":"s5-q4","domain":3,"difficulty":"core","rule":"Machine-parseable CI findings require --output-format json with --json-schema \u2014 prompt-level 'return JSON' requests are probabilistic and unenforced.","stem":"Your CI review step pipes Claude Code's output into a script that posts inline PR comments. The prompt ends with 'Respond only with a JSON array of findings,' but in roughly 8% of runs the script crashes: the output contains markdown fences around the JSON, an introductory sentence, or a missing field. What's the correct fix?","options":["Set CLAUDE_OUTPUT_FORMAT=json in the pipeline environment so Claude Code serializes its response before printing.","Invoke Claude Code with --output-format json and --json-schema pointing to a committed findings schema, then parse the structured result.","Harden the posting script to strip markdown fences and leading prose with a regex before parsing, and retry the run on parse failure.","Strengthen the prompt with an explicit warning that any non-JSON output will break the pipeline and cause the review to fail."],"correct":1,"explanation":"The root cause is that JSON was requested through prompt text, which is probabilistic \u2014 nothing enforces the format. The documented CI mechanism is --output-format json combined with --json-schema, which produces machine-parseable, schema-enforced findings and eliminates the syntax failures crashing the script. Option A references an environment variable that does not exist. Option C patches symptoms downstream: regex stripping handles the failure shapes you've seen but not the next one (e.g., a missing required field), and retries burn CI time on a problem the CLI already solves deterministically. Option D is still prompt-only compliance \u2014 a sterner warning changes the probability, not the guarantee, and an 8% failure rate on a blocking pipeline needs a guarantee."},{"id":"s5-q5","domain":3,"difficulty":"stretch","rule":"A session that generated code retains its generation reasoning and won't question its own decisions \u2014 review must run in a fresh, independent instance.","stem":"Your pipeline uses Claude Code to apply automated dependency-upgrade refactors, then asks the same session to review its own diff before opening the PR. Human spot-checks find the self-review approves changes containing real regressions in about 1 in 5 PRs, even though the review prompt says 'scrutinize this diff as if a different engineer wrote it.' What change would most effectively catch these regressions?","options":["Run the review as a separate CI step in a fresh Claude Code session that receives only the diff and repo context, with no access to the generator session.","Enable extended thinking for the self-review step so the model reasons more deeply before approving its own changes.","Strengthen the review prompt to instruct the model to adopt an adversarial reviewer persona and list at least three potential problems before approving.","Run the self-review three times in the same session and only approve the PR when all three runs agree the diff is safe."],"correct":0,"explanation":"The root cause is session context: an instance that generated the code retains the reasoning that produced its decisions, making it systematically unlikely to question them. Independent review instances without the generator's reasoning context catch issues that self-review instructions and extended thinking do not \u2014 and in CI, a fresh session per step is free. Option B applies more compute to a biased context; deeper reasoning from the same premises reproduces the same blind spots. Option C is prompt-only role-play that the stem shows is already being tried and failing \u2014 the persona instruction doesn't remove the generation context. Option D repeats the same biased evaluation three times; correlated errors agree with each other, so consensus among self-reviews launders the bias rather than catching it."},{"id":"s5-q6","domain":4,"difficulty":"core","rule":"Precision comes from explicit categorical report/skip criteria, not from vague caution instructions or confidence filtering.","stem":"Your PR review bot's prompt says 'check that error handling is robust and flag anything concerning.' Developers report that 45% of its error-handling findings are false positives \u2014 mostly flagging intentional fire-and-forget patterns that match the surrounding codebase. What prompt change would most effectively reduce the false positive rate?","options":["Add 'be conservative and only flag issues you are highly confident about' to the review instructions.","Have the model attach a confidence score to each finding and configure the posting script to suppress findings below 0.8.","Replace the vague instruction with explicit criteria defining which error-handling issues to report (e.g., swallowed exceptions on payment or data-write paths) and which to skip (e.g., patterns consistent with the surrounding codebase).","Add a second Claude pass that re-evaluates each finding from the first pass and filters out those it judges to be false positives."],"correct":2,"explanation":"The false positives stem from a vague criterion ('robust', 'anything concerning') that gives the model no decision boundary, so it flags patterns the team considers acceptable. Explicit categorical report/skip criteria \u2014 including skipping patterns consistent with the local codebase \u2014 directly define that boundary. Option A is the named trap: general instructions like 'be conservative' fail to improve precision because they don't tell the model what conservative means for this codebase. Option B relies on self-reported confidence, an unreliable proxy \u2014 the model is confidently wrong about exactly these patterns. Option D adds cost and latency to filter outputs downstream while the generator keeps producing noise from the same vague criterion, and the filter inherits the same undefined standard for what counts as a real issue."},{"id":"s5-q7","domain":4,"difficulty":"core","rule":"When detailed instructions still produce inconsistently formatted output, 2-4 few-shot examples demonstrating the exact desired format are the most effective fix.","stem":"Your review prompt contains a detailed specification of the required finding format: file location, issue description, severity, and a suggested fix. Despite this, about 30% of findings arrive malformed \u2014 severity written as a sentence, suggested fixes merged into the issue description, or the location omitted. What change would most effectively achieve consistent output?","options":["Expand the format specification with a numbered list of formatting rules and a warning that malformed findings will be discarded.","Add 2-4 few-shot examples of complete, correctly formatted findings, including one demonstrating how to format an ambiguous case.","Lower the sampling temperature for the review invocation so the model adheres more deterministically to the written specification.","Split the review into two calls: one that identifies issues in free text, and a second that reformats that text into the required structure."],"correct":1,"explanation":"Few-shot examples are the most effective technique for achieving consistently formatted, actionable output precisely when detailed instructions alone produce inconsistent results \u2014 the situation described. Concrete examples demonstrate the format unambiguously and generalize to novel findings, including ambiguous cases. Option A adds more of the thing that is already failing: prose specifications are interpreted inconsistently no matter how numbered or threatening. Option C misdiagnoses formatting drift as a sampling problem; temperature doesn't teach the model what the format is. Option D over-engineers a two-call pipeline with doubled cost and latency to work around a problem a few examples solve in one call, and the reformatting call would itself need format examples to be reliable."},{"id":"s5-q8","domain":4,"difficulty":"stretch","rule":"When one category generates most false positives, temporarily disable it while improving its prompt \u2014 high-FP categories destroy trust in the accurate categories too.","stem":"Analysis of dismissed findings shows your review bot's 'documentation accuracy' category accounts for 70% of all false positives, while its security and bug categories run above 90% precision. Developers have begun bulk-dismissing every bot comment, including valid critical security findings. What's the most effective immediate response?","options":["Add 'only report documentation issues when you are highly confident' to the documentation category's criteria.","Apply a global confidence threshold across all categories so only the strongest findings in any category get posted.","Reclassify all documentation-accuracy findings as minor severity so developers can filter them out of their review workflow.","Temporarily disable the documentation-accuracy category while you rewrite its criteria, keeping security and bug reporting active."],"correct":3,"explanation":"The urgent problem is trust contagion: one high-false-positive category is causing developers to dismiss the accurate categories' findings too, including critical security issues. The documented remedy is to temporarily disable the offending category while its prompt is improved \u2014 this immediately stops the noise, protects trust in the >90%-precision categories, and loses only a category that was mostly wrong anyway. Option A is the 'high-confidence' caution instruction that fails to improve precision. Option B punishes the healthy categories: a global threshold suppresses valid security findings to treat a problem caused by one category. Option C solves a different problem \u2014 the findings are still posted and still mostly wrong; labeling noise 'minor' doesn't restore trust, it teaches developers the bot mislabels on top of misfiring."},{"id":"s5-q9","domain":4,"difficulty":"stretch","rule":"Strict schemas eliminate JSON syntax errors, not semantic errors \u2014 semantic failures need validation plus retry-with-error-feedback.","stem":"Since adding --json-schema, your review findings parse successfully in 100% of runs. But developers report that about 15% of inline comments land on the wrong line, and some findings carry severities that contradict your documented anchors. Your team is confused because 'the schema should have prevented this.' What should you do?","options":["Add programmatic validation after each run (e.g., verify each file/line exists in the diff, check severity against the anchor rules) and on failure retry with the specific validation errors appended to the prompt.","Tighten the JSON schema by adding stricter type constraints, minimum/maximum bounds on the line field, and pattern validation on file paths.","Force the findings tool with tool_choice so the model must emit findings through the schema-bound tool on every invocation.","Drop the schema and have the model write findings as free-form prose, since the structured format is constraining its reasoning about locations."],"correct":0,"explanation":"This is the schema boundary: strict schemas guarantee the output parses (syntax) but cannot guarantee the values are right (semantics) \u2014 a line number can be a perfectly valid integer and still point at the wrong line. Semantic errors require external validation plus the retry-with-error-feedback pattern: re-prompt with the specific validation failures so the model can self-correct. Option B stays inside the schema, which can only check form: a line-number bound can't know which line the issue is actually on. Option C solves a different problem \u2014 tool_choice guarantees the tool gets called, but the tool is already being called; the values inside it are what's wrong. Option D is a regression to the pre-schema world, reintroducing the parse failures the schema eliminated while doing nothing for location accuracy."},{"id":"s5-q10","domain":4,"difficulty":"core","rule":"Batch failures are handled per custom_id: resubmit only the failed requests, modified to fix the failure cause \u2014 never rerun the whole batch.","stem":"Your nightly test-generation batch submits 400 source modules through the Message Batches API. This morning's results show 352 succeeded, while 48 failed because several large modules exceeded the context limit. What's the correct way to handle the failures?","options":["Resubmit the full 400-request batch with the oversized modules removed, then process those modules manually.","Move the 48 failed modules to synchronous API calls against a higher-tier model with a larger context window.","Identify the 48 failed requests by their custom_id values, chunk the oversized modules, and resubmit only those requests in a new batch.","Configure the nightly job to automatically resubmit the entire batch each night until every request in it succeeds."],"correct":2,"explanation":"custom_id exists precisely for correlating batch requests with results, so failures can be isolated and resubmitted individually \u2014 with modifications that address why they failed, here chunking the modules that blew the context limit. Option A re-pays for 352 requests that already succeeded and abandons the failed modules to manual work instead of fixing them. Option B is over-engineered escalation: it forfeits the 50% batch savings and adds a second code path for a latency-tolerant overnight job, when chunking within the existing batch lane solves the actual failure cause. Option D blindly re-pays for the entire batch every night, and the oversized modules will fail identically forever because nothing about the requests changed."},{"id":"s6-q1","domain":4,"difficulty":"core","rule":"Fields the source document may not contain must be optional/nullable \u2014 a required field the document lacks pressures the model to fabricate a value.","stem":"Your invoice extraction pipeline uses tool use with a strict JSON schema in which every field is required. QA sampling finds that for the 9% of invoices that print no purchase-order number, extractions contain plausible-looking PO numbers that appear nowhere in the source document. Schema validation passes on every one of these. What change would most effectively eliminate the fabricated values?","options":["Add a system-prompt instruction: \"Never guess or infer values; only extract information explicitly present in the document\"","Add a verification pass in which a second independent Claude instance checks each extracted PO number against the document text before acceptance","Make po_number nullable in the schema and state in the tool description that the model must return null when the field is absent from the document","Enable strict mode on the JSON schema so the model can only emit values grounded in the input document"],"correct":2,"explanation":"A required schema field the document lacks forces the model to invent a value to satisfy the schema \u2014 the fabrication is structural, not behavioral. Making the field nullable with a return-null instruction in the tool description removes that pressure at the root, which is the guide's stated fix for exactly this failure. The system-prompt instruction is probabilistic compliance layered on a schema that still demands a value, so the structural pressure remains. The second-instance verification pass detects fabrications downstream at double the cost and latency instead of preventing them \u2014 and the extraction still needs a way to represent absence, which is the nullable field. Strict mode is a misattributed capability: strict schemas eliminate JSON syntax errors, but no schema mode grounds values in the source text."},{"id":"s6-q2","domain":4,"difficulty":"core","rule":"Guaranteed schema-compliant structured output = tool use with the JSON schema as input_schema, never JSON-by-prompting plus cleanup.","stem":"Your extraction service prompts Claude to \"respond with a JSON object matching this schema\" and parses the text response. In production, 6% of responses fail json.loads \u2014 markdown code fences, explanatory preambles before the object, and trailing commas \u2014 crashing the downstream ingestion job. What change would most effectively eliminate these failures?","options":["Add a post-processing repair layer that strips code fences, removes preamble text, and fixes trailing commas before parsing","Define an extraction tool whose input_schema is the output schema, force it with tool_choice, and read the structured data from the tool_use block's input","Strengthen the prompt to \"Respond ONLY with valid JSON \u2014 no markdown, no commentary\" and retry any response that fails to parse","Set output_format: \"json\" on the Messages API request to enforce JSON-only responses"],"correct":1,"explanation":"Tool use with the JSON schema as the tool's input_schema eliminates syntax failures by construction \u2014 the model's tool arguments must conform to the schema, so fences, preambles, and trailing commas cannot occur. This is the guide's stated most-reliable approach and the root-cause fix. The repair layer patches symptoms, chasing an open-ended set of malformations it will keep missing. The strengthened prompt plus retry is probabilistic compliance with paid retries for a failure class tool use removes entirely. The output_format parameter is a nonexistent Messages API feature \u2014 structured output on the API is achieved through tool use, not an output-format flag."},{"id":"s6-q3","domain":4,"difficulty":"core","rule":"Multiple extraction schemas with unknown document type \u2192 tool_choice \"any\": guarantees a tool call while letting the model pick the matching schema.","stem":"Your pipeline registers three extraction tools \u2014 record_invoice, record_contract, record_receipt \u2014 because document type is unknown at submission time. tool_choice is currently {\"type\": \"auto\"}. In 4% of runs the model returns prose (\"This appears to be a receipt from...\") instead of calling any tool, and the parser crashes. What change most effectively guarantees structured output?","options":["Set tool_choice to {\"type\": \"tool\", \"name\": \"record_invoice\"} since invoices are the most common document type","Add a system-prompt instruction: \"You must always call exactly one extraction tool; never respond with plain text\"","Add a classification pre-pass that calls the model once to detect the document type, then makes a second call forcing the corresponding tool","Set tool_choice to {\"type\": \"any\"} so the model must call a tool but can select the schema matching the document type"],"correct":3,"explanation":"tool_choice \"any\" deterministically guarantees a tool call while preserving the model's ability to choose the schema that matches the document \u2014 the guide's prescribed setting for exactly this case: multiple extraction schemas with unknown document type. Forcing record_invoice pushes every contract and receipt through the wrong schema, corrupting the data to fix the format. The system-prompt mandate is probabilistic \u2014 under \"auto\" the model may still return text, so the 4% failure mode persists at some rate. The classification pre-pass doubles calls and latency to rebuild, outside the API, routing that \"any\" already provides deterministically in a single call."},{"id":"s6-q4","domain":4,"difficulty":"core","rule":"Strict JSON schemas eliminate syntax errors only; semantic errors require code-level cross-field validation plus retry-with-error-feedback.","stem":"Every extraction in your pipeline passes strict JSON schema validation, yet finance reports that in 3% of invoices the line-item amounts do not sum to the extracted total, and in some documents the ship-to address lands in the bill-to field. What change would most effectively address these errors?","options":["Add code-level semantic validation (cross-field checks such as line-item sums), and on failure send a follow-up request containing the document, the failed extraction, and the specific validation error","Tighten the JSON schema with stricter types, patterns, and additionalProperties: false so invalid combinations cannot validate","Upgrade the extraction calls to a higher-tier model with stronger reasoning to reduce extraction mistakes","Run each extraction three times and accept the majority value for each field, discarding outlier extractions"],"correct":0,"explanation":"Line items that fail to sum and swapped same-typed fields are semantic errors \u2014 schema-valid values that are wrong in relation to each other, which the guide is explicit that strict schemas cannot prevent. The fix is a code-level semantic validation layer (e.g., Pydantic cross-field checks) plus retry-with-error-feedback carrying the document, the failed extraction, and the specific error so the model can self-correct. Schema tightening misunderstands the boundary: no JSON schema construct expresses cross-field arithmetic or detects a value placed in the wrong same-typed field. A higher-tier model is disproportionate spend that at best reduces, never guarantees against, errors a deterministic check catches for free. Triple extraction with majority voting triples cost and can converge on a consistent misreading, still shipping unvalidated arithmetic."},{"id":"s6-q5","domain":4,"difficulty":"stretch","rule":"Retries fix format and structural errors; they can never fix information that is absent from the source document \u2014 classify failures before retrying.","stem":"Your validation-retry loop allows 3 retries with error feedback per document. A cost review shows 30% of retry spend goes to receipts failing validation on po_number, which your Pydantic model requires \u2014 but receipts do not carry PO numbers, so all three retries fail and the documents route to human review anyway. What change most effectively reduces this waste?","options":["Rewrite the retry feedback message to more strongly direct the model to locate the PO number anywhere in the document","Classify validation failures before retrying: make po_number nullable so absent-from-document cases return null with zero retries and route by confidence, while format and structural errors still retry with error feedback","Raise max_retries from 3 to 5 to give the model more attempts on difficult documents","Remove po_number from the schema and validation model entirely so it can never trigger a retry"],"correct":1,"explanation":"Retries are only effective against format and structural errors; no number of retries can produce information the document does not contain. Classifying failure types \u2014 making the field nullable so genuinely absent information short-circuits to null with zero retries \u2014 is the guide's stated judgment call and eliminates the wasted spend at its root while keeping retries where they work. Strengthening the feedback message intensifies an attempt that is structurally guaranteed to fail: the PO number is not there to find. Raising max_retries to 5 makes the waste 66% worse per affected document. Removing the field entirely solves a different problem by destroying real data \u2014 invoices and contracts in the same pipeline do carry PO numbers, and dropping the field loses them everywhere to silence one document type's failure."},{"id":"s6-q6","domain":4,"difficulty":"stretch","rule":"Batch failures \u2192 resubmit only the failed custom_ids with modifications; batch requests cannot run multi-turn retry conversations in-flight.","stem":"Your nightly Message Batches API run processes 6,000 documents. This morning, 45 requests failed with context-length errors on unusually long contracts, and 120 succeeded but failed your semantic validation. A teammate proposes rerunning the entire 6,000-document batch with the validation-retry conversation embedded in each request so failures self-correct in-flight. What is the correct approach?","options":["Embed the validation-retry loop inside each batch request so the model corrects failed extractions before the batch completes","Rerun the full 6,000-document batch with a higher max_tokens setting so the long contracts no longer exceed limits","Resubmit only the failed items by custom_id: chunk the 45 oversized contracts, and send the 120 validation failures as new requests that include the original document, the failed extraction, and the specific errors","Migrate the entire nightly pipeline to the synchronous API so retries and long documents can be handled in real time"],"correct":2,"explanation":"custom_id exists precisely to correlate results and enable selective resubmission with modifications \u2014 chunking is the standard fix for context-limit failures, and retry feedback goes into new requests because the original conversation cannot continue inside a batch. Embedding the retry loop in batch requests is impossible: the Batch API does not support multi-turn tool calling within a single request, so no mid-request retry round-trip can execute. Raising max_tokens misdiagnoses the failure \u2014 context-length errors come from oversized input, which max_tokens does not address \u2014 and rerunning everything wastefully reprocesses 5,835 already-successful documents. Migrating to the synchronous API abandons the 50% batch savings on the entire latency-tolerant nightly volume to fix a problem affecting under 3% of items."},{"id":"s6-q7","domain":5,"difficulty":"core","rule":"Aggregate accuracy masks segment-level failure \u2014 analyze accuracy by document type AND by field before reducing human review.","stem":"Your extraction dashboard shows 96.5% overall field accuracy across 40,000 documents per month, comfortably above the 95% target. Leadership wants to cut the human review queue by 80% to reduce costs. What is the most effective first step before reducing review coverage?","options":["Raise the confidence threshold for auto-approval so that only the very highest-confidence extractions bypass human review","Proceed with the reduction \u2014 96.5% exceeds the target, and downstream systems will surface any residual errors for correction","Deploy a separately trained error-detection classifier over historical extractions to predict which documents need review","Analyze accuracy segmented by document type and by field to verify performance is consistent across every segment before automating any of them"],"correct":3,"explanation":"A 96.5% aggregate can hide a document type or field running far below target \u2014 the guide's core warning before automating high-confidence extractions. Segmenting accuracy by document type and by field is the low-effort, high-leverage verification that must precede any reduction in review. Raising the auto-approval confidence threshold trusts a signal that may be miscalibrated precisely in the failing segments (confidently wrong) and never reveals where errors concentrate. Proceeding on the aggregate shifts detection to downstream systems, where plausible-but-wrong values fail silently for weeks. A separately trained error-detection classifier is over-engineered infrastructure built before running the simple segmentation analysis that actually answers the question."},{"id":"s6-q8","domain":5,"difficulty":"core","rule":"Lost-in-the-middle: models reliably process the beginning and end of long inputs and drop middles \u2014 fix with chunking, summary-first placement, and section headers, not more context capacity.","stem":"Your system extracts obligation clauses from 70-page service agreements submitted as a single input. In roughly 20% of documents, clauses from pages 30\u201350 come back null even though reviewers confirm they are present, while clauses near the beginning and end extract reliably. The documents fit within the context window. What change most effectively addresses this?","options":["Chunk each agreement into sections for separate extraction passes, and where aggregated input is required, place a key-information summary at the beginning and organize content with explicit section headers","Switch to a model with a larger context window so the full agreement fits with substantial headroom","Add a system-prompt instruction to \"read the entire document carefully, including all middle sections, before extracting any clauses\"","Increase max_tokens on the request so the model has enough output budget to extract every clause it finds"],"correct":0,"explanation":"Reliable extraction at the start and end with nulls from the middle is the lost-in-the-middle effect \u2014 a position-based attention limitation, not a capacity problem. Chunking into per-section extraction passes, plus summary-first placement and explicit section headers where aggregated input is required, restructures the input around that limitation exactly as the guide prescribes. A larger context window misses the point: the documents already fit, and window capacity does not fix attention position effects. The read-carefully instruction is prompt-only guidance against a probabilistic attention behavior, with no structural change. Raising max_tokens governs output length \u2014 nothing indicates truncated output; the model is failing to attend to middle input, not running out of room to respond."},{"id":"s6-q9","domain":5,"difficulty":"stretch","rule":"Never route on raw self-reported confidence \u2014 calibrate per-field review thresholds against a labeled validation set.","stem":"Your extraction tool outputs field-level confidence scores, and you route anything below 0.8 to human review. An audit finds the auto-approved lane carries a 7% error rate on invoice_date fields scored above 0.9, while the human queue is flooded with vendor_name extractions scored around 0.7 that reviewers confirm correct 98% of the time. What change most effectively fixes this routing?","options":["Add a system-prompt instruction telling the model to assign confidence scores more conservatively, especially for date fields","Lower the global review threshold from 0.8 to 0.6 to relieve the flooded human queue","Build a labeled validation set, measure actual accuracy at each confidence level per field, and calibrate separate per-field review thresholds from that data","Train a dedicated confidence-estimation model on historical extraction outcomes to replace the extractor's self-reported scores"],"correct":2,"explanation":"The miscalibration runs in opposite directions per field \u2014 overconfident on invoice_date, underconfident on vendor_name \u2014 so no single raw cutoff can work. The guide's pattern is to measure actual accuracy at each confidence level against a labeled validation set and calibrate separate per-field thresholds, so routing reflects measured accuracy rather than the model's self-assessment. Prompting the model to score more conservatively is prompt-only tuning of a self-reported signal the guide identifies as unreliable \u2014 the same failure class as trusting self-reported confidence for escalation. Lowering the global threshold to 0.6 is a symptom patch that shrinks the queue while auto-approving even more confidently wrong invoice_date extractions. A dedicated trained confidence model is over-engineered ML infrastructure when threshold calibration on labeled data has not been tried."},{"id":"s6-q10","domain":5,"difficulty":"core","rule":"Never stop auditing the automated lane \u2014 stratified random sampling of high-confidence extractions measures ongoing error rate and catches novel error patterns.","stem":"Six months after you automated high-confidence extractions, a major vendor changed its invoice layout. For six weeks, unit prices were extracted into the quantity field \u2014 every affected extraction passed validation with high confidence \u2014 until an accounting reconciliation finally surfaced the damage. What ongoing process would have caught this weeks earlier?","options":["Running each document through two independent extraction calls and auto-approving only when the two results agree","Stratified random sampling of high-confidence auto-approved extractions, with human review of the sample to measure ongoing error rates and detect novel error patterns","Raising the confidence threshold for auto-approval so fewer extractions bypass human review","Restoring full human review of all extractions until the pipeline demonstrates twelve consecutive error-free months"],"correct":1,"explanation":"The layout change produced extractions that were high-confidence, validation-passing, and systematically wrong \u2014 a novel error pattern in the automated lane. Stratified random sampling of high-confidence auto-approved output is the guide's mechanism for exactly this: it continuously measures the automated lane's error rate and surfaces new failure modes within the sampling cadence rather than after downstream damage. Dual independent extraction fails because both calls face the same new layout and make the same misreading \u2014 agreement does not imply correctness \u2014 while doubling cost. A higher confidence threshold does not help when the model is confidently wrong; the bad extractions still clear any cutoff. Restoring full human review for twelve months is wildly disproportionate, abandoning the automation's entire value to compensate for a missing sampling process."}]};
const DOCS = {"order":["00-answer-physics","01-customer-support-agent","02-claude-code-codegen","03-multi-agent-research","04-dev-productivity-agent","05-claude-code-ci","06-structured-extraction","domain-1-agentic-architecture","domain-2-tool-design-mcp","domain-3-claude-code-config","domain-4-prompt-structured-output","domain-5-context-reliability","exercise-1-2-agent-and-claude-code","exercise-3-4-extraction-and-research"],"items":{"00-answer-physics":{"title":"Answer Physics","group":"Start here","html":"<h1>00 \u2014 Answer Physics<\/h1>\n<p><strong>What this is:<\/strong> The exam's answer-selection doctrine, reverse-engineered from the 12 official sample questions and their explanations. Every claim below points at a specific sample question (Q1\u2013Q12) or a task statement in the guide. If you internalize this one file, you can pick correct answers even on questions where you're fuzzy on the underlying tech \u2014 because the exam rewards <em>judgment patterns<\/em>, and there are only about seven of them.<\/p>\n<p><strong>Exam mechanics you exploit:<\/strong> 60 questions, 120 min (2 min each), 1 correct + 3 distractors, 720/1000 to pass. Distractors are \"plausible to a candidate with incomplete knowledge.\" Translation: every wrong answer is a <em>named anti-pattern<\/em> or a <em>real technique applied to the wrong problem<\/em>. The guide literally lists the anti-patterns in its task statements. You're not being tested on trivia \u2014 you're being tested on whether you reach for the crane when a screwdriver fixes it, and whether you reach for a screwdriver when the requirement is load-bearing.<\/p>\n<hr />\n<h2>1. How correct answers behave<\/h2>\n<p>Seven principles. Every one of the 12 sample answers is an instance of at least one.<\/p>\n<h3>P1. Fix the root cause the evidence points at \u2014 not a symptom, not a neighbor<\/h3>\n<p>The stem always tells you what's actually broken. The correct answer touches <em>that thing<\/em>.<\/p>\n<ul>\n<li><strong>Q2<\/strong> \u2014 Agent picks <code>get_customer<\/code> when it should pick <code>lookup_order<\/code>. Stem says both tools have <em>minimal descriptions<\/em> (\"Retrieves customer information\" / \"Retrieves order details\"). Root cause is stated in the stem. Winner: <strong>expand the tool descriptions<\/strong> (input formats, example queries, edge cases, boundaries). The guide is explicit: \"Tool descriptions are the primary mechanism LLMs use for tool selection.\"<\/li>\n<li><strong>Q3<\/strong> \u2014 55% first-contact resolution; agent escalates easy cases and grinds on hard ones. Root cause: <em>unclear decision boundaries<\/em>. Winner: <strong>explicit escalation criteria + few-shot examples in the system prompt<\/strong>. Not confidence scores, not sentiment, not a classifier.<\/li>\n<li><strong>Q12<\/strong> \u2014 14-file review is inconsistent, misses bugs, contradicts itself. Root cause: <em>attention dilution<\/em>, not context size. Winner: <strong>restructure into per-file passes + one cross-file integration pass<\/strong>.<\/li>\n<\/ul>\n<p><strong>Test:<\/strong> Re-read the stem. What specific defect is described or shown in the logs? The correct answer modifies exactly that component. Any answer that modifies a <em>different<\/em> component is wrong even if it's a real best practice.<\/p>\n<h3>P2. \"Most effective FIRST step\" = lowest effort, highest leverage, at the root cause<\/h3>\n<p>When the stem says <em>first step<\/em> or <em>most effective way to improve<\/em>, the exam wants the cheapest intervention that addresses the root cause \u2014 almost always words (descriptions, criteria, examples) before infrastructure (classifiers, routers, layers).<\/p>\n<ul>\n<li><strong>Q2<\/strong> \u2014 Rewriting descriptions beats few-shot examples (\"token overhead without fixing the underlying issue\"), beats a routing layer (\"over-engineered\"), beats consolidating tools (\"requires more effort than a 'first step' warrants\"). Note: consolidation is called <em>a valid architectural choice<\/em> \u2014 it loses only because the question asked for a first step. Read the ask.<\/li>\n<li><strong>Q3<\/strong> \u2014 Prompt criteria beat a trained classifier because \"prompt optimization hasn't been tried\" yet. The exam's escalation ladder: <strong>fix the prompt \u2192 fix the tool descriptions \u2192 restructure the workflow \u2192 add infrastructure<\/strong>. You may only skip rungs when determinism is required (see P3).<\/li>\n<\/ul>\n<h3>P3. When money, compliance, or ordering is at stake \u2192 deterministic enforcement, never prompts<\/h3>\n<p>Prompt instructions have \"a non-zero failure rate\" (Task 1.4, verbatim). If the failure has financial or compliance consequences, the correct answer is <em>code<\/em>, not <em>words<\/em>.<\/p>\n<ul>\n<li><strong>Q1<\/strong> \u2014 Agent skips <code>get_customer<\/code> in 12% of cases \u2192 misidentified accounts \u2192 <strong>incorrect refunds<\/strong>. Winner: <strong>programmatic prerequisite that blocks <code>lookup_order<\/code>/<code>process_refund<\/code> until <code>get_customer<\/code> returns a verified customer ID<\/strong>. The explanation kills the prompt options by name: \"probabilistic LLM compliance \u2026 is insufficient when errors have financial consequences.\"<\/li>\n<li>Task 1.5 backs this up with the canonical hook example: intercept tool calls to <strong>block refunds over $500<\/strong> and redirect to human escalation. Hooks = deterministic guarantees; prompts = probabilistic compliance.<\/li>\n<\/ul>\n<p><strong>How P2 and P3 coexist:<\/strong> P2 (cheap prompt fix) applies to <em>quality<\/em> problems \u2014 accuracy, consistency, tool selection, escalation calibration. P3 (hooks/gates) applies to <em>guarantee<\/em> problems \u2014 must-happen ordering, policy thresholds, financial operations. The stem tells you which world you're in: look for words like <em>incorrect refunds, compliance, mandatory, must, policy<\/em> vs <em>inconsistent, suboptimal, below target, unreliable<\/em>.<\/p>\n<h3>P4. Match the API to latency and blocking requirements<\/h3>\n<ul>\n<li><strong>Q11<\/strong> \u2014 Two workflows: blocking pre-merge check + overnight tech-debt report. Winner: <strong>Batches API for the overnight report only; synchronous for pre-merge<\/strong>. Physics: Batches = 50% cheaper, up to 24-hour window, <strong>no latency SLA<\/strong>, no multi-turn tool calling. Anyone waiting on the result = synchronous. Nobody waiting = batch. \"Often completes faster\" is explicitly <em>not<\/em> acceptable for blocking workflows, and a timeout-fallback hybrid is \"unnecessary complexity.\"<\/li>\n<li><strong>Q10<\/strong> \u2014 CI pipeline hangs because Claude Code waits for interactive input. Winner: <strong><code>claude -p \"...\"<\/code><\/strong> (<code>--print<\/code>, the documented non-interactive mode). Pair with <code>--output-format json --json-schema<\/code> when CI needs machine-parseable findings.<\/li>\n<\/ul>\n<h3>P5. Least privilege and separation of concerns \u2014 scope everything to its role<\/h3>\n<ul>\n<li><strong>Q9<\/strong> \u2014 Synthesis agent needs verification; 85% are simple fact-checks, 15% deep. Winner: <strong>give synthesis a single scoped <code>verify_fact<\/code> tool for the 85%, keep routing the 15% through the coordinator<\/strong>. Giving it <em>all<\/em> web search tools \"over-provisions the synthesis agent, violating separation of concerns.\" The explanation names the principle: least privilege.<\/li>\n<li><strong>Q4<\/strong> \u2014 Team command \u2192 <strong><code>.claude/commands/<\/code> in the repo<\/strong> (version-controlled, arrives on clone). Personal \u2192 <code>~/.claude/commands/<\/code>. Same scoping logic everywhere: <code>.mcp.json<\/code> (project, shared, <code>${ENV_VAR}<\/code> for secrets) vs <code>~/.claude.json<\/code> (personal/experimental); project CLAUDE.md (team) vs <code>~/.claude/CLAUDE.md<\/code> (you only \u2014 a classic bug is \"new teammate isn't getting the instructions\" because they live in someone's user-level file).<\/li>\n<li>Task 2.3: an agent with 18 tools selects worse than one with 4\u20135. Restricting tool sets <em>is<\/em> the fix, not a limitation to work around.<\/li>\n<\/ul>\n<h3>P6. Explicit criteria and concrete examples beat vague instructions \u2014 every time<\/h3>\n<p>The model can't read your mind; it can read your examples.<\/p>\n<ul>\n<li><strong>Q3<\/strong> \u2014 Explicit escalation criteria <strong>with few-shot examples<\/strong> demonstrating escalate-vs-resolve.<\/li>\n<li><strong>Q6<\/strong> \u2014 Explicit glob matching (<code>.claude/rules/<\/code> frontmatter <code>paths: [\"**/*.test.tsx\"]<\/code>) beats \"relying on Claude to infer which section applies\" from a monolithic CLAUDE.md. Deterministic loading beats inference.<\/li>\n<li>Task 4.1: \"be conservative\" and \"only report high-confidence findings\" <strong>fail<\/strong>; \"flag comments only when claimed behavior contradicts actual code behavior\" works. Specific categorical criteria (report bugs/security; skip style) beat confidence-based filtering. Severity levels need concrete code examples per level.<\/li>\n<li>Task 3.5: when prose descriptions are interpreted inconsistently, 2\u20133 concrete input/output examples are \"the most effective way to communicate expected transformations.\"<\/li>\n<\/ul>\n<h3>P7. Blame the agent whose OUTPUT the logs show is wrong<\/h3>\n<p>In multi-agent debugging questions, the stem hands you log evidence. Find the agent whose <em>output<\/em> is defective; everyone downstream of it \"executed correctly within their assigned scope.\"<\/p>\n<ul>\n<li><strong>Q7<\/strong> \u2014 Report on \"AI in creative industries\" covers only visual arts. Coordinator's logs show it decomposed the topic into digital art / graphic design / photography. That decomposition IS the defect. Winner: <strong>coordinator's task decomposition is too narrow<\/strong>. The three distractors all blame downstream agents (synthesis, search, analysis) that did exactly what they were assigned.<\/li>\n<li><strong>Q8<\/strong> is the flip side \u2014 when a subagent <em>fails<\/em> (timeout), the right move is to pass <strong>structured error context up<\/strong>: failure type, attempted query, partial results, alternative approaches. So the coordinator can decide: retry modified, try alternative, or proceed with partials + annotate coverage gaps.<\/li>\n<\/ul>\n<hr />\n<h2>2. Distractor taxonomy<\/h2>\n<p>The same seven wrong answers keep getting re-skinned. Name the archetype and it dies.<\/p>\n<h3>D1. Over-engineered infrastructure<\/h3>\n<p>A heavyweight system where a prompt/description/config fix works. Instant kill on any \"first step\" question.\n- Q2-C: routing layer that parses input and pre-selects tools (\"over-engineered and bypasses the LLM's natural language understanding\")\n- Q3-C: separate classifier model trained on historical tickets (\"requiring labeled data and ML infrastructure when prompt optimization hasn't been tried\")\n- Q1-D: routing classifier per request type (\"addresses tool availability rather than tool ordering\")\n- Q12-C: bigger context window (\"larger context windows don't solve attention quality issues\")\n- Q11-D: batch + timeout-fallback hybrid (\"unnecessary complexity\")<\/p>\n<h3>D2. Prompt-hope where a guarantee is required<\/h3>\n<p>Prompt/few-shot enforcement of something that MUST happen. Only wrong when stakes are money/compliance/ordering \u2014 this is the mirror image of D1.\n- Q1-B: \"enhance the system prompt to state verification is mandatory\"\n- Q1-C: few-shot examples of calling get_customer first\nBoth die to: \"probabilistic LLM compliance \u2026 insufficient when errors have financial consequences.\"<\/p>\n<h3>D3. Solves a different problem<\/h3>\n<p>Real technique, wrong disease. Verify the answer touches the defect named in the stem.\n- Q3-D: sentiment-based escalation (\"sentiment doesn't correlate with case complexity, which is the actual issue\")\n- Q1-D: tool availability filter for a tool <em>ordering<\/em> problem\n- Q7-A/C/D: fixing synthesis/search/analysis agents when the coordinator's decomposition was the defect\n- Q4-C: putting a command in CLAUDE.md (instructions/context, not command definitions)<\/p>\n<h3>D4. Nonexistent features<\/h3>\n<p>Made-up flags, env vars, and config mechanisms. If you've never seen it in docs, it doesn't exist.\n- Q10-B: <code>CLAUDE_HEADLESS=true<\/code> \u2014 doesn't exist\n- Q10-D: <code>claude --batch<\/code> \u2014 doesn't exist\n- Q4-D: <code>.claude/config.json<\/code> with a commands array \u2014 \"a configuration mechanism that doesn't exist in Claude Code\"\n- Also in this family: generic Unix workarounds (Q10-C: <code>&lt; /dev/null<\/code>) that dodge the documented mechanism (<code>-p<\/code>).<\/p>\n<h3>D5. Named anti-patterns (the guide lists these explicitly)<\/h3>\n<p>The task statements literally enumerate anti-patterns; distractors are built from the list:\n- <strong>Self-reported confidence scores<\/strong> as routing signal \u2014 Q3-B (\"LLM self-reported confidence is poorly calibrated \u2014 the agent is already incorrectly confident on hard cases\")\n- <strong>Sentiment-based escalation<\/strong> \u2014 Q3-D\n- <strong>Consensus voting / majority-of-N runs<\/strong> \u2014 Q12-D (\"would actually suppress detection of real bugs\" that are only caught intermittently)\n- <strong>Silent error suppression<\/strong> (return empty result marked success) \u2014 Q8-C (\"prevents any recovery and risks incomplete research outputs\")\n- <strong>Generic error status<\/strong> (\"search unavailable\" after exhausting retries) \u2014 Q8-B (\"hides valuable context from the coordinator\")\n- <strong>Kill the whole workflow on one failure<\/strong> \u2014 Q8-D\n- <strong>Iteration caps / parsing natural-language signals / checking assistant text<\/strong> as loop termination (Task 1.1) \u2014 the loop runs on <code>stop_reason<\/code>: continue on <code>\"tool_use\"<\/code>, stop on <code>\"end_turn\"<\/code>\n- <strong>Heuristic selection among multiple customer matches<\/strong> instead of asking for another identifier (Task 5.2)<\/p>\n<h3>D6. Burden-shifting<\/h3>\n<p>Makes humans absorb the system's failure instead of fixing the system.\n- Q12-B: \"require developers to split large PRs into 3\u20134 file submissions\" (\"shifts burden to developers without improving the system\")\n- Same smell: \"have the customer call back,\" \"require reviewers to double-check everything.\"<\/p>\n<h3>D7. Right answer, wrong scope<\/h3>\n<p>Correct mechanism, wrong location/blast radius.\n- Q4-B: <code>~/.claude/commands/<\/code> for a command that must reach \"every developer who clones\" \u2014 personal scope can't travel through version control\n- Q6-D: per-directory CLAUDE.md for test files spread across the whole tree (\"directory-bound\")\n- Q6-C: skills for always-on conventions (\"requires manual invocation \u2026 contradicting the need for deterministic 'automatic' application\")\n- Q9-C: ALL search tools when one scoped tool covers 85% (over-provisioning)\n- Q9-B: batching verifications when synthesis steps depend on earlier verified facts (blocking dependency)\n- Q9-D: speculative caching (\"cannot reliably predict what the synthesis agent will need\")\n- Q5-B/C/D: direct execution for architecture-scale work \u2014 B risks \"costly rework,\" C \"assumes you already know the right structure,\" D \"ignores that the complexity is already stated in the requirements.\"<\/p>\n<hr />\n<h2>3. The 20-second elimination checklist<\/h2>\n<p>Run in order on every question. Most questions die by step 4.<\/p>\n<ol>\n<li><strong>Find the defect sentence.<\/strong> What does the stem/logs say is actually broken? Underline it mentally. (Q7: the coordinator's three subtasks. Q2: \"minimal descriptions.\" Q12: \"inconsistent \u2026 contradictory.\")<\/li>\n<li><strong>Classify stakes: guarantee or quality?<\/strong> Words like <em>must, mandatory, financial, refund, compliance, policy, before any<\/em> \u2192 deterministic answer (hook, prerequisite gate, forced tool_choice, glob rule). Words like <em>inconsistent, below target, unreliable, suboptimal<\/em> \u2192 prompt/description/criteria/examples answer.<\/li>\n<li><strong>Check the ask's size.<\/strong> \"First step\" / \"most effective way\" \u2192 cheapest root-cause fix. \"How should you restructure/design\" \u2192 architectural answer is allowed.<\/li>\n<li><strong>Kill nonexistent features.<\/strong> Any flag/env/config you've never seen in the docs is fabricated. (<code>--batch<\/code>, <code>CLAUDE_HEADLESS<\/code>, config.json commands array.)<\/li>\n<li><strong>Kill named anti-patterns on sight.<\/strong> Self-reported confidence, sentiment escalation, consensus voting, silent suppression, generic errors, workflow termination, iteration caps, burden-shifting, heuristic identity guessing.<\/li>\n<li><strong>Kill answers that fix a component the logs cleared.<\/strong> If an agent's output matched its assignment, it's innocent.<\/li>\n<li><strong>Check scope fit.<\/strong> Who needs this? Whole team via git \u2192 project scope (<code>.claude/commands/<\/code>, <code>.mcp.json<\/code>, project CLAUDE.md, <code>.claude/rules/<\/code>). Just you / experimental \u2192 user scope (<code>~/.claude/...<\/code>). Spread-across-tree files \u2192 glob rules, not directory files.<\/li>\n<li><strong>Latency check (API questions).<\/strong> Someone blocked waiting \u2192 synchronous. Overnight/weekly/report \u2192 Batches. Never batch a blocking path.<\/li>\n<li><strong>Two survivors?<\/strong> Pick the one that (a) is closer to the underlined defect and (b) preserves existing structure (adds a scoped tool, keeps coordinator routing for the hard cases) over the one that rebuilds the system.<\/li>\n<\/ol>\n<hr />\n<h2>4. Trigger-phrase tells<\/h2>\n<p>The stem phrase \u2192 the answer shape. Grounded in the sample questions (Q#) and task statements (T#).<\/p>\n<h3>Enforcement and workflow<\/h3>\n<table>\n<thead>\n<tr>\n<th>Stem says<\/th>\n<th>Correct answer shape<\/th>\n<th>Source<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>\"must / mandatory / guarantee / compliance / financial consequences / incorrect refunds\"<\/td>\n<td>Programmatic hook or prerequisite gate that <em>blocks<\/em> the tool call \u2014 never prompt instructions<\/td>\n<td>Q1, T1.4, T1.5<\/td>\n<\/tr>\n<tr>\n<td>\"refunds above $X / policy threshold\"<\/td>\n<td>Tool-call interception hook that blocks and redirects to human escalation<\/td>\n<td>T1.5<\/td>\n<\/tr>\n<tr>\n<td>\"tools return mixed formats (Unix timestamps, ISO 8601, numeric codes)\"<\/td>\n<td>PostToolUse hook normalizing results before the model sees them<\/td>\n<td>T1.5<\/td>\n<\/tr>\n<tr>\n<td>\"when should the loop stop / termination\"<\/td>\n<td><code>stop_reason<\/code>: continue on <code>\"tool_use\"<\/code>, stop on <code>\"end_turn\"<\/code> \u2014 never NL parsing, iteration caps, or checking for text<\/td>\n<td>T1.1<\/td>\n<\/tr>\n<tr>\n<td>\"verify identity before financial operations\"<\/td>\n<td>Prerequisite gate blocking downstream tools until upstream returned verified ID<\/td>\n<td>Q1, T1.4<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3>Diagnosis and improvement<\/h3>\n<table>\n<thead>\n<tr>\n<th>Stem says<\/th>\n<th>Correct answer shape<\/th>\n<th>Source<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>\"most effective FIRST step\"<\/td>\n<td>Cheapest root-cause fix (descriptions, criteria, examples) \u2014 not new infra, not consolidation<\/td>\n<td>Q2<\/td>\n<\/tr>\n<tr>\n<td>\"wrong tool selected + descriptions are minimal/similar\"<\/td>\n<td>Expand tool descriptions: input formats, example queries, edge cases, when-to-use-vs-alternatives<\/td>\n<td>Q2, T2.1<\/td>\n<\/tr>\n<tr>\n<td>\"two tools with near-identical names/descriptions (analyze_content vs analyze_document)\"<\/td>\n<td>Rename + differentiate descriptions to eliminate overlap<\/td>\n<td>T2.1<\/td>\n<\/tr>\n<tr>\n<td>\"agent prefers built-in Grep over your MCP tool\"<\/td>\n<td>Enhance the MCP tool's description (capabilities + outputs)<\/td>\n<td>T2.4<\/td>\n<\/tr>\n<tr>\n<td>\"escalates easy cases, attempts hard ones / calibration off\"<\/td>\n<td>Explicit escalation criteria + few-shot escalate-vs-resolve examples in system prompt<\/td>\n<td>Q3<\/td>\n<\/tr>\n<tr>\n<td>\"be conservative / only high-confidence didn't help\"<\/td>\n<td>Specific categorical criteria (report bugs+security, skip style); disable high-FP categories temporarily<\/td>\n<td>T4.1<\/td>\n<\/tr>\n<tr>\n<td>\"inconsistent severity labels\"<\/td>\n<td>Explicit severity criteria with a concrete code example per level<\/td>\n<td>T4.1<\/td>\n<\/tr>\n<tr>\n<td>\"agent has 18 tools, picks wrong ones\"<\/td>\n<td>Restrict each agent to its role's 4\u20135 tools<\/td>\n<td>T2.3<\/td>\n<\/tr>\n<tr>\n<td>\"logs show what the coordinator assigned\"<\/td>\n<td>Blame the agent whose output is defective (usually the coordinator's decomposition); downstream agents \"executed correctly\"<\/td>\n<td>Q7<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3>Claude Code config and scoping<\/h3>\n<table>\n<thead>\n<tr>\n<th>Stem says<\/th>\n<th>Correct answer shape<\/th>\n<th>Source<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>\"available to every developer who clones/pulls\"<\/td>\n<td>Project scope in the repo: <code>.claude/commands/<\/code>, <code>.mcp.json<\/code>, project CLAUDE.md<\/td>\n<td>Q4, T2.4, T3.1<\/td>\n<\/tr>\n<tr>\n<td>\"personal / experimental / don't affect teammates\"<\/td>\n<td>User scope: <code>~/.claude/commands/<\/code>, <code>~/.claude.json<\/code>, <code>~/.claude/CLAUDE.md<\/code>, personal skill variants with different names<\/td>\n<td>Q4, T2.4, T3.2<\/td>\n<\/tr>\n<tr>\n<td>\"new team member isn't getting the instructions\"<\/td>\n<td>They're in user-level config; move to project-level<\/td>\n<td>T3.1<\/td>\n<\/tr>
