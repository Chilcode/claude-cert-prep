ode class=\"language-yaml\"># .claude/rules/terraform.md\n---\npaths: [&quot;terraform/**/*&quot;]\n---\nPin provider versions. Never inline secrets; use variables.\n<\/code><\/pre>\n<p>The killer comparison (sample Q6): test files sit <strong>next to<\/strong> the code they test, scattered across the\nwhole tree (<code>Button.test.tsx<\/code> beside <code>Button.tsx<\/code>). A directory-level CLAUDE.md can't cover that \u2014\nCLAUDE.md files are directory-bound. A glob rule <code>**/*.test.tsx<\/code> covers every test file no matter\nwhere it lives, automatically and deterministically.<\/p>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Conventions for a file <em>type<\/em> scattered across the tree (test files everywhere)<\/td>\n<td><code>.claude/rules/<\/code> file with <code>paths: [\"**/*.test.tsx\"]<\/code><\/td>\n<td>Glob matches by path pattern regardless of directory<\/td>\n<td>Per-directory CLAUDE.md (directory-bound, can't span); monolithic CLAUDE.md with headers (relies on inference)<\/td>\n<\/tr>\n<tr>\n<td>Conventions confined to one contiguous area<\/td>\n<td>Either a glob rule (<code>paths: [\"src/api/**/*\"]<\/code>) or a directory CLAUDE.md works; glob rule scales better<\/td>\n<td>Both scope correctly here<\/td>\n<td>Overthinking it \u2014 exam favors rules when the word \"automatic\"/\"regardless of location\" appears<\/td>\n<\/tr>\n<tr>\n<td>Context window bloated by rules irrelevant to current file<\/td>\n<td>Path-scoped rules<\/td>\n<td>Load only on matching edits \u2192 fewer wasted tokens<\/td>\n<td>Cramming all conventions into always-loaded CLAUDE.md<\/td>\n<\/tr>\n<tr>\n<td>Conventions must apply \"automatically\" with no manual step<\/td>\n<td>Path-scoped rules (deterministic match)<\/td>\n<td>Loading is triggered by file path, not model judgment<\/td>\n<td>Skills \u2014 require invocation or Claude <em>choosing<\/em> to load them; not deterministic<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>3.4 Plan mode vs direct execution; the Explore subagent<\/h2>\n<h3>Concepts in plain words<\/h3>\n<p><strong>Plan mode<\/strong> = explore and design before touching anything. It's for tasks with large-scale changes,\nmultiple valid approaches, architectural decisions, or multi-file modifications \u2014 the guide's own\nexamples: monolith\u2192microservices restructuring, a library migration touching 45+ files, choosing\nbetween integration approaches with different infrastructure requirements. Value: safe exploration\nprevents costly rework.<\/p>\n<p><strong>Direct execution<\/strong> = just do it. For simple, well-scoped changes: adding a single validation check to\none function, a single-file bug fix with a clear stack trace, a date-validation conditional.<\/p>\n<p><strong>The sequencing trick the exam loves (sample Q5):<\/strong> if complexity is <em>stated in the requirements<\/em>\n(\"dozens of files\", \"decisions about service boundaries\"), plan mode is the answer <strong>now<\/strong> \u2014 \"start\ndirect and switch to plan mode if it gets complicated\" is a named-wrong option. The legitimate combo\nis: plan mode for investigation \u2192 direct execution for implementing the planned approach.<\/p>\n<p><strong>Explore subagent.<\/strong> During multi-phase tasks, discovery output (file dumps, search results) is\nverbose and mostly disposable. The Explore subagent does the noisy discovery in its own context and\nreturns a <strong>summary<\/strong>, preserving the main conversation's context window.<\/p>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Monolith \u2192 microservices, dozens of files, boundary decisions<\/td>\n<td>Plan mode first<\/td>\n<td>Large-scale + architectural + multiple valid approaches = plan mode's exact design target<\/td>\n<td>\"Direct execution, let implementation reveal boundaries\" \u2192 costly rework; \"detailed upfront instructions\" \u2192 assumes you already know the answer<\/td>\n<\/tr>\n<tr>\n<td>Single-file bug fix with a clear stack trace<\/td>\n<td>Direct execution<\/td>\n<td>Well-understood, clearly scoped<\/td>\n<td>Plan-mode ceremony on a trivial fix (wasted time; exam counts over-engineering as wrong)<\/td>\n<\/tr>\n<tr>\n<td>Add one validation conditional to one function<\/td>\n<td>Direct execution<\/td>\n<td>Simple, well-scoped<\/td>\n<td>Same as above<\/td>\n<\/tr>\n<tr>\n<td>Library migration affecting 45+ files<\/td>\n<td>Plan mode to design, then direct execution to implement<\/td>\n<td>Investigation and implementation are different phases<\/td>\n<td>Staying in plan mode forever, or executing without a plan<\/td>\n<\/tr>\n<tr>\n<td>Complexity already stated in the requirements<\/td>\n<td>Plan mode immediately<\/td>\n<td>The complexity isn't speculative \u2014 it's given<\/td>\n<td>\"Start direct, escalate to plan mode if I hit complexity\" (sample Q5 distractor D)<\/td>\n<\/tr>\n<tr>\n<td>Discovery phase generating verbose output during a long multi-phase task<\/td>\n<td>Explore subagent \u2192 returns summary to main session<\/td>\n<td>Isolates noise, prevents context-window exhaustion<\/td>\n<td>Doing all exploration in the main conversation and running out of context mid-task<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>3.5 Iterative refinement techniques<\/h2>\n<h3>Concepts in plain words<\/h3>\n<p><strong>Concrete I/O examples beat prose.<\/strong> When a natural-language description of a transformation keeps\ngetting interpreted inconsistently, give <strong>2\u20133 concrete input/output example pairs<\/strong>. That is stated as\nthe <em>most effective<\/em> way to communicate expected transformations.<\/p>\n<pre><code class=\"language-text\">Convert these log lines. Examples:\nIN:  2026-07-11T14:02:11Z ERROR db timeout uid=482\nOUT: {&quot;ts&quot;: &quot;2026-07-11T14:02:11Z&quot;, &quot;level&quot;: &quot;error&quot;, &quot;msg&quot;: &quot;db timeout&quot;, &quot;uid&quot;: 482}\n\nIN:  Jul 11 14:03:40 WARN cache miss uid=99\nOUT: {&quot;ts&quot;: &quot;2026-07-11T14:03:40Z&quot;, &quot;level&quot;: &quot;warn&quot;, &quot;msg&quot;: &quot;cache miss&quot;, &quot;uid&quot;: 99}\n<\/code><\/pre>\n<p><strong>Test-driven iteration.<\/strong> Write the test suite first \u2014 expected behavior, edge cases, performance\nrequirements \u2014 then iterate by <strong>sharing test failures<\/strong> with Claude to guide progressive improvement.\nTo fix a specific edge case (null values in a migration script), hand over a specific test case with\nexample input and expected output.<\/p>\n<p><strong>Interview pattern.<\/strong> In unfamiliar domains, have Claude <strong>ask you questions first<\/strong> to surface\nconsiderations you didn't anticipate (cache invalidation strategy, failure modes) <em>before<\/em> it\nimplements anything.<\/p>\n<p><strong>Single message vs sequential.<\/strong> If multiple issues <strong>interact<\/strong> (fixing one changes another), report\nthem all in a single detailed message so Claude can solve them jointly. If issues are <strong>independent<\/strong>,\nfix them sequentially, one at a time.<\/p>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Prose description of a transformation keeps producing inconsistent output<\/td>\n<td>Provide 2\u20133 concrete input/output examples<\/td>\n<td>Examples pin down what words can't<\/td>\n<td>Rewriting the prose longer and more emphatic<\/td>\n<\/tr>\n<tr>\n<td>Building something with known edge cases and performance requirements<\/td>\n<td>Write the test suite first; iterate by sharing failures<\/td>\n<td>Failures are unambiguous, machine-checkable feedback<\/td>\n<td>Vibes-based \"looks right\" review each round<\/td>\n<\/tr>\n<tr>\n<td>One specific edge case is broken (nulls in a migration script)<\/td>\n<td>Give a specific test case: example input + expected output<\/td>\n<td>Targets the exact gap<\/td>\n<td>Generic \"handle edge cases better\" instruction<\/td>\n<\/tr>\n<tr>\n<td>Implementing in a domain you don't fully understand<\/td>\n<td>Interview pattern \u2014 Claude asks questions before coding<\/td>\n<td>Surfaces cache invalidation, failure modes, etc., you didn't think of<\/td>\n<td>Letting Claude assume defaults and finding the gaps in prod<\/td>\n<\/tr>\n<tr>\n<td>Several bugs whose fixes interact<\/td>\n<td>All issues in one detailed message<\/td>\n<td>Joint solution avoids fix-A-breaks-B whack-a-mole<\/td>\n<td>Sequential fixes that keep colliding<\/td>\n<\/tr>\n<tr>\n<td>Several independent bugs<\/td>\n<td>Sequential iteration, one at a time<\/td>\n<td>Isolated verification per fix<\/td>\n<td>Dumping unrelated issues in one message (muddled attention, harder to verify)<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>3.6 Claude Code in CI/CD<\/h2>\n<h3>Concepts in plain words<\/h3>\n<p><strong><code>-p<\/code> / <code>--print<\/code> = non-interactive mode.<\/strong> Without it, <code>claude \"prompt\"<\/code> in a pipeline waits for\ninteractive input and the job hangs forever (sample Q10). With <code>-p<\/code>, Claude processes the prompt,\nwrites the result to stdout, and exits. Distractors that <strong>do not exist<\/strong>: <code>CLAUDE_HEADLESS=true<\/code>,\n<code>--batch<\/code>, stdin redirect from <code>/dev/null<\/code>.<\/p>\n<p><strong>Structured output flags.<\/strong> <code>--output-format json<\/code> plus <code>--json-schema<\/code> force machine-parseable\nfindings, so CI can post them as inline PR comments instead of regex-scraping prose:<\/p>\n<pre><code class=\"language-bash\">claude -p &quot;Review this diff for security issues&quot; \\\n  --output-format json \\\n  --json-schema review-findings.schema.json\n<\/code><\/pre>\n<p><strong>CLAUDE.md is the CI context channel.<\/strong> CI-invoked Claude Code reads the project's CLAUDE.md like\nany session. Document testing standards, what makes a test valuable, fixture conventions, and review\ncriteria there \u2014 it directly raises test-generation quality and cuts low-value output.<\/p>\n<p><strong>Independent instance beats self-review.<\/strong> The session that generated code retains its generation\nreasoning and is less likely to question its own decisions. Reviews should run in a <strong>separate,\nindependent Claude instance<\/strong> with no prior reasoning context. (Adjacent D4.6 fact: for big PRs \u2014\ne.g., 14 files \u2014 split into per-file passes + a cross-file integration pass to avoid attention\ndilution.)<\/p>\n<p><strong>Deduplication on re-review.<\/strong> When a review re-runs after new commits, feed the <strong>prior review\nfindings into context<\/strong> and instruct Claude to report <strong>only new or still-unaddressed issues<\/strong> \u2014 that's\nhow you avoid duplicate PR comments. Same principle for test generation: provide the <strong>existing test\nfiles<\/strong> in context so it doesn't suggest scenarios already covered.<\/p>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>CI job hangs; logs show Claude Code waiting for input<\/td>\n<td>Add <code>-p<\/code> (<code>--print<\/code>): <code>claude -p \"\u2026\"<\/code><\/td>\n<td>Documented non-interactive mode: process, print, exit<\/td>\n<td><code>CLAUDE_HEADLESS=true<\/code> and <code>--batch<\/code> are fake; <code>&lt; /dev/null<\/code> is a Unix hack, not the fix<\/td>\n<\/tr>\n<tr>\n<td>CI must post findings as inline PR comments<\/td>\n<td><code>--output-format json<\/code> + <code>--json-schema<\/code><\/td>\n<td>Machine-parseable, schema-enforced structure<\/td>\n<td>Parsing free-text prose output with regex<\/td>\n<\/tr>\n<tr>\n<td>CI-generated tests are low-value / off-convention<\/td>\n<td>Document testing standards, valuable-test criteria, and available fixtures in CLAUDE.md<\/td>\n<td>CLAUDE.md is the project-context mechanism for CI runs<\/td>\n<td>Stuffing all standards into the per-run prompt string<\/td>\n<\/tr>\n<tr>\n<td>Reviewing code Claude just generated<\/td>\n<td>Independent Claude instance with no generation context<\/td>\n<td>Generator retains reasoning context \u2192 won't question its own decisions<\/td>\n<td>\"Self-review\" instructions or extended thinking in the same session<\/td>\n<\/tr>\n<tr>\n<td>Re-running review after new commits duplicates old comments<\/td>\n<td>Include prior findings in context; instruct: report only new or still-unaddressed issues<\/td>\n<td>Explicit dedup instruction against known state<\/td>\n<td>Re-reviewing from scratch every push (duplicate comment spam)<\/td>\n<\/tr>\n<tr>\n<td>Test generation suggests scenarios already covered<\/td>\n<td>Provide existing test files in context<\/td>\n<td>Model can only avoid what it can see<\/td>\n<td>Instruction \"don't duplicate tests\" without showing the test suite<\/td>\n<\/tr>\n<tr>\n<td>Cheap overnight analysis vs blocking pre-merge check (crosses into D4.5)<\/td>\n<td>Batch API for overnight jobs only; synchronous calls for anything blocking<\/td>\n<td>Batches: 50% cheaper, up to 24 h, no latency SLA<\/td>\n<td>Batching a blocking pre-merge gate<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>Memorize cold<\/h2>\n<p>Flashcard facts. If a D3 question hinges on an exact name, it's on this list.<\/p>\n<p><strong>Paths &amp; hierarchy<\/strong>\n- User-level memory: <code>~/.claude/CLAUDE.md<\/code> \u2014 personal, never shared via version control\n- Project-level memory: <code>.claude/CLAUDE.md<\/code> <strong>or<\/strong> root <code>CLAUDE.md<\/code> \u2014 shared via version control\n- Directory-level memory: <code>CLAUDE.md<\/code> inside a subdirectory \u2014 applies to that subtree\n- Modular import: <code>@import path/to/file.md<\/code> inside CLAUDE.md\n- Topic rule files: <code>.claude/rules/*.md<\/code> (e.g., testing.md, api-conventions.md, deployment.md)\n- Diagnostic command: <code>/memory<\/code> \u2014 shows which memory files are loaded<\/p>\n<p><strong>Rules frontmatter<\/strong>\n- Key: <code>paths:<\/code> \u2014 YAML frontmatter, list of glob patterns, e.g. <code>paths: [\"terraform/**/*\"]<\/code>, <code>paths: [\"**/*.test.tsx\"]<\/code>\n- Behavior: rule loads <strong>only when editing a matching file<\/strong>; matches by path pattern, not directory<\/p>\n<p><strong>Commands &amp; skills<\/strong>\n- Project commands: <code>.claude/commands/<\/code> (in repo, version-controlled)\n- User commands: <code>~/.claude/commands/<\/code> (personal)\n- Skills: <code>.claude/skills/&lt;name&gt;/SKILL.md<\/code>; personal variants in <code>~/.claude/skills/<\/code> under a <strong>different name<\/strong>\n- SKILL.md frontmatter keys: <code>context: fork<\/code> (isolated sub-agent context), <code>allowed-tools<\/code> (tool restriction), <code>argument-hint<\/code> (parameter prompt on bare invocation)\n- Skills = on-demand / task-specific; CLAUDE.md = always-loaded / universal<\/p>\n<p><strong>Plan mode &amp; exploration<\/strong>\n- Plan mode triggers: large-scale changes, multiple valid approaches, architectural decisions, multi-file mods (canonical examples: microservices restructuring, 45+-file library migration)\n- Direct execution triggers: simple well-scoped change (single validation check, single-file fix with clear stack trace)\n- Explore subagent: isolates verbose discovery, returns summaries, preserves main context<\/p>\n<p><strong>Iterative refinement numbers &amp; names<\/strong>\n- <strong>2\u20133<\/strong> concrete input/output examples (D3.5; note D4.2 few-shot is <strong>2\u20134<\/strong> \u2014 don't cross-wire)\n- Test-driven iteration: tests first (behavior + edge cases + performance), then share failures\n- Interview pattern: Claude asks questions before implementing (unfamiliar domains)\n- Interacting issues \u2192 single detailed message; independent issues \u2192 sequential<\/p>\n<p><strong>CI flags &amp; mechanics<\/strong>\n- Non-interactive: <code>-p<\/code> / <code>--print<\/code>\n- Structured output: <code>--output-format json<\/code> and <code>--json-schema &lt;file&gt;<\/code>\n- CI context mechanism: project CLAUDE.md (testing standards, fixtures, review criteria)\n- Review isolation: independent instance &gt; self-review (generator keeps its reasoning context)\n- Dedup: prior findings in context + \"report only new or still-unaddressed\"\n- <strong>Fake features used as distractors:<\/strong> <code>CLAUDE_HEADLESS<\/code> env var, <code>--batch<\/code> flag, <code>.claude/config.json<\/code> with a <code>commands<\/code> array<\/p>\n<p><strong>Boundary items (owned by D1/D5, but appear in Scenario 2 alongside D3 material)<\/strong>\n- <code>--resume &lt;session-name&gt;<\/code> \u2014 resume a named session (D1.7)\n- <code>fork_session<\/code> \u2014 branch independent explorations from a shared baseline (D1.7)\n- <code>/compact<\/code> \u2014 reduce context usage in long exploration sessions (D5.4)<\/p>\n<hr />\n<h2>Anti-pattern wall<\/h2>\n<p>Recognize on sight; each is a wrong answer somewhere.<\/p>\n<table>\n<thead>\n<tr>\n<th>Anti-pattern<\/th>\n<th>Why it's wrong<\/th>\n<th>Correct pattern<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Team instructions in <code>~/.claude/CLAUDE.md<\/code><\/td>\n<td>User-level is never version-controlled \u2014 teammates get nothing<\/td>\n<td>Project-level CLAUDE.md<\/td>\n<\/tr>\n<tr>\n<td>Monolithic CLAUDE.md with area headers, \"Claude infers the section\"<\/td>\n<td>Inference-based, unreliable<\/td>\n<td><code>.claude/rules/<\/code> topic files; <code>paths:<\/code> globs for conditional load<\/td>\n<\/tr>\n<tr>\n<td>Per-directory CLAUDE.md for conventions spanning scattered files<\/td>\n<td>CLAUDE.md is directory-bound; can't follow file types across the tree<\/td>\n<td>Glob-scoped rule (<code>**/*.test.tsx<\/code>)<\/td>\n<\/tr>\n<tr>\n<td>Skills for always-on standards or \"automatic\" convention loading<\/td>\n<td>Skills need invocation or Claude choosing them \u2014 not deterministic<\/td>\n<td>CLAUDE.md (always-on) or path rules (automatic)<\/td>\n<\/tr>\n<tr>\n<td>Editing a shared skill in-place for a personal tweak<\/td>\n<td>Changes hit every teammate<\/td>\n<td>Personal variant in <code>~/.claude/skills/<\/code> with a different name<\/td>\n<\/tr>\n<tr>\n<td>Direct execution on stated-complex architectural work; \"switch to plan mode if it gets hard\"<\/td>\n<td>Complexity is already given; late discovery = costly rework<\/td>\n<td>Plan mode first, then execute the plan<\/td>\n<\/tr>\n<tr>\n<td>Plan mode for a one-line, well-scoped fix<\/td>\n<td>Over-engineering; exam penalizes disproportionate responses<\/td>\n<td>Direct execution<\/td>\n<\/tr>\n<tr>\n<td>Verbose discovery in the main conversation during multi-phase work<\/td>\n<td>Context-window exhaustion mid-task<\/td>\n<td>Explore subagent returning summaries<\/td>\n<\/tr>\n<tr>\n<td>Longer prose instead of examples when output stays inconsistent<\/td>\n<td>Words stay ambiguous; examples don't<\/td>\n<td>2\u20133 concrete I/O examples<\/td>\n<\/tr>\n<tr>\n<td>Fixing interacting bugs one-by-one (or independent bugs all-at-once)<\/td>\n<td>Whack-a-mole / muddled attention respectively<\/td>\n<td>Match strategy to issue coupling<\/td>\n<\/tr>\n<tr>\n<td>Interactive <code>claude \"\u2026\"<\/code> in a pipeline<\/td>\n<td>Hangs waiting for input<\/td>\n<td><code>claude -p \"\u2026\"<\/code><\/td>\n<\/tr>\n<tr>\n<td>Regex-parsing prose CI output<\/td>\n<td>Fragile; unstructured<\/td>\n<td><code>--output-format json<\/code> + <code>--json-schema<\/code><\/td>\n<\/tr>\n<tr>\n<td>Same session generates and reviews the code<\/td>\n<td>Retained reasoning context \u2192 blind to own mistakes<\/td>\n<td>Independent review instance<\/td>\n<\/tr>\n<tr>\n<td>Re-running CI review with no memory of prior findings<\/td>\n<td>Duplicate PR comments every push<\/td>\n<td>Prior findings in context + report-only-new instruction<\/td>\n<\/tr>\n<tr>\n<td>Test generation without existing tests in context<\/td>\n<td>Duplicates covered scenarios<\/td>\n<td>Provide existing test files<\/td>\n<\/tr>\n<tr>\n<td>Believing in <code>CLAUDE_HEADLESS<\/code>, <code>--batch<\/code>, or a <code>.claude/config.json<\/code> commands array<\/td>\n<td>None exist \u2014 pure distractor bait<\/td>\n<td><code>-p<\/code>, Batch <strong>API<\/strong> (not a CLI flag), <code>.claude/commands/<\/code><\/td>\n<\/tr>\n<\/tbody>\n<\/table>","words":3281},"domain-4-prompt-structured-output":{"title":"Domain 4 \u2014 Prompt Engineering & Structured Output (20% of exam)","group":"Domain playbooks","html":"<h1>Domain 4 \u2014 Prompt Engineering &amp; Structured Output (20% of exam)<\/h1>\n<p><strong>~12 of 60 questions.<\/strong> Feeds two scenarios directly: <strong>Scenario 5 (Claude Code for CI \u2014 code review prompts, false positives)<\/strong> and <strong>Scenario 6 (Structured Data Extraction \u2014 JSON schemas, validation, batching)<\/strong>. If either scenario is drawn, this domain is where those points live.<\/p>\n<p>Six task statements. Each decoded below: plain-words concept \u2192 decision-rules table. Then one Memorize-Cold section and the Anti-Pattern Wall for the whole domain.<\/p>\n<hr />\n<h2>4.1 \u2014 Explicit criteria beat vague instructions (precision / false positives)<\/h2>\n<h3>Concepts in plain words<\/h3>\n<p>When a review prompt says \"be conservative\" or \"only report high-confidence findings,\" the model has no operational definition of <em>conservative<\/em> \u2014 precision doesn't improve. What works is <strong>explicit categorical criteria<\/strong>: name the categories to report, name the categories to skip. \"Flag comments only when claimed behavior contradicts actual code behavior\" is testable; \"check that comments are accurate\" is not.<\/p>\n<p>Why the exam cares: <strong>false positives destroy developer trust<\/strong>, and the damage spreads \u2014 a noisy category makes devs ignore the <em>accurate<\/em> categories too. The exam-approved emergency move is to <strong>temporarily disable a high-FP category<\/strong> while you fix its prompt, rather than let it poison the whole review system.<\/p>\n<p>For severity classification, the fix is the same shape: define each severity level with <strong>concrete code examples<\/strong>, not adjectives.<\/p>\n<pre><code class=\"language-text\"># BAD (confidence-based filtering \u2014 exam marks this wrong)\nReview this PR. Be conservative and only report issues you are\nhighly confident about.\n\n# GOOD (categorical criteria)\nReport ONLY:\n- Bugs: logic errors, null-handling failures, off-by-one errors\n- Security: injection, auth bypass, secrets in code\nDo NOT report:\n- Minor style (naming, formatting)\n- Patterns local to this codebase (see examples below)\n\nSeverity levels \u2014 classify using these anchors:\n- critical: e.g. `query = f&quot;SELECT * WHERE id={user_input}&quot;`  (injection)\n- major:    e.g. missing null check before `.items[0]`\n- minor:    e.g. unused import\n<\/code><\/pre>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Automated review floods PRs with false positives<\/td>\n<td>Write specific criteria: which categories to report (bugs, security) vs skip (minor style, local patterns)<\/td>\n<td>Categorical criteria are operational; the model can apply them<\/td>\n<td>\"Add 'be conservative' / 'only high-confidence findings' to the prompt\" \u2014 vague instructions don't improve precision<\/td>\n<\/tr>\n<tr>\n<td>One review category has a high FP rate, devs are losing trust<\/td>\n<td><strong>Temporarily disable<\/strong> that category while improving its prompt<\/td>\n<td>High-FP categories undermine confidence in accurate categories; protect trust first<\/td>\n<td>Keep it running while tuning, or lower a global confidence threshold<\/td>\n<\/tr>\n<tr>\n<td>Severity labels are inconsistent across runs<\/td>\n<td>Define explicit severity criteria with a <strong>concrete code example per level<\/strong><\/td>\n<td>Anchored examples produce consistent classification<\/td>\n<td>Prose definitions of \"critical/major/minor\" without examples<\/td>\n<\/tr>\n<tr>\n<td>Reviewer flags legitimate codebase-local patterns as issues<\/td>\n<td>Enumerate the acceptable patterns explicitly (and see 4.2 \u2014 few-shot the distinction)<\/td>\n<td>The model can't know your conventions unless told<\/td>\n<td>Assuming a smarter model or bigger context fixes it<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>4.2 \u2014 Few-shot prompting for consistency, ambiguity, and FP reduction<\/h2>\n<h3>Concepts in plain words<\/h3>\n<p>Few-shot examples are the <strong>most effective single technique<\/strong> when detailed instructions alone still produce inconsistent output. The exam's magic number: <strong>2\u20134 targeted examples<\/strong> (the \"iterative refinement\" statement in D3 says 2\u20133 for input/output transformations \u2014 same idea). \"Targeted\" means examples chosen for the <strong>ambiguous cases<\/strong>, showing the <em>reasoning<\/em> for why one action beat the plausible alternative \u2014 not 8 examples of the easy case.<\/p>\n<p>Four exam-tested jobs few-shot does:\n1. <strong>Ambiguous-case handling<\/strong> \u2014 e.g., which tool to pick for an ambiguous request, or what counts as a branch-level test coverage gap.\n2. <strong>Format consistency<\/strong> \u2014 demonstrate the exact output shape (location, issue, severity, suggested fix).\n3. <strong>False-positive reduction<\/strong> \u2014 show pairs: <em>this pattern is acceptable in our codebase<\/em> vs <em>this is a genuine issue<\/em>. The model then <strong>generalizes the judgment to novel patterns<\/strong> \u2014 it doesn't just memorize the listed cases.\n4. <strong>Extraction from varied document structures<\/strong> \u2014 inline citations vs bibliographies, methodology sections vs embedded details, informal measurements. This reduces hallucination and fixes empty/null extraction of fields that <em>are<\/em> present but formatted unusually.<\/p>\n<pre><code class=\"language-text\">Example 1 (ambiguous case \u2014 show the reasoning):\nInput: &quot;check my order #12345&quot;\nCorrect action: lookup_order\nWhy: the request contains an order ID and asks about an order;\nget_customer would be wrong even though a customer is implied.\n\nExample 2 (acceptable pattern vs genuine issue):\nACCEPTABLE: `except Exception: log.warn(...)` in our telemetry\nwrappers (established local pattern \u2014 do not flag)\nGENUINE ISSUE: `except Exception: pass` swallowing errors in\npayment flow (flag as major)\n<\/code><\/pre>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Detailed instructions still give inconsistently formatted output<\/td>\n<td>2\u20134 few-shot examples demonstrating the exact format (location, issue, severity, suggested fix)<\/td>\n<td>Examples beat prose for format transfer<\/td>\n<td>Writing even longer prose instructions<\/td>\n<\/tr>\n<tr>\n<td>Model mishandles ambiguous edge cases<\/td>\n<td>Few-shot examples of the ambiguous cases <strong>with reasoning<\/strong> why one action beat the alternatives<\/td>\n<td>Model generalizes the judgment to novel cases<\/td>\n<td>Examples of only the obvious/easy cases; or 5\u20138 examples when 2\u20134 targeted ones suffice<\/td>\n<\/tr>\n<tr>\n<td>Extraction returns empty/null for required fields that exist in oddly-formatted docs<\/td>\n<td>Few-shot examples showing correct extraction from the varied formats (inline citations vs bibliographies, informal measurements)<\/td>\n<td>Demonstrates structural variety the model must tolerate<\/td>\n<td>Making the fields required in the schema (that causes fabrication \u2014 see 4.3)<\/td>\n<\/tr>\n<tr>\n<td>Review flags acceptable local code patterns<\/td>\n<td>Few-shot pairs distinguishing acceptable patterns from genuine issues<\/td>\n<td>Reduces FPs while still generalizing<\/td>\n<td>Blanket \"don't flag style\" without examples<\/td>\n<\/tr>\n<tr>\n<td>Tool misrouting between two similar tools, descriptions are minimal<\/td>\n<td><strong>Fix tool descriptions first<\/strong> (Domain 2), not few-shot<\/td>\n<td>Descriptions are the primary selection mechanism; few-shot adds token overhead without fixing root cause<\/td>\n<td>Sample Q2 distractor: \"add 5\u20138 few-shot routing examples\"<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>4.3 \u2014 Structured output via tool_use + JSON schemas<\/h2>\n<h3>Concepts in plain words<\/h3>\n<p>The <strong>most reliable<\/strong> way to get schema-compliant output: define a tool whose <code>input_schema<\/code> <em>is<\/em> your output schema, make the model call it, and read your data out of the <code>tool_use<\/code> content block. This <strong>eliminates JSON syntax errors<\/strong> (no markdown fences, no trailing commas). It does <strong>not<\/strong> eliminate <strong>semantic errors<\/strong> \u2014 line items that don't sum to the total, values placed in the wrong field. That gap is what 4.4's validation loops exist for.<\/p>\n<p><code>tool_choice<\/code> has exactly three modes:\n- <code>{\"type\": \"auto\"}<\/code> \u2014 model <em>may<\/em> call a tool or may just answer in text. Not a guarantee.\n- <code>{\"type\": \"any\"}<\/code> \u2014 model <strong>must call some tool<\/strong>, its choice which. Use when you have multiple extraction schemas and don't know the document type.\n- <code>{\"type\": \"tool\", \"name\": \"extract_metadata\"}<\/code> \u2014 <strong>forced<\/strong>: model must call that specific tool. Use to guarantee a particular extraction runs (e.g., metadata before enrichment).<\/p>\n<p>Schema design rules the exam grades:\n- Fields that may be <strong>absent from the source \u2192 optional/nullable<\/strong>. A required field forces the model to invent a value to satisfy the schema. Nullable = anti-fabrication.\n- <strong>Enums for categories<\/strong>, plus <code>\"unclear\"<\/code> for ambiguous cases and <code>\"other\"<\/code> <strong>+ a detail string field<\/strong> so novel categories don't get force-fit into wrong buckets.\n- Strict schema handles output shape; put <strong>format normalization rules in the prompt<\/strong> (e.g., \"convert all dates to ISO 8601\") to handle inconsistent <em>source<\/em> formatting.<\/p>\n<pre><code class=\"language-python\">import anthropic\nclient = anthropic.Anthropic()\n\ntools = [{\n    &quot;name&quot;: &quot;record_invoice&quot;,\n    &quot;description&quot;: &quot;Record structured data extracted from an invoice.&quot;,\n    &quot;input_schema&quot;: {\n        &quot;type&quot;: &quot;object&quot;,\n        &quot;properties&quot;: {\n            &quot;vendor&quot;: {&quot;type&quot;: &quot;string&quot;},\n            &quot;po_number&quot;: {&quot;type&quot;: [&quot;string&quot;, &quot;null&quot;]},   # nullable: may be absent \u2192 prevents fabrication\n            &quot;category&quot;: {&quot;enum&quot;: [&quot;hardware&quot;, &quot;software&quot;, &quot;services&quot;, &quot;unclear&quot;, &quot;other&quot;]},\n            &quot;category_detail&quot;: {&quot;type&quot;: [&quot;string&quot;, &quot;null&quot;]},  # pairs with &quot;other&quot;\n            &quot;stated_total&quot;: {&quot;type&quot;: &quot;number&quot;},\n            &quot;calculated_total&quot;: {&quot;type&quot;: &quot;number&quot;},      # self-check field (see 4.4)\n        },\n        &quot;required&quot;: [&quot;vendor&quot;, &quot;category&quot;, &quot;stated_total&quot;],\n    },\n}]\n\nresp = client.messages.create(\n    model=&quot;claude-sonnet-4-5&quot;,\n    max_tokens=1024,\n    tools=tools,\n    tool_choice={&quot;type&quot;: &quot;tool&quot;, &quot;name&quot;: &quot;record_invoice&quot;},  # forced\n    messages=[{&quot;role&quot;: &quot;user&quot;, &quot;content&quot;: f&quot;Extract from:\\n{doc}\\nNormalize dates to ISO 8601.&quot;}],\n)\ndata = next(b.input for b in resp.content if b.type == &quot;tool_use&quot;)\n<\/code><\/pre>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Need guaranteed schema-valid JSON out of Claude<\/td>\n<td>Tool use with a JSON <code>input_schema<\/code>; read from the <code>tool_use<\/code> block<\/td>\n<td>Most reliable path; eliminates syntax errors<\/td>\n<td>\"Ask for JSON in the prompt and parse the text\" (fragile)<\/td>\n<\/tr>\n<tr>\n<td>Multiple extraction schemas, unknown document type<\/td>\n<td><code>tool_choice: {\"type\": \"any\"}<\/code><\/td>\n<td>Guarantees a tool call while letting the model pick the right schema<\/td>\n<td><code>\"auto\"<\/code> \u2014 model may return conversational text instead<\/td>\n<\/tr>\n<tr>\n<td>A specific extraction must run before enrichment steps<\/td>\n<td>Forced: <code>tool_choice: {\"type\": \"tool\", \"name\": \"extract_metadata\"}<\/code>, then process later steps in follow-up turns<\/td>\n<td>Deterministic first step<\/td>\n<td>Prompt-only \"please call extract_metadata first\"<\/td>\n<\/tr>\n<tr>\n<td>Source docs sometimes lack a field<\/td>\n<td>Make it optional/<strong>nullable<\/strong> in the schema<\/td>\n<td>Required fields force the model to fabricate values<\/td>\n<td>Marking everything required \"for data quality\"<\/td>\n<\/tr>\n<tr>\n<td>Category set won't cover everything / some cases genuinely ambiguous<\/td>\n<td>Enum + <code>\"unclear\"<\/code> value + <code>\"other\"<\/code> with a detail string field<\/td>\n<td>Extensible; ambiguity is representable instead of forced<\/td>\n<td>Closed enum that force-fits novel cases<\/td>\n<\/tr>\n<tr>\n<td>Source formatting is inconsistent (dates, units)<\/td>\n<td>Format normalization rules <strong>in the prompt<\/strong>, strict schema for shape<\/td>\n<td>Schema constrains output shape, not input interpretation<\/td>\n<td>Believing strict schema alone normalizes messy sources<\/td>\n<\/tr>\n<tr>\n<td>Output validates against schema but totals don't sum / values in wrong fields<\/td>\n<td>That's a <strong>semantic<\/strong> error \u2014 needs validation + retry (4.4) or self-check fields<\/td>\n<td>Tool use only kills <em>syntax<\/em> errors<\/td>\n<td>\"Tool use guarantees correct output\"<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>4.4 \u2014 Validation, retry, and feedback loops<\/h2>\n<h3>Concepts in plain words<\/h3>\n<p><strong>Retry-with-error-feedback<\/strong>: when validation (Pydantic / JSON schema / business rules) fails, don't just re-send the same prompt. Send a follow-up containing <strong>(1) the original document, (2) the failed extraction, (3) the specific validation errors<\/strong>. The model self-corrects against concrete feedback.<\/p>\n<p><strong>Know when retry cannot help.<\/strong> Retries fix <em>format mismatches and structural output errors<\/em>. Retries are <strong>useless when the information is simply absent from the source<\/strong> (e.g., it lives in an external document you never provided). Detecting this saves money and latency \u2014 route those to a different path (fetch the missing doc, mark null, or human review) instead of burning retries.<\/p>\n<p><strong>Self-check fields<\/strong> catch semantic errors at extraction time: extract <code>calculated_total<\/code> (model sums the line items) alongside <code>stated_total<\/code> (what the doc says); a mismatch flags the record. Add a <code>conflict_detected<\/code> boolean for internally inconsistent source data.<\/p>\n<p><strong>detected_pattern feedback loop<\/strong>: have findings include a <code>detected_pattern<\/code> field naming the code construct that triggered the finding. When developers dismiss findings, you can aggregate dismissals by pattern and systematically fix the false-positive-generating patterns \u2014 closing the loop from production feedback to prompt improvement.<\/p>\n<pre><code class=\"language-python\">from pydantic import BaseModel, ValidationError\n\nclass Invoice(BaseModel):\n    vendor: str\n    stated_total: float\n    calculated_total: float\n\nfor attempt in range(3):\n    data = extract(doc, error_feedback)          # tool_use call from 4.3\n    try:\n        inv = Invoice(**data)\n        if abs(inv.calculated_total - inv.stated_total) &gt; 0.01:\n            error_feedback = (&quot;Semantic error: calculated_total &quot;\n                              f&quot;{inv.calculated_total} != stated_total {inv.stated_total}. &quot;\n                              &quot;Re-extract line items and re-sum.&quot;)\n            continue\n        break\n    except ValidationError as e:\n        # retry = original doc + failed extraction + SPECIFIC errors\n        error_feedback = f&quot;Previous extraction:\\n{data}\\nValidation errors:\\n{e}&quot;\nelse:\n    route_to_human(doc)   # retry exhausted, or info likely absent from source\n<\/code><\/pre>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Extraction fails schema/Pydantic validation<\/td>\n<td>Follow-up request with original document + failed extraction + specific validation errors<\/td>\n<td>Concrete feedback steers the correction<\/td>\n<td>Blind re-send of the identical prompt; or feedback without the original document<\/td>\n<\/tr>\n<tr>\n<td>Required info exists only in an external doc not provided<\/td>\n<td>Recognize retry is <strong>ineffective<\/strong>; fetch the doc, allow null, or route to review<\/td>\n<td>No amount of retrying conjures absent information<\/td>\n<td>Retry loop with escalating temperature/attempts<\/td>\n<\/tr>\n<tr>\n<td>Output is schema-valid but numbers don't reconcile<\/td>\n<td>Extract <code>calculated_total<\/code> alongside <code>stated_total<\/code>; flag discrepancies; add <code>conflict_detected<\/code> boolean for inconsistent sources<\/td>\n<td>Semantic self-check inside the extraction itself<\/td>\n<td>Trusting schema validation as full validation<\/td>\n<\/tr>\n<tr>\n<td>Developers dismiss review findings, you need to improve precision systematically<\/td>\n<td>Add a <code>detected_pattern<\/code> field to every finding; analyze dismissals by pattern<\/td>\n<td>Turns dismissals into a measurable FP feedback loop<\/td>\n<td>Anecdote-driven prompt tweaks; asking devs to write reports<\/td>\n<\/tr>\n<tr>\n<td>Deciding whether a failure class is retryable<\/td>\n<td>Format/structural output errors \u2192 retry helps. Information-absent \u2192 retry cannot help<\/td>\n<td>The exam explicitly tests this split<\/td>\n<td>Treating all validation failures identically<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>4.5 \u2014 Message Batches API: batch processing strategy<\/h2>\n<h3>Concepts in plain words<\/h3>\n<p>The Message Batches API trades latency for money: <strong>50% cost savings<\/strong>, processing takes <strong>up to 24 hours<\/strong>, with <strong>no guaranteed latency SLA<\/strong>. You submit many requests, <strong>poll for completion<\/strong>, and correlate each response to its request via the <strong><code>custom_id<\/code><\/strong> field you set on submission.<\/p>\n<p>Two hard constraints decide everything:\n1. <strong>Latency tolerance.<\/strong> Batch fits non-blocking workloads: overnight technical-debt reports, weekly audits, nightly test generation. It does <strong>not<\/strong> fit blocking workflows \u2014 a pre-merge check a developer is waiting on stays on the synchronous API. (This is sample Q11 verbatim: split the workloads, don't move both.)\n2. <strong>No multi-turn tool calling within a batch request.<\/strong> A batch request can't execute a tool mid-request and feed results back. Agentic loops don't batch; single-shot extraction/analysis does.<\/p>\n<p>Operational skills the exam tests:\n- <strong>SLA math<\/strong>: submission cadence + 24h max processing must fit inside the SLA. Guide's example: submit in <strong>4-hour windows<\/strong> to guarantee a <strong>30-hour SLA<\/strong> given 24-hour max processing (4 + 24 &lt; 30, with margin).\n- <strong>Failure handling<\/strong>: resubmit <strong>only the failed requests<\/strong>, identified by <code>custom_id<\/code>, <em>with modifications that address why they failed<\/em> (e.g., chunk documents that blew the context limit).\n- <strong>Sample-first refinement<\/strong>: tune the prompt on a small sample <strong>before<\/strong> batching the full volume \u2014 maximizes first-pass success, minimizes expensive resubmission cycles.<\/p>\n<pre><code class=\"language-python\">batch = client.messages.batches.create(requests=[\n    {\n        &quot;custom_id&quot;: f&quot;doc-{d.id}&quot;,          # correlation key \u2014 responses come back unordered\n        &quot;params&quot;: {\n            &quot;model&quot;: &quot;claude-sonnet-4-5&quot;,\n            &quot;max_tokens&quot;: 1024,\n            &quot;tools&quot;: tools,\n            &quot;tool_choice&quot;: {&quot;type&quot;: &quot;tool&quot;, &quot;name&quot;: &quot;record_invoice&quot;},\n            &quot;messages&quot;: [{&quot;role&quot;: &quot;user&quot;, &quot;content&quot;: d.text}],\n        },\n    }\n    for d in documents\n])\n# ...poll batch status until ended; then resubmit ONLY failures by custom_id,\n# modified (e.g., chunked) to fix the failure cause.\n<\/code><\/pre>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Cut API cost; workloads = blocking pre-merge check + overnight report<\/td>\n<td>Batch the overnight report <strong>only<\/strong>; keep sync API for the pre-merge check<\/td>\n<td>No latency SLA \u2192 can't sit in a blocking path<\/td>\n<td>\"Batch both with polling\" or \"batch with timeout fallback to real-time\" (Q11 distractors)<\/td>\n<\/tr>\n<tr>\n<td>Worried batch responses come back out of order<\/td>\n<td>Correlate with <code>custom_id<\/code><\/td>\n<td>That's exactly what it's for<\/td>\n<td>\"Keep real-time calls to avoid result-ordering issues\" (Q11 distractor C)<\/td>\n<\/tr>\n<tr>\n<td>Must deliver results within a 30-hour SLA<\/td>\n<td>Compute submission cadence: e.g. 4-hour submission windows + 24h max processing<\/td>\n<td>up-to-24h window is the planning number, not the average<\/td>\n<td>Assuming batches \"usually finish faster\"<\/td>\n<\/tr>\n<tr>\n<td>Some batch requests failed (context overflow etc.)<\/td>\n<td>Resubmit only failed <code>custom_id<\/code>s, modified to fix the cause (chunk oversized docs)<\/td>\n<td>Cheapest correct recovery<\/td>\n<td>Resubmitting the entire batch; resubmitting failures unmodified<\/td>\n<\/tr>\n<tr>\n<td>About to batch 100k documents with a new prompt<\/td>\n<td>Refine the prompt on a <strong>sample set first<\/strong><\/td>\n<td>First-pass success is the cost lever; resubmission cycles at scale are expensive<\/td>\n<td>Batch first, iterate on the whole corpus<\/td>\n<\/tr>\n<tr>\n<td>Workflow needs tools executed mid-request<\/td>\n<td>Synchronous API \u2014 batch does <strong>not<\/strong> support multi-turn tool calling<\/td>\n<td>Hard API constraint<\/td>\n<td>Trying to run an agentic loop inside a batch request<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>4.6 \u2014 Multi-instance and multi-pass review architectures<\/h2>\n<h3>Concepts in plain words<\/h3>\n<p><strong>Self-review is structurally weak<\/strong>: the same session that generated the code retains its own reasoning context, so it's biased toward its own decisions. A <strong>second, independent Claude instance<\/strong> \u2014 no access to the generator's reasoning \u2014 catches subtle issues that self-review instructions or even extended thinking miss. (This is why the guide's D3 section calls out \"session context isolation\" for CI review: don't have the code-writing session review its own diff.)<\/p>\n<p><strong>Multi-pass review<\/strong> fixes attention dilution: one pass over 14 files produces uneven depth, missed bugs, and <em>contradictory<\/em> findings (flagging a pattern in one file, approving it in another). Restructure as <strong>per-file local passes<\/strong> (consistent depth on local issues) <strong>plus one cross-file integration pass<\/strong> (data flow between files). Sample Q12 tests exactly this \u2014 and its distractors are all named traps: bigger context window doesn't fix attention quality; forcing devs to split PRs shifts the burden; consensus voting across 3 runs <em>suppresses real bugs<\/em> that are only caught intermittently.<\/p>\n<p><strong>Confidence self-reporting for routing<\/strong>: have the review pass self-report a confidence score <strong>alongside each finding<\/strong> so downstream review attention can be routed (low-confidence findings get human eyes first). Nuance the exam may probe: self-reported confidence is fine as a <em>routing/prioritization<\/em> signal on findings, but D5 says it's <strong>unreliable as an escalation trigger<\/strong> for case complexity \u2014 don't use \"confidence &lt; 7 \u2192 escalate to human agent\" as primary escalation logic.<\/p>\n<pre><code class=\"language-python\"># Generator and reviewer are ISOLATED instances \u2014 reviewer never sees\n# the generator's conversation/reasoning, only the artifact.\ngen = client.messages.create(model=..., messages=[{&quot;role&quot;: &quot;user&quot;, &quot;content&quot;: task}])\ncode = gen.content[0].text\n\nreview = client.messages.create(   # fresh message list = independent instance\n    model=...,\n    tools=[finding_tool],          # schema: file, line, issue, severity,\n                                   # detected_pattern, confidence\n    tool_choice={&quot;type&quot;: &quot;any&quot;},\n    messages=[{&quot;role&quot;: &quot;user&quot;, &quot;content&quot;: f&quot;Review this code:\\n{code}&quot;}],\n)\n<\/code><\/pre>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Generated code needs quality review<\/td>\n<td>Second <strong>independent<\/strong> instance with no generator reasoning context<\/td>\n<td>Generator is biased toward its own decisions<\/td>\n<td>\"Add self-review instructions\" or \"use extended thinking\" in the same session<\/td>\n<\/tr>\n<tr>\n<td>14-file PR review: uneven depth, missed bugs, contradictory findings<\/td>\n<td>Per-file local passes + separate cross-file integration pass<\/td>\n<td>Fixes attention dilution at the root<\/td>\n<td>Bigger context window (Q12-C); force devs to split PRs (Q12-B); 2-of-3 consensus voting (Q12-D \u2014 suppresses intermittently-caught real bugs)<\/td>\n<\/tr>\n<tr>\n<td>Limited human review capacity for findings<\/td>\n<td>Model self-reports confidence per finding \u2192 route low-confidence findings to review<\/td>\n<td>Calibrated routing of scarce attention<\/td>\n<td>Using self-reported confidence as the primary <em>escalation<\/em> trigger (unreliable for case complexity \u2014 D5)<\/td>\n<\/tr>\n<tr>\n<td>Cross-file bugs (data flow) getting missed by per-file passes<\/td>\n<td>That's the job of the dedicated integration pass<\/td>\n<td>Local passes can't see cross-file flow by design<\/td>\n<td>Assuming per-file passes alone are complete<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>Memorize cold<\/h2>\n<p>Flashcard facts. If a D4 question hinges on a single detail, it's one of these.<\/p>\n<p><strong>tool_choice \u2014 exactly three values<\/strong>\n- <code>{\"type\": \"auto\"}<\/code> \u2192 model MAY return plain text instead of calling a tool\n- <code>{\"type\": \"any\"}<\/code> \u2192 model MUST call a tool, ANY tool (use: multiple schemas, unknown doc type)\n- <code>{\"type\": \"tool\", \"name\": \"extract_metadata\"}<\/code> \u2192 model MUST call THAT tool (forced)<\/p>\n<p><strong>stop_reason values<\/strong> (agentic-loop boundary, shared with D1): <code>\"tool_use\"<\/code> \u2192 execute tools and continue; <code>\"end_turn\"<\/code> \u2192 done.<\/p>\n<p><strong>Tool-use structured output<\/strong>\n- Tool definition fields: <code>name<\/code>, <code>description<\/code>, <code>input_schema<\/code> (JSON Schema)\n- Data comes back in the <code>tool_use<\/code> content block's <code>input<\/code>\n- Eliminates: JSON <strong>syntax<\/strong> errors. Does NOT eliminate: <strong>semantic<\/strong> errors (bad sums, wrong-field values)\n- API params in play: <code>tools<\/code>, <code>tool_choice<\/code>, <code>max_tokens<\/code>, <code>system<\/code><\/p>\n<p><strong>Schema design<\/strong>\n- May-be-absent field \u2192 <strong>optional/nullable<\/strong> (prevents fabrication)\n- Enum patterns: <code>\"unclear\"<\/code> for ambiguous; <code>\"other\"<\/code> + <strong>detail string field<\/strong> for extensibility\n- Format normalization rules go <strong>in the prompt<\/strong>, schema handles shape\n- Pydantic = validation layer; catches <strong>semantic<\/strong> validation errors; drives validation-retry loops<\/p>\n<p><strong>Retry-with-error-feedback \u2014 the 3 ingredients<\/strong>: original document + failed extraction + specific validation errors.\n- Retry WORKS: format mismatches, structural output errors\n- Retry CANNOT work: information absent from the source document<\/p>\n<p><strong>Self-check / feedback fields<\/strong>: <code>calculated_total<\/code> vs <code>stated_total<\/code> (discrepancy flag) \u00b7 <code>conflict_detected<\/code> boolean (inconsistent source) \u00b7 <code>detected_pattern<\/code> (FP dismissal analysis).<\/p>\n<p><strong>Message Batches API \u2014 the numbers<\/strong>\n- <strong>50%<\/strong> cost savings \u00b7 up to <strong>24-hour<\/strong> processing window \u00b7 <strong>no<\/strong> guaranteed latency SLA\n- <strong><code>custom_id<\/code><\/strong> correlates request \u2194 response (responses unordered) \u00b7 <strong>poll<\/strong> for completion\n- <strong>No multi-turn tool calling<\/strong> within a batch request\n- SLA math example: <strong>4-hour<\/strong> submission windows \u2192 guarantees <strong>30-hour<\/strong> SLA with 24h processing\n- Recovery: resubmit <strong>only failures by custom_id, modified<\/strong> (e.g., chunk oversized docs)\n- <strong>Sample-first<\/strong> prompt refinement before large-volume batch runs\n- Fits: overnight reports, weekly audits, nightly test generation. Never: blocking pre-merge checks.<\/p>\n<p><strong>Few-shot numbers<\/strong>: <strong>2\u20134 targeted<\/strong> examples for ambiguous scenarios (2\u20133 for I/O transformations, per D3). Show reasoning for why the chosen action beat plausible alternatives. Format demo fields: location, issue, severity, suggested fix.<\/p>\n<p><strong>Precision prompting<\/strong>: categorical report/skip criteria &gt; \"be conservative\" / \"only high-confidence.\" Severity = concrete code example per level. High-FP category \u2192 temporarily disable while fixing.<\/p>\n<p><strong>Multi-pass/multi-instance<\/strong>: independent instance &gt; self-review instructions &gt; extended thinking (for catching generator's own bugs). Per-file passes + cross-file integration pass. Confidence self-report per finding = routing signal, not escalation trigger.<\/p>\n<p><strong>Border facts from D3 you'll see in D4-flavored CI questions<\/strong>: <code>-p<\/code> / <code>--print<\/code> (non-interactive), <code>--output-format json<\/code>, <code>--json-schema<\/code> (structured CI output). Not D4's core, but they co-occur in Scenario 5.<\/p>\n<hr />\n<h2>Anti-pattern wall<\/h2>\n<p>Recognize these on sight \u2014 each is a wrong-answer template.<\/p>\n<table>\n<thead>\n<tr>\n<th>#<\/th>\n<th>Anti-pattern<\/th>\n<th>Why it's wrong<\/th>\n<th>Correct alternative<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>1<\/td>\n<td><strong>\"Be conservative\" / \"only report high-confidence findings\"<\/strong> as a precision fix<\/td>\n<td>Vague instructions don't change behavior; no operational definition<\/td>\n<td>Explicit categorical report/skip criteria<\/td>\n<\/tr>\n<tr>\n<td>2<\/td>\n<td><strong>Confidence-based filtering instead of criteria<\/strong><\/td>\n<td>Model confidence is uncalibrated for this<\/td>\n<td>Categories + severity anchored with code examples<\/td>\n<\/tr>\n<tr>\n<td>3<\/td>\n<td><strong>Keeping a high-FP category live while tuning<\/strong><\/td>\n<td>Poisons trust in the accurate categories<\/td>\n<td>Temporarily disable, fix, re-enable<\/td>\n<\/tr>\n<tr>\n<td>4<\/td>\n<td><strong>Prompt-parse JSON from text output<\/strong><\/td>\n<td>Syntax errors, markdown fences, drift<\/td>\n<td>tool_use with <code>input_schema<\/code><\/td>\n<\/tr>\n<tr>\n<td>5<\/td>\n<td><strong>All schema fields required \"for quality\"<\/strong><\/td>\n<td>Forces fabrication when source lacks the info<\/td>\n<td>Nullable/optional fields<\/td>\n<\/tr>\n<tr>\n<td>6<\/td>\n<td><strong>Closed enum with no escape hatch<\/strong><\/td>\n<td>Novel/ambiguous cases get force-fit into wrong buckets<\/td>\n<td><code>\"unclear\"<\/code> + <code>\"other\"<\/code> + detail field<\/td>\n<\/tr>\n<tr>\n<td>7<\/td>\n<td><strong>Assuming schema-valid = correct<\/strong><\/td>\n<td>Tool use kills syntax errors only, not semantics<\/td>\n<td>Self-check fields + validation-retry<\/td>\n<\/tr>\n<tr>\n<td>8<\/td>\n<td><strong>Blind retry (same prompt, no feedback)<\/strong><\/td>\n<td>Model has nothing new to correct against<\/td>\n<td>Doc + failed extraction + specific errors<\/td>\n<\/tr>\n<tr>\n<td>9<\/td>\n<td><strong>Retrying when the info is absent from source<\/strong><\/td>\n<td>Cannot succeed; wastes cost and latency<\/td>\n<td>Detect absence \u2192 null / fetch / human review<\/td>\n<\/tr>\n<tr>\n<td>10<\/td>\n<td><strong>Batching a blocking workflow<\/strong> (pre-merge check)<\/td>\n<td>No latency SLA; up-to-24h window<\/td>\n<td>Sync API for blocking, batch for overnight/weekly<\/td>\n<\/tr>\n<tr>\n<td>11<\/td>\n<td><strong>\"Batch with timeout fallback to real-time\"<\/strong><\/td>\n<td>Complexity papering over a wrong fit<\/td>\n<td>Match each workload to the right API<\/td>\n<\/tr>\n<tr>\n<td>12<\/td>\n<td><strong>Avoiding batch over result-ordering fears<\/strong><\/td>\n<td><code>custom_id<\/code> exists precisely for correlation<\/td>\n<td>Use <code>custom_id<\/code><\/td>\n<\/tr>\n<tr>\n<td>13<\/td>\n<td><strong>Resubmitting the whole batch (or failures unmodified)<\/strong><\/td>\n<td>Pays twice, fails identically<\/td>\n<td>Failed <code>custom_id<\/code>s only, modified (e.g., chunked)<\/td>\n<\/tr>\n<tr>\n<td>14<\/td>\n<td><strong>Full-volume batch before sample refinement<\/strong><\/td>\n<td>Iterating on 100k docs is the expensive loop<\/td>\n<td>Refine on a sample first<\/td>\n<\/tr>\n<tr>\n<td>15<\/td>\n<td><strong>Multi-turn tool use inside a batch request<\/strong><\/td>\n<td>Not supported by the Batches API<\/td>\n<td>Sync agentic loop; batch single-shot work<\/td>\n<\/tr>\n<tr>\n<td>16<\/td>\n<td><strong>Self-review in the generating session<\/strong><\/td>\n<td>Retained reasoning context biases toward own decisions<\/td>\n<td>Independent second instance<\/td>\n<\/tr>\n<tr>\n<td>17<\/td>\n<td><strong>Bigger context window to fix uneven review depth<\/strong><\/td>\n<td>Attention dilution isn't a capacity problem<\/td>\n<td>Per-file passes + integration pass<\/td>\n<\/tr>\n<tr>\n<td>18<\/td>\n<td><strong>N-run consensus voting on findings<\/strong><\/td>\n<td>Suppresses real bugs caught intermittently<\/td>\n<td>Focused passes with consistent depth<\/td>\n<\/tr>\n<tr>\n<td>19<\/td>\n<td><strong>Forcing devs to split PRs so the reviewer copes<\/strong><\/td>\n<td>Shifts burden without improving the system<\/td>\n<td>Restructure the review, not the workflow<\/td>\n<\/tr>\n<tr>\n<td>20<\/td>\n<td><strong>5\u20138 few-shot examples for a tool-routing problem with bad descriptions<\/strong><\/td>\n<td>Token overhead; root cause is the descriptions (D2)<\/td>\n<td>Fix tool descriptions first; few-shot for genuine ambiguity<\/td>\n<\/tr>\n<\/tbody>\n<\/table>","words":3561},"domain-5-context-reliability":{"title":"Domain 5 \u2014 Context Management & Reliability (15%)","group":"Domain playbooks","html":"<h1>Domain 5 \u2014 Context Management &amp; Reliability (15%)<\/h1>\n<p>~9 of 60 questions. D5 is a <strong>primary domain in 4 of the 6 scenarios<\/strong>: S1 Customer Support Agent, S2 Claude Code codegen, S3 Multi-Agent Research, S6 Structured Extraction. So even at 15% weight, D5 judgment shows up everywhere.<\/p>\n<p>The whole domain is one idea: <strong>context is a lossy, finite resource, and LLM self-assessment is unreliable \u2014 so you protect critical facts structurally, escalate on explicit signals, propagate errors with detail, and verify accuracy with real measurement, not vibes.<\/strong><\/p>\n<hr />\n<h2>5.1 \u2014 Preserve critical information across long interactions<\/h2>\n<h3>What it means<\/h3>\n<p>Long conversations degrade in two ways. (1) <strong>Summarization loss<\/strong>: when you progressively summarize history, exact numbers, dates, percentages, and customer-stated expectations get blurred into \"customer wants a refund for a recent order.\" (2) <strong>Lost in the middle<\/strong>: models reliably attend to the <em>beginning and end<\/em> of long inputs but drop findings from the middle. On top of that, <strong>verbose tool results pile up<\/strong> \u2014 an order lookup returns 40+ fields when only ~5 matter \u2014 burning tokens on junk. The fixes are structural, not prompt magic:<\/p>\n<ul>\n<li>Pull <strong>transactional facts<\/strong> (amounts, dates, order numbers, statuses) into a persistent <strong>\"case facts\" block<\/strong> injected into <em>every<\/em> prompt, <em>outside<\/em> the summarized history. Summaries can lose detail; the case-facts block cannot.<\/li>\n<li><strong>Trim tool outputs to relevant fields before they enter context<\/strong>, not after.<\/li>\n<li><strong>Put the key-findings summary at the beginning<\/strong> of aggregated inputs; organize detail under explicit section headers \u2014 mitigates position effects.<\/li>\n<li>Pass <strong>complete conversation history<\/strong> in each API request for coherence (the API is stateless \u2014 you own the transcript).<\/li>\n<li>When downstream agents have tight context budgets, make <strong>upstream agents return structured data<\/strong> (key facts, citations, relevance scores, dates, source locations, methodological context) instead of verbose prose + reasoning chains.<\/li>\n<\/ul>\n<pre><code class=\"language-python\"># Case-facts block: extracted once, injected verbatim every turn \u2014 never summarized\ncase_facts = {\n    &quot;order_id&quot;: &quot;ORD-88214&quot;,\n    &quot;amount&quot;: 149.99,\n    &quot;order_date&quot;: &quot;2026-06-12&quot;,\n    &quot;status&quot;: &quot;delivered&quot;,\n    &quot;customer_expectation&quot;: &quot;full refund, not store credit&quot;,\n}\n\ndef trim_order(raw: dict) -&gt; dict:\n    &quot;&quot;&quot;40+ fields come back; only return-relevant ones enter context.&quot;&quot;&quot;\n    keep = (&quot;order_id&quot;, &quot;status&quot;, &quot;amount&quot;, &quot;delivery_date&quot;, &quot;return_window_ends&quot;)\n    return {k: raw[k] for k in keep if k in raw}\n\nmessages = [\n    {&quot;role&quot;: &quot;user&quot;, &quot;content&quot;:\n        f&quot;&lt;case_facts&gt;{json.dumps(case_facts)}&lt;/case_facts&gt;\\n&quot;\n        f&quot;&lt;history_summary&gt;{summary}&lt;/history_summary&gt;\\n&quot;\n        f&quot;{new_user_message}&quot;}\n]\n<\/code><\/pre>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Long support session; summarization is dropping amounts/dates<\/td>\n<td>Extract transactional facts into a persistent case-facts block in every prompt, outside summarized history<\/td>\n<td>Summaries condense numbers into vagueness; a verbatim block can't drift<\/td>\n<td>\"Improve the summarization prompt\" \u2014 still probabilistic loss<\/td>\n<\/tr>\n<tr>\n<td>Multi-issue session (3 orders, 2 disputes)<\/td>\n<td>Persist structured issue data (order IDs, amounts, statuses) in a separate context layer<\/td>\n<td>Keeps issues from bleeding into each other across turns<\/td>\n<td>One mega-summary mixing all issues<\/td>\n<\/tr>\n<tr>\n<td>Order lookups dump 40+ fields, context fills fast<\/td>\n<td>Trim tool output to the ~5 relevant fields <em>before<\/em> it accumulates in context<\/td>\n<td>Tool results consume tokens disproportionately to relevance<\/td>\n<td>Bigger context window / summarize later \u2014 junk already cost you attention<\/td>\n<\/tr>\n<tr>\n<td>Aggregated multi-source input; middle findings get ignored<\/td>\n<td>Key-findings summary at the <strong>beginning<\/strong>, details under explicit section headers<\/td>\n<td>Lost-in-the-middle: start/end are reliable, middle isn't<\/td>\n<td>Assuming the model reads all positions equally<\/td>\n<\/tr>\n<tr>\n<td>Synthesis agent misinterprets subagent findings<\/td>\n<td>Require subagents to include metadata (dates, source locations, methodological context) in structured outputs<\/td>\n<td>Downstream synthesis needs the context that prose drops<\/td>\n<td>Passing raw prose findings and hoping<\/td>\n<\/tr>\n<tr>\n<td>Downstream agent has limited context budget<\/td>\n<td>Modify <strong>upstream<\/strong> agents to emit structured data (key facts, citations, relevance scores), not verbose content + reasoning chains<\/td>\n<td>Fix the producer, not the consumer<\/td>\n<td>Truncating downstream input arbitrarily<\/td>\n<\/tr>\n<tr>\n<td>Multi-turn API app loses thread<\/td>\n<td>Send complete conversation history each request<\/td>\n<td>API is stateless; coherence is your job<\/td>\n<td>Sending only the latest message<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>5.2 \u2014 Escalation and ambiguity resolution<\/h2>\n<h3>What it means<\/h3>\n<p>The exam wants you to know the <strong>three legitimate escalation triggers<\/strong> and the <strong>two famous fakes<\/strong>. Legit: (1) customer <strong>explicitly asks for a human<\/strong>, (2) <strong>policy exception or gap<\/strong> \u2014 policy is silent/ambiguous on this exact request, (3) agent <strong>can't make meaningful progress<\/strong>. Fakes: <strong>sentiment<\/strong> (frustration \u2260 complexity \u2014 an angry customer with a simple damage claim should get resolution, not a queue) and <strong>self-reported confidence scores<\/strong> (LLMs are poorly calibrated \u2014 the agent is already wrongly confident on the hard cases, so asking it to rate itself measures nothing). The fix for bad escalation calibration is <strong>explicit escalation criteria in the system prompt with few-shot examples<\/strong> showing escalate-vs-resolve \u2014 this was sample question 3, answer A. And when a lookup returns <strong>multiple matching customers<\/strong>, the agent must <strong>ask for additional identifiers<\/strong>, never pick one by heuristic (\"most recent account\").<\/p>\n<pre><code class=\"language-python\">SYSTEM = &quot;&quot;&quot;Escalate to a human ONLY when:\n1. The customer explicitly requests a human \u2014 comply immediately, no investigation first.\n2. Policy does not cover the request (e.g., competitor price match when policy\n   only covers own-site adjustments).\n3. You cannot make meaningful progress after using available tools.\n\nDo NOT escalate for: customer frustration alone, case difficulty you can still\nwork, or low confidence feelings.\n\nIf a lookup returns multiple matches, ask for another identifier\n(email, order #, billing zip). Never guess which record is theirs.\n\n&lt;example&gt;Customer: &quot;This is ridiculous, third damaged item this year!&quot; +\nphoto of damage \u2192 In policy, agent capability: acknowledge frustration,\nprocess the replacement. Do not escalate.&lt;/example&gt;\n&lt;example&gt;Customer: &quot;I just want to talk to a person.&quot; \u2192 Escalate immediately.&lt;/example&gt;\n&quot;&quot;&quot;\n<\/code><\/pre>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Agent escalates easy cases, autonomously botches policy-exception cases (55% FCR vs 80% target)<\/td>\n<td>Explicit escalation criteria + few-shot escalate-vs-resolve examples in the system prompt<\/td>\n<td>Root cause is unclear decision boundaries; proportionate first fix<\/td>\n<td>Self-reported confidence threshold (uncalibrated), sentiment routing (wrong signal), separate classifier model (over-engineered before prompt work)<\/td>\n<\/tr>\n<tr>\n<td>Customer explicitly says \"give me a human\"<\/td>\n<td>Escalate immediately, without attempting investigation first<\/td>\n<td>Explicit request is an absolute trigger<\/td>\n<td>\"Let me just try one lookup first\"<\/td>\n<\/tr>\n<tr>\n<td>Customer is furious but the issue is a standard in-policy fix<\/td>\n<td>Acknowledge frustration, offer resolution; escalate only if they <strong>reiterate<\/strong> wanting a human<\/td>\n<td>Sentiment doesn't correlate with complexity<\/td>\n<td>Auto-escalate on negative sentiment<\/td>\n<\/tr>\n<tr>\n<td>Request hits a policy gap (competitor price match; policy covers only own-site)<\/td>\n<td>Escalate \u2014 policy exceptions/gaps are for humans<\/td>\n<td>Agent has no authority to invent policy<\/td>\n<td>Agent improvises a \"reasonable\" exception<\/td>\n<\/tr>\n<tr>\n<td>get_customer returns 3 matches for \"John Smith\"<\/td>\n<td>Ask for an additional identifier (email, order #, zip)<\/td>\n<td>Wrong-account actions are unrecoverable<\/td>\n<td>Heuristic pick (most recent, best fuzzy match)<\/td>\n<\/tr>\n<tr>\n<td>Want automated escalation signal<\/td>\n<td>Encode explicit <em>criteria<\/em> (categories of case), not confidence scores<\/td>\n<td>Criteria are checkable; confidence is vibes<\/td>\n<td><code>if self_confidence &lt; 7: escalate<\/code><\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>5.3 \u2014 Error propagation across multi-agent systems<\/h2>\n<h3>What it means<\/h3>\n<p>When a subagent fails, what flows back to the coordinator determines whether recovery is possible. A generic <code>\"search unavailable\"<\/code> gives the coordinator nothing to act on. <strong>Structured error context<\/strong> \u2014 failure type, the attempted query, any partial results, and potential alternative approaches \u2014 lets the coordinator decide: retry modified query? alternative source? proceed with partials? (Sample question 8, answer A.) Order of operations: <strong>subagents recover locally first<\/strong> (retry transient timeouts themselves) and propagate only what they can't fix, <em>with<\/em> partials and what was attempted. Two hard distinctions the exam loves: an <strong>access failure<\/strong> (timeout \u2014 a retry decision is needed) is not a <strong>valid empty result<\/strong> (query succeeded, zero matches \u2014 that's a real answer, don't retry it). And when synthesis runs on incomplete inputs, the output must carry <strong>coverage annotations<\/strong>: which findings are well-supported vs. which topic areas have gaps because a source was unavailable.<\/p>\n<p>This is the multi-agent layer above D2's <code>isError<\/code> / <code>errorCategory<\/code> / <code>isRetryable<\/code> tool-level pattern \u2014 same philosophy, one level up.<\/p>\n<pre><code class=\"language-python\"># Subagent \u2192 coordinator failure payload (after local retries were exhausted)\n{\n  &quot;status&quot;: &quot;error&quot;,\n  &quot;failure_type&quot;: &quot;timeout&quot;,              # not &quot;operation failed&quot;\n  &quot;attempted&quot;: &quot;web_search('EU AI Act enforcement 2026')&quot;,\n  &quot;local_recovery&quot;: &quot;2 retries w/ backoff, both timed out&quot;,\n  &quot;partial_results&quot;: [ {...3 findings gathered before timeout...} ],\n  &quot;alternatives&quot;: [&quot;narrow query to official EU sources&quot;, &quot;use document corpus instead&quot;]\n}\n\n# Synthesis output on incomplete inputs \u2192 annotate coverage, don't fake completeness\n{\n  &quot;well_supported&quot;: [&quot;finding A (3 sources)&quot;, &quot;finding B (2 sources)&quot;],\n  &quot;coverage_gaps&quot;: [&quot;enforcement timeline \u2014 web search unavailable, not covered&quot;]\n}\n<\/code><\/pre>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Web-search subagent times out; design the failure flow<\/td>\n<td>Return structured error context: failure type + attempted query + partial results + alternatives<\/td>\n<td>Coordinator can choose retry / re-route / proceed-with-partials<\/td>\n<td>Generic \"search unavailable\" after silent internal retries \u2014 hides everything actionable<\/td>\n<\/tr>\n<tr>\n<td>Subagent hits a transient failure<\/td>\n<td>Recover <strong>locally<\/strong> (retry/backoff) first; propagate only unresolvable errors, with partials + what was attempted<\/td>\n<td>Don't make the coordinator manage every blip<\/td>\n<td>Propagating every transient error up, or retrying forever silently<\/td>\n<\/tr>\n<tr>\n<td>Query returns zero rows<\/td>\n<td>Report as <strong>valid empty result<\/strong> (success, no matches) \u2014 distinct from access failure<\/td>\n<td>Retrying a correct empty answer wastes turns; treating timeout as \"no data\" fabricates a conclusion<\/td>\n<td>One <code>null<\/code>-ish return shape for both cases<\/td>\n<\/tr>\n<tr>\n<td>One subagent fails mid-pipeline<\/td>\n<td>Proceed with partial results; annotate the gap<\/td>\n<td>Single failure shouldn't zero out all completed work<\/td>\n<td>Terminating the whole workflow on one failure<\/td>\n<\/tr>\n<tr>\n<td>Tempted to keep output \"clean\"<\/td>\n<td>Never return empty results marked as success after a failure<\/td>\n<td>Silent suppression prevents any recovery and yields confidently incomplete reports<\/td>\n<td><code>except: return []<\/code><\/td>\n<\/tr>\n<tr>\n<td>Synthesis ran with a missing source<\/td>\n<td>Coverage annotations: well-supported findings vs. gap areas due to unavailable sources<\/td>\n<td>Consumers must know what the report <em>doesn't<\/em> cover<\/td>\n<td>Uniformly confident final report<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>5.4 \u2014 Context management in large-codebase exploration<\/h2>\n<h3>What it means<\/h3>\n<p>Extended exploration sessions degrade in a recognizable way: the model starts giving <strong>inconsistent answers<\/strong> and citing <strong>\"typical patterns\"<\/strong> instead of the <em>specific classes it discovered earlier<\/em> \u2014 that phrase is the exam's symptom fingerprint for context degradation. Four mitigations, and questions hinge on picking the right one:<\/p>\n<ol>\n<li><strong>Scratchpad files<\/strong> \u2014 the agent writes key findings to a file and re-reads it for later questions. Findings survive context boundaries because they're on disk, not in the window.<\/li>\n<li><strong>Subagent delegation<\/strong> \u2014 spawn subagents for verbose investigations (\"find all test files,\" \"trace refund flow dependencies\"); the main agent keeps only summaries and stays a high-level coordinator.<\/li>\n<li><strong>Phase summaries<\/strong> \u2014 summarize each exploration phase's key findings <em>before<\/em> spawning the next phase's subagents, injecting the summary into their initial context.<\/li>\n<li><strong>/compact<\/strong> \u2014 Claude Code command to compress the current session's context when it fills with verbose discovery output.<\/li>\n<\/ol>\n<p>For long-running multi-agent jobs that might die: <strong>crash recovery via manifests<\/strong> \u2014 each agent exports structured state to a <strong>known location<\/strong>; on resume the coordinator <strong>loads the manifest<\/strong> and injects state into agent prompts. No re-exploration from zero.<\/p>\n<pre><code class=\"language-text\">project/\n\u251c\u2500\u2500 .scratch/\n\u2502   \u251c\u2500\u2500 findings.md          # agent-maintained scratchpad: key classes, file:line refs\n\u2502   \u2514\u2500\u2500 manifest.json        # crash-recovery state, exported to a KNOWN location\n\u2514\u2500\u2500 src/ ...\n\n# manifest.json \u2014 coordinator loads this on resume, injects into agent prompts\n{\n  &quot;phase&quot;: &quot;2-trace-dependencies&quot;,\n  &quot;completed&quot;: [&quot;1-map-structure&quot;],\n  &quot;agents&quot;: {\n    &quot;test-finder&quot;:  {&quot;status&quot;: &quot;done&quot;,    &quot;output&quot;: &quot;.scratch/test-files.md&quot;},\n    &quot;refund-tracer&quot;:{&quot;status&quot;: &quot;partial&quot;, &quot;last_file&quot;: &quot;src/billing/refund.py&quot;}\n  }\n}\n<\/code><\/pre>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Model starts citing \"typical patterns\" instead of specific classes it found earlier<\/td>\n<td>Maintain a scratchpad file of key findings; reference it for subsequent questions<\/td>\n<td>Disk persists; context degrades<\/td>\n<td>Re-asking the model to \"remember carefully\"<\/td>\n<\/tr>\n<tr>\n<td>Need verbose investigation (find all test files, trace a flow) mid-task<\/td>\n<td>Spawn a subagent for the question; main agent keeps high-level coordination<\/td>\n<td>Verbose output stays in the subagent's context, only the summary returns<\/td>\n<td>Main agent Grep/Reads everything itself and drowns<\/td>\n<\/tr>\n<tr>\n<td>Multi-phase exploration, phase 1 done<\/td>\n<td>Summarize phase-1 key findings, inject the summary into phase-2 subagents' initial context<\/td>\n<td>Subagents don't inherit context; fresh agents need the distilled state<\/td>\n<td>Assuming the next phase \"knows\" what phase 1 found<\/td>\n<\/tr>\n<tr>\n<td>Extended session, context filling with discovery output<\/td>\n<td><code>/compact<\/code><\/td>\n<td>Purpose-built to reduce context usage in-session<\/td>\n<td>Starting over from scratch, losing everything<\/td>\n<\/tr>\n<tr>\n<td>Long multi-agent job could crash/be interrupted<\/td>\n<td>Each agent exports structured state to a known location; coordinator loads the manifest on resume and injects it into prompts<\/td>\n<td>Resume from state, not from zero<\/td>\n<td>Relying on session history surviving a crash<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>5.5 \u2014 Human review workflows and confidence calibration<\/h2>\n<h3>What it means<\/h3>\n<p>\"97% overall accuracy\" is the exam's bait number: <strong>aggregate accuracy masks per-segment failure<\/strong> \u2014 the system can be 99.5% on invoices and 71% on handwritten receipts and still average 97%. Before you reduce human review, you must <strong>segment accuracy by document type AND by field<\/strong> and verify every segment holds. Two mechanisms make ongoing quality measurable: (1) <strong>stratified random sampling<\/strong> of <em>high-confidence<\/em> extractions \u2014 humans review a random slice of the stuff you'd otherwise auto-pass, which measures the true error rate up there and catches <strong>novel error patterns<\/strong> confidence scores won't flag; (2) <strong>field-level confidence scores calibrated against a labeled validation set<\/strong> \u2014 raw LLM confidence numbers are meaningless until you've mapped \"model says 0.9\" to an observed accuracy on labeled data, and only then do you set the auto-accept threshold. Routing: <strong>low confidence OR ambiguous/contradictory source documents \u2192 human review<\/strong>, so limited reviewer capacity goes where errors live.<\/p>\n<pre><code class=\"language-python\">def route(extraction: dict, thresholds: dict) -&gt; str:\n    # thresholds were CALIBRATED per-field on a labeled validation set \u2014\n    # not guessed, not the model's raw self-assessment taken at face value\n    if extraction[&quot;source_flags&quot;].get(&quot;ambiguous_or_contradictory&quot;):\n        return &quot;human_review&quot;\n    if any(conf &lt; thresholds[field]\n           for field, conf in extraction[&quot;field_confidence&quot;].items()):\n        return &quot;human_review&quot;\n    if random.random() &lt; 0.05:          # stratified sample of high-confidence\n        return &quot;human_review_sample&quot;    # \u2192 ongoing error rate + novel patterns\n    return &quot;auto_accept&quot;\n<\/code><\/pre>\n<h3>Decision rules<\/h3>\n<table>\n<thead>\n<tr>\n<th>Situation<\/th>\n<th>Correct move<\/th>\n<th>Why<\/th>\n<th>The trap<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>\"97% accurate \u2014 can we drop human review?\"<\/td>\n<td>Segment accuracy by document type and by field first; reduce review only if all segments hold<\/td>\n<td>Aggregates mask segment-level failure<\/td>\n<td>Trusting the headline number<\/td>\n<\/tr>\n<tr>\n<td>Auto-accepting high-confidence extractions<\/td>\n<td>Stratified random sampling of high-confidence extractions for ongoing human review<\/td>\n<td>Measures real error rate in the auto-pass lane; detects novel error patterns<\/td>\n<td>Only reviewing low-confidence items \u2014 you never learn your high-confidence error rate<\/td>\n<\/tr>\n<tr>\n<td>Want confidence-based routing<\/td>\n<td>Model outputs field-level confidence \u2192 calibrate thresholds on a <strong>labeled validation set<\/strong> \u2192 then route<\/td>\n<td>Raw LLM confidence is uncalibrated; labels anchor it to observed accuracy<\/td>\n<td>Using self-reported scores directly as thresholds (same failure as 5.2)<\/td>\n<\/tr>\n<tr>\n<td>Limited reviewer capacity<\/td>\n<td>Route low-confidence + ambiguous/contradictory-source extractions to humans first<\/td>\n<td>Prioritizes review where errors concentrate<\/td>\n<td>Uniform random review of everything, or review by document order<\/td>\n<\/tr>\n<tr>\n<td>One field type keeps failing inside a \"good\" doc type<\/td>\n<td>Per-field accuracy analysis, not per-document<\/td>\n<td>Field-level granularity finds it; doc-level averages hide it<\/td>\n<td>Whole-document accuracy as the only metric<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr />\n<h2>5.6 \u2014 Provenance and uncertainty in multi-source synthesis<\/h2>\n<h3>What it means<\/h3>\n<p>Every summarization step is a chance to sever the claim\u2192source link. The fix is <strong>structured claim-source mappings<\/strong> that subagents <em>emit<\/em> and downstream agents are <em>required to preserve and merge<\/em>: each finding carries claim, evidence excerpt, source URL/document name, and <strong>publication or data-collection date<\/strong>. Dates matter because two credible sources reporting different numbers may not conflict at all \u2014 one is 2023 data, one is 2025; without dates, <strong>temporal differences masquerade as contradictions<\/strong>. When sources genuinely conflict, the rule is: <strong>keep both values, annotate the conflict with attribution<\/strong> \u2014 the analysis agent completes its work with conflicting values included and explicitly flagged, and the <strong>coordinator decides how to reconcile<\/strong> before synthesis. Never let a mid-pipeline agent silently pick a winner. Reports should <strong>separate well-established findings from contested ones<\/strong>, preserving original source characterizations and methodological context. And rendering is content-type-appropriate: <strong>financial data as tables,
