  $('#elVoice').addEventListener('change', e => {
    const name = e.target.selectedOptions[0] ? e.target.selectedOptions[0].textContent : '';
    saveAudioPrefs({ ...audioPrefs(), elVoice: e.target.value, elVoiceName: name });
  });
  $('#elModel').addEventListener('change', e => saveAudioPrefs({ ...audioPrefs(), elModel: e.target.value }));
  $('#anthKey').addEventListener('change', e => saveAudioPrefs({ ...audioPrefs(), anthKey: e.target.value.trim() }));
  updateElStatus();
  window.scrollTo(0, 0);
}

function startDrill() {
  const scens = [...document.querySelectorAll('#scenChips input:checked')].map(i => i.dataset.scen);
  const doms = [...document.querySelectorAll('#domChips input:checked')].map(i => +i.dataset.dom);
  const count = +$('#countSel').value;
  const missOnly = $('#missOnly').checked;
  const missSet = new Set(missedIds());
  let pool = BANK.questions.filter(q => scens.includes(q.id.split('-')[0]) && doms.includes(q.domain));
  if (missOnly) pool = pool.filter(q => missSet.has(q.id));
  if (!pool.length) { alert('No questions match those filters.'); return; }
  begin({ mode: 'drill', queue: shuffle(pool).slice(0, count) });
}

function startExam() {
  const scens = shuffle(Object.keys(SCENARIOS)).slice(0, 4);
  const queue = scens.flatMap(s => shuffle(BANK.questions.filter(q => q.id.startsWith(s + '-'))));
  begin({ mode: 'exam', queue, deadline: Date.now() + queue.length * 2 * 60 * 1000 });
}

function startReview() {
  const due = dueList();
  const seen = due.filter(q => { const c = cardOf(q.id); return c && (c.r + c.w) > 0; })
                  .sort((a, b) => ((cardOf(a.id).sr || {}).due || 0) - ((cardOf(b.id).sr || {}).due || 0));
  const fresh = due.filter(q => { const c = cardOf(q.id); return !c || (c.r + c.w) === 0; });
  const queue = shuffle([...seen, ...fresh].slice(0, 30));
  if (!queue.length) { alert('Nothing due right now — you\'re caught up. Come back later, or use Drill to grind extra questions.'); return; }
  begin({ mode: 'review', queue });
}

function gradeAndNext(q, g, ok) {
  gradeCard(q.id, g, ok);
  if (g === 'again') S.queue.push(q);
  next();
}

function finishReview() {
  stopTimer(); stopSpeak(); S.done = true; homeBtn.hidden = true;
  const reviewed = S.answers.length;
  const right = S.answers.filter(a => a.ok).length;
  const remaining = dueList().length;
  app.innerHTML = `
    <div class="card score-hero">
      <div class="eyebrow">Review complete</div>
      <div class="big">${reviewed}</div>
      <div>cards reviewed · ${right} first-try correct</div>
      <div class="passnote">${remaining ? remaining + ' still due — keep going, or come back later.' : 'Caught up. Nothing else due right now.'}</div>
    </div>
    <div class="actions">
      ${remaining ? '<button class="primary" id="moreBtn">Review more</button>' : ''}
      <button class="ghost" id="progBtn">See progress</button>
      <button class="ghost" id="backBtn">Practice home</button>
    </div>`;
  const mo = $('#moreBtn'); if (mo) mo.addEventListener('click', startReview);
  $('#progBtn').addEventListener('click', showProgress);
  $('#backBtn').addEventListener('click', home);
  window.scrollTo(0, 0);
}

function begin(cfg) {
  S = { ...cfg, idx: 0, answers: [], done: false };
  homeBtn.hidden = false;
  if (S.mode === 'exam') {
    timerId = setInterval(() => {
      const el = $('#timer'); if (!el) return;
      const left = S.deadline - Date.now();
      if (left <= 0) { stopTimer(); finish(); return; }
      const m = Math.floor(left / 60000), s = Math.floor(left % 60000 / 1000);
      el.textContent = m + ':' + String(s).padStart(2, '0');
      el.classList.toggle('low', left < 10 * 60 * 1000);
    }, 500);
  }
  renderQ();
}

/* ---------- question ---------- */
function renderQ() { paintQuestion(true); }

function paintQuestion(fresh) {
  const q = S.queue[S.idx];
  const scen = q.id.split('-')[0];
  const newScen = S.idx === 0 || S.queue[S.idx - 1].id.split('-')[0] !== scen;
  if (fresh || !S.current || S.current.q !== q) S.current = { q, order: shuffle([0, 1, 2, 3]), picked: null };
  const order = S.current.order;

  app.innerHTML = `
    <div class="qhead">
      <span class="eyebrow"><b>${SCENARIOS[scen]}</b> · D${q.domain} ${DOMAINS[q.domain].name}${q.difficulty === 'stretch' ? ' · stretch' : ''}</span>
      <span class="prog">${hasTTS ? '<button class="ghost small" id="listenBtn">🔊 Listen</button>' : ''}${S.idx + 1} / ${S.queue.length}${S.mode === 'exam' ? ' <span class="timer" id="timer">—</span>' : ''}</span>
    </div>
    ${newScen && S.mode === 'exam' ? `<p class="scen-banner">Scenario: ${SCENARIOS[scen]}</p>` : ''}
    <div class="card qcard">
      <div class="stem">${fmt(q.stem)}</div>
      <div class="opts" id="opts">
        ${order.map((oi, pos) => `
          <button class="opt" data-pos="${pos}">
            <span class="key">${'ABCD'[pos]}</span>
            <span>${fmt(q.options[oi])}</span>
          </button>`).join('')}
      </div>
      <div id="verdict"></div>
      <div class="qfoot">
        <span class="hint">Keys: A–D or 1–4${hasTTS ? ' · R reads aloud' : ''}${S.mode === 'drill' ? ' · Enter for next' : ''}</span>
        <span id="nextSlot"></span>
      </div>
    </div>
  `;
  document.querySelectorAll('.opt').forEach(b => b.addEventListener('click', () => pick(+b.dataset.pos)));
  const lb = document.getElementById('listenBtn');
  if (lb) lb.addEventListener('click', speakCurrent);
  window.scrollTo(0, 0);
  if (S.current.picked != null) reveal(q, order, S.current.picked, false);
  else if (hasTTS && audioPrefs().auto) speak(questionSpeech(q, newScen));
}

function reveal(q, order, pos, speakNow) {
  const ok = order[pos] === q.correct;
  const correctPos = order.indexOf(q.correct);
  document.querySelectorAll('.opt').forEach((b, i) => {
    b.disabled = true;
    if (i === correctPos) b.classList.add('right');
    else if (i === pos) b.classList.add('wrong');
    else b.classList.add('dim');
  });
  $('#verdict').innerHTML = verdictHTML(q, ok, correctPos);
  wireStudyLinks($('#verdict'));
  wireNotes($('#verdict'));
  if (S.mode === 'review') {
    $('#nextSlot').innerHTML = `<div class="grades"><span class="grade-hint">How well did you know it? (keys 1–4)</span><button class="grade again" data-g="again">Again</button><button class="grade hard" data-g="hard">Hard</button><button class="grade good" data-g="good">Good</button><button class="grade easy" data-g="easy">Easy</button></div>`;
    document.querySelectorAll('.grade').forEach(b => b.addEventListener('click', () => gradeAndNext(q, b.dataset.g, ok)));
    const sug = document.querySelector(ok ? '.grade.good' : '.grade.again'); if (sug) sug.focus();
  } else {
    $('#nextSlot').innerHTML = `<button class="ghost small" id="askBtn">🎤 Ask the tutor</button> <button class="primary" id="nextBtn">${S.idx + 1 < S.queue.length ? 'Next question' : 'See results'}</button>`;
    $('#nextBtn').addEventListener('click', next);
    $('#askBtn').addEventListener('click', () => openTutor({ kind: 'question', q }));
    $('#nextBtn').focus();
  }
  if (speakNow && hasTTS && audioPrefs().auto) speak(verdictSpeech({ q, order, pos, ok }));
}

function resumeSession() {
  if (!S.mode || S.done || !S.current) { home(); return; }
  setTab('practice'); homeBtn.hidden = false;
  paintQuestion(false);
}

function pick(pos) {
  if (S.current.picked != null) return;
  stopSpeak();
  const { q, order } = S.current;
  S.current.picked = pos;
  const ok = order[pos] === q.correct;
  S.answers.push({ q, order, pos, ok });
  recordAnswer(q.id, ok);
  if (S.mode === 'exam') { next(); return; }
  reveal(q, order, pos, true);
}

function next() {
  stopSpeak();
  if (S.idx + 1 < S.queue.length) { S.idx++; renderQ(); }
  else finish();
}

document.addEventListener('keydown', e => {
  if (e.target.matches('input, select, textarea')) return;
  const k = e.key.toUpperCase();
  if (k === 'R' && hasTTS) {
    if (S.current && !S.done) { e.preventDefault(); speakCurrent(); return; }
    if (currentDoc) { e.preventDefault(); speakDocFrom(0); return; }
  }
  if (!S.mode || S.done || !S.current) return;
  if (S.mode === 'review' && S.current.picked != null) {
    const g = { '1': 'again', '2': 'hard', '3': 'good', '4': 'easy', ' ': 'good' }[e.key];
    if (g) { e.preventDefault(); gradeAndNext(S.current.q, g, S.answers[S.answers.length - 1].ok); }
    return;
  }
  const map = { A: 0, B: 1, C: 2, D: 3, 1: 0, 2: 1, 3: 2, 4: 3 };
  if (k in map && S.current.picked == null) { e.preventDefault(); pick(map[k]); }
  else if (e.key === 'Enter' && S.mode === 'drill' && S.current.picked != null) {
    const btn = $('#nextBtn'); if (btn && document.activeElement !== btn) { e.preventDefault(); next(); }
  }
});

/* ---------- results ---------- */
function finish() {
  if (S.mode === 'review') { finishReview(); return; }
  stopTimer(); stopSpeak(); S.done = true; homeBtn.hidden = true;
  const total = S.answers.length;
  const right = S.answers.filter(a => a.ok).length;
  const pct = total ? Math.round(100 * right / total) : 0;
  const pass = pct >= PASS_PCT;
  if (S.mode === 'exam' && total === S.queue.length) recordExam(pct);

  const byDom = {}, byScen = {};
  for (const a of S.answers) {
    const d = byDom[a.q.domain] = byDom[a.q.domain] || { r: 0, t: 0 };
    d.t++; if (a.ok) d.r++;
    const s = byScen[a.q.id.split('-')[0]] = byScen[a.q.id.split('-')[0]] || { r: 0, t: 0 };
    s.t++; if (a.ok) s.r++;
  }
  const misses = S.answers.filter(a => !a.ok);

  app.innerHTML = `
    <div class="card score-hero">
      <div class="eyebrow">${S.mode === 'exam' ? 'Exam simulation' : 'Drill'} complete</div>
      <div class="big">${pct}<small>%</small></div>
      <div>${right} of ${total} correct</div>
      <span class="badge ${pass ? 'pass' : 'fail'}">${pass ? 'On pass pace' : 'Below pass line'}</span>
      <div class="passnote">Real exam passes at 720/1000 scaled — roughly ${PASS_PCT}% is the working target.</div>
    </div>

    <div class="section-label">By domain</div>
    <div class="card bars">
      ${Object.keys(byDom).sort().map(d => bar('D' + d + ' · ' + DOMAINS[d].name, byDom[d])).join('')}
    </div>

    ${Object.keys(byScen).length > 1 ? `
    <div class="section-label">By scenario</div>
    <div class="card bars">
      ${Object.keys(byScen).sort().map(s => bar(SCENARIOS[s], byScen[s])).join('')}
    </div>` : ''}

    ${misses.length ? `
    <div class="section-label">Review your ${misses.length} miss${misses.length > 1 ? 'es' : ''}</div>
    ${misses.map(a => {
      const corrPos = a.order.indexOf(a.q.correct);
      return `<details class="miss">
        <summary>${fmt(a.q.stem)}</summary>
        <div class="body">
          <p class="yourpick"><b>Your answer:</b> ${fmt(a.q.options[a.order[a.pos]])}</p>
          <p class="rightpick"><b>Correct (${'ABCD'[corrPos]}):</b> ${fmt(a.q.options[a.q.correct])}</p>
          <p>${fmt(a.q.explanation)}</p>
          ${a.q.rule ? `<div class="rule"><b>The rule</b>${fmt(a.q.rule)}</div>` : ''}
          <div class="study"><div class="study-lbl">Where to study this</div>${(STUDYMAP[a.q.id] || {}).focus ? `<p class="study-focus">${esc(STUDYMAP[a.q.id].focus)}</p>` : ''}<div class="slinks">${studyLinksHTML(a.q)}</div></div>
          <label class="note-lbl">Your note<textarea class="note" data-qid="${a.q.id}" rows="2" placeholder="A memory hook, why you missed it…">${esc(getNote(a.q.id))}</textarea></label>
          <p class="hint">${SCENARIOS[a.q.id.split('-')[0]]} · D${a.q.domain} ${DOMAINS[a.q.domain].name}</p>
        </div>
      </details>`;
    }).join('')}` : `<p class="sub" style="margin-top:20px">Clean sheet. Go take the real practice test.</p>`}

    <div class="actions">
      <button class="primary" id="againBtn">${S.mode === 'exam' ? 'New exam sim' : 'Drill again'}</button>
      ${misses.length ? '<button class="ghost" id="missBtn">Drill these misses now</button>' : ''}
      <button class="ghost" id="backBtn">Practice home</button>
    </div>
  `;
  $('#againBtn').addEventListener('click', () => S.mode === 'exam' ? startExam() : begin({ mode: 'drill', queue: shuffle(S.queue) }));
  $('#backBtn').addEventListener('click', home);
  const mb = $('#missBtn');
  if (mb) mb.addEventListener('click', () => begin({ mode: 'drill', queue: shuffle(misses.map(a => a.q)) }));
  wireStudyLinks(app); wireNotes(app);
  window.scrollTo(0, 0);
}

function bar(label, e) {
  const p = Math.round(100 * e.r / e.t);
  return `<div class="bar-row">
    <span>${label}</span>
    <span class="track"><span class="fill ${p < PASS_PCT ? 'lowacc' : ''}" style="width:${p}%"></span></span>
    <span class="num">${e.r}/${e.t} · ${p}%</span>
  </div>`;
}

function showProgress() {
  setTab('progress'); currentDoc = null; stopSpeak(); S = {}; homeBtn.hidden = true;
  const st = loadStats(); const Q = st.q || {};
  const status = { new: 0, learning: 0, young: 0, mature: 0 };
  let due = 0;
  for (const q of BANK.questions) { status[cardStatus(q.id)]++; if (isDue(q.id)) due++; }
  const total = BANK.questions.length;
  const right = Object.values(Q).reduce((n, e) => n + (e.r || 0), 0);
  const totAns = Object.values(Q).reduce((n, e) => n + (e.r || 0) + (e.w || 0), 0);
  const acc = totAns ? Math.round(100 * right / totAns) : null;

  const agg = (keyFn) => {
    const m = {};
    for (const q of BANK.questions) {
      const k = keyFn(q); const e = m[k] = m[k] || { r: 0, w: 0, mature: 0, n: 0 };
      const c = Q[q.id]; e.n++;
      if (c) { e.r += c.r || 0; e.w += c.w || 0; }
      if (cardStatus(q.id) === 'mature') e.mature++;
    }
    return m;
  };
  const byDom = agg(q => q.domain), byScen = agg(q => q.id.split('-')[0]);
  const accOf = e => (e.r + e.w) ? Math.round(100 * e.r / (e.r + e.w)) : null;

  const row = (label, docId, e) => {
    const a = accOf(e);
    return `<div class="bar-row"><span><a class="slink" data-doc="${docId}">${label}</a></span>
      <span class="track"><span class="fill ${a != null && a < PASS_PCT ? 'lowacc' : ''}" style="width:${a || 0}%"></span></span>
      <span class="num">${a == null ? '—' : a + '%'} · ${e.mature}/${e.n}</span></div>`;
  };

  const seenDoms = Object.keys(DOMAINS).filter(d => accOf(byDom[d]) != null).sort((x, y) => accOf(byDom[x]) - accOf(byDom[y]));
  const focusDoms = seenDoms.slice(0, 2);
  const misses = BANK.questions.filter(q => Q[q.id] && Q[q.id].last === 'w');

  app.innerHTML = `
    <div class="eyebrow">Claude Certified Architect — Foundations</div>
    <h1>Progress</h1>
    <p class="sub">Your mastery, what's due, and exactly where to study each weak spot. Every bar and link opens the matching study doc.</p>

    <div class="tiles">
      <div class="tile ${due ? 'hot' : ''}"><b>${due}</b><span>due now</span></div>
      <div class="tile"><b>${status.mature}/${total}</b><span>mastered</span></div>
      <div class="tile"><b>${status.learning + status.young}</b><span>learning</span></div>
      <div class="tile"><b>${status.new}</b><span>not started</span></div>
      <div class="tile"><b>${acc == null ? '—' : acc + '%'}</b><span>lifetime accuracy</span></div>
      <div class="tile"><b>${st.bestExam != null ? st.bestExam + '%' : '—'}</b><span>best exam sim</span></div>
    </div>

    ${due ? `<button class="review-banner" id="progReview"><div class="rb-main"><h2>Review now</h2><p>Clear today's due cards before they pile up.</p></div><div class="rb-count"><b>${due}</b><span>due</span></div></button>` : ''}

    <div class="section-label">Mastery by domain — weakest first</div>
    <div class="card bars prog">${Object.keys(DOMAINS).sort((x, y) => (accOf(byDom[x]) == null ? 999 : accOf(byDom[x])) - (accOf(byDom[y]) == null ? 999 : accOf(byDom[y]))).map(d => row(`D${d} · ${DOMAINS[d].name} <em class="wt">${DOMAINS[d].w}</em>`, DOMAIN_DOC[d], byDom[d])).join('')}</div>

    <div class="section-label">Mastery by scenario</div>
    <div class="card bars prog">${Object.keys(SCENARIOS).map(s => row(SCENARIOS[s], SCEN_DOC[s], byScen[s])).join('')}</div>

    ${focusDoms.length ? `<div class="section-label">Study next</div>${focusDoms.map(d => {
      const princ = {};
      misses.filter(q => q.domain == d).forEach(q => ((STUDYMAP[q.id] || {}).principles || []).forEach(p => princ[p.id] = p.title));
      const pLinks = Object.keys(princ).map(id => `<a class="slink" data-doc="${START_DOC}" data-anchor="${id}.">Start Here · ${id}</a>`).join('');
      return `<div class="focus-card">
        <h3>D${d} · ${DOMAINS[d].name} — ${accOf(byDom[d])}% (${DOMAINS[d].w} of the exam)</h3>
        <p>Read the domain playbook${pLinks ? ', then the principles behind the ones you missed' : ''}. Then drill it back up.</p>
        <div class="slinks"><a class="slink" data-doc="${DOMAIN_DOC[d]}">D${d} playbook</a>${pLinks}</div>
      </div>`;
    }).join('')}` : ''}

    ${misses.length ? `<div class="section-label">Missed questions (${misses.length})</div>
      ${misses.map(q => missDetailHTML(q)).join('')}
      <div class="actions"><button class="primary" id="drillMiss">Drill these ${misses.length}</button></div>`
      : `<p class="sub" style="margin-top:20px">No misses on record yet — drill or review to start filling this in.</p>`}

    <div class="actions" style="margin-top:26px">
      <button class="ghost" id="toPractice">← Practice</button>
      <button class="ghost" id="toStudy">Study docs</button>
    </div>`;
  wireStudyLinks(app); wireNotes(app);
  const pr = $('#progReview'); if (pr) pr.addEventListener('click', startReview);
  const dm = $('#drillMiss'); if (dm) dm.addEventListener('click', () => begin({ mode: 'drill', queue: shuffle(misses.slice()) }));
  $('#toPractice').addEventListener('click', home);
  $('#toStudy').addEventListener('click', showStudy);
  window.scrollTo(0, 0);
}

/* ---------- Learning Path (7-phase framing) ---------- */
function pathCard(n, title, desc, bodyHtml, bodyId) {
  return `<div class="card path-step">
    <div class="path-head"><span class="path-num">${n}</span><div><h2>${esc(title)}</h2><p>${esc(desc)}</p></div></div>
    <div class="path-body" id="${bodyId}">${bodyHtml}</div>
  </div>`;
}

/* Phase 1 — Break it Down: weakest-domain-first pre-read list (reuses Progress's existing
   weakest-first diagnostic ordering — mastery ascending, not the Phase-5 admission weighting). */
function renderP1Body() {
  const doms = Object.keys(DOMAINS).sort((a, b) => domainMastery(a) - domainMastery(b));
  return `<div class="path-domlist">
    ${doms.map(d => `<button class="path-dom" data-doc="${DOMAIN_DOC[d]}">
      <span class="t">D${d} · ${DOMAINS[d].name}</span>
      <span class="m">${DOMAINS[d].w} of exam · ${domainMastery(d)}% mastery</span>
    </button>`).join('')}
  </div>`;
}
function wireP1() {
  document.querySelectorAll('#pathP1Body .path-dom').forEach(b => b.addEventListener('click', () => showDoc(b.dataset.doc)));
}

/* Phase 2 — Lock it In: goal + commitment ritual */
function renderP2Body() {
  const g = goalPrefs();
  if (g && !pathEditingGoal) {
    return `<p class="path-goal-set"><b>Goal:</b> ${esc(g.what)} — ${esc(g.minutes)} min/day, ${esc(g.days)} days/week, ${esc(g.weeks)} weeks<br>
      <b>Reward:</b> ${esc(g.reward)} &nbsp;·&nbsp; <b>Obstacle:</b> ${esc(g.obstacle)}</p>
      <div>${(g.locks || []).map(l => `<span class="path-chip">${esc(l)}</span>`).join('') || '<span class="path-chip">No locking mechanisms picked yet</span>'}</div>
      <div class="row">
        <button class="ghost small" id="goalCopy">Copy commitment message</button>
        <button class="ghost small" id="goalEdit">Edit goal</button>
      </div>`;
  }
  const w = g || {};
  return `<div class="row" style="margin-top:0">
      <label>Goal <input id="goalWhat" placeholder="e.g. pass the CCAF exam" value="${esc(w.what || '')}" style="font:inherit;font-size:13px;background:var(--surface);color:var(--ink);border:1px solid var(--line-strong);border-radius:6px;padding:4px 8px;width:220px"></label>
      <label>Min/day <input id="goalMinutes" type="number" min="1" value="${esc(String(w.minutes || 30))}" style="font:inherit;font-size:13px;background:var(--surface);color:var(--ink);border:1px solid var(--line-strong);border-radius:6px;padding:4px 8px;width:70px"></label>
      <label>Days/wk <input id="goalDays" type="number" min="1" max="7" value="${esc(String(w.days || 5))}" style="font:inherit;font-size:13px;background:var(--surface);color:var(--ink);border:1px solid var(--line-strong);border-radius:6px;padding:4px 8px;width:60px"></label>
      <label>Weeks <input id="goalWeeks" type="number" min="1" value="${esc(String(w.weeks || 4))}" style="font:inherit;font-size:13px;background:var(--surface);color:var(--ink);border:1px solid var(--line-strong);border-radius:6px;padding:4px 8px;width:60px"></label>
    </div>
    <div class="row">
      <label>Reward <input id="goalReward" placeholder="what you get for hitting it" value="${esc(w.reward || '')}" style="font:inherit;font-size:13px;background:var(--surface);color:var(--ink);border:1px solid var(--line-strong);border-radius:6px;padding:4px 8px;width:220px"></label>
      <label>Obstacle <input id="goalObstacle" placeholder="what's most likely to stop you" value="${esc(w.obstacle || '')}" style="font:inherit;font-size:13px;background:var(--surface);color:var(--ink);border:1px solid var(--line-strong);border-radius:6px;padding:4px 8px;width:220px"></label>
    </div>
    <div class="path-locks">
      ${LOCK_MECHANISMS.map(l => `<label><input type="checkbox" class="goalLock" value="${esc(l)}" ${(w.locks || []).includes(l) ? 'checked' : ''}>${esc(l)}</label>`).join('')}
    </div>
    <div class="row"><button class="primary" id="goalSave">Save goal &amp; commitment</button></div>`;
}
function wireP2() {
  const el = document.getElementById('pathP2Body');
  const gs = el.querySelector('#goalSave');
  if (gs) gs.addEventListener('click', () => {
    const g = {
      what: el.querySelector('#goalWhat').value.trim(),
      minutes: +el.querySelector('#goalMinutes').value || 30,
      days: +el.querySelector('#goalDays').value || 5,
      weeks: +el.querySelector('#goalWeeks').value || 4,
      reward: el.querySelector('#goalReward').value.trim(),
      obstacle: el.querySelector('#goalObstacle').value.trim(),
      locks: [...el.querySelectorAll('.goalLock:checked')].map(c => c.value),
    };
    saveGoal(g); pathEditingGoal = false;
    el.innerHTML = renderP2Body(); wireP2();
  });
  const cp = el.querySelector('#goalCopy');
  if (cp) cp.addEventListener('click', () => {
    const msg = goalMessage(goalPrefs());
    if (navigator.clipboard) navigator.clipboard.writeText(msg).then(() => alert('Commitment message copied.')).catch(() => prompt('Copy your commitment message:', msg));
    else prompt('Copy your commitment message:', msg);
  });
  const ed = el.querySelector('#goalEdit');
  if (ed) ed.addEventListener('click', () => { pathEditingGoal = true; el.innerHTML = renderP2Body(); wireP2(); });
}

/* Phase 3 — Map it Out: domain -> scenario -> principle tree, reusing the existing study-link graph */
function buildMapTree() {
  const tree = {};
  for (const q of BANK.questions) {
    const scen = q.id.split('-')[0];
    tree[q.domain] = tree[q.domain] || {};
    tree[q.domain][scen] = tree[q.domain][scen] || new Map();
    const sm = STUDYMAP[q.id] || {};
    (sm.principles || []).forEach(p => tree[q.domain][scen].set(p.id, p.title || ''));
  }
  return tree;
}
function renderP3Body() {
  const tree = buildMapTree();
  return Object.keys(DOMAINS).map(d => `
    <details class="map-node">
      <summary><a class="slink" data-doc="${DOMAIN_DOC[d]}">D${d} · ${DOMAINS[d].name}</a></summary>
      <div class="map-children">
        ${Object.keys(tree[d] || {}).map(s => `
          <details class="map-node">
            <summary><a class="slink" data-doc="${SCEN_DOC[s]}">${SCENARIOS[s]}</a></summary>
            <div class="map-children">
              ${[...tree[d][s].entries()].map(([pid, title]) => `<a class="slink map-leaf" data-doc="${START_DOC}" data-anchor="${pid}.">${pid} · ${esc(title)}</a>`).join('') || '<span class="map-leaf" style="color:var(--ink-soft)">No principle anchors recorded for this pair yet.</span>'}
            </div>
          </details>`).join('')}
      </div>
    </details>`).join('');
}

/* Phase 4 — Make it Simple: AGENT-4's build; this is just the framing + a stand-in link */
function renderP4Body() {
  return `<p class="sub" style="margin:0 0 10px">Coming soon — explain an answer out loud and the tutor grades your reasoning against the official explanation. In the meantime, hit 🎤 Ask on any answered question in Practice and talk through your reasoning with the tutor — same "why" muscle.</p>
    <button class="ghost small" id="p4ToPractice">Go to Practice</button>`;
}
function wireP4() {
  const b = document.getElementById('pathP4Body').querySelector('#p4ToPractice');
  if (b) b.addEventListener('click', () => { if (guardSession()) home(); });
}

/* Phase 5 — Make it Stick: loading-strategy new-card intake plan */
function renderP5Body() {
  const lp = loadingPrefs();
  const neverStarted = admissionOrder().length;
  const cap = newCardCapToday(lp, BANK.questions.length);
  const unlocked = Math.min(cap, neverStarted);
  const planSet = !!(lp.examDate && lp.studyStart);
  return `<div class="row" style="margin-top:0">
      <label>Pace <select id="planLevel">
        <option value="beginner" ${lp.level === 'beginner' ? 'selected' : ''}>Back-loaded — ease in, ramp through the middle</option>
        <option value="intermediate" ${lp.level === 'intermediate' ? 'selected' : ''}>Level-loaded — steady pace</option>
        <option value="advanced" ${lp.level === 'advanced' ? 'selected' : ''}>Front-loaded — hit it hard early, coast into review</option>
      </select></label>
      <label>Exam date <input type="date" id="planExamDate" value="${lp.examDate || ''}" style="font:inherit;font-size:13px;background:var(--surface);color:var(--ink);border:1px solid var(--line-strong);border-radius:6px;padding:4px 8px"></label>
      <button class="ghost small" id="planSave">Save plan</button>
    </div>
    <p class="audio-note">${planSet
      ? `New cards unlocked today: <b>${unlocked}</b> of ${neverStarted} not-yet-started. Cards you've already started keep reviewing on their normal schedule, unaffected.`
      : `No exam date set — every new card is unlocked, same as today. Set a pace and an exam date to ramp new cards toward it instead.`}</p>`;
}
function wireP5() {
  const el = document.getElementById('pathP5Body');
  const b = el.querySelector('#planSave');
  if (b) b.addEventListener('click', () => {
    const level = el.querySelector('#planLevel').value;
    const examDate = el.querySelector('#planExamDate').value || null;
    const prev = loadingPrefs();
    const studyStart = examDate ? (prev.studyStart || new Date().toISOString().slice(0, 10)) : null;
    saveLoadingPrefs({ level, examDate, studyStart });
    el.innerHTML = renderP5Body(); wireP5();
  });
}

/* Phase 6 — Make it Real: the build exercises, already in the Study doc list */
function renderP6Body() {
  const ids = ['exercise-1-2-agent-and-claude-code', 'exercise-3-4-extraction-and-research'];
  return `<div class="path-domlist">
    ${ids.filter(id => DOCS.items[id]).map(id => `<button class="path-dom" data-doc="${id}"><span class="t">${esc(DOCS.items[id].title)}</span><span class="m">Build exercise</span></button>`).join('')}
  </div>`;
}
function wireP6() {
  document.querySelectorAll('#pathP6Body .path-dom').forEach(b => b.addEventListener('click', () => showDoc(b.dataset.doc)));
}

/* Phase 7 — Make it Yours: end-of-study reflection */
function renderP7Body() {
  const r = reflectionPrefs();
  return `${REFLECTION_QS.map((q, i) => `<div class="path-refl-q">${esc(q)}</div><textarea class="note reflAns" data-i="${i}" rows="2" placeholder="Your answer…">${esc((r.answers && r.answers[i]) || '')}</textarea>`).join('')}
    <div class="row"><button class="ghost small" id="reflSave">Save reflection</button>${r.savedAt ? `<span class="audio-note">Saved ${esc(r.savedAt)}</span>` : ''}</div>`;
}
function wireP7() {
  const el = document.getElementById('pathP7Body');
  const b = el.querySelector('#reflSave');
  if (b) b.addEventListener('click', () => {
    const answers = [...el.querySelectorAll('.reflAns')].sort((a, b) => +a.dataset.i - +b.dataset.i).map(t => t.value);
    saveReflection({ answers, savedAt: new Date().toISOString().slice(0, 10) });
    el.innerHTML = renderP7Body(); wireP7();
  });
}

let pathEditingGoal = false;
function showPath() {
  setTab('path'); currentDoc = null; stopSpeak(); S = {}; homeBtn.hidden = true;
  pathEditingGoal = false;
  app.innerHTML = `
    <div class="eyebrow">Claude Certified Architect — Foundations</div>
    <h1>Learning Path</h1>
    <p class="sub">The 7-phase Super-Learner method, mapped onto Study, Practice, and Progress — pre-read, lock in, connect, teach back, make it stick, apply it, make it yours.</p>
    ${pathCard(1, 'Break it Down', 'Pre-read each domain playbook — skim titles, headings, and numbers before a real read — weakest domain first.', renderP1Body(), 'pathP1Body')}
    ${pathCard(2, 'Lock it In', 'Commit to a goal, a cadence, a reward — and real locking mechanisms to keep you honest.', renderP2Body(), 'pathP2Body')}
    ${pathCard(3, 'Map it Out', "Every question links to its domain, its scenario, and the principles behind it — explore it as a map, not a list.", renderP3Body(), 'pathP3Body')}
    ${pathCard(4, 'Make it Simple', 'Teach-back: explain out loud why an answer is right, and get graded on what you missed.', renderP4Body(), 'pathP4Body')}
    ${pathCard(5, 'Make it Stick', 'Spaced repetition with a loading strategy — how fast brand-new cards get introduced toward your exam date.', renderP5Body(), 'pathP5Body')}
    ${pathCard(6, 'Make it Real', 'Apply the domains — the build exercises turn them into something you actually built.', renderP6Body(), 'pathP6Body')}
    ${pathCard(7, 'Make it Yours', "A short reflection once you're passing — what you'd change, who'd benefit, what actually stuck.", renderP7Body(), 'pathP7Body')}
  `;
  wireP1(); wireP2(); wireP4(); wireP5(); wireP6(); wireP7();
  wireStudyLinks(app);
  window.scrollTo(0, 0);
}

applyDisplay();
initTutor();
showStudy();
</script>
